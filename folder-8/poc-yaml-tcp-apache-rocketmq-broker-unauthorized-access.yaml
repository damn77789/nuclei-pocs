id: apache-rocketmq-broker-unauthorized-access

info:
  name: Apache RocketMQ Broker Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects unauthorized access to Apache RocketMQ Broker by sending a crafted payload and checking for specific response indicators.
  tags: configuration

tcp:
  - inputs:
      - data: ""
    host:
      - "{{Hostname}}"
    port: 10911
    read-size: 1024
    matchers-condition: and
    matchers:
      - type: word
        part: data
        words:
          - "\"serializeTypeCurrentRPC\""
          - "\"code\":0"
      - type: word
        part: data
        words:
          - "\"opaque\""
          - "\"version\""
      - type: word
        part: data
        words:
          - "HTTP"
        negative: true
      - type: word
        part: data
        words:
          - "FTP"
        negative: true
