id: wayos-firewall-account-password-leak
info:
  name: Wayos Firewall Account Password Leak
  author: ProjectDiscoveryAI
  severity: medium
  tags: info-leak,wayos,firewall
http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"name\""
        part: body
      - type: word
        words:
          - "var persons ="
        part: body
      - type: regex
        regex:
          - "\"password\":\"[0-9a-f]{32}\""
        part: body
