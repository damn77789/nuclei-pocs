id: poc-yaml-weaver-e-cology-setup-info-leak
info:
  name: E-cology Setup Information Disclosure
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    This template detects information disclosure in 泛微OA E-cology setup by accessing the `ecology_dev.zip` file which contains sensitive information.
  tags: info-leak
http:
  - method: GET
    path:
      - "{{BaseURL}}/cloudstore/ecode/setup/ecology_dev.zip"
    headers:
      Range: bytes=0-500
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 206
      - type: dsl
        dsl:
          - "contains(body, '\x50\x4b\x03\x04')"
          - "contains(body, 'ecology/WEB-INF')"
