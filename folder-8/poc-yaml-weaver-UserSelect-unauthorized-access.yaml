id: poc-yaml-weaver-userselect-unauthorized-access
info:
  name: 泛微OA E-Office UserSelect Unauthorized Access
  author: ProjectDiscoveryAI
  severity: medium
  tags: unauthorized-access

http:
  - raw:
      - |
        GET /UserSelect/ HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "<title>选择人员</title>"
      - type: status
        status:
          - 200

  - raw:
      - |
        GET /UserSelect HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: status
        status:
          - 301
