id: poc-yaml-yisaitong-esafenet-GetValidateLoginUserService-xstream-deserialize
info:
  name: 亿赛通 电子文档安全管理系统 GetValidateLoginUserService XStream反序列化漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 反序列化
  description: |
    亿赛通电子文档安全管理系统存在反序列化漏洞，攻击者可以利用此漏洞发送恶意数据包，执行未授权操作。

http:
