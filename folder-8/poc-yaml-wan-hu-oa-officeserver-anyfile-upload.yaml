id: wanhu-oa-officeserver-anyfile-upload
info:
  name: 万户OA OfficeServer Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload
  description: |
    万户OA OfficeServer contains an arbitrary file upload vulnerability that allows attackers to upload malicious files to the server.
http:
  - raw:
      - |
        POST /defaultroot/public/iWebOfficeSign/OfficeServer.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 0
    matchers-condition: or
    matchers:
      - type: word
        words:
          - "0               客户端发送数据包错误"
        part: body
      - type: word
        words:
          - "              0               客户端发送数据包错误!"
        part: body
