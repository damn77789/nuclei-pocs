  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects a SQL Injection vulnerability in Yongyou NC's querygoodsgridbycode endpoint, allowing potential exploitation by injecting malicious SQL queries.

