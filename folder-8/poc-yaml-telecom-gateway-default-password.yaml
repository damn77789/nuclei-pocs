id: telecom-gateway-default-password
info:
  name: Telecom Gateway Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: access-control
  description: |
    This template checks for default credentials in Telecom Gateway management interfaces.

http:
  - raw:
      - |
        GET /manager/index.php HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: status
        status:
          - 200

  - raw:
      - |
        POST /manager/login.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        Name=admin&Pass=admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<title>电信网关服务器管理后台</title>"
          - "index-shang.php"
          - "di.php"
