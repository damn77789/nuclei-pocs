id: poc-yaml-subconverter-identify
info:
  name: Identify Subconverter
  author: ProjectDiscoveryAI
  severity: info
  tags: identify

http:
  - method: GET
    path:
      - "{{BaseURL}}/version"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "subconverter v"
        part: body
      - type: word
        words:
          - "backend"
        part: body
