id: tongda-oa-identify

info:
  name: Tongda OA Identification
  author: ProjectDiscoveryAI
  severity: info
  tags: identify

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/oa/"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "RSAKey"
          - "module/captcha/captcha_output.php"
