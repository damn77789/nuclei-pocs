id: wordpress-wpvivid-backup-migration-sqli
info:
  name: WordPress WPvivid Backup&Migration Plugin SQL Injection Vulnerability (CVE-2024-1981)
  author: ProjectDiscoveryAI
  severity: critical
  tags: CVE-2024-1981
  description: |
    Detects the presence of the WordPress WPvivid Backup&Migration plugin and identifies a version vulnerable to SQL injection (<= 0.9.68).

variables:
  vulnerable_version: "0.9.68"

http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-content/plugins/wpvivid-backuprestore/readme.txt"
    extractors:
      - type: regex
        name: version
        regex:
          - "Stable tag\x3a ([0-9.]+)"
        part: body
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Stable tag"
        part: body
      - type: dsl
        dsl:
          - "compare_versions(version, '<='+vulnerable_version)"
