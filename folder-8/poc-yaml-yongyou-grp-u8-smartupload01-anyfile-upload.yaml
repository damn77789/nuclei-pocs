      </Item6>
      <Item7 Class="Text">
      <Variable>=$学生表</Variable>
      <Border/>
      <Cell>
      <Row>0</Row>
      <Col>1</Col>
      <ColSpan>3</ColSpan>
      </Cell>
      </Item7>
      <Item8 Class="Text">
      <Variable>=$学生表.value()</Variable>
      <Border/>
      <Cell>
      <Row>1</Row>
      <Col>1</Col>
      <ColSpan>3</ColSpan>
      </Cell>
      </Item8>
      <Item9 Class="Text">
      <Variable>=$学生表.getName()</Variable>
      <Border/>
      <Cell>
      <Row>2</Row>
      <Col>1</Col>
      <ColSpan>3</ColSpan>
      </Cell>
      </Item9>
      <Item10 Class="RowPanel">
      <Cell>
      <Row>4</Row>
      <Col>0</Col>
      <ColSpan>4</ColSpan>
      </Cell>
      <Children ItemClass="Text">
      <Item0> <Variable></Variable>
      <Border/>
      <Cell>
      <Row>4</Row>
      <Col>3</Col>
      </Cell>
      </Item0>
      <Item1>
      <Variable></Variable>
      <Border/>
