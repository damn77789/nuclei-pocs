      </Item10>
      </Children>
      <ColumnWidths>60,60,60,60</ColumnWidths>
      <RowHeights>20,20,20,20,20</RowHeights>
      </Item0>
      </Children>
      <Type>102</Type>
      </Item2>
      </Children>
      </Page>
      <NodeSource>
      <Children ItemClass="ArrayNodeSource">
      <Item0>
      <Children ItemClass="ArrayNodeSource">
      <Item0>
      <TagName>成员</TagName>
      <Expression>$.value()</Expression>
      </Item0>
      </Children>
      <TagName>学生表</TagName>
      <Expression>new Object{"{{content}}"}</Expression>
      </Item0>
      </Children>
      </NodeSource>
      </jatools>
      ------WebKitFormBoundaryosqexjih--
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "SmartUpload"
          - ".pdf"

  - id: file-confirmation
    method: GET
    path:
      - '{{BaseURL}}/jatoolsreport?as=dhtml&file=/{{random_name}}.pdf'
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{content}}"
