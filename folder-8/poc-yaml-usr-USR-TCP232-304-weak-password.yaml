id: usr-tcp232-304-weak-password
info:
  name: USR-TCP232-304 Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
  description: |
    This template detects weak password vulnerability in USR-TCP232-304 devices by checking for improper authentication and successful access using default credentials.

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 401
      - type: word
        part: body
        words:
          - "需要授权登录"

  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic YWRtaW46YWRtaW4=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "有人物联网"
          - "本机IP设置"
          - "模块管理"
          - "端口参数"
