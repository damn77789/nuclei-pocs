id: poc-yaml-wgcloud-weak-password
info:
  name: WGCLOUD Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
  description: |
    This template identifies weak passwords in WGCLOUD by attempting login with common credentials.

variables:
  passwd:
    - "96e79218965eb72c92a549dd5a330112" # md5(111111)
    - "0192023a7bbd73250516f069df18b500" # md5(admin123)
    - "6e8c3bcf6e3c8b340e4779c4a995d3f7" # md5(mall123)
    - "2e9d3b37c9e7e7b4ecb0fa9bf0b7a3cf" # md5(promotion123)

http:
  - id: initial-check
    method: GET
    path:
      - "{{BaseURL}}/login/toLogin"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "WGCLOUD"

  - id: weak-password-check
    method: POST
    path:
      - "{{BaseURL}}/login/login"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: userName=admin&passwd=********&md5pwd={{passwd}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "/dash/main"
          - "wgcloud-server="
      - type: word
        part: body
        words:
          - ""
        condition: or
