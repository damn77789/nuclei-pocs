id: mongodb-unauthorized-access
info:
  name: Mongodb Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  tags: unauthorized-access,mongodb

tcp:
  - inputs:
      - data: "3a000000a741000000000000d40700000000000061646d696e2e24636d640000000000ffffffff130000001069736d6173746572000100000000"
        type: hex
    host:
      - "{{Hostname}}"
    port: 27017
    read-size: 2048
    matchers:
      - type: word
        words:
          - "logicalSessionTimeout"
          - "localTime"
    matchers-condition: or
