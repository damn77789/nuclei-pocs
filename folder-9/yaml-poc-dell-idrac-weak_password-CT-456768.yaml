id: dell-idrac-weak-password

info:
  name: Dell iDRAC Weak Password Detection
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    This template detects weak default credentials (root/calvin) on Dell iDRAC interfaces.
    Exploiting this vulnerability could allow unauthorized access to the iDRAC management interface.
  reference:
    - https://www.delltechnologies.com/en-us/solutions/openmanage/idrac.htm

variables:
  username: root
  password: calvin

http:
  - raw:
      - |
        POST /data/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        user={{username}}&password={{password}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<authResult>0</authResult>"
          - "<authResult>5</authResult>"
      - type: regex
        part: body
        regex:
          - "<forwardUrl>"
          - "The maximum number of user sessions has been reached!"

  - raw:
      - |
        POST /cgi-bin/webcgi/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        user={{username}}&password={{password}}&WEBSERVER_timeout=1800&WEBSERVER_timeout_select=1800
    matchers-condition: or
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "/cgi-bin/webcgi/index"
          - "Connection refused, maximum sessions already in use"

  - raw:
      - |
        POST /Applications/dellUI/RPC/WEBSES/create.asp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        WEBVAR_USERNAME={{username}}&WEBVAR_PASSWORD={{password}}&WEBVAR_ISCMCLOGIN=0
    matchers-condition: or
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "Failure_No_Free_Slot"
          - "'USERNAME'\\s*:\\s*'(.*)'"
