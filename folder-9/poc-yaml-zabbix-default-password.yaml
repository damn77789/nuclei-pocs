id: poc-yaml-zabbix-default-password
info:
  name: Zabbix Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Detects Zabbix default credentials vulnerability using username 'Admin' and password 'zabbix'.
  tags: access-control
http:
  - method: POST
    path:
      - "{{BaseURL}}/index.php"
    body: name=Admin&password=zabbix&autologin=1&enter=Sign+in
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "Location: zabbix.php?action=dashboard.view"
      - type: word
        part: header
        words:
          - "set-cookie"
      - type: word
        part: header
        words:
          - "zbx_session"
