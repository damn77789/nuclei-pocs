id: hikvision-streaming-media-weak-password-cnvd-2021-14544
info:
  name: Hikvision Streaming Media Management Server Weak Password
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Detects weak password vulnerability in Hikvision Streaming Media Management Server (CNVD-2021-14544).

variables:
  auth_user: "{{base64('admin')}}"
  auth_pass: "{{base64('12345')}}"

http:
  - id: r0
    method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "<TITLE>流媒体管理服务器</TITLE>"
      - type: word
        part: body
        words:
          - "<TITLE>Video Transmission Management Server</TITLE>"

  - id: r1
    method: POST
    path:
      - "{{BaseURL}}/data/login.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      userName={{auth_user}}&password={{auth_pass}}
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "0"
