id: cve-2022-22916-o2oa-rce
info:
  name: CVE-2022-22916 O2OA Remote Command Execution (Version Detection)
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,cve,cve-2022-22916,o2oa
http:
  - method: GET
    path:
      - "/x_desktop/res/config/config.json"
    headers:
      Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "\"version\": \"6.4.7\""
          - "\"center\""
