id: weaver-ecology-byxml-xxe
info:
  name: Weaver Ecology byXML XXE Detection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Detects XXE vulnerability in Weaver Ecology 'deleteUserRequestInfoByXml' endpoint by injecting an XML payload and checking for specific response indicators.
  reference:
    - https://stack.chaitin.com/techblog/detail?id=125
http:
  - raw:
      - |
        GET /rest/ofs/deleteUserRequestInfoByXml HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/xml

        <?xml version="1.0"?>
        <!DOCTYPE>
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<ResultInfo>"
          - "<syscode>"
        part: body
