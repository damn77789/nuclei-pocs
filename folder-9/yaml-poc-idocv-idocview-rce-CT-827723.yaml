id: idocview-rce-CT-827723
info:
  name: iDocView Remote Code Execution (CT-827723)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    iDocView RCE vulnerability allows attackers to execute arbitrary code via crafted inputs within the iDocView system.

variables:
  filename: "{{rand_text_alpha(8)}}"
  filename_md5: "{{md5(filename)}}"

http:
  - method: GET
    path:
      - "/html/2word?url={{filename}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "{{filename_md5}}"
