id: weak_password-ejinshan-zdv8
info:
  name: Weak Password Detection - Ejinshan ZDV8
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects the use of weak credentials for Ejinshan ZDV8 by checking the login endpoint for a successful response with admin credentials.
http:
  - raw:
      - |
        POST /inter/ajax.php?cmd=get_user_login_cmd HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"get_user_login_cmd":{"name":"admin","password":"21232f297a57a5a743894a0e4a801fc3"}}
    redirects: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ADMIN"
          - "userSession"
