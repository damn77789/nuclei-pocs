id: elastic-kibana-unauthorized-access
info:
  name: Elastic Kibana Unauthorized Access
  author: ProjectDiscoveryAI
  severity: low
  description: |
    Checks for unauthorized access to Kibana by detecting the Kibana welcome view page.
http:
  - method: GET
    path:
      - "{{BaseURL}}/app/kibana"
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ".kibanaWelcomeView"
