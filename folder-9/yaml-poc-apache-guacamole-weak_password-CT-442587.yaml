id: apache-guacamole-weak-password
info:
  name: Apache Guacamole Default Credential Detection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects the use of default credentials (guacadmin:guacadmin) in Apache Guacamole by sending a POST request to the API and checking for an authentication token in the response.
http:
  - raw:
      - |
        POST /api/tokens HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=guacadmin&password=guacadmin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"userID\":\"guacadmin\""
          - "\"authToken\""
        part: body
