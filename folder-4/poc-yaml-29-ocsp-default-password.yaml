id: poc-yaml-29-ocsp-default-password
info:
  name: 29网课交单平台 默认口令漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
  description: |
    Detects default credentials vulnerability in the 29网课交单平台 platform.

flow: http(1) && http(2)

http:
  - id: check-login-page
    method: GET
    path:
      - "{{BaseURL}}/admin/login.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "/apisub.php"
        part: body

  - id: attempt-default-login
    method: POST
    path:
      - "{{BaseURL}}/apisub.php?act=login"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "user=123456&pass=123456"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '{"code":1,"msg":"登录成功"}'
        part: body
      - type: word
        words:
          - "application/json"
        part: header
