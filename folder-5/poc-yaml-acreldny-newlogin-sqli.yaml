id: poc-yaml-acreldny-newlogin-sqli
info:
  name: 安科瑞环保用电监管云平台 newLogin SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects SQL injection vulnerability in the newLogin functionality of 安科瑞环保用电监管云平台.
http:
