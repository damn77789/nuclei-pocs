id: apache-druid-identify
info:
  name: Discover Apache Druid
  author: ProjectDiscoveryAI
  severity: high
  tags: identify

http:
  - method: GET
    path:
      - "{{BaseURL}}/unified-console.html"
    headers:
      User-Agent: Mozilla/5.0
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Apache Druid"
