id: apache-activemq-artemis-console-weak-password
info:
  name: Apache ActiveMQ Artemis Console Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - raw:
      - |
        POST /console/auth/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"username":"artemis","password":"artemis"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "/console"
      - type: regex
        part: body
        regex:
          - '\{"credentials":(.*)\}'
      - type: word
        part: body
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "<"
        negative: true
