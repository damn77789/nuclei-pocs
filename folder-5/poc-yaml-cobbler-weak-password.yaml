id: poc-yaml-cobbler-weak-password
info:
  name: Cobbler Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password

variables:
  users:
    - cobbler
    - testing
  passwords:
    - cobbler
    - testing

http:
  - method: GET
    path:
      - "{{BaseURL}}/cobbler_web"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Cobbler Web Interface"
  - method: POST
    path:
      - "{{BaseURL}}/cobbler_api"
    headers:
      Content-Type: text/xml
    payloads:
      users:
        - cobbler
        - testing
      passwords:
        - cobbler
        - testing
    body: |
      <?xml version='1.0'?>
      <methodCall>
        <methodName>login</methodName>
        <params>
          <param>
            <value>
              <string>{{users}}</string>
            </value>
          </param>
          <param>
            <value>
              <string>{{passwords}}</string>
            </value>
          </param>
        </params>
      </methodCall>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "text/xml"
        part: header
      - type: regex
        regex:
          - "(.*[a-zA-Z0-9].+==)</string></value>"
        part: body
      - type: word
        words:
          - "<name>faultCode</name>"
        part: body
        negative: true
      - type: word
        words:
          - "login failed"
        part: body
        negative: true
