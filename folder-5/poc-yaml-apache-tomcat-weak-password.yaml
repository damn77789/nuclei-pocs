id: apache-tomcat-weak-password
info:
  name: Apache Tomcat Weak Password
  author: ProjectDiscoveryAI
  severity: high
  tags: authentication,weak-password,tomcat
http:
  - raw:
      - |
        GET /manager/html HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: status
        status:
          - 401
      - type: word
        part: header
        words:
          - "Tomcat"

  - raw:
      - |
        GET /manager/html HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64('admin:admin')}}

      - |
        GET /manager/html HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64('tomcat:tomcat')}}

      - |
        GET /manager/html HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64('tomcat:123456')}}

      - |
        GET /manager/html HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64('admin:tomcat')}}

      - |
        GET /manager/html HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64('admin:123456')}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Tomcat"
