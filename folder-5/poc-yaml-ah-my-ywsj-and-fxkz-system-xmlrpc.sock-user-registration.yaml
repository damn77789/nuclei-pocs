id: poc-yaml-ah-my-ywsj-and-fxkz-system-xmlrpc-sock-user-registration
info:
  name: 安恒 明御运维审计与风险控制系统 xmlrpc.sock 任意用户注册漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: 开放注册,xmlrpc
http:
