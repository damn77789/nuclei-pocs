id: filegator-weak-password
info:
  name: FileGator Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: dsl
        dsl:
          - status_code == 200
    extractors:
      - type: regex
        name: cookie
        internal: true
        part: header
        regex:
          - "filegator=(.*?);"
      - type: regex
        name: token
        internal: true
        part: header
        regex:
          - "([0-9a-zA-Z-_]{43})"
  - raw:
      - |
        POST /?r=/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Cookie: filegator={{cookie}}
        X-Csrf-Token: {{token}}

        {"username":"admin","password":"admin123"}
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - status_code == 200
          - contains(http_body, 'role":"admin')
          - contains(http_body, 'permissions":[')
          - contains(http_content_type, 'application/json')
