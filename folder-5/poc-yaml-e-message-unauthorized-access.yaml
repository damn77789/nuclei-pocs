id: e-message-unauthorized-access
info:
  name: E-message Unauthorized Access Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: privilege-bypass
http:
  - method: GET
    path:
      - "{{BaseURL}}/setup/setup-datasource-standard.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "数据库设置 - 标准连接"
          - "用户名："
          - "数据库驱动选项"
