id: chinaunicom-modem-default-password
info:
  name: Chinaunicom Modem Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: access-control
  description: |
    Potential default credentials vulnerability in Chinaunicom Modem.
http:
  - method: POST
    path:
      - "{{BaseURL}}/cu.html"
    body: |
      frashnum=&action=login&Frm_Logintoken=1&Username=CUAdmin&Password=CUAdmin&Username=&Password=
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "location"
      - type: regex
        part: header
        regex:
          - "\\/menu\\.gch"
