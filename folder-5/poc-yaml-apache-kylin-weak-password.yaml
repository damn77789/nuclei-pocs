id: apache-kylin-weak-password
info:
  name: Apache Kylin Weak Password Detection
  author: ProjectDiscoveryAI
  severity: high
  tags: auth,weak-password
http:
  - method: GET
    path:
      - "{{BaseURL}}/kylin/login"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>Kylin</title>"
      - type: word
        words:
          - "apache"
  - method: POST
    path:
      - "{{BaseURL}}/kylin/api/user/authentication"
    headers:
      Authorization: "Basic {{t1}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "userDetails"
          - "username"
          - "password"
        part: body
      - type: word
        words:
          - "application/json"
        part: header
variables:
  t1:
    - "YWRtaW46S1lMSU4="
    - "QURNSU46S1lMSU4="
    - "YWRtaW46a3lsaW4="
    - "QURNSU46a3lsaW4="
    - "YWRtaW46MTIzNDU2"
    - "QURNSU46MTIzNDU2"
