id: poc-yaml-backup-file-2
info:
  name: 备份文件泄漏漏洞 (2)
  author: ProjectDiscoveryAI
  severity: high
  tags: 配置不当

variables:
  paths:
    - ftp
    - index
    - log
    - logs
    - old
    - package
    - redis
    - ROOT
    - root
  extensions:
    - .zip
    - .tar.gz
    - .bak
    - .tar
    - .rar
    - .7z
    - .gz

http:
  - method: GET
    path:
      - '{{BaseURL}}/{{paths}}/{{extensions}}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: header
        regex:
          - "application/"
      - type: binary
        condition: or
        binary:
          - "377ABCAF271C" # 7z
          - "314159265359" # bz2
          - "1f8b08" # gz tar.gz
          - "526172211A0700" # rar version 1.50
          - "526172211A070100" # rar version 5.0
          - "FD377A585A0000" # xz tar.xz
          - "504B0304" # zip
          - "1F9D" # z tar.z
          - "1FA0" # z tar.z
          - "4C5A4950" # lz
      - type: word
        condition: and
        words:
          - "\x00\x00\x00\x00\x00\x00\x00\x00"
          - "application/"
          - "tar"
