id: poc-yaml-activemq-weak-pass
info:
  name: ActiveMQ Web Console Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password, activemq
  description: |
    Checks for weak credentials on the ActiveMQ Web Console by attempting to authenticate using default credentials.
http:
  - raw:
      - |
        GET /admin/index.jsp HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username + ":" + password)}}
    attack: pitchfork
    payloads:
      username:
        - "root"
        - "admin"
      password:
        - "root"
        - "admin"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "ActiveMQ Console"
          - "standardista-table-sorting.js"
          - "prettify.js"
        part: body
