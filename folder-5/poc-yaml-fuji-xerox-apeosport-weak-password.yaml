id: poc-yaml-fuji-xerox-apeosport-weak-password
info:
  name: Fuji Xerox ApeosPort Weak Password
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    Identifies weak password vulnerability in Fuji Xerox ApeosPort devices by verifying access with default credentials.
http:
  - raw:
      - |
        GET /prop.htm HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: status
        status:
          - 401
  - raw:
      - |
        GET /prop.htm HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic MTExMTE6eC1hZG1pbg==
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Configuration Overview"
          - "Description"
          - "System Administrator Settings"
        condition: and
