id: poc-yaml-bigant-server-ms-admin-php-unauthorized-access
info:
  name: BigAnt Server ms_admin.php Unauthorized Access (CVE-2022-23348)
  author: ProjectDiscoveryAI
  severity: medium
  tags: CVE-2022-23348,unauthorized-access
http:
  - method: GET
    path:
      - "{{BaseURL}}/Runtime/Data/ms_admin.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "user_id"
          - "user_name"
          - "user_pwd"
