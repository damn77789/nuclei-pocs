id: poc-direct-web-remoting-identify
info:
  name: Direct Web Remoting (DWR) Identification
  author: ProjectDiscoveryAI
  severity: info
  tags: identify
http:
  - method: GET
    path:
      - "{{BaseURL}}/dwr/index.html"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "/dwr"
      - type: regex
        part: body
        regex:
          - "<title>DWR Test Index</title>"
