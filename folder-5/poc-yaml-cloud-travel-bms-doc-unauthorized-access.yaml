id: cloud-travel-bms-doc-unauthorized-access
info:
  name: Cloud Travel BMS Doc Unauthorized Access
  author: ProjectDiscoveryAI
  severity: medium
  tags: unauthorized-access
http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "云出行后台管理系统"
  - method: GET
    path:
      - "{{BaseURL}}/doc/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "文档说明"
          - "接口文档"
          - "日志说明"
          - "操作手册"
