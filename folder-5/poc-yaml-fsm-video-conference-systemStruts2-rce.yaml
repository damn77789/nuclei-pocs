id: poc-yaml-fsm-video-conference-systemStruts2-rce
info:
  name: FSM Video Conference System Struts2 RCE
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects a remote command execution vulnerability in FSM Video Conference System via Struts2. The issue allows attackers to execute arbitrary system commands.
  tags: rce
http:
  - raw:
      - |
        POST /confinfoaction!showallConfinfos.action HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

