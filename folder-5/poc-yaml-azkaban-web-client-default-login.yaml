id: azkaban-web-client-default-login

info:
  name: Azkaban Web Client Default Login
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password,login
  description: |
    Checks for default credentials (admin:admin) in Azkaban Web Client, which may allow unauthorized access.

http:
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        action=login&username=admin&password=admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "\"session.id\" : \"(.*?)\""
      - type: word
        part: body
        words:
          - "\"status\" : \"success\""
      - type: word
        part: header
        words:
          - "azkaban.browser.session.id="
      - type: word
        part: header
        words:
          - "application/json"
