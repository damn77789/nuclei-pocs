id: poc-yaml-backup-file-3
info:
  name: 备份文件泄漏漏洞 (3)
  author: ProjectDiscoveryAI
  severity: high
  tags: 配置不当

variables:
  paths:
    - script
    - sql
    - test
    - tmp
    - upload
    - web
    - webroot
    - www
    - wwwroot
  extensions:
    - .zip
    - .tar.gz
    - .bak
    - .tar
    - .rar
    - .7z
    - .gz

http:
  - attack: pitchfork
    raw:
      - |
        GET /{{paths}}{{extensions}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "application/"
      - type: binary
        binary:
          - "377ABCAF271C" # 7z
          - "314159265359" # bz2
          - "1f8b08" # gz tar.gz
          - "526172211A0700" # rar RAR archive version 1.50
          - "526172211A070100" # rar RAR archive version 5.0
          - "FD377A585A0000" # xz tar.xz
          - "504B0304" # zip
          - "1F9D" # z tar.z
          - "1FA0" # z tar.z
          - "4C5A4950" # lz
