id: apache-ambari-default-password

info:
  name: Apache Ambari Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: access-control
  description: |
    Detects Apache Ambari's default password vulnerability by checking for admin privileges.

http:
  - raw:
      - |
        GET /api/v1/users/admin?fields=*,privileges/PrivilegeInfo/cluster_name,privileges/PrivilegeInfo/permission_name HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic YWRtaW46YWRtaW4=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "PrivilegeInfo"
          - "AMBARI.ADMINISTRATOR"
