id: dialogic-xms-admin-console-weak-password
info:
  name: Dialogic XMS Admin Console Weak Password
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - raw:
      - |
        POST /index.php/verifyLogin/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        usernameId=admin&passwordId=admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "DialogicDojo"
          - "userId\">user:"
          - "var downloads"
          - "onclick=\"logout\""
