id: alibaba-canal-default-password
info:
  name: Alibaba Canal Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: access-control
  description: |
    Detects the use of default credentials in Alibaba Canal's login functionality.

http:
  - raw:
      - |
        POST /api/v1/user/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"username":"admin","password":"123456"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{\"code\":20000,"
          - "\"data\":{\"token\""
  - raw:
      - |
        POST /api/v1/user/login HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "com.alibaba.otter.canal.admin.controller.UserController.login"
