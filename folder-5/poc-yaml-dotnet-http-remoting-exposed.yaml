id: poc-dotnet-http-remoting-exposed
info:
  name: .NET HTTP Remoting Unauthorized Access Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: unauthorized-access,dotnet
http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "DispatchChannelSink"
          - "ArgumentNullException"
      - type: word
        part: header
        words:
          - "Server: MS .NET Remoting"
