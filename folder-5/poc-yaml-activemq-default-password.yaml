id: poc-yaml-activemq-default-password
info:
  name: Activemq Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control,activemq
  description: |
    Detects the use of the default credentials for the Apache ActiveMQ admin console.
http:
  - raw:
      - |
        GET /admin/ HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 401
      - type: word
        part: body
        words:
          - "Unauthorized"
  - raw:
      - |
        GET /admin/ HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic YWRtaW46YWRtaW4=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Welcome to the Apache ActiveMQ Console of"
          - "<h2>Broker</h2>"
