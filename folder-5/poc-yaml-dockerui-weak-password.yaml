id: poc-yaml-dockerui-weak-password
info:
  name: DockerUI Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password,dockerui
http:
  - raw:
      - |
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        username=ginghan&grant_type=password&password=123456&practicetype=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"msg":"OK"'
          - '"token":'
      - type: word
        part: headers
        words:
          - "Docker-UIManager"
      - type: word
        part: body
        negative: true
        words:
          - "<"
