id: feiyuxing-weak-password
info:
  name: 飞鱼星企业级智能上网行为管理系统 弱口令漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    The template detects weak password vulnerability in 飞鱼星企业级智能上网行为管理系统.
http:
  - raw:
      - |
        POST /send_order.cgi?parameter=login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        {"username":"admin","password":"asdasdwadawdaa"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "error"
        part: body
  - raw:
      - |
        POST /send_order.cgi?parameter=login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        {"username":"admin","password":"admin"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "hash_key="
          - "session_id"
        part: header
      - type: word
        words:
          - "ok"
        part: body
