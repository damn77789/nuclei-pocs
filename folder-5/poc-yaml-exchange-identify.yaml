id: exchange-server-identify
info:
  name: Microsoft Exchange Server Identification
  author: ProjectDiscoveryAI
  severity: info
  tags: identify

http:
  - method: GET
    path:
      - "{{BaseURL}}/owa/"
      - "{{BaseURL}}/autodiscover/"
      - "{{BaseURL}}/ews/"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "X-FEServer:"
      - type: dsl
        dsl:
          - "status_code != 404 && status_code != 200"
