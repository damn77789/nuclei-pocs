id: emqx-default-password
info:
  name: EMQ X Dashboard Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - method: POST
    path:
      - "/api/v3/auth"
    headers:
      Content-Type: application/json
    body: '{"password": "{{password}}", "username": "{{username}}"}'
    payloads:
      username:
        - admin
      password:
        - public
        - admin
        - 123456
        - admin123
    attack: clusterbomb
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Cowboy"
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "code"
