id: digital-watchdog-weak-password
info:
  name: Digital Watchdog Weak Password Detection
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password

variables:
  user: |
    admin
    dwuser
  pass: |
    admin
    admin1234
    admin12345
    Dw5pectrum

http:
  - method: GET
    path:
      - "{{BaseURL}}/static/index.html"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "Digital Watchdog"

  - method: POST
    path:
      - "{{BaseURL}}/web/rest/v1/login/sessions"
    headers:
      Content-Type: application/json
    payloads:
      user:
        - admin
        - dwuser
      pass:
        - admin
        - admin1234
        - admin12345
        - Dw5pectrum
    body: |-
      {"username":"{{user}}","password":"{{pass}}","setCookie":true}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "x-runtime-guid="
      - type: regex
        part: body
        regex:
          - "\"token\":\"([0-9a-zA-Z-]+)\""
      - type: word
        part: body
        words:
          - "username"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: word
        part: header
        words:
          - "application/json"
