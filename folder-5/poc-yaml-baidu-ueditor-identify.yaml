id: poc-yaml-baidu-ueditor-identify
info:
  name: Identify Baidu UEditor (ueditor.config.js)
  author: ProjectDiscoveryAI
  severity: info
  tags: identify

http:
  - method: GET
    path:
      - "/ueditor/ueditor.config.js"
      - "/Plugins/ueditor/ueditor.config.js"
      - "/Scripts/plugins/ueditor/ueditor.config.js"
      - "/static/ueditor/ueditor.config.js"
      - "/Content/ueditor/ueditor.config.js"
      - "/Scripts/ueditor/ueditor.config.js"
      - "/public/static/js/ueditor/ueditor.config.js"
      - "/static/js/ueditor/ueditor.config.js"
      - "/ue/ueditor.config.js"
      - "/Public/ueditor/ueditor.config.js"
      - "/js/ueditor/ueditor.config.js"
      - "/module/ueditor/ueditor.config.js"
      - "/static/vendor/ueditor/ueditor.config.js"
      - "/lib/ueditor/ueditor.config.js"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "UEDITOR_HOME_URL"
      - type: word
        part: body
        words:
          - "UEDITOR_CONFIG"
