id: poc-yaml-springboot-admin-unauth
info:
  name: SpringBoot-Admin Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  tags: input-validation-error,java,spring_boot

http:
  - method: GET
    path:
      - "/applications"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "json"
      - type: word
        part: body
        words:
          - "\"name\":"
          - "\"buildVersion\":"
          - "\"instances\":"
      - type: word
        part: body
        words:
          - "<"
        negative: true
