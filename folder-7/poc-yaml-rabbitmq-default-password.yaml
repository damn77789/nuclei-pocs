id: rabbitmq-default-password
info:
  name: RabbitMQ Default Credentials Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    Detects RabbitMQ instances with default credentials.
http:
  - raw:
      - |
        GET /api/whoami HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: status
        status:
          - 401
  - raw:
      - |
        GET /api/whoami HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic Z3Vlc3Q6Z3Vlc3Q=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"name":"guest"'
