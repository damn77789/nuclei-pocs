id: poc-yaml-oss-read-identify
info:
  name: OSS Public Access Identification
  author: ProjectDiscoveryAI
  severity: medium
  tags: identify

variables:
  paths:
    - /static/
    - /file/
    - /

http:
  - method: GET
    path:
      - "{{BaseURL}}{{paths}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - (contains(body, '\"StorageClass\"') && contains(body, '\"Key\"') && contains(body, '\"LastModified\"')) || ((contains(body, '<MaxKeys>1000</MaxKeys>') || contains(body, '<MaxKeys>100</MaxKeys>')) && contains(body, 'StorageClass'))
