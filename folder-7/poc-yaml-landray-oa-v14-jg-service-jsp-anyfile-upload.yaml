id: landray-oa-v14-jg-service-jsp-file-upload
info:
  name: Landray OA V14 jg_service.jsp Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload
http:
  - raw:
      - |
        POST /sys/attachment/sys_att_main/jg_service.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        testdata=test
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "java.lang.NumberFormatException"
          - "0               53              0"
