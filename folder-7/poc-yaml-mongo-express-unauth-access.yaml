id: mongo-express-unauth-access
info:
  name: Mongo Express Unauthorized Access
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Detects unauthorized access to Mongo Express by checking for specific indicators in the response body.
  tags: unauthorized-access, info-leak
http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Home - Mongo Express"
      - type: word
        words:
          - "MongoDB Version"
