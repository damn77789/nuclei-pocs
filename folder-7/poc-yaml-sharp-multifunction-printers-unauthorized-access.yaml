id: cve-2024-33605

info:
  name: Sharp Multifunction Printers Unauthorized Access Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: cve-2024-33605,unauthorized-access
  description: |
    This template detects unauthorized access to Sharp multifunction printers, specifically to the `installed_emanual_list.html` endpoint which exposes sensitive information.

http:
  - method: GET
    path:
      - "{{BaseURL}}/installed_emanual_list.html"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ServiceEmanualList"
          - "/installed_emanual_down.html"
      - type: word
        part: header
        words:
          - "Set-Cookie: MFPSESSIONID="
