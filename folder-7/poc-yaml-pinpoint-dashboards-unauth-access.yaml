id: poc-yaml-pinpoint-dashboards-unauth-access
info:
  name: PinPoint Dashboards Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  tags: unauthorized-access, pinpoint
http:
  - method: GET
    path:
      - "{{BaseURL}}/applications.pinpoint"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"applicationName\":\""
          - "\"serviceType\":\""
