id: redis-manager-weak-password
info:
  name: Redis Manager Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password

http:
  - method: GET
    path:
      - "{{BaseURL}}/login"
    matchers:
      - type: word
        part: body
        words:
          - "redis-manager"

  - method: POST
    path:
      - "{{BaseURL}}/user/login"
    headers:
      Content-Type: application/json;charset=UTF-8
    body: |
      {"userName":"admin","password":"admin"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "code"
          - "success"
          - "token"
          - "admin"
