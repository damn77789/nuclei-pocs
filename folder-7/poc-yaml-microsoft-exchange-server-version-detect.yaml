id: microsoft-exchange-server-version-detect
info:
  name: Microsoft Exchange Server Version Detection (CVE-2021-26857)
  author: ProjectDiscoveryAI
  severity: high
  tags: rce,CVE-2021-26857,exchange_server
http:
  - raw:
      - |
        GET /owa/auth/logon.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<!-- OwaPage = ASP.auth_logon_aspx -->"
      - type: regex
        part: body
        regex:
          - "/owa/(?:auth/)?(\\d+\\.\\d+\\.\\d+)/"
    extractors:
      - type: regex
        part: body
        internal: true
        group: 1
        regex:
          - "/owa/(?:auth/)?(?P<version>\\d+\\.\\d+\\.\\d+)/"
  - raw:
      - |
        GET /owa/auth/logon.aspx?v={{version}} HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: or
    matchers:
      - type: dsl
        dsl:
          - compare_versions(version, ">6.5.0", "<6.5.999")
          - compare_versions(version, ">8.0.0", "<8.99.999")
          - compare_versions(version, "<14.0.727", ">14.0.0")
          - compare_versions(version, "<14.1.496", ">14.1.0")
          - compare_versions(version, "<14.2.496", ">14.2.0")
          - compare_versions(version, "<14.3.496", ">14.3.0")
          - compare_versions(version, "<14.4.496", ">14.4.0")
          - compare_versions(version, "<15.0.1497", ">15.0.0")
          - compare_versions(version, "<15.1.2016", ">15.1.0")
          - compare_versions(version, "<15.2.720", ">15.2.0")
