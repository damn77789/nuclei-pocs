id: marathon-web-ui-unauthorized-access
info:
  name: Marathon Web UI Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  tags: unauthorized-access
http:
  - method: GET
    path:
      - "/v2/apps"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "tasksStaged"
      - type: word
        part: header
        words:
          - "X-Marathon-Leader"
