id: spring-boot-actuator-unauthorized-access
info:
  name: Spring Boot Actuator Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  tags: misconfiguration
  description: |
    Detects unauthorized access to the Spring Boot Actuator endpoints which expose sensitive environment information.

variables:
  r_paths:
    - env
    - actuator/env
    - api/env
    - api/actuator/env
    - apis/actuator/env

http:
  - method: GET
    path:
      - "{{BaseURL}}/{{r_paths}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "java.runtime.version"
          - "{"  
        part: body
      - type: word
        words:
          - "<html"
        negative: true
        part: body
