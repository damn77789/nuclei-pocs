id: panabit-gateway-default-password
info:
  name: Panabit Gateway Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: access-control
  description: |
    This template detects the default admin credentials vulnerability in Panabit Gateway.
http:
  - method: POST
    path:
      - "{{BaseURL}}/login/userverify.cgi"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "username=admin&password=panabit"
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Set-Cookie"
          - "paonline_admin"
      - type: word
        part: body
        words:
          - "URL=/index.htm"
