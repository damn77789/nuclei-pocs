id: ruijie-rg-uac-password-hashes-leak
info:
  name: Ruijie RG-UAC Account Password Information Disclosure
  author: ProjectDiscoveryAI
  severity: high
  tags: information-disclosure
http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"role":"super_admin"'
          - '"role":"guest_admin"'
          - '"role":"reporter_admin"'
        part: body
      - type: regex
        regex:
          - '"password":"[a-f0-9]{32}"'
        part: body
