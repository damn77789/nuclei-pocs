id: ruoyi-druid-unauthorized-access

info:
  name: Ruoyi Druid Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Detects unauthorized access to the Ruoyi Druid monitoring interface.
  tags: unauthorized-access

http:
  - method: GET
    path:
      - "{{BaseURL}}/prod-api/druid/index.html"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Druid Stat Index"
        part: body
      - type: word
        words:
          - "View JSON API"
        part: body
