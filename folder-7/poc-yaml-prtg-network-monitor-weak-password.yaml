id: prtg-network-monitor-weak-password
info:
  name: PRTG Network Monitor Weak Password
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - method: POST
    path:
      - "{{BaseURL}}/public/checklogin.htm"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: "loginurl=&username=prtgadmin&password=prtgadmin"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "Server: PRTG"
      - type: word
        part: header
        words:
          - "OCTOPUS"
      - type: word
        part: header
        words:
          - "/home"
