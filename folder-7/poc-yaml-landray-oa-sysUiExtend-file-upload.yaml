id: poc-landray-oa-sysui-extend-file-upload
info:
  name: Landray OA sysUiExtend.do Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload
http:
  - method: GET
    path:
      - "{{BaseURL}}/api///sys/ui/sys_ui_extend/sysUiExtend.do?method=upload"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "添加主题包"
          - "上传文件"
