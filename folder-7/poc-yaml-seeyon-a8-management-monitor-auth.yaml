id: poc-yaml-seeyon-a8-management-monitor-auth
info:
  name: Seeyon A8 Management Monitor Unauthorized Access Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

http:
  - method: GET
    path:
      - "{{BaseURL}}/seeyon/management/index.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "A8 Management Monitor"
      - type: word
        part: header
        words:
          - "text/html"
