id: thinkphp-5-0-23-rce
info:
  name: ThinkPHP 5.0.23 Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    ThinkPHP versions prior to 5.0.23 are vulnerable to a remote code execution vulnerability due to improper handling of method names. Attackers can exploit this to execute arbitrary code.
  reference:
    - https://fofa.so/
http:
  - raw:
      - |
        GET /test.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "test"
        part: body
