id: docker-remote-api-unauth-access

info:
  name: Docker Remote API Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Docker Remote API Unauthorized Access vulnerability allows attackers to obtain sensitive information or potentially control the containers.
  tags: directory-traversal

http:
  - raw:
      - |
        GET /version HTTP/1.1
        Host: {{Hostname}}
        TestHead: TestValue

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "ApiVersion"

      - type: word
        part: body
        words:
          - "KernelVersion"

      - type: word
        part: body
        words:
          - "GoVersion"
