id: cve-2020-2551
info:
  name: WebLogic JtaTransactionManager Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    WebLogic Server is vulnerable to a remote code execution vulnerability via the IIOP protocol, allowing unauthenticated attackers to execute arbitrary commands.
  classification:
    cve-id: CVE-2020-2551
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
  tags: rce,weblogic,network
  reference:
    - https://www.oracle.com/security-alerts/cpujan2020.html

variables:
  marker: "{{interactsh-url}}"

http:
  - raw:
      - |
        GET /console/login/LoginForm.jsp HTTP/1.1
        Host: {{Hostname}}
        Connection: close
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - '<p id="footerVersion">.+([\d\.]+)</p>'
    extractors:
      - type: regex
        group: 1
        regex:
          - '<p id="footerVersion">.+([\d\.]+)</p>'

  - raw:
      - |
        POST /iiop/rebind HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/octet-stream
        Connection: close

        {{base64("")}}
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
      - type: regex
        part: header
        regex:
          - "Check LDAP Address"
