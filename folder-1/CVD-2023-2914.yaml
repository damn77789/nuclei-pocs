id: yonyou-nc-delete-servlet-rce

info:
  name: Yonyou NC DeleteServlet API Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Yonyou NC Cloud contains a deserialization vulnerability that allows attackers to execute arbitrary code on the server, potentially leading to a complete system compromise.
  reference:
    - http://www.yonyougz.com/yonyou/yonyou-nc/

http:
  - raw:
      - |
        POST /servlet/~baseapp/nc.document.pub.fileSystem.servlet.DeleteServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/octet-stream
        Connection: close

        
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "java.util.HashSet"
          - "org.apache.commons.collections.keyvalue.TiedMapEntry"
          - "logicalSessionTimeout"
