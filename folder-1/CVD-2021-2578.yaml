id: vnc-default-password
info:
  name: VNC Remote Desktop Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    VNC is a screen sharing and remote operation software using the RFB protocol. This template checks for systems using the default weak password '123456', which allows unauthorized access to view system information or modify configurations.
  tags: default-password,vnc
  reference:
    - https://fofa.so/
http:
  - raw:
      - |
        GET /test.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "test"
        part: body
