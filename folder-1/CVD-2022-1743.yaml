id: cve-2022-26133
info:
  name: Bitbucket Data Center Hazelcast API Unauthenticated RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Atlassian Bitbucket Data Center contains a deserialization vulnerability in the Hazelcast interface, leading to unauthenticated remote code execution.
  reference:
    - https://github.com/snowyyowl/writeups/tree/main/CVE-2022-26133

variables:
  payload: ""

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{BaseURL}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "com.atlassian.plugins.atlassian-plugins-webresource-plugin:context-path.context-path"

  - raw:
      - |
        POST /hazelcast/rest/maps/testMap HTTP/1.1
        Host: {{BaseURL}}
        Content-Type: application/octet-stream

        {{payload}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "hazelcastInstance"
        part: body
      - type: word
        words:
          - "java.util.HashMap"
        part: body
