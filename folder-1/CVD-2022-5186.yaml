id: yapi-mongodb-injection-rce
info:
  name: YApi 1.10.2 MongoDB Injection RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    YApi is an API management platform. A vulnerability in its interface allows MongoDB injection, leading to token extraction and potential RCE.
  reference:
    - https://github.com/YMFE/yapi/commit/59bade3a8a43e7db077d38a4b0c7c584f30ddf8c
http:
  - raw:
      - |
        GET /test.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "test"
        part: body
