id: oracle-ebusiness-iesruntime-deserialization
info:
  name: Oracle E-Business Suite iesRuntimeServlet Deserialization Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Oracle E-Business Suite iesRuntimeServlet endpoint contains a deserialization vulnerability that allows remote code execution. Exploitation can lead to arbitrary code execution on the system, allowing attackers to take full control of the server.
  tags: code-execution, deserialization
  reference:
    - https://erpscan.io/press-center/blog/oracle-ebs-penetration-testing-tool/

http:
  - raw:
      - |
        POST /OA_HTML/iesRuntimeServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-java-serialized-object

        {{base64('')}}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "iesRuntimeServlet"
          - "Oracle E-Business Suite"
        part: body
