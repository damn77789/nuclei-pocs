id: cve-2022-4693

defaults:
  stop-at-first-match: true

info:
  name: WordPress plugins User Verification Authentication Bypass Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    WordPress plugins User Verification is a plugin to protect your website from spam users and block instant access by using spam email addresses. There is an authorization problem vulnerability in WordPress plugins User Verification before version 1.0.94. The vulnerability stems from the fact that login verification can be bypassed.
  tags: permission-bypass
  classification:
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cve-id: CVE-2022-4693
    cvss-score: 7.5
  reference:
    - https://lana.codes/lanavdb/eeabe1d3-6f64-400a-8fb2-0865efdf6957/
    - https://wordpress.org/plugins/user-verification/

http:
  - raw:
      - |
        POST /wp-admin/admin-ajax.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        action=user_verification_send_otp&user_login=admin

    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words:
          - "OTP has been sent successfully"
          - "otp_via_mail": true
