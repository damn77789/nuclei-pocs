id: engenius-wifi-default-password

info:
  name: EnGenius WiFi Default Password
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    EnGenius WiFi routers and access points use default credentials (admin/admin), allowing unauthorized access to the system interface.
  reference:
    - https://www.engeniustech.com/engenius-products/managed-indoor-wireless-ews300ap/#
  tags:
    - default-password

http:
  - raw:
      - |
        POST /cgi-bin/luci HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&password=admin
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "Location: /cgi-bin/luci/;stok"
      - type: word
        part: header
        words:
          - "Set-Cookie: sysauth"
