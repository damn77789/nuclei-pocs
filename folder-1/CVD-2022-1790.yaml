id: seeddms-default-password
info:
  name: SeedDMS Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    SeedDMS is a free document management system. This template checks for the default login credentials (admin:admin) vulnerability in the 'op.Login.php' file.
  tags: default-password,admin-access
  reference:
    - https://www.seeddms.org
http:
  - raw:
      - |
        POST /op/op.Login.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/86.0.4240.111 Safari/537.36
        Upgrade-Insecure-Requests: 1
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        Referer: {{BaseURL}}
        Origin: {{BaseURL}}
        Content-Length: 29

        login=admin&pwd=admin&lang=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: regex
        regex:
          - "/out/out.ViewFolder.php"
        part: header
        case-insensitive: true
