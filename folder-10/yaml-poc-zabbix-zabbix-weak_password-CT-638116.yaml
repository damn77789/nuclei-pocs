id: zabbix-weak-password
info:
  name: Zabbix Weak Password Detection
  author: ProjectDiscoveryAI
  severity: high
  reference:
    - https://www.zabbix.com/documentation/3.4/zh/manual/quickstart/login
variables:
  username:
    - "Admin"
    - "guest"
  password:
    - "zabbix"
    - ""
http:
  - raw:
      - |
        POST /index.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        name={{username}}&password={{password}}&autologin=1&enter=Sign+in
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "zabbix.php?action=dashboard.view"
      - type: word
        part: header
        words:
          - "zbx_session"
    attack: pitchfork
