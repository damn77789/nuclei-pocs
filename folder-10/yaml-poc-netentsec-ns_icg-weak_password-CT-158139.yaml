id: netentsec-ns_icg-weak-password
info:
  name: Netentsec NS-ICG Weak Password Detection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects weak default credentials (ns25000/ns25000) in Netentsec NS-ICG systems by checking for a successful login redirection.
http:
  - raw:
      - |
        POST /user/login/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        usrname=ns25000&pass=ns25000&signinfo=&ukey_user_flag=0&SlotSerialNumber=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "/user/main/"
        condition: and
