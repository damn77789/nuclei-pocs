id: yonyou-nc-cloud-deserialization

info:
  name: Yonyou NC Cloud Deserialization RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template detects an RCE vulnerability in Yonyou NC Cloud MonitorServlet
    by exploiting deserialization using crafted payloads.
  reference:
    - https://mp.weixin.qq.com/s/xVKuJb3DbKH0em0HoMZ4ZQ

