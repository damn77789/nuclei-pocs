id: venustech-wlsj-weak-password

info:
  name: Venustech WLSJ Weak Password
  author: ProjectDiscoveryAI
  severity: medium
  reference:
    - https://www.venustech.com.cn/new_type/wlsj/
  description: |
    Checks for weak password vulnerability in the Venustech WLSJ system using a test
    username and password combination.

variables:
  username: sysuseradmin
  password: 116264704E61706262667E637535202322

http:
  - id: login-page-check
    method: GET
    path:
      - "{{BaseURL}}/ops/Login"
    headers:
      Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "网御星云"
        part: body
      - type: regex
        regex:
          - "Set-Cookie"
        part: header
    extractors:
      - type: regex
        part: header
        regex:
          - "Set-Cookie:(?P<cookie>[^;]+);"
        name: cookie
        internal: true

  - id: login-verification
    method: POST
    path:
      - "{{BaseURL}}/ops/index.php?c=Login&a=Verify"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: "{{cookie}}"
    body: "u={{username}}&p={{password}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "^\\{\\s*\\\"param\\\".*[iI]ndex.*\\}$"
        part: body
