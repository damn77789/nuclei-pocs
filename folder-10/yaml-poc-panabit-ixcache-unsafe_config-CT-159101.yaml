id: panabit-ixcache-unsafe-config
info:
  name: Panabit IXCache Unsafe Configuration
  author: ProjectDiscoveryAI
  severity: high
  description: |
    This template checks for unsafe configurations in Panabit IXCache by verifying default credentials and identifying admin panel redirection.
http:
  - raw:
      - |
        POST /login/userverify.cgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&password=ixcache
    matchers-condition: or
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "URL=/cgi-bin/monitor.cgi"

  - raw:
      - |
        POST /login/userverify.cgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&password=panabit
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Set-Cookie: paonline_admin"
      - type: word
        part: body
        words:
          - "URL=/index.htm"
