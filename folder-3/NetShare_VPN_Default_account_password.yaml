id: netshare-vpn-default-account-password

info:
  name: NetShare VPN Default Account Password
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Default account password login vulnerability in NetShare VPN. The default account credentials (admin:admin) allow login to the admin dashboard.
  tags: defaultaccount

http:
  - raw:
      - |
        GET /cgi-bin/index.htm HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic YWRtaW46YWRtaW4=

    redirects: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "logo.jpg"
          - "menubj.jpg"
          - "index.htm"
