id: poc-h2-console-identify
info:
  name: H2 Console Identification
  author: ProjectDiscoveryAI
  severity: info
  tags: identify

http:
  - method: GET
    path:
      - "{{BaseURL}}/h2-console/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "H2 Console"
      - type: regex
        part: body
        regex:
          - "(?i)<title>.*H2 Console.*</title>"
