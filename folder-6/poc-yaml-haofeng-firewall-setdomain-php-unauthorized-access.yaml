id: haofeng-firewall-setdomain-php-unauthorized-access
info:
  name: Haofeng Firewall setdomain.php Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  tags: unauthorized-access
http:
  - method: GET
    path:
      - "{{BaseURL}}/setdomain.php?action=list"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "皓峰系统管理平台"
          - "域名绑定列表"
          - "[删除]"
          - "[修改]"
