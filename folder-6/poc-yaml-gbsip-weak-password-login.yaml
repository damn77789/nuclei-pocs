id: gbsip-weak-password-login
info:
  name: GbSip Weak Password Login
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password
http:
  - raw:
      - |
        POST /api/Admin/Login?UserName=gbsip&Password=admin HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 0
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"data":'
      - type: regex
        part: body
        regex:
          - '"Token":"[a-z0-9A-Z]+"'
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: word
        part: header
        words:
          - "application/json"
