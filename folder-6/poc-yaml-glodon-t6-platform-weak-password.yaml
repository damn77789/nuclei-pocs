id: glodon-t6-platform-weak-password
info:
  name: Glodon T6 Platform Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password

variables:
  passwd:
    - admin
    - 123456
    - admin123

flow: http(1) && http(2)

http:
  - id: initial-check
    method: GET
    path:
      - "{{BaseURL}}/Console/Account/LogOn"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "GTPESign_Console.js"
      - type: status
        status:
          - 200

  - id: weak-password-test
    method: POST
    path:
      - "{{BaseURL}}/Console/Account/LogOn"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: "pws={{passwd}}"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "\"success\":true"
          - "\"url\":\"/Console/Home/Index\""
      - type: word
        part: header
        words:
          - "ConsoleLogOn="
