id: poc-yaml-itc-cms-weak-password

info:
  name: itC CMS Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password,auth
  description: |
    Detection of weak password vulnerability in itC CMS via default credentials.

flow: http(1) && http(2)

http:
  - id: first-request
    name: Check CMS Fingerprint
    method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "/mt_res_v3/img/public/logo.ico"

  - id: weak-password-check
    name: Check Weak Password
    method: POST
    path:
      - "{{BaseURL}}/frame/actionLogin.do"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: account=admin&password=21232f297a57a5a743894a0e4a801fc3&language=zh_CN
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "0"
      - type: regex
        part: header
        regex:
          - "JSESSIONID=[A-Za-z0-9]+"
