id: gitstack-default-password
info:
  name: Gitstack Default Username and Password
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password,gitstack
http:
  - raw:
      - |
        POST /registration/login/ HTTP/1.1
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8
        Cookie: csrftoken=19NqVDMQedgerobuBqtGR0Oi7mtAfTgt; uvts=11MjdhXHJJPLX9sg; sessionid=1936f50e65288c1742f6d3d68b6a17a3
        Content-Type: application/x-www-form-urlencoded
        Referer: {{BaseURL}}/registration/login/?next=/gitstack/

        csrfmiddlewaretoken=19NqVDMQedgerobuBqtGR0Oi7mtAfTgt&username=admin&password=admin&next=%2Fgitstack%2F
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Logout"
          - "Repositories"
          - "Users & Groups"
          - "Settings"
