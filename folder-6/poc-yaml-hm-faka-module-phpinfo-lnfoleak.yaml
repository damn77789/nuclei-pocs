id: poc-yaml-hm-faka-module-phpinfo-lnfoleak
info:
  name: 红盟发卡系统 /module/phpinfo 信息泄露漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: information-disclosure

http:
  - method: GET
    path:
      - "{{BaseURL}}/module/phpinfo"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "PHP Version"
          - "PHP Extension"
          - "<!DOCTYPE html"
      - type: word
        part: header
        words:
          - "phpinfo"
