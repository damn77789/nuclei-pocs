id: h2-database-console-unauth-access
info:
  name: H2 Database Console Unauthorized Access
  author: ProjectDiscoveryAI
  severity: high
  tags: unauthorized-access,h2
http:
  - method: GET
    path:
      - "{{BaseURL}}/h2-console"
      - "{{BaseURL}}/dbconsole"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<title>H2 Console</title>"
          - "webAllowOthers"
