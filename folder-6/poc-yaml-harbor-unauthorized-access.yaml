id: harbor-unauthorized-access-cve-2022-46463
info:
  name: Harbor Unauthorized Access Vulnerability (CVE-2022-46463)
  author: ProjectDiscoveryAI
  severity: high
  tags: CVE-2022-46463
http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v2.0/search?q=/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "repository_name"
          - "project_name"
