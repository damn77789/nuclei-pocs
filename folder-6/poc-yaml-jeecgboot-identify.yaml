id: jeecgboot-api-identify
info:
  name: JeecgBoot API Identification
  author: ProjectDiscoveryAI
  severity: info
  tags: identify

variables:
  paths:
    - "/jeecg-boot/"
    - "/jeecgboot/"
    - "/"
    - "/api/"

http:
  - raw:
      - |
        POST {{BaseURL}}{{paths}}sys/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {}
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "(contains(body, '\"验证码无效\"') && !contains(body, '验证码错误')) || (contains(body, '\"message\":\"用户名或密码错误！\"') && contains(body, '\"success\":false'))"
          - "!contains(body, '<')"

  - raw:
      - |
        POST {{BaseURL}}{{paths}}sys/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"captcha":"abcd"}
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "(contains(body, '验证码错误') && !contains(body, '\"验证码无效\"')) || (contains(body, '\"message\":\"用户名或密码错误！\"') && contains(body, '\"success\":false'))"
          - "!contains(body, '<')"
