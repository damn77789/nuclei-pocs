id: jenkins-cli-anyfile-read

info:
  name: Jenkins CLI Arbitrary File Read Vulnerability (CVE-2024-23897) (Version Detection)
  author: ProjectDiscoveryAI
  severity: critical
  tags: CVE-2024-23897,jenkins
  description: |
    This template detects Jenkins CLI arbitrary file read vulnerability by identifying specific vulnerable versions based on the X-Jenkins header.

http:
  - method: GET
    path:
      - "{{BaseURL}}/login?from=%2F"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: header
        regex:
          - "(?i)X-Jenkins: (?P<version>[0-9.]+)"
      - type: dsl
        dsl:
          - "compare_versions(regex_find(headers, 'X-Jenkins: ([0-9.]+)'), '<=2.426.2')"
