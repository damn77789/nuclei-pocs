id: hikvision-intercom-default-password
info:
  name: Hikvision Intercom Service Default Password
  author: ProjectDiscoveryAI
  severity: high
  tags: access-control
  description: |
    Detects Hikvision Intercom Service default password vulnerability by evaluating login responses.

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "document.title = LOGIN_BTN_LOGIN"

  - raw:
      - |
        POST /authorize.action HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&userpsw=827ccb0eea8a706c4c34a16891f84e7b&language=zh_cn

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{\"success\": true, \"msg\": \"OK\"}"
