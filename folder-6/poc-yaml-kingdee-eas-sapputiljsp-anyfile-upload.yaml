id: kingdee-eas-sapputiljsp-anyfile-upload
info:
  name: Kingdee EAS appUtil.jsp Arbitrary File Upload/Download Vulnerability
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

http:
  - method: GET
    path:
      - "{{BaseURL}}/easportal/tools/getenvs.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "programfiles(x86)"
          - "ADMINCLASSPATH"
          - "USE_HTTPSERVER_FOR_DOWNLOAD"
