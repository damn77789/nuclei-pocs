id: poc-yaml-h5s-video-platform-api-info-leak
info:
  name: H5S视频平台 /doc/api.html 接口文档信息未授权访问
  author: ProjectDiscoveryAI
  severity: medium
  tags: access-control
http:
  - method: GET
    path:
      - "{{BaseURL}}/doc/api.html"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "API文档"
          - "所有接口"
          - "接口列表"
          - "eolinker，一个简易开放的接口管理"
